<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%23131110'/%3E%3Ctext x='16' y='21' font-family='monospace' font-size='11' font-weight='bold' fill='%232ee6c8' text-anchor='middle'%3Eo_o%3C/text%3E%3C/svg%3E" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#131110" />
    <meta name="description" content="Dravix — a local companion for the M5Stack StackChan desk robot" />
    <title>Dravix · dravix-os</title>
    <script>
      // Pick the UI direction before React mounts, so English users don't flash RTL.
      // Mirrors initialLang() in src/i18n.tsx (same storage key + browser guess).
      (function () {
        try {
          var l = localStorage.getItem("dravix_lang");
          if (l !== "he" && l !== "en") {
            l = (navigator.language || "").toLowerCase().indexOf("he") === 0 ? "he" : "en";
          }
          var el = document.documentElement;
          el.lang = l;
          el.dir = l === "he" ? "rtl" : "ltr";
        } catch (e) {
          /* leave the default (Hebrew / RTL) */
        }
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Secular+One&family=Heebo:wght@400;500;700&family=IBM+Plex+Mono:wght@500;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
