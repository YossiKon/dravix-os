<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>dravix-os</title>
<style>
  :root {
    --bg: #0e1117; --panel: #161b22; --line: #232a35; --ink: #e6edf3;
    --muted: #8b949e; --accent: #4ea1ff; --ok: #3fb950; --bad: #f85149; --chip:#1f2630;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--ink);
    font: 14px/1.5 ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
  header { padding: 18px 24px; border-bottom: 1px solid var(--line); display:flex;
    align-items:center; gap:14px; }
  header h1 { font-size: 18px; margin: 0; letter-spacing: .3px; }
  header .ver { color: var(--muted); font-size: 12px; }
  .dot { width:10px; height:10px; border-radius:50%; background:var(--bad); box-shadow:0 0 8px var(--bad); }
  .dot.on { background:var(--ok); box-shadow:0 0 8px var(--ok); }
  main { max-width: 1040px; margin: 0 auto; padding: 24px; display:grid; gap:18px;
    grid-template-columns: repeat(2, 1fr); }
  .card { background: var(--panel); border:1px solid var(--line); border-radius:12px; padding:18px; }
  .card.full { grid-column: 1 / -1; }
  .card h2 { font-size: 13px; text-transform: uppercase; letter-spacing:.08em; color:var(--muted);
    margin:0 0 14px; }
  .row { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
  .kv { display:flex; justify-content:space-between; padding:6px 0; border-bottom:1px dashed var(--line); }
  .kv:last-child { border-bottom:0; }
  .kv span:first-child { color:var(--muted); }
  .chip { background:var(--chip); border:1px solid var(--line); border-radius:999px;
    padding:3px 10px; font-size:12px; color:var(--ink); }
  button { background:var(--accent); color:#04121f; border:0; border-radius:8px; padding:8px 14px;
    font-weight:600; cursor:pointer; }
  button.ghost { background:transparent; color:var(--ink); border:1px solid var(--line); font-weight:500; }
  button:active { transform: translateY(1px); }
  input, select { background:#0d1117; color:var(--ink); border:1px solid var(--line);
    border-radius:8px; padding:8px 10px; font: inherit; }
  input[type=range]{ padding:0; }
  input.grow { flex:1; min-width:120px; }
  .modelist { display:flex; flex-direction:column; gap:8px; }
  .mode { display:flex; justify-content:space-between; align-items:center; gap:10px;
    border:1px solid var(--line); border-radius:10px; padding:10px 12px; }
  .mode .meta b { display:block; }
  .mode .meta small { color:var(--muted); }
  .mode.active { border-color: var(--accent); }
  .log { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size:12px; color:var(--muted);
    white-space:pre-wrap; max-height:160px; overflow:auto; }
  @media (max-width:760px){ main{ grid-template-columns:1fr; } }
</style>
</head>
<body>
<header>
  <span id="dot" class="dot"></span>
  <h1>dravix-os</h1>
  <span class="ver" id="ver"></span>
</header>

<main>
  <section class="card">
    <h2>Status</h2>
    <div id="status">loading…</div>
  </section>

  <section class="card">
    <h2>Capabilities</h2>
    <div class="row" id="caps"><span class="chip">…</span></div>
  </section>

  <section class="card full">
    <h2>Modes</h2>
    <div class="modelist" id="modes">no modes loaded</div>
  </section>

  <section class="card">
    <h2>Manual control</h2>
    <div class="row" style="margin-bottom:10px">
      <select id="face">
        <option>neutral</option><option>happy</option><option>sad</option>
        <option>angry</option><option>sleepy</option><option>doubt</option>
        <option>love</option><option>dizzy</option>
      </select>
      <button class="ghost" onclick="setFace()">Set face</button>
    </div>
    <div class="row" style="margin-bottom:6px">
      <label style="width:46px;color:var(--muted)">yaw</label>
      <!-- the API takes normalized -1..1, not degrees -->
      <input type="range" id="yaw" min="-1" max="1" step="0.1" value="0" class="grow" oninput="yawv.textContent=this.value">
      <span id="yawv" class="chip">0</span>
    </div>
    <div class="row" style="margin-bottom:10px">
      <label style="width:46px;color:var(--muted)">pitch</label>
      <input type="range" id="pitch" min="-1" max="1" step="0.1" value="0" class="grow" oninput="pitchv.textContent=this.value">
      <span id="pitchv" class="chip">0</span>
    </div>
    <button class="ghost" onclick="moveHead()">Move head</button>
  </section>

  <section class="card full">
    <h2>Talk</h2>
    <div class="row">
      <input id="say" class="grow" placeholder="Make StackChan say…" />
      <button onclick="sayText()">Say</button>
    </div>
    <div class="row" style="margin-top:10px">
      <input id="chat" class="grow" placeholder="Chat (via AI router)…" />
      <button onclick="chat()">Send</button>
    </div>
    <div class="log" id="log" style="margin-top:12px"></div>
  </section>
</main>

<script>
const $ = (id) => document.getElementById(id);
const logEl = $("log");
function logLine(m){ logEl.textContent = `[${new Date().toLocaleTimeString()}] ${m}\n` + logEl.textContent; }
// Resolve API paths relative to where this page is served, so it works under HA ingress
// (/api/hassio_ingress/<token>/…) as well as direct :8800 — a root-absolute /api/ would 401.
const API_BASE = new URL('.', location.href).href;
async function api(path, opts){
  const url = API_BASE + String(path).replace(/^\//, '');
  const r = await fetch(url, { headers:{'Content-Type':'application/json'}, ...opts });
  const body = await r.json().catch(()=> ({}));
  if(!r.ok) throw new Error(typeof body.detail === 'string' ? body.detail : (body.detail ? JSON.stringify(body.detail) : r.statusText));
  return body;
}
async function refresh(){
  try{
    const h = await api('/api/health'); $("ver").textContent = 'v'+h.version;
    const s = await api('/api/status');
    $("dot").className = 'dot' + (s.robot.online ? ' on':'');
    $("status").innerHTML = `
      <div class="kv"><span>robot</span><span>${s.robot.online?'online':'offline'}</span></div>
      <div class="kv"><span>driver</span><span>${s.robot.driver} ${s.robot.transport?('· '+s.robot.transport):''}</span></div>
      <div class="kv"><span>expression</span><span>${s.robot.expression}</span></div>
      <div class="kv"><span>head</span><span>${s.robot.head_yaw}, ${s.robot.head_pitch}</span></div>
      <div class="kv"><span>active mode</span><span>${s.active_mode||'—'}</span></div>
      <div class="kv"><span>AI</span><span>${s.ai_available?s.ai_provider:'unavailable'}</span></div>
      ${s.robot.last_error?`<div class="kv"><span>error</span><span style="color:var(--bad)">${s.robot.last_error}</span></div>`:''}`;
    $("caps").innerHTML = (s.robot.capabilities||[]).map(c=>`<span class="chip">${c}</span>`).join('') || '<span class="chip">none</span>';
    const m = await api('/api/modes');
    $("modes").innerHTML = (m.modes.length? m.modes : []).map(md=>`
      <div class="mode ${md.active?'active':''}">
        <div class="meta"><b>${md.name} <small>(${md.kind})</small></b><small>${md.description||''}</small></div>
        <button class="ghost" onclick="${md.active?`deactivate()`:`activate('${md.name}')`}">${md.active?'Stop':'Activate'}</button>
      </div>`).join('') || 'no modes loaded';
  }catch(e){ logLine('refresh error: '+e.message); }
}
async function activate(n){ try{ await api(`/api/modes/${n}/activate`,{method:'POST'}); logLine('activated '+n); refresh(); }catch(e){ logLine(e.message);} }
async function deactivate(){ try{ await api(`/api/modes/deactivate`,{method:'POST'}); logLine('deactivated'); refresh(); }catch(e){ logLine(e.message);} }
async function setFace(){ try{ await api('/api/robot/face',{method:'POST',body:JSON.stringify({expression:$("face").value})}); logLine('face '+$("face").value); refresh(); }catch(e){ logLine(e.message);} }
async function moveHead(){ try{ await api('/api/robot/head',{method:'POST',body:JSON.stringify({yaw:+$("yaw").value,pitch:+$("pitch").value})}); logLine('head moved'); refresh(); }catch(e){ logLine(e.message);} }
async function sayText(){ try{ await api('/api/robot/say',{method:'POST',body:JSON.stringify({text:$("say").value})}); logLine('said: '+$("say").value); $("say").value=''; }catch(e){ logLine(e.message);} }
async function chat(){ try{ const r=await api('/api/ai/chat',{method:'POST',body:JSON.stringify({text:$("chat").value,speak:true})}); logLine('you: '+$("chat").value); logLine('ai: '+(r.text||'(no reply)')); $("chat").value=''; }catch(e){ logLine(e.message);} }
refresh(); setInterval(refresh, 5000);
</script>
</body>
</html>
