# ════════════════════════════════════════════════════════════════════════════════
#  dravix-os · StackChan — the git-tracked flavor
#
#  Put THIS tiny file in your ESPHome add-on as the robot's config (instead of the big
#  one). It pulls the real firmware straight from the dravix-os repo at build time, so
#  UPDATING THE FIRMWARE = the repo updated → you press Install. No copy-pasting.
#
#  EVERYTHING PERSONAL LIVES HERE (or in your secrets), never in the repo file:
#  · Wi-Fi: put wifi_ssid / wifi_password in your ESPHome secrets.yaml, as usual.
#  · Every per-person knob is a substitution below — uncomment what you need; local
#    values WIN over the repo's defaults.
#
#  · pick how you track the repo with `ref:`:
#       ref: main                 → always the latest (refresh: 0s re-checks every build)
#       ref: <a tag or commit>    → pinned; bump it yourself when you want to update
#  · ROLLBACK — new firmware misbehaving? Every release is tagged: set for example
#       ref: v0.0.94
#    (pick any older tag from the repo's Releases page), press Install, done.
# ════════════════════════════════════════════════════════════════════════════════

# ── Wi-Fi — YOUR network (edit these two lines!) ──────────────────────────────────
# Simplest: write your network name + password right here.
# Using the ESPHome SECRETS file instead (button top-right of the dashboard)? Put
#     wifi_ssid: "MyHomeWifi"
#     wifi_password: "my-password"
# there, and replace the two values below with:  !secret wifi_ssid  /  !secret wifi_password
wifi:
  ssid: "YOUR-WIFI-NAME"
  password: "YOUR-WIFI-PASSWORD"

substitutions:
  # ── identity ──────────────────────────────────────────────────────────────────
  # Running more than one robot? Give each a unique node name (mDNS + fresh-flash
  # entity prefix). Changing this on an adopted robot registers a NEW device in HA.
  # device_name: "stackchan"
  # friendly_name: "stackchan"
  # The entity-id prefix HA gave the robot's sensors. Fresh flash = the device_name;
  # if you renamed the device in HA (the dravix convention is "Dravix"), put that here.
  ha_prefix: "dravix"
  # A second prefix that is ALSO listened on (covers HA's "<area>_<device>" rename
  # quirk). Harmless if it doesn't exist; leave equal to ha_prefix when unsure.
  # ha_prefix_alt: "dravix"

  # ── voice ─────────────────────────────────────────────────────────────────────
  # The on-device wake word (any micro_wake_word model name).
  # wake_word_model: "okay_nabu"

  # ── room thresholds (greet-on-approach + sleep-when-dark) ─────────────────────
  # prox_near: "150"          # proximity counts above this = someone came close
  # prox_far: "80"            # …and below this = they left
  # lux_dark: "5"             # lux below this = room went dark → sleep
  # lux_bright: "30"          # lux above this = light came back → wake

packages:
  dravix_firmware:
    url: https://github.com/YossiKon/dravix-os
    files: [deploy/esphome/stackchan-dravix.yaml]
    ref: main
    refresh: 0s   # re-check the repo on every build, so Install always ships the latest
