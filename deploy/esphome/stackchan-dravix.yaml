# ════════════════════════════════════════════════════════════════════════════════
#  dravix-os · StackChan ESPHome firmware (M5Stack CoreS3)
#  Sits ON TOP of the M5Stack BSP (servos, mic, speaker, LEDs, touch come from it).
#  PET FACE: two big DRAWN eyes (blink · look around · squint when happy · widen when
#  listening) + pink cheeks + an animated mouth — a little desk creature, not a text face.
#  IT ACTS ALIVE: petting the head → pink LEDs + nuzzle-up + happy wiggle · every
#  expression has a mood LED colour + a head pose (sad droops, doubt tilts, angry shakes)
#  · it glances around with its head · going to sleep the head droops, waking it rises.
#  Switches: "Body language" = autonomous head moves · "Mood LEDs" = emotion colours.
#  States:  awake = WHITE bg + dark eyes  ·  listening = BIG eyes + YELLOW LEDs
#           screensaver = dim, face+blink, NO drift  ·  sleep = closed eyes + zzz, black
#  Wake word "Okay, Nabu" (on-device) · brightness control.
#  SWIPE:  down → status · up → face · left/right → 3 cards + the CATCH-ME game.
#  GAME "CATCH ME!": a teal dot runs around the screen — tap it to score; every 10
#  catches the robot celebrates (green LEDs + a happy head wiggle).
#  TAP face = talk (toggle) · LONG-PRESS face (1.2s) = instant sleep.
#  Publishes live state to HA:  sensor State (awake/listening/speaking/screensaver/sleep),
#  Last heard (STT), Last reply (TTS) — the dravix dashboard shows these in real time.
#  Buttons: Identify (find the robot — cyan flashes) · Reboot.
#  The 3 CARDS are DYNAMIC — you pick which HA entities appear on each one from the
#  dravix-os dashboard (Screens page); dravix pushes title+body into the text slots
#  below (text.dravix_card1_title / _body … card3). No need to edit entity_ids here.
#  Head servos + calibration + petting are handled by dravix-os (the add-on).
#  VALIDATE first. If `time:` clashes with the BSP, delete that block. Swipe is manual
#  (no built-in gesture) — if it misbehaves send me the log. LED save/restore uses
#  light id `stackchan_light_bar`; if that id is wrong, Validate will say so — tell me.
# ════════════════════════════════════════════════════════════════════════════════

esphome:
  name: stackchan
  friendly_name: stackchan
  # LIST form on purpose: package lists CONCATENATE, so the BSP's own on_boot automations
  # (RTC clock read + restoring the servos' calibration offsets!) are kept. A mapping here
  # would silently REPLACE them — and the head would boot uncalibrated every time.
  on_boot:
    - priority: -100
      then:
        # LVGL is ready from here on — allow face redraws (guards the privacy-restore path,
        # which otherwise fires render_face BEFORE the display exists → boot crash).
        - globals.set: { id: g_booted, value: "true" }
        - script.execute: render_face   # correct face + PRIVACY badge after any reboot
        # start listening for "Okay, Nabu" — unless privacy mode was left ON
        - if:
            condition: { switch.is_off: sw_privacy }
            then: [ micro_wake_word.start ]

esp32:
  variant: esp32s3
  flash_size: 16MB
  framework:
    type: esp-idf
    # REBOOT FIX / TEST: the ESP32-S3 brownout detector FALSE-fires on the current spike
    # when a servo starts moving while WiFi transmits — rebooting the board every few
    # minutes. Turning it off stops those false reboots (the #1 suspect here).
    #   · If the reboots STOP  → it was a (false) brownout. Done.
    #   · If it now HANGS or still reboots → you have a REAL power sag: use a strong
    #     5V/2A+ USB-C charger + a good cable (a tired battery / thin cable can't feed
    #     the servos). Re-enable detection by deleting the two lines below.
    sdkconfig_options:
      CONFIG_ESP_BROWNOUT_DET: "n"
      # OOM-RESET FIX: move the big WiFi + lwIP buffers into PSRAM (the CoreS3 has 8MB, nearly
      # empty) instead of the scarce ~300KB internal RAM. WiFi alone uses 64 RX + 64 TX buffers —
      # relocating them frees tens of KB of internal heap, which is exactly what the added LVGL
      # pages/widgets were starving (the resets are an internal-RAM out-of-memory, not the games).
      CONFIG_SPIRAM_TRY_ALLOCATE_WIFI_LWIP: "y"

logger:

api:

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "stackchan Fallback Hotspot"

captive_portal:

# Lets the robot DOWNLOAD images (Frigate person snapshots, any camera) to its screen.
http_request:
  verify_ssl: false

# The downloadable image for the ALERT page. Setting the "Show image URL" text entity
# (from HA automations / the dravix add-on) fetches the URL and shows it full-screen for
# ~25s, then returns to the face. Tip: append ?height=240 to Frigate snapshot URLs.
online_image:
  - id: oi_show
    url: "http://127.0.0.1/placeholder.jpg"   # replaced at runtime via Show image URL
    format: JPEG
    type: RGB565
    resize: 320x240
    update_interval: never
    on_download_finished:
      - lvgl.image.update: { id: img_show, src: oi_show }
      - lvgl.page.show: page_image
      - script.execute: img_timeout
    on_error:
      - logger.log: "show-image: download failed"

packages:
  m5stack_stackchan:
    url: https://github.com/m5stack/esphome-yaml
    files: [examples/kit/stackchan-bsp.factory.yaml]
    refresh: 1d

display:
  - id: !extend m5cores3_lcd
    show_test_card: false
    # note: DON'T set invert_colors here — the BSP's `true` is what the CoreS3 panel needs.

font:
  - file: "gfonts://Roboto"
    id: title_font
    size: 30
  - file: "gfonts://Roboto"
    id: text_font
    size: 24
  - file: "gfonts://Roboto"
    id: small_font
    size: 19
  - file: "gfonts://Roboto"
    id: big_font
    size: 52
  # Hebrew-capable font for the speech bubble (HA Assist usually replies in Hebrew).
  # ESPHome has no GF_Hebrew glyphset, so the Hebrew letters are listed explicitly here;
  # GF_Latin_Core covers digits / punctuation / any Latin the reply mixes in.
  - file: "gfonts://Heebo"
    id: heb_font
    size: 20
    glyphsets: [GF_Latin_Core]
    glyphs: ["א", "ב", "ג", "ד", "ה", "ו", "ז", "ח", "ט", "י", "כ", "ך", "ל", "מ", "ם", "נ", "ן", "ס", "ע", "פ", "ף", "צ", "ץ", "ק", "ר", "ש", "ת", "־", "׳", "״"]

globals:
  # true once on_boot ran — LVGL widgets exist and it's safe to draw
  - { id: g_booted, type: bool, restore_value: false, initial_value: "false" }
  # face state
  - { id: g_expr,   type: int,  restore_value: false, initial_value: "0" }
  - { id: g_blink,  type: bool, restore_value: false, initial_value: "false" }
  - { id: g_listen, type: bool, restore_value: false, initial_value: "false" }
  - { id: g_talk,   type: bool, restore_value: false, initial_value: "false" }
  - { id: g_tip,    type: bool, restore_value: false, initial_value: "false" }  # a wellness tip is showing
  - { id: g_voice,  type: bool, restore_value: false, initial_value: "false" }  # voice pipeline active
  - { id: g_sleep,  type: bool, restore_value: false, initial_value: "false" }
  - { id: g_saver,  type: bool, restore_value: false, initial_value: "false" }
  - { id: g_busy,   type: bool, restore_value: false, initial_value: "false" }
  - { id: g_night,  type: bool, restore_value: false, initial_value: "false" }   # לילה — dim + quiet behaviour
  - { id: g_focus,  type: bool, restore_value: false, initial_value: "false" }   # מרוכז — do-not-disturb
  - { id: g_quiet,  type: bool, restore_value: false, initial_value: "false" }   # שקט — low volume, no mood LEDs
  - { id: g_vol_saved, type: float, restore_value: false, initial_value: "-1" }  # volume before quiet mode
  - { id: g_anim,   type: int,  restore_value: false, initial_value: "0" }
  - { id: g_near,   type: bool, restore_value: false, initial_value: "false" }  # someone is close
  - { id: g_pet,    type: bool, restore_value: false, initial_value: "false" }  # being touched
  # swipe tracking + which "home screen" (0 = face, 1..3 = cards)
  - { id: sw_x0,    type: int,  restore_value: false, initial_value: "0" }
  - { id: sw_y0,    type: int,  restore_value: false, initial_value: "0" }
  - { id: sw_x1,    type: int,  restore_value: false, initial_value: "0" }
  - { id: sw_y1,    type: int,  restore_value: false, initial_value: "0" }
  - { id: sw_sleep, type: bool, restore_value: false, initial_value: "false" }
  - { id: g_card,   type: int,  restore_value: false, initial_value: "0" }
  - { id: g_score,  type: int,  restore_value: false, initial_value: "0" }   # catch-me game score
  - { id: g_tms,    type: long, restore_value: false, initial_value: "0" }   # touch-press start (ms)
  # mood-flash bookkeeping + head pose memory
  - { id: g_flash, type: bool,  restore_value: false, initial_value: "false" }   # a mood LED flash is active
  - { id: g_pitch_saved, type: float, restore_value: false, initial_value: "-1" }  # pitch before sleep-droop
  # saved LED state, so a voice interaction can restore it afterwards
  - { id: led_on,  type: bool,  restore_value: false, initial_value: "false" }
  - { id: led_bri, type: float, restore_value: false, initial_value: "0" }
  - { id: led_r,   type: float, restore_value: false, initial_value: "0" }
  - { id: led_g,   type: float, restore_value: false, initial_value: "0" }
  - { id: led_b,   type: float, restore_value: false, initial_value: "0" }
  # ── mini-games (the Games menu: Catch Me · Reaction · Simon · Rock-Paper-Scissors) ──
  - { id: g_react,   type: int,  restore_value: false, initial_value: "0" }   # reaction: 0 wait · 1 go · 2 result
  - { id: g_react_t, type: long, restore_value: false, initial_value: "0" }   # millis when it turned green
  - { id: g_slen,    type: int,  restore_value: false, initial_value: "0" }   # simon: sequence length so far
  - { id: g_spi,     type: int,  restore_value: false, initial_value: "0" }   # simon: playback cursor
  - { id: g_sipos,   type: int,  restore_value: false, initial_value: "0" }   # simon: your-turn cursor
  - { id: g_saccept, type: bool, restore_value: false, initial_value: "false" } # simon: accepting your taps
  - { id: g_rps_bot, type: int,  restore_value: false, initial_value: "0" }   # RPS: the robot's pick
  - { id: g_rps_out, type: int,  restore_value: false, initial_value: "0" }   # RPS: 0 tie · 1 you win · 2 robot wins
  - id: g_sq
    type: int[16]
    restore_value: false
    # plain '{}' is ambiguous between GlobalsComponent's two ctors (scalar vs array) in
    # ESPHome 2026.6.4 — pass an explicit std::array so it binds the array ctor cleanly.
    initial_value: "std::array<int, 16>{}"

# If Validate says homeassistant time already exists (from the BSP), delete this block.
time:
  - platform: homeassistant
    id: dravix_time

# ── DIAGNOSTICS (temporary — pull these out once the reboot cause is found) ──────
#  WHY DOES IT REBOOT? Watch these entities in HA:
#   · "Reset Reason" — the exact cause of the LAST reboot. Brownout ⇒ power/servo-stall
#     (a strong charger or fewer big moves fixes it) · Software Reset/panic ⇒ a code bug
#     · Task/Int Watchdog ⇒ a lambda that blocks the loop too long.
#   · "Heap Free" — if it slides toward ~0 just before each reboot, it's OOM (micro_wake_word
#     + camera + LVGL + voice is RAM-heavy). Stable & high ⇒ NOT memory.
#   · "Loop Time" — big spikes ⇒ something blocks the main loop (watchdog reboot).
debug:
  update_interval: 10s

sensor:
  - platform: debug
    free: { name: "Heap Free" }
    block: { name: "Heap Largest Block" }
    loop_time: { name: "Loop Time" }
    psram: { name: "PSRAM Free" }
  - platform: wifi_signal
    id: wifi_db
    update_interval: 30s
  - platform: uptime
    id: up_sec
  # Robot battery %, imported from HA. Fix the entity_id if yours differs.
  - platform: homeassistant
    id: ha_batt
    entity_id: sensor.dravix_battery_level
  # Proximity — the robot notices you approach and perks up (greets). The BSP exposes the
  # ltr_als_ps proximity as "Proximity counts". Tune the 150/80 thresholds to taste.
  - platform: homeassistant
    id: ha_prox
    entity_id: sensor.dravix_proximity_counts
    on_value:
      - if:
          condition: { lambda: 'return x > 150 && !id(g_near) && id(sw_greet).state;' }
          then:
            - globals.set: { id: g_near, value: "true" }
            - script.execute: greet
      - if:
          condition: { lambda: 'return x < 80;' }                    # they moved away
          then:
            - globals.set: { id: g_near, value: "false" }
  # Ambient light — night = sleep (room goes dark), morning = wake (lights come on).
  # ltr_als_ps exposes "Ambient light". Tune the 5/30 lux thresholds to your room.
  - platform: homeassistant
    id: ha_lux
    entity_id: sensor.dravix_ambient_light
    on_value:
      - if:
          condition: { lambda: 'return x < 5 && !id(g_sleep) && id(sw_dark).state;' }   # dark → sleep
          then:
            - select.set: { id: robot_mode, option: sleep }
      - if:
          condition: { lambda: 'return x > 30 && id(g_sleep) && id(sw_dark).state;' }    # light → wake
          then:
            - select.set: { id: robot_mode, option: awake }
text_sensor:
  # DIAGNOSTIC (temporary): the exact reason for the last reboot — see the debug block above.
  - platform: debug
    reset_reason: { name: "Reset Reason" }
  # PETTING — the BSP's touch sensors publish TEXT ("No touch" / touch levels), so they
  # must be imported as text. Any state that isn't "No touch" = you're petting the head →
  # pink LEDs + nuzzle + happy face (see pet_react). Add sensors 2/3 the same way if you like.
  - platform: homeassistant
    id: ha_touch1
    entity_id: sensor.dravix_touch_sensor_1
    on_value:
      - if:
          condition:
            lambda: |-
              return x != "No touch" && x != "unknown" && x != "unavailable" && x != ""
                     && !id(g_pet) && id(sw_touch).state;
          then:
            - globals.set: { id: g_pet, value: "true" }
            - script.execute: pet_react
      - if:
          condition: { lambda: 'return x == "No touch";' }            # released
          then:
            - globals.set: { id: g_pet, value: "false" }
  # Fallback: some flashes register the touch sensor under the `mmd_room_dravix_` prefix
  # (the device/area-rename quirk) instead of `dravix_`. Only one of the two really exists;
  # the other just stays unavailable. This makes petting survive either prefix.
  - platform: homeassistant
    id: ha_touch1b
    entity_id: sensor.mmd_room_dravix_touch_sensor_1
    on_value:
      - if:
          condition:
            lambda: |-
              return x != "No touch" && x != "unknown" && x != "unavailable" && x != ""
                     && !id(g_pet) && id(sw_touch).state;
          then:
            - globals.set: { id: g_pet, value: "true" }
            - script.execute: pet_react
      - if:
          condition: { lambda: 'return x == "No touch";' }
          then:
            - globals.set: { id: g_pet, value: "false" }
  - platform: wifi_info
    ip_address:
      id: ip_txt
    ssid:
      id: ssid_txt
  # Live robot state for HA + the dravix dashboard: awake/listening/speaking/screensaver/sleep.
  - platform: template
    name: "State"
    id: st_state
  # What the robot heard (STT) and what it answered (TTS) — shown live on the dashboard.
  - platform: template
    name: "Last heard"
    id: st_heard
  - platform: template
    name: "Last reply"
    id: st_reply

# ── Dynamic card slots — dravix-os writes these (you choose the entities in the UI) ──
text:
  - platform: template
    name: "Card1 title"
    id: t_c1_title
    optimistic: true
    mode: text
    max_length: 30
    initial_value: "CARD 1"
  - platform: template
    name: "Card1 body"
    id: t_c1_body
    optimistic: true
    mode: text
    max_length: 160
    initial_value: ""
  - platform: template
    name: "Card2 title"
    id: t_c2_title
    optimistic: true
    mode: text
    max_length: 30
    initial_value: "CARD 2"
  - platform: template
    name: "Card2 body"
    id: t_c2_body
    optimistic: true
    mode: text
    max_length: 160
    initial_value: ""
  - platform: template
    name: "Card3 title"
    id: t_c3_title
    optimistic: true
    mode: text
    max_length: 30
    initial_value: "CARD 3"
  - platform: template
    name: "Card3 body"
    id: t_c3_body
    optimistic: true
    mode: text
    max_length: 160
    initial_value: ""
  # Set this to any image URL → the robot shows it full-screen (empty = back to the face).
  # e.g. http://<frigate>:5000/api/<camera>/latest.jpg?height=240
  - platform: template
    name: "Show image URL"
    id: t_img_url
    optimistic: true
    mode: text
    max_length: 255
    initial_value: ""
    set_action:
      - if:
          condition: { lambda: 'return x.empty();' }
          then:
            - lvgl.page.show: page_face
          else:
            - online_image.set_url:      # set_url also starts the download itself
                id: oi_show
                url: !lambda 'return x;'
  # ── WELLNESS TIP — dravix writes a short tip here; the robot pops it in the speech
  #    bubble, flashes cyan + wiggles so you notice, then auto-hides after ~12s.
  - platform: template
    name: "Tip"
    id: t_tip
    optimistic: true
    mode: text
    max_length: 120
    initial_value: ""
    set_action:
      - if:
          condition: { lambda: 'return !x.empty();' }
          then:
            - globals.set: { id: g_tip, value: "true" }
            - lvgl.label.update: { id: speech_txt, text: !lambda 'return x;' }
            - lvgl.page.show: page_face
            - script.execute: render_face
            - script.execute: { id: led_flash, r: 0, g: 80, b: 100 }   # cyan attention flash
            - script.execute: head_shake                                # a wiggle so you notice
            - script.execute: tip_timeout
          else:
            - globals.set: { id: g_tip, value: "false" }
            - script.execute: render_face

number:
  - platform: template
    name: "Screensaver after (min)"
    id: n_screensaver
    optimistic: true
    min_value: 1
    max_value: 120
    step: 1
    initial_value: 5
    restore_value: true
  - platform: template
    name: "Sleep after (min)"
    id: n_sleep
    optimistic: true
    min_value: 1
    max_value: 240
    step: 1
    initial_value: 15
    restore_value: true
  - platform: template
    name: "Screen brightness"
    id: n_brightness
    optimistic: true
    min_value: 10
    max_value: 100
    step: 5
    initial_value: 100
    unit_of_measurement: "%"
    restore_value: true
    set_action:
      - light.turn_on:
          id: lcd_backlight
          brightness: !lambda 'return x / 100.0;'
  # Head PITCH in YOUR units (158..260). The BSP's servo_y_angle is locked to 0..90 and can't
  # be re-ranged, so this number maps 158..260 → the real 0..90 servo. In dravix-os Setup,
  # map "Head — up/down" to THIS entity: number.dravix_head_pitch  (instead of servo_y_angle).
  - platform: template
    name: "Head pitch"
    id: n_head_pitch
    optimistic: true
    min_value: 158
    max_value: 260
    step: 1
    initial_value: 165
    restore_value: true
    set_action:
      - number.set:
          id: servo_y_angle
          value: !lambda 'return (x - 158.0f) * 90.0f / 102.0f;'   # 158..260 → 0..90
  # ── VITALS bars — dravix writes these 0-100; page_vitals draws them as bars ──
  - { platform: template, name: "Vital energy", id: n_vital_energy, optimistic: true, min_value: 0, max_value: 100, step: 1, initial_value: 80 }
  - { platform: template, name: "Vital food",   id: n_vital_food,   optimistic: true, min_value: 0, max_value: 100, step: 1, initial_value: 80 }
  - { platform: template, name: "Vital fun",    id: n_vital_fun,    optimistic: true, min_value: 0, max_value: 100, step: 1, initial_value: 70 }
  - { platform: template, name: "Vital calm",   id: n_vital_calm,   optimistic: true, min_value: 0, max_value: 100, step: 1, initial_value: 80 }

# ── Utility buttons ───────────────────────────────────────────────────────────
button:
  - platform: template
    name: "Identify"
    id: btn_identify
    on_press:
      - script.execute: identify
  - platform: restart
    name: "Reboot"
    id: btn_reboot

# ── Behaviour toggles — flip these from Home Assistant / the dravix dashboard ────
switch:
  - { platform: template, name: "Greet on approach", id: sw_greet,     optimistic: true, restore_mode: RESTORE_DEFAULT_ON }
  - { platform: template, name: "Sleep when dark",   id: sw_dark,      optimistic: true, restore_mode: RESTORE_DEFAULT_ON }
  - { platform: template, name: "Touch reaction",    id: sw_touch,     optimistic: true, restore_mode: RESTORE_DEFAULT_ON }
  - { platform: template, name: "Speaking LEDs",     id: sw_speak_led, optimistic: true, restore_mode: RESTORE_DEFAULT_ON }
  - { platform: template, name: "Random blink",      id: sw_blink,     optimistic: true, restore_mode: RESTORE_DEFAULT_ON }
  - { platform: template, name: "Idle head drift",   id: sw_drift,     optimistic: true, restore_mode: RESTORE_DEFAULT_ON }
  - { platform: template, name: "Tap face to talk",  id: sw_tap_talk,  optimistic: true, restore_mode: RESTORE_DEFAULT_ON }
  - { platform: template, name: "Body language",     id: sw_move,      optimistic: true, restore_mode: RESTORE_DEFAULT_ON }
  - { platform: template, name: "Mood LEDs",         id: sw_mood_led,  optimistic: true, restore_mode: RESTORE_DEFAULT_ON }
  # PRIVACY: kills the microphone on-device (wake word + voice pipeline stopped) and shows
  # a red PRIVACY badge on the face. dravix additionally blocks the camera stream/snapshot
  # endpoints (the path Frigate + the dashboard use) while this is ON.
  - platform: template
    name: "Privacy mode"
    id: sw_privacy
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    on_turn_on:
      - voice_assistant.stop
      - micro_wake_word.stop
      # restore_mode replays this at BOOT, before the display exists — only draw when ready
      - if:
          condition: { lambda: 'return id(g_booted);' }
          then: [ { script.execute: render_face } ]
    on_turn_off:
      - micro_wake_word.start
      - if:
          condition: { lambda: 'return id(g_booted);' }
          then: [ { script.execute: render_face } ]

lvgl:
  displays:
    - m5cores3_lcd
  # A tasteful default style for every "card" container.
  style_definitions:
    - id: card_box
      radius: 18
      bg_color: 0x121821
      bg_opa: COVER
      border_color: 0x2b3644
      border_width: 2
      pad_all: 16
    - id: accent_txt
      text_color: 0x33E6C8
    - id: muted_txt
      text_color: 0x8b96a4
  # ── STATUS BAR — a slim overlay on the TOP LAYER (floats above every page). Swipe DOWN
  #    shows it; swipe up/left/right hides it. Stays until you dismiss it (no auto-vanish).
  #    Drawn from primitives (no icon font): wifi = 4 signal bars, battery = outline+fill.
  top_layer:
    widgets:
      - obj:
          id: statusbar
          align: TOP_MID
          x: 0
          y: 0
          width: 320
          height: 40
          radius: 0
          bg_color: 0x05080b
          bg_opa: COVER
          border_width: 0
          pad_all: 0          # no default padding — otherwise the text is clipped
          hidden: true
          scrollbar_mode: "OFF"
          widgets:
            # WiFi — 4 ascending signal bars (upper bars hidden as the signal drops)
            - obj: { id: sb_w1, x: 12, y: 24, width: 4, height: 6,  radius: 1, bg_color: 0x33E6C8, bg_opa: COVER, border_width: 0 }
            - obj: { id: sb_w2, x: 18, y: 20, width: 4, height: 10, radius: 1, bg_color: 0x33E6C8, bg_opa: COVER, border_width: 0 }
            - obj: { id: sb_w3, x: 24, y: 16, width: 4, height: 14, radius: 1, bg_color: 0x33E6C8, bg_opa: COVER, border_width: 0 }
            - obj: { id: sb_w4, x: 30, y: 12, width: 4, height: 18, radius: 1, bg_color: 0x33E6C8, bg_opa: COVER, border_width: 0 }
            # Clock + date — SMALL font, vertically centred (LEFT_MID) so nothing is clipped
            - label: { id: sb_time, text: "--:--", text_font: small_font, text_color: 0xFFFFFF, align: LEFT_MID, x: 60,  y: 0 }
            - label: { id: sb_date, text: "",      text_font: small_font, text_color: 0x8b96a4, align: LEFT_MID, x: 132, y: 0 }
            # Battery — % label + outline + fill + nub (right side)
            - label: { id: sb_batt, text: "--%", text_font: small_font, text_color: 0x5dffa0, align: LEFT_MID, x: 196, y: 0 }
            - obj: { id: sb_bat_o, x: 244, y: 12, width: 34, height: 16, radius: 2, bg_opa: TRANSP, border_color: 0xFFFFFF, border_width: 2 }
            - bar:
                id: sb_bat_f
                x: 247
                y: 15
                width: 28
                height: 10
                min_value: 0
                max_value: 100
                value: 0
                indicator:
                  bg_color: 0x5dffa0
                  bg_opa: COVER
            - obj: { id: sb_bat_n, x: 279, y: 16, width: 3, height: 8, radius: 1, bg_color: 0xFFFFFF, bg_opa: COVER, border_width: 0 }
  on_idle:
    # After 3 min of no touch, drift back to the FACE from any other screen (cards / games /
    # vitals). Touching any screen resets this timer (LVGL counts touches as activity).
    - timeout: 180000ms
      then:
        - if:
            condition:
              not:
                lvgl.page.is_showing: page_face
            then:
              - globals.set: { id: g_card, value: "0" }
              - lvgl.widget.hide: statusbar
              - lvgl.page.show: page_face
    # Screensaver: dim + dozy breathing eyes + a soft clock (night mode is already dim — skip).
    - timeout: !lambda 'return (uint32_t) id(n_screensaver).state * 60000;'
      then:
        - if:
            condition: { lambda: 'return !id(g_voice) && !id(g_sleep) && !id(g_night);' }
            then:
              - globals.set: { id: g_saver, value: "true" }
              - script.execute: render_face
              - light.turn_on: { id: lcd_backlight, brightness: 25% }
    # Sleep: freeze (no movement) and go black — via the mode select so HA stays in sync.
    - timeout: !lambda 'return (uint32_t) id(n_sleep).state * 60000;'
      then:
        - if:
            condition: { lambda: 'return !id(g_voice);' }
            then:
              - select.set: { id: robot_mode, option: sleep }
  pages:
    # ── Page 0: the face (HOME) ──────────────────────────────────────────────────
    - id: page_face
      bg_color: 0x000000
      bg_opa: COVER
      # the face drifts partly off-page when "looking around" — never let that scroll the page
      scrollable: false
      scrollbar_mode: "OFF"
      widgets:
        - obj:
            id: bg_rect
            x: 0
            y: 0
            width: 320
            height: 240
            radius: 0
            border_width: 0
            bg_color: 0x000000
            bg_opa: COVER
        # ── the pet face: everything lives in face_box so it can "look around" as one ──
        - obj:
            id: face_box
            align: CENTER
            width: 320
            height: 210
            bg_opa: TRANSP
            border_width: 0
            scrollbar_mode: "OFF"
            widgets:
              - obj: { id: eye_l,   align: CENTER, x: -58, y: 0,  width: 64, height: 64, radius: 22, bg_color: 0x33E6C8, bg_opa: COVER, border_width: 0 }
              - obj: { id: eye_r,   align: CENTER, x: 58,  y: 0,  width: 64, height: 64, radius: 22, bg_color: 0x33E6C8, bg_opa: COVER, border_width: 0 }
              - obj: { id: cheek_l, align: CENTER, x: -58, y: 42, width: 28, height: 10, radius: 5,  bg_color: 0xFF9EB5, bg_opa: COVER, border_width: 0, hidden: true }
              - obj: { id: cheek_r, align: CENTER, x: 58,  y: 42, width: 28, height: 10, radius: 5,  bg_color: 0xFF9EB5, bg_opa: COVER, border_width: 0, hidden: true }
              - obj: { id: mouth,   align: CENTER, x: 0,   y: 64, width: 40, height: 8,  radius: 4,  bg_color: 0x33E6C8, bg_opa: COVER, border_width: 0 }
        # zzz while sleeping
        - label:
            id: lbl_zzz
            text: ""
            text_font: title_font
            text_color: 0x33E6C8
            align: TOP_LEFT
            x: 12
            y: 8
        # red badge while privacy mode is on (mic dead + camera blocked)
        - label:
            id: lbl_priv
            text: ""
            text_font: small_font
            text_color: 0xE05555
            align: TOP_MID
            y: 6
        # a soft clock, shown only on the screensaver
        - label:
            id: lbl_clock
            text: ""
            text_font: title_font
            text_color: 0x8b96a4
            align: BOTTOM_MID
            y: -8
        # Low-battery warning — appears (red) on the face only when battery < 20%.
        - label:
            id: lbl_face_batt
            text: ""
            text_font: small_font
            text_color: 0xE05555
            align: TOP_RIGHT
            x: -6
            y: 4
        # SPEECH BUBBLE — shows "Listening..." while listening and the AI's reply while
        # speaking (Hebrew via heb_font). Hidden otherwise; text set by the voice events.
        - obj:
            id: speech_bubble
            align: BOTTOM_MID
            y: -2
            width: 312
            height: 66
            radius: 14
            bg_color: 0x1a2233
            bg_opa: COVER
            border_color: 0x33E6C8
            border_width: 2
            pad_all: 6
            hidden: true
            scrollbar_mode: "OFF"
            widgets:
              - label:
                  id: speech_txt
                  align: CENTER
                  width: 296
                  text: ""
                  text_font: heb_font
                  text_color: 0xFFFFFF
                  text_align: RIGHT
                  long_mode: WRAP
    # ── The 3 dynamic cards (swipe left/right). (The old full status PAGE was removed —
    #    the swipe-down status BAR overlay replaced it; keeping both just wasted RAM.) ──
    - id: page_card1
      bg_color: 0x05080b
      bg_opa: COVER
      widgets:
        - obj:
            styles: card_box
            align: CENTER
            width: 300
            height: 222
            scrollbar_mode: "OFF"
            widgets:
              - label: { id: lbl_c1_title, text: "CARD 1", text_font: title_font, styles: accent_txt, align: TOP_MID, y: 2 }
              - label: { id: lbl_c1_body, text: "", text_font: text_font, text_color: 0xFFFFFF, align: TOP_LEFT, x: 4, y: 52 }
    - id: page_card2
      bg_color: 0x05080b
      bg_opa: COVER
      widgets:
        - obj:
            styles: card_box
            align: CENTER
            width: 300
            height: 222
            scrollbar_mode: "OFF"
            widgets:
              - label: { id: lbl_c2_title, text: "CARD 2", text_font: title_font, styles: accent_txt, align: TOP_MID, y: 2 }
              - label: { id: lbl_c2_body, text: "", text_font: text_font, text_color: 0xFFFFFF, align: TOP_LEFT, x: 4, y: 52 }
    - id: page_card3
      bg_color: 0x05080b
      bg_opa: COVER
      widgets:
        - obj:
            styles: card_box
            align: CENTER
            width: 300
            height: 222
            scrollbar_mode: "OFF"
            widgets:
              - label: { id: lbl_c3_title, text: "CARD 3", text_font: title_font, styles: accent_txt, align: TOP_MID, y: 2 }
              - label: { id: lbl_c3_body, text: "", text_font: text_font, text_color: 0xFFFFFF, align: TOP_LEFT, x: 4, y: 52 }
    # ── Page 5: CATCH ME! — tap the dot before it runs away (in the swipe cycle) ──
    - id: page_play
      bg_color: 0x05080b
      bg_opa: COVER
      widgets:
        - label: { id: lbl_play, text: "CATCH ME!", text_font: title_font, styles: accent_txt, align: TOP_MID, y: 6 }
        - label: { id: lbl_score, text: "0", text_font: big_font, text_color: 0xFFFFFF, align: TOP_RIGHT, x: -12, y: 0 }
        - button:
            id: play_back
            x: 6
            y: 6
            width: 52
            height: 28
            radius: 8
            bg_color: 0x05080b
            widgets:
              - label: { text: "<", text_font: text_font, text_color: 0x33E6C8, align: CENTER }
            on_click:
              - globals.set: { id: g_card, value: "4" }
              - lvgl.page.show: page_games
        - button:
            id: btn_dot
            x: 132
            y: 100
            width: 56
            height: 56
            radius: 28
            bg_color: 0x33E6C8
            widgets:
              # the dot is a tiny creature — it has a face 🙂
              - label: { text: "o_o", text_font: small_font, text_color: 0x05080b, align: CENTER }
            on_click:
              - lambda: 'id(g_score) += 1;'
              - lvgl.label.update:
                  id: lbl_score
                  text: !lambda 'char b[12]; snprintf(b, sizeof(b), "%d", id(g_score)); return std::string(b);'
              # the dot escapes to a random spot
              - lvgl.widget.update:
                  id: btn_dot
                  x: !lambda 'return (int)(random_float() * 240.0f) + 12;'
                  y: !lambda 'return (int)(random_float() * 130.0f) + 46;'
              # every 10 catches → celebration!
              - if:
                  condition: { lambda: 'return id(g_score) % 10 == 0;' }
                  then:
                    - script.execute: { id: led_flash, r: 20, g: 100, b: 30 }
                    - script.execute: head_shake
    # ── Page 6: ALERT IMAGE — a downloaded snapshot (Frigate person, doorbell, …) ──
    - id: page_image
      bg_color: 0x000000
      bg_opa: COVER
      widgets:
        - image:
            id: img_show
            align: CENTER
            src: oi_show
    # ── GAMES MENU — swipe to the "game" slot in the card cycle to open this ──────
