            width: 300
            height: 44
            radius: 10
            bg_color: 0x121821
            widgets:
              - label: { id: lbl_c1_r1, text: "", text_font: small_font, text_color: 0xFFFFFF, align: LEFT_MID, x: 10 }
            on_click:
              - homeassistant.event: { event: esphome.dravix_card, data: { card: "1", row: "1" } }
        - button:
            id: c1_r2
            x: 10
            y: 142
            width: 300
            height: 44
            radius: 10
            bg_color: 0x121821
            widgets:
              - label: { id: lbl_c1_r2, text: "", text_font: small_font, text_color: 0xFFFFFF, align: LEFT_MID, x: 10 }
            on_click:
              - homeassistant.event: { event: esphome.dravix_card, data: { card: "1", row: "2" } }
        - button:
            id: c1_r3
            x: 10
            y: 192
            width: 300
            height: 44
            radius: 10
            bg_color: 0x121821
            widgets:
              - label: { id: lbl_c1_r3, text: "", text_font: small_font, text_color: 0xFFFFFF, align: LEFT_MID, x: 10 }
            on_click:
              - homeassistant.event: { event: esphome.dravix_card, data: { card: "1", row: "3" } }
    - id: page_card2
      bg_color: 0x05080b
      bg_opa: COVER
      scrollable: false
      scrollbar_mode: "OFF"
      widgets:
        - label: { id: lbl_c2_title, text: "CARD 2", text_font: title_font, styles: accent_txt, align: TOP_MID, y: 4 }
        - button:
            id: c2_r0
            x: 10
            y: 42
            width: 300
            height: 44
            radius: 10
            bg_color: 0x121821
            widgets:
              - label: { id: lbl_c2_r0, text: "", text_font: small_font, text_color: 0xFFFFFF, align: LEFT_MID, x: 10 }
            on_click:
              - homeassistant.event: { event: esphome.dravix_card, data: { card: "2", row: "0" } }
        - button:
            id: c2_r1
            x: 10
            y: 92
            width: 300
            height: 44
            radius: 10
            bg_color: 0x121821
            widgets:
              - label: { id: lbl_c2_r1, text: "", text_font: small_font, text_color: 0xFFFFFF, align: LEFT_MID, x: 10 }
            on_click:
              - homeassistant.event: { event: esphome.dravix_card, data: { card: "2", row: "1" } }
        - button:
            id: c2_r2
            x: 10
            y: 142
            width: 300
            height: 44
            radius: 10
