        # the bubble's tail — two teal lines converging toward the mouth
        - line: { id: bub_t1, points: ["150, 93", "132, 114"], line_width: 4, line_color: 0x33E6C8, line_rounded: true, hidden: true }
        - line: { id: bub_t2, points: ["174, 93", "132, 114"], line_width: 4, line_color: 0x33E6C8, line_rounded: true, hidden: true }
