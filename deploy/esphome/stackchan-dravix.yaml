                  - label: { text: "Reject", text_font: small_font, text_color: 0xFFFFFF, align: CENTER }
                on_click:
                  - globals.set: { id: g_perm, value: "false" }
                  - homeassistant.event: { event: esphome.dravix_permission, data: { decision: "reject" } }
                  - globals.set: { id: perm_dec, value: "2" }
                  - script.execute: perm_log
                  - lvgl.widget.hide: perm_box
  on_idle:
    # After ~6s of no interaction, settle the face back to the mood's resting expression, so a
    # pet / greet / tickle that set a happy "blush" face directly doesn't stick there forever
    # (the mood engine can't fix that — it only pushes on change). Touch/voice/reactions reset it.
    - timeout: 6000ms
      then:
        - if:
            condition:
              lambda: |-
                return !id(g_sleep) && !id(g_listen) && !id(g_talk) && !id(g_think)
                       && !id(g_saver) && !id(g_focus) && !id(g_voice)
                       && id(g_expr) != id(g_face_rest);
            then:
              - globals.set: { id: g_expr, value: !lambda 'return id(g_face_rest);' }
              - script.execute: render_face
    # After 3 min of no touch, drift back to the FACE from any other screen (cards / games /
    # vitals). Touching any screen resets this timer (LVGL counts touches as activity).
    - timeout: 180000ms
      then:
        - if:
            condition:
              not:
                lvgl.page.is_showing: page_face
            then:
              - globals.set: { id: g_card, value: "0" }
              - lvgl.widget.hide: statusbar
              - lvgl.page.show: page_face
    # Screensaver: dim + dozy breathing eyes + a soft clock (night mode is already dim — skip).
    - timeout: !lambda 'return (uint32_t) id(n_screensaver).state * 60000;'
      then:
        - if:
            condition: { lambda: 'return !id(g_voice) && !id(g_sleep) && !id(g_night);' }
            then:
              - globals.set: { id: g_saver, value: "true" }
              - script.execute: render_face
              - light.turn_on: { id: lcd_backlight, brightness: 25% }
    # Sleep: freeze (no movement) and go black — via the mode select so HA stays in sync.
    - timeout: !lambda 'return (uint32_t) id(n_sleep).state * 60000;'
      then:
        - if:
            condition: { lambda: 'return !id(g_voice);' }
            then:
              - select.set: { id: robot_mode, option: sleep }
