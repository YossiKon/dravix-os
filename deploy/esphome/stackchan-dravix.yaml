script:
  # ── FACE TAP dispatch — single tap = STOP everything · double tap = toggle the AI ──
  - id: panic_stop            # single tap: cut speech + dance + effects, LEDs off, clean face
    then:
      - voice_assistant.stop                    # stop listening / speaking mid-sentence
      - media_player.stop: va_media_player      # …and external TTS (dravix chat/notify) too
      - script.stop: led_flash
      - script.stop: party                      # stop the disco / dance
      - script.stop: identify
      # …and EVERY other animation — "stop everything" used to leave a dance bopping with
      # rainbow LEDs (its own restore then overrode the turn-off below).
      - script.stop: dance
      - script.stop: eat
      - script.stop: drink
      - script.stop: tickle
      - script.stop: boop_react
      - script.stop: wave_react
      - script.stop: hand_react
      - script.stop: greet
      - script.stop: wave
      - script.stop: shy
      - script.stop: clap
      - script.stop: pet_react
      - script.stop: plug_react
      - script.stop: ir_glance
      - script.stop: dizzy_react
      - script.stop: react_hot
      - script.stop: react_cold
      - script.stop: rub_eyes
      - script.stop: head_nudge
      - script.stop: head_shake
      - script.stop: head_nod
      - globals.set: { id: g_flash,  value: "false" }
      - globals.set: { id: g_listen, value: "false" }
      - globals.set: { id: g_think,  value: "false" }   # else STOP mid-"thinking" leaves the face + HA state stuck
      - globals.set: { id: g_talk,   value: "false" }
      - globals.set: { id: g_voice,  value: "false" }
      - globals.set: { id: g_sweat,  value: "false" }
      - globals.set: { id: g_conc,   value: "false" }
      - globals.set: { id: g_ext_talk, value: "false" }
      # a stopped eat/drink cleans up only at its END — tidy its props here
      - lvgl.widget.hide: hand_l
      - lvgl.widget.hide: hand_r
      - lvgl.widget.hide: food_item
      - lvgl.widget.hide: food_top
      - lvgl.widget.hide: heart1
      - lvgl.widget.hide: heart2
      - lvgl.widget.hide: heart3
      - lvgl.widget.hide: drink_glass
      - lvgl.widget.hide: drink_water
      - lvgl.widget.update: { id: hand_l, x: -34, y: 92 }   # paws back to their home spot
      - lvgl.widget.update: { id: hand_r, x: 34, y: 92 }
      - light.turn_on: { id: stackchan_light_bar, effect: "None" }   # cancel a running LED effect…
      - light.turn_off: stackchan_light_bar     # …then no LEDs — back to a clean state
      - script.execute: render_face             # redraw the current mode's face
  - id: tap_single            # settle timer: a settled DOUBLE (2 taps) toggles the AI; 1 tap = nothing
    mode: restart
    then:
      - delay: 380ms
      - if:
          condition: { lambda: 'return id(g_tapc) == 2;' }
          then:
            - if:
                condition: { lambda: 'return id(g_voice);' }
                then:
                  - voice_assistant.stop
                else:
                  - if:
                      condition: { switch.is_off: sw_privacy }
                      then: [ voice_assistant.start ]
      - globals.set: { id: g_tapc, value: "0" }
      - globals.set: { id: g_dc_ms, value: "0" }
  # After ~25s the alert image goes away and the face comes back.
  - id: img_timeout
    mode: restart
    then:
      - delay: 25s
      - if:
          condition: { lvgl.page.is_showing: page_image }
          then: [ { lvgl.page.show: page_face } ]
  # A wellness tip auto-hides after ~12s (the speech bubble goes back to the face).
  - id: tip_timeout
    mode: restart
    then:
      - delay: 12s
      - globals.set: { id: g_tip, value: "false" }
      - script.execute: render_face
  # NO-VOICE AUTO-CLOSE — armed on every listen (wake word / double-tap / follow-up turn).
  # If ${listen_timeout_s}s pass while STILL listening and VAD never heard a voice, close
  # the session (voice_assistant.stop → on_end cleans the face/LEDs + re-arms the wake
  # word). Once a voice IS detected (g_vad) this never cuts you off mid-sentence.
  - id: listen_timeout
    mode: restart
    then:
      - delay: ${listen_timeout_s}s
      - if:
          condition: { lambda: 'return id(g_listen) && !id(g_vad);' }
          then:
            - voice_assistant.stop
  # Safety auto-hide for the permission prompt — clears the buttons after 3 min if you never
  # tapped (the agent has already timed out by then). NEVER auto-decides — just tidies up.
  - id: perm_timeout
    mode: restart
    then:
      - delay: 180s
      - globals.set: { id: g_perm, value: "false" }
      - lvgl.widget.hide: perm_box
  # APPROVE via a head touch — fires the moment you touch (quick + reliable, no waiting for
  # release / no HA round-trip race). REJECT is screen-only (the red button on the prompt).
  # NOT while asleep/screensaver: petting a sleeping robot must never blind-approve an
  # agent request the user hasn't even seen.
  - id: perm_approve
    then:
      - if:
          condition: { lambda: 'return id(g_perm) && !id(g_sleep) && !id(g_saver);' }
          then:
            - globals.set: { id: g_perm, value: "false" }
            - lvgl.widget.hide: perm_box
            - homeassistant.event: { event: esphome.dravix_permission, data: { decision: "approve" } }
            - globals.set: { id: perm_dec, value: "1" }
            - script.execute: perm_log
            - script.execute: head_nod            # a "yes" nod to confirm
  # APPROVE from a face TAP — waits 200 ms first, so a tap on the red Reject button wins the race
  # (Reject flips g_perm off, and this then no-ops). Head-touch still approves instantly.
  - id: perm_tap_approve
    mode: restart
    then:
      - delay: 200ms
      - if:
          condition: { lambda: 'return id(g_perm);' }
          then: [ { script.execute: perm_approve } ]
  # Set both eyes to a shape: width / height / corner-radius / vertical offset.
  # (Eyes are align:CENTER, so size changes keep them centred — no x math needed.)
  - id: set_eyes
    mode: restart
    parameters:
      w: int
      h: int
      r: int
      dy: int
    then:
      - lvgl.widget.update:
          id: eye_l
          width: !lambda 'return w;'
          height: !lambda 'return h;'
          radius: !lambda 'return r;'
          y: !lambda 'return dy;'
      - lvgl.widget.update:
          id: eye_r
          width: !lambda 'return w;'
          height: !lambda 'return h;'
          radius: !lambda 'return r;'
          y: !lambda 'return dy;'
  - id: set_mouth
    mode: restart
    parameters:
      w: int
      h: int
      r: int
      dy: int
    then:
      - lvgl.widget.update:
          id: mouth
          width: !lambda 'return w;'
          height: !lambda 'return h;'
          radius: !lambda 'return r;'
          y: !lambda 'return dy;'
  # ── BODY LANGUAGE ─────────────────────────────────────────────────────────────
  # Nudge the head relative to where it is now. PITCH goes through n_head_pitch, i.e.
  # in YOUR units (158..260, straight=165) — never the motor's internal 0..90 scale.
  # Writes are spaced 350ms apart — the SCS9009 serial bus drops back-to-back writes.
  # HARD no-move rule: in the calm modes (night / focus / quiet) body language is
  # fully OFF — not even slow moves (only deliberate user control still works).
  - id: head_nudge
    mode: restart
    parameters:
      dx: int
      dy: int
    then:
      - lambda: 'id(g_move_ms) = (long) millis();'   # a commanded move — not a hand
      - if:
          condition:
            lambda: |-
              return id(sw_move).state && dx != 0 && !std::isnan(id(servo_x_angle).state)
                     && !id(g_night) && !id(g_focus) && !id(g_quiet)
                     && !id(g_sleep) && !id(g_saver);
          then:
            - number.set:
                id: servo_x_angle
                value: !lambda |-
                  float v = id(servo_x_angle).state + dx;
                  return v < -164 ? -164 : (v > 164 ? 164 : v);
            - delay: 350ms
      - if:
          condition:
            lambda: |-
              return id(sw_move).state && dy != 0 && !std::isnan(id(n_head_pitch).state)
                     && !id(g_night) && !id(g_focus) && !id(g_quiet)
                     && !id(g_sleep) && !id(g_saver);
          then:
            - number.set:
                id: n_head_pitch
                value: !lambda |-
                  float v = id(n_head_pitch).state + dy;
                  return v < 158 ? 158 : (v > 260 ? 260 : v);
  # A quick left-right "no!" shake (angry / playful). Silent in the calm modes.
  # mode: single — the steps are RELATIVE (-12/+24/-12 sums to zero), so a restart
  # mid-sequence left the head permanently off-centre by ±12° per collision.
  - id: head_shake
    mode: single
    then:
      - lambda: 'id(g_move_ms) = (long) millis();'
      - if:
          condition:
            lambda: |-
              return id(sw_move).state && !std::isnan(id(servo_x_angle).state)
                     && !id(g_night) && !id(g_focus) && !id(g_quiet)
                     && !id(g_sleep) && !id(g_saver);
          then:
            - number.set:
                id: servo_x_angle
                value: !lambda 'float v = id(servo_x_angle).state - 12; return v < -164 ? -164 : v;'
            - delay: 350ms
            - number.set:
                id: servo_x_angle
                value: !lambda 'float v = id(servo_x_angle).state + 24; return v > 164 ? 164 : v;'
            - delay: 350ms
            - number.set:
                id: servo_x_angle
                value: !lambda 'float v = id(servo_x_angle).state - 12; return v < -164 ? -164 : v;'
  # A gentle up-down "yes" nod (agree / acknowledge / greet). PITCH via n_head_pitch
  # (158..260). Silent in the calm modes. mode: single — same drift-on-restart risk as head_shake.
  - id: head_nod
    mode: single
    then:
      - lambda: 'id(g_move_ms) = (long) millis();'
      - if:
          condition:
            lambda: |-
              return id(sw_move).state && !std::isnan(id(n_head_pitch).state)
                     && !id(g_night) && !id(g_focus) && !id(g_quiet)
                     && !id(g_sleep) && !id(g_saver);
          then:
            - number.set:
                id: n_head_pitch
                value: !lambda 'float v = id(n_head_pitch).state + 12; return v > 260 ? 260 : v;'
            - delay: 350ms
            - number.set:
                id: n_head_pitch
                value: !lambda 'float v = id(n_head_pitch).state - 24; return v < 158 ? 158 : v;'
            - delay: 350ms
            - number.set:
                id: n_head_pitch
                value: !lambda 'float v = id(n_head_pitch).state + 12; return v > 260 ? 260 : v;'
  # ── MOOD LEDs — flash an emotion colour for ~2.5s, then put the LEDs back ──────
  - id: led_flash
    mode: restart
    parameters:
      r: int
      g: int
      b: int
    then:
      - if:
          # calm modes (night / focus / quiet) and SLEEP/SAVER = no light shows
          condition:
            lambda: |-
              return id(sw_mood_led).state && !id(g_voice)
                     && !id(g_night) && !id(g_focus) && !id(g_quiet)
                     && !id(g_sleep) && !id(g_saver);
          then:
            - if:
                condition: { lambda: 'return !id(g_flash);' }   # don't re-save our own colour
                then:
                  - lambda: |-
                      auto v = id(stackchan_light_bar).current_values;
                      id(led_on)  = v.is_on();
                      id(led_bri) = v.get_brightness();
                      id(led_r)   = v.get_red();
                      id(led_g)   = v.get_green();
                      id(led_b)   = v.get_blue();
            - globals.set: { id: g_flash, value: "true" }
            - light.turn_on:
                id: stackchan_light_bar
                brightness: 70%
                red: !lambda 'return r / 100.0f;'
                green: !lambda 'return g / 100.0f;'
                blue: !lambda 'return b / 100.0f;'
            - delay: 2500ms
            # if a voice conversation started meanwhile, DON'T stomp its yellow —
            # the conversation's own on_end will restore the true original colour.
            - if:
                condition: { lambda: 'return !id(g_voice);' }
                then:
                  - script.execute: restore_leds
            - globals.set: { id: g_flash, value: "false" }
  # ── PETTING — wake up, blush, pink LEDs, nuzzle up + a happy wiggle ─────────────
  - id: pet_react
    mode: restart
    then:
      - if:
          condition: { lambda: 'return !id(g_sleep) && !id(g_saver);' }   # DND: in sleep/screensaver ONLY a screen tap or "Ok Nabu" wakes it
          then:
            - lambda: 'lv_disp_trig_activity(NULL);'
            # a pet must NOT cancel night/focus/quiet (it used to flip them to awake —
            # backlight to full, mood LEDs re-armed). It still blushes, gently.
            - if:
                condition: { lambda: 'return !id(g_night) && !id(g_focus) && !id(g_quiet) && id(robot_mode).current_option() != std::string("awake");' }
                then: [ { select.set: { id: robot_mode, option: awake } } ]
            # AFFECTION STREAK — pets within 90s of each other escalate: 1-2 = the happy
            # blush · 3-4 = love-eyes + a purr · 5+ = it MELTS (floating hearts). The robot
            # visibly warms up to sustained affection, Cozmo-style.
            - lambda: |-
                long now = (long) millis();
                if (now - id(g_pets_ms) > 90000) id(g_pets_n) = 0;
                id(g_pets_n) += 1;
                id(g_pets_ms) = now;
            - globals.set: { id: g_expr, value: !lambda 'return id(g_pets_n) >= 3 ? 6 : 1;' }   # streak → ♥ eyes
            - globals.set: { id: g_card, value: "0" }
            - lvgl.page.show: page_face
            - script.execute: render_face
            - script.execute: { id: led_flash, r: 100, g: 25, b: 45 }   # pink
            - if:
                condition: { lambda: 'return id(sw_sfx).state && !id(g_quiet) && !id(g_night) && id(g_pets_n) < 3;' }
                then: [ { rtttl.play: "pet:d=16,o=6,b=200:c,e,g" } ]   # a happy little giggle 😊
            - if:
                condition: { lambda: 'return id(sw_sfx).state && !id(g_quiet) && !id(g_night) && id(g_pets_n) >= 3;' }
                then: [ { rtttl.play: "purr:d=16,o=5,b=140:c,e,c,e,g" } ]   # a longer, warmer purr
            - delay: 400ms
            - script.execute: { id: head_nudge, dx: 0, dy: 12 }         # nuzzle up into your hand
            - delay: 900ms
            - script.execute: head_shake                                # happy little wiggle
            - if:  # 5+ pets in a row → the melt: hearts float up over the blush
                condition: { lambda: 'return id(g_pets_n) >= 5;' }
                then:
                  - lvgl.widget.update: { id: heart1, y: 18 }
                  - lvgl.widget.update: { id: heart2, y: 26 }
                  - lvgl.widget.update: { id: heart3, y: 12 }
                  - lvgl.widget.show: heart1
                  - lvgl.widget.show: heart2
                  - lvgl.widget.show: heart3
                  - delay: 1600ms
                  - lvgl.widget.hide: heart1
                  - lvgl.widget.hide: heart2
                  - lvgl.widget.hide: heart3
  # ── EATS 🍪 — Ropet-style: paws lift a random treat to the mouth, 2 nibbles + "nom", then a
  #    happy "yum" nod. Fires from the Feed button, or spontaneously now and then on the face.
  - id: eat
    mode: single
    then:
      - if:
          condition: { lambda: 'return id(g_booted) && !id(g_sleep) && !id(g_saver) && !id(g_voice) && !id(g_perm);' }
          then:
            - lambda: 'lv_disp_trig_activity(NULL);'
            - globals.set: { id: g_card, value: "0" }
            - lvgl.page.show: page_face
            - globals.set: { id: g_expr, value: "1" }
            - script.execute: render_face
            - lambda: 'id(g_food) = (int)(random_float() * 3.999f);'
            - lvgl.widget.update:
                id: food_item
                width:  !lambda 'return id(g_food) == 3 ? 40 : 30;'    # croissant is wider + flatter
                height: !lambda 'return id(g_food) == 3 ? 22 : 30;'
                radius: !lambda 'return id(g_food) == 1 ? 5 : (id(g_food) == 3 ? 11 : 15);'   # cake = slice
                bg_color: !lambda |-
                  switch (id(g_food)) {
                    case 0:  return lv_color_hex(0xc79457);   // cookie — golden tan
                    case 1:  return lv_color_hex(0xffc2d2);   // cake — pink frosting
                    case 2:  return lv_color_hex(0xe23b3b);   // apple — glossy red
                    default: return lv_color_hex(0xe6a94e);   // croissant — golden brown
                  }
            # a topping for EVERY treat: cookie chip · cake cherry · apple leaf · croissant fold
            - lvgl.widget.update:
                id: food_top
                bg_color: !lambda |-
                  switch (id(g_food)) {
                    case 0:  return lv_color_hex(0x5a3418);   // choc chip
                    case 1:  return lv_color_hex(0xff3355);   // cherry
                    case 2:  return lv_color_hex(0x4caf50);   // leaf
                    default: return lv_color_hex(0xb9791f);   // fold
                  }
            - lvgl.widget.show: food_top
            - lvgl.widget.update: { id: food_item, y: 86 }
            - lvgl.widget.update: { id: food_top, y: 72 }
            - lvgl.widget.update: { id: hand_l, y: 92 }
            - lvgl.widget.update: { id: hand_r, y: 92 }
            - lvgl.widget.show: hand_l
            - lvgl.widget.show: hand_r
            - lvgl.widget.show: food_item
            - delay: 260ms
            # lift to the mouth
            - lvgl.widget.update: { id: food_item, y: 66 }
            - lvgl.widget.update: { id: food_top, y: 52 }
            - lvgl.widget.update: { id: hand_l, y: 80 }
            - lvgl.widget.update: { id: hand_r, y: 80 }
            - lvgl.widget.update: { id: heart1, y: 46 }
            - lvgl.widget.update: { id: heart2, y: 52 }
            - lvgl.widget.update: { id: heart3, y: 40 }
            - lvgl.widget.show: heart1
            - lvgl.widget.show: heart2
            - lvgl.widget.show: heart3
            - delay: 340ms
            # nibble 1
            - if:
                condition: { lambda: 'return id(sw_sfx).state && !id(g_quiet) && !id(g_night);' }
                then: [ { rtttl.play: "nom:d=32,o=5,b=170:e" } ]
            - lvgl.widget.hide: food_top
            - lvgl.widget.update: { id: food_item, width: 20, height: 20 }
            - lvgl.widget.update: { id: heart1, y: 18 }
            - lvgl.widget.update: { id: heart2, y: 26 }
            - lvgl.widget.update: { id: heart3, y: 12 }
            - delay: 340ms
            # nibble 2
            - if:
                condition: { lambda: 'return id(sw_sfx).state && !id(g_quiet) && !id(g_night);' }
                then: [ { rtttl.play: "nom:d=32,o=5,b=170:c" } ]
            - lvgl.widget.update: { id: food_item, width: 10, height: 10 }
            - lvgl.widget.update: { id: heart1, y: -12 }
            - lvgl.widget.update: { id: heart2, y: -4 }
            - lvgl.widget.update: { id: heart3, y: -20 }
            - delay: 300ms
            # gone → yum!
            - lvgl.widget.hide: food_item
            - lvgl.widget.hide: heart1
            - lvgl.widget.hide: heart2
            - lvgl.widget.hide: heart3
            - globals.set: { id: g_expr, value: "1" }
            - script.execute: render_face
            - if:
                condition: { lambda: 'return id(sw_sfx).state && !id(g_quiet) && !id(g_night);' }
                then: [ { rtttl.play: "yum:d=16,o=6,b=160:c,e,g" } ]
            - script.execute: head_nod
            - delay: 220ms
            - lvgl.widget.hide: hand_l
            - lvgl.widget.hide: hand_r
  # ── DRINKS 🥤 — paws raise a glass of water to the mouth, 2 sips (the level drops), then "ahh".
  - id: drink
    mode: single
    then:
      - if:
          condition: { lambda: 'return id(g_booted) && !id(g_sleep) && !id(g_saver) && !id(g_voice) && !id(g_perm);' }
          then:
