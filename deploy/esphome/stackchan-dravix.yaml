# ════════════════════════════════════════════════════════════════════════════════
#  dravix-os · StackChan ESPHome firmware (M5Stack CoreS3)
#  Sits ON TOP of the M5Stack BSP (servos, mic, speaker, LEDs, touch come from it).
#  Features:
#    • Animated kaomoji FACE (home) — blink, drift, talk/listen, sleep "zzz"
#    • VOICE assistant — white screen while listening/talking
#    • SLEEP + SCREENSAVER — dim then black, wake on touch or "ok nabu"
#    • SWIPE navigation:
#        swipe DOWN  → status (time · battery · date · WiFi · IP · uptime)
#        swipe UP    → back to the face (home)
#        swipe LEFT / RIGHT → cycle Mushroom-style HA entity cards
#    • Screen BRIGHTNESS control
#  Head servos + calibration + petting are handled by dravix-os (the add-on).
#  Validate-first. Swipe is done manually via the touchscreen (no built-in gesture in
#  ESPHome LVGL); if on_update/on_release misbehave on your build, tell me the log.
#  If `time:` clashes with the BSP, delete that block.
# ════════════════════════════════════════════════════════════════════════════════

esphome:
  name: stackchan
  friendly_name: stackchan

esp32:
  variant: esp32s3
  flash_size: 16MB
  framework:
    type: esp-idf

logger:

api:

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "stackchan Fallback Hotspot"

captive_portal:

packages:
  m5stack_stackchan:
    url: https://github.com/m5stack/esphome-yaml
    files: [examples/kit/stackchan-bsp.factory.yaml]
    refresh: 1d

display:
  - id: !extend m5cores3_lcd
    show_test_card: false
    invert_colors: false          # flip to true if colours come out inverted

font:
  - file: "gfonts://Roboto Mono"
    id: face_font
    size: 96
    glyphs: "-_^Tu><oOz "
  - file: "gfonts://Roboto"
    id: text_font
    size: 28
  - file: "gfonts://Roboto"
    id: small_font
    size: 20

globals:
  # face state
  - { id: g_expr,   type: int,  restore_value: false, initial_value: "0" }
  - { id: g_blink,  type: bool, restore_value: false, initial_value: "false" }
  - { id: g_listen, type: bool, restore_value: false, initial_value: "false" }
  - { id: g_talk,   type: bool, restore_value: false, initial_value: "false" }
  - { id: g_sleep,  type: bool, restore_value: false, initial_value: "false" }
  - { id: g_busy,   type: bool, restore_value: false, initial_value: "false" }
  - { id: g_anim,   type: int,  restore_value: false, initial_value: "0" }
  # swipe tracking + which "home screen" (0 = face, 1 = card1, 2 = card2)
  - { id: sw_x0,    type: int,  restore_value: false, initial_value: "0" }
  - { id: sw_y0,    type: int,  restore_value: false, initial_value: "0" }
  - { id: sw_x1,    type: int,  restore_value: false, initial_value: "0" }
  - { id: sw_y1,    type: int,  restore_value: false, initial_value: "0" }
  - { id: sw_sleep, type: bool, restore_value: false, initial_value: "false" }
  - { id: g_card,   type: int,  restore_value: false, initial_value: "0" }

# If Validate says homeassistant time already exists (from the BSP), delete this block.
time:
  - platform: homeassistant
    id: dravix_time

sensor:
  - platform: wifi_signal
    id: wifi_db
    update_interval: 30s
  - platform: uptime
    id: up_sec
  # Robot battery %, imported from HA. Fix the entity_id if yours differs.
  - platform: homeassistant
    id: ha_batt
    entity_id: sensor.dravix_battery_level
  # ── CARD 1 (climate) values — change these entity_ids to your sensors ─────────
  - platform: homeassistant
    id: ha_temp
    entity_id: sensor.living_room_temperature
  - platform: homeassistant
    id: ha_hum
    entity_id: sensor.living_room_humidity

text_sensor:
  - platform: wifi_info
    ip_address:
      id: ip_txt
    ssid:
      id: ssid_txt
  # ── CARD 2 (home) entities — pick ANY HA entities you want to show here ───────
  # Each imports the entity's STATE as text (on/off/open/…). Rename freely.
  - platform: homeassistant
    id: ha_e1
    entity_id: light.living_room
  - platform: homeassistant
    id: ha_e2
    entity_id: binary_sensor.front_door

number:
  - platform: template
    name: "Screensaver after (min)"
    id: n_screensaver
    optimistic: true
    min_value: 1
    max_value: 120
    step: 1
    initial_value: 5
    restore_value: true
  - platform: template
    name: "Sleep after (min)"
    id: n_sleep
    optimistic: true
    min_value: 1
    max_value: 240
    step: 1
    initial_value: 15
    restore_value: true
  - platform: template
    name: "Screen brightness"
    id: n_brightness
    optimistic: true
    min_value: 10
    max_value: 100
    step: 5
    initial_value: 100
    unit_of_measurement: "%"
    restore_value: true
    set_action:
      - light.turn_on:
          id: lcd_backlight
          brightness: !lambda 'return x / 100.0;'

lvgl:
  displays:
    - m5cores3_lcd
  on_idle:
    - timeout: !lambda 'return (uint32_t) id(n_screensaver).state * 60000;'
      then:
        - light.turn_on: { id: lcd_backlight, brightness: 25% }
    - timeout: !lambda 'return (uint32_t) id(n_sleep).state * 60000;'
      then:
        - globals.set: { id: g_sleep, value: "true" }
        - script.execute: render_face
        - delay: 3s
        - light.turn_off: lcd_backlight
  pages:
    # ── Page 0: the face (HOME) ──────────────────────────────────────────────────
    - id: page_face
      bg_color: 0x000000
      bg_opa: COVER
      widgets:
        - obj:
            id: bg_rect
            x: 0
            y: 0
            width: 320
            height: 240
            radius: 0
            border_width: 0
            bg_color: 0x000000
            bg_opa: COVER
        - label:
            id: face_label
            text: "o_o"
            text_color: 0x33E6C8
            text_font: face_font
            align: CENTER
    # ── Page 1: STATUS (swipe down) ──────────────────────────────────────────────
    - id: page_status
      bg_color: 0x000000
      bg_opa: COVER
      widgets:
        - label: { id: lbl_time, text: "--:--", text_font: text_font,  text_color: 0x33E6C8, align: CENTER, y: -88 }
        - label: { id: lbl_batt, text: "Batt --", text_font: small_font, text_color: 0x5dffa0, align: CENTER, y: -50 }
        - label: { id: lbl_date, text: "",        text_font: small_font, text_color: 0x8892A0, align: CENTER, y: -16 }
        - label: { id: lbl_wifi, text: "WiFi",    text_font: small_font, text_color: 0x8892A0, align: CENTER, y:  16 }
        - label: { id: lbl_ip,   text: "IP",      text_font: small_font, text_color: 0x8892A0, align: CENTER, y:  48 }
        - label: { id: lbl_up,   text: "Up",      text_font: small_font, text_color: 0x8892A0, align: CENTER, y:  80 }
    # ── Page 2: CARD 1 — climate (swipe left/right) ──────────────────────────────
    - id: page_card1
      bg_color: 0x000000
      bg_opa: COVER
      widgets:
        - label: { id: lbl_c1_title, text: "CLIMATE", text_font: small_font, text_color: 0x33E6C8, align: CENTER, y: -70 }
        - label: { id: lbl_temp, text: "Temp --", text_font: text_font, text_color: 0xFFFFFF, align: CENTER, y: -15 }
        - label: { id: lbl_hum,  text: "Hum --",  text_font: text_font, text_color: 0xFFFFFF, align: CENTER, y:  35 }
    # ── Page 3: CARD 2 — home entities (swipe left/right) ────────────────────────
    - id: page_card2
      bg_color: 0x000000
      bg_opa: COVER
      widgets:
        - label: { id: lbl_c2_title, text: "HOME",    text_font: small_font, text_color: 0x33E6C8, align: CENTER, y: -70 }
        - label: { id: lbl_e1, text: "Light  --",     text_font: text_font, text_color: 0xFFFFFF, align: CENTER, y: -15 }
        - label: { id: lbl_e2, text: "Door  --",      text_font: text_font, text_color: 0xFFFFFF, align: CENTER, y:  35 }

script:
  # Redraw the animated face.
  - id: render_face
    then:
      - lvgl.widget.update:
          id: bg_rect
          bg_color: !lambda 'return (id(g_listen) || id(g_talk)) ? lv_color_hex(0xFFFFFF) : lv_color_hex(0x000000);'
      - lvgl.label.update:
          id: face_label
          text_color: !lambda 'return (id(g_listen) || id(g_talk)) ? lv_color_hex(0x000000) : lv_color_hex(0x33E6C8);'
          text: !lambda |-
            if (id(g_sleep)) {
              const char* z[] = {"u_u", "u_u z", "u_u zz", "u_u zzz"};
              return std::string(z[id(g_anim) % 4]);
            }
            if (id(g_listen)) return std::string("O_O");
            if (id(g_talk))   return std::string((id(g_anim) % 2) ? "o o" : "o_o");
            if (id(g_blink))  return std::string("-_-");
            const char* faces[] = {"o_o", "^_^", "T_T", ">_<", "u_u", "o_O"};
            return std::string(faces[id(g_expr) % 6]);
  # Show the current "home screen" card (0 = face, 1 = card1, 2 = card2).
  - id: show_card
    then:
      - if:
          condition: { lambda: 'return id(g_card) == 1;' }
          then: [ { lvgl.page.show: page_card1 } ]
      - if:
          condition: { lambda: 'return id(g_card) == 2;' }
          then: [ { lvgl.page.show: page_card2 } ]
      - if:
          condition: { lambda: 'return id(g_card) <= 0 || id(g_card) > 2;' }
          then: [ { lvgl.page.show: page_face } ]

select:
  - platform: template
    name: "Face"
    id: robot_face
    optimistic: true
    options: [neutral, happy, sad, angry, sleepy, doubt]
    initial_option: neutral
    set_action:
      - globals.set:
          id: g_expr
          value: !lambda |-
            if (x == "happy") return 1;
            else if (x == "sad") return 2;
            else if (x == "angry") return 3;
            else if (x == "sleepy") return 4;
            else if (x == "doubt") return 5;
            return 0;
      - script.execute: render_face
  - platform: template
    name: "Mode"
    id: robot_mode
    optimistic: true
    options: [awake, busy, sleep]
    initial_option: awake
    set_action:
      - globals.set: { id: g_sleep, value: !lambda 'return x == std::string("sleep");' }
      - globals.set: { id: g_busy,  value: !lambda 'return x == std::string("busy");' }
      - script.execute: render_face

interval:
  # Random blink (never while sleeping / listening / talking).
  - interval: 1s
    then:
      - if:
          condition:
            lambda: 'return !id(g_sleep) && !id(g_talk) && !id(g_listen) && random_float() < 0.22;'
          then:
            - globals.set: { id: g_blink, value: "true" }
            - script.execute: render_face
            - delay: 160ms
            - globals.set: { id: g_blink, value: "false" }
            - script.execute: render_face
  # Sleep "zzz" + talking mouth animation.
  - interval: 600ms
    then:
      - globals.set: { id: g_anim, value: !lambda 'return id(g_anim) + 1;' }
      - if:
          condition: { lambda: 'return id(g_sleep) || id(g_talk);' }
          then: [ { script.execute: render_face } ]
  # Occasional "alive" drift of the face (not in sleep / busy).
  - interval: 7s
    then:
      - if:
          condition: { lambda: 'return !id(g_sleep) && !id(g_busy);' }
          then:
            - lvgl.widget.update:
                id: face_label
                x: !lambda 'return (int)(random_float() * 24 - 12);'
                y: !lambda 'return (int)(random_float() * 18 - 9);'
  # Refresh the status + card labels.
  - interval: 5s
    then:
      - lvgl.label.update:
          id: lbl_time
          text: !lambda |-
            auto t = id(dravix_time).now();
            if (!t.is_valid()) return std::string("--:--");
            char b[8]; snprintf(b, sizeof(b), "%02d:%02d", t.hour, t.minute);
            return std::string(b);
      - lvgl.label.update:
          id: lbl_date
          text: !lambda |-
            auto t = id(dravix_time).now();
            if (!t.is_valid()) return std::string("");
            char b[16]; snprintf(b, sizeof(b), "%02d/%02d", t.day_of_month, t.month);
            return std::string(b);
      - lvgl.label.update:
          id: lbl_wifi
          text: !lambda |-
            char b[20]; snprintf(b, sizeof(b), "WiFi %d dB", (int) id(wifi_db).state);
            return std::string(b);
      - lvgl.label.update:
          id: lbl_ip
          text: !lambda 'return "IP " + id(ip_txt).state;'
      - lvgl.label.update:
          id: lbl_up
          text: !lambda |-
            int s = (int) id(up_sec).state;
            char b[24]; snprintf(b, sizeof(b), "Up %dh %dm", s / 3600, (s % 3600) / 60);
            return std::string(b);
      - lvgl.label.update:
          id: lbl_batt
          text: !lambda |-
            if (!id(ha_batt).has_state()) return std::string("Batt --");
            char b[16]; snprintf(b, sizeof(b), "Batt %.0f%%", id(ha_batt).state);
            return std::string(b);
      - lvgl.label.update:
          id: lbl_temp
          text: !lambda |-
            if (!id(ha_temp).has_state()) return std::string("Temp --");
            char b[24]; snprintf(b, sizeof(b), "Temp %.1f C", id(ha_temp).state);
            return std::string(b);
      - lvgl.label.update:
          id: lbl_hum
          text: !lambda |-
            if (!id(ha_hum).has_state()) return std::string("Hum --");
            char b[24]; snprintf(b, sizeof(b), "Hum %.0f %%", id(ha_hum).state);
            return std::string(b);
      - lvgl.label.update:
          id: lbl_e1
          text: !lambda 'return "Light  " + (id(ha_e1).has_state() ? id(ha_e1).state : std::string("--"));'
      - lvgl.label.update:
          id: lbl_e2
          text: !lambda 'return "Door  " + (id(ha_e2).has_state() ? id(ha_e2).state : std::string("--"));'

# ── Manual SWIPE detection (ESPHome LVGL has no built-in gesture) ────────────────
touchscreen:
  - id: !extend touch
    on_touch:
      # Remember whether we were asleep at the moment of touch (so a wake isn't a swipe),
      # and reset the swipe deltas so a plain tap doesn't replay a stale swipe.
      - globals.set: { id: sw_sleep, value: !lambda 'return id(g_sleep);' }
      - lambda: 'id(sw_x0) = 0; id(sw_y0) = 0; id(sw_x1) = 0; id(sw_y1) = 0;'
    on_update:
      # Track the gesture: start = original press point, end = current point.
      - lambda: |-
          for (auto t : touches) {
            id(sw_x0) = t.x_org; id(sw_y0) = t.y_org;
            id(sw_x1) = t.x;     id(sw_y1) = t.y;
          }
    on_release:
      # Asleep → wake and stop (don't treat the wake as a swipe).
      - if:
          condition: { lambda: 'return id(sw_sleep);' }
          then:
            - light.turn_on: { id: lcd_backlight, brightness: !lambda 'return id(n_brightness).state / 100.0;' }
            - globals.set: { id: g_sleep, value: "false" }
            - script.execute: render_face
      # swipe DOWN → status
      - if:
          condition:
            lambda: |-
              int dx = id(sw_x1) - id(sw_x0), dy = id(sw_y1) - id(sw_y0);
              int adx = dx < 0 ? -dx : dx, ady = dy < 0 ? -dy : dy;
              return !id(sw_sleep) && ady > adx && dy > 40;
          then: [ { lvgl.page.show: page_status } ]
      # swipe UP → face (home)
      - if:
          condition:
            lambda: |-
              int dx = id(sw_x1) - id(sw_x0), dy = id(sw_y1) - id(sw_y0);
              int adx = dx < 0 ? -dx : dx, ady = dy < 0 ? -dy : dy;
              return !id(sw_sleep) && ady > adx && dy < -40;
          then:
            - globals.set: { id: g_card, value: "0" }
            - lvgl.page.show: page_face
      # swipe LEFT → next card
      - if:
          condition:
            lambda: |-
              int dx = id(sw_x1) - id(sw_x0), dy = id(sw_y1) - id(sw_y0);
              int adx = dx < 0 ? -dx : dx, ady = dy < 0 ? -dy : dy;
              return !id(sw_sleep) && adx >= ady && dx < -40;
          then:
            - globals.set: { id: g_card, value: !lambda 'return (id(g_card) + 1) % 3;' }
            - script.execute: show_card
      # swipe RIGHT → previous card
      - if:
          condition:
            lambda: |-
              int dx = id(sw_x1) - id(sw_x0), dy = id(sw_y1) - id(sw_y0);
              int adx = dx < 0 ? -dx : dx, ady = dy < 0 ? -dy : dy;
              return !id(sw_sleep) && adx >= ady && dx > 40;
          then:
            - globals.set: { id: g_card, value: !lambda 'return (id(g_card) + 2) % 3;' }
            - script.execute: show_card

voice_assistant:
  microphone: i2s_mic
  media_player: va_media_player
  on_listening:
    - light.turn_on:
        id: lcd_backlight
        brightness: !lambda 'return id(n_brightness).state / 100.0;'
    - globals.set: { id: g_sleep, value: "false" }
    - globals.set: { id: g_listen, value: "true" }
    - lvgl.page.show: page_face      # come back to the face to talk
    - globals.set: { id: g_card, value: "0" }
    - script.execute: render_face
  on_tts_start:
    - globals.set: { id: g_listen, value: "false" }
    - globals.set: { id: g_talk, value: "true" }
    - script.execute: render_face
  on_end:
    - globals.set: { id: g_listen, value: "false" }
    - globals.set: { id: g_talk, value: "false" }
    - script.execute: render_face
