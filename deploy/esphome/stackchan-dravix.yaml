            height: 44
            radius: 10
            bg_color: 0x121821
            widgets:
              - label: { id: lbl_c1_r0, text: "", text_font: small_font, text_color: 0xFFFFFF, align: LEFT_MID, x: 10 }
            on_click:
              - homeassistant.event: { event: esphome.dravix_card, data: { card: "1", row: "0" } }
        - button:
