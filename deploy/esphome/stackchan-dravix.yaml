# ════════════════════════════════════════════════════════════════════════════════
#  dravix-os · StackChan ESPHome firmware (M5Stack CoreS3)
#  Sits ON TOP of the M5Stack BSP (servos, mic, speaker, LEDs, touch come from it).
#  PET FACE: two big DRAWN eyes (blink · look around · squint when happy · widen when
#  listening) + pink cheeks + an animated mouth — a little desk creature, not a text face.
#  IT ACTS ALIVE: petting the head → pink LEDs + nuzzle-up + happy wiggle · every
#  expression has a mood LED colour + a head pose (sad droops, doubt tilts, angry shakes)
#  · it glances around with its head · going to sleep the head droops, waking it rises.
#  ALL 3 TOUCH ZONES: 1+2 = pet (pink nuzzle) · 3 (back) = TICKLE (giggly wiggle).
#  OFFICIAL ESP-NOW REMOTE supported: joystick drives the head, button B = talk toggle
#  (set the remote's channel to your router's Wi-Fi channel). PARTY button = desk disco.
#  REAL power metering (INA226): the status bar shows true W / mA / time-left; battery %
#  falls back to the LiPo voltage curve when no battery sensor exists. Servo pitch is
#  clamped to M5Stack's recommended 5-85° operating range.
#  ARCADE (swipe to GAMES): Catch Me · Reaction · Simon · R-P-S · FLAPPY · Party.
#  Switches: "Body language" = autonomous head moves · "Mood LEDs" = emotion colours.
#  States:  awake = WHITE bg + dark eyes  ·  listening = BIG eyes + YELLOW LEDs
#           screensaver = dim, face+blink, NO drift  ·  sleep = closed eyes + zzz, black
#  Wake word "Okay, Nabu" (on-device) · brightness control.
#  SWIPE:  down → status · up → face · left/right → 3 cards + the CATCH-ME game.
#  GAME "CATCH ME!": a teal dot runs around the screen — tap it to score; every 10
#  catches the robot celebrates (green LEDs + a happy head wiggle).
#  TRIPLE-tap face = STOP everything · DOUBLE-tap = AI listen (toggle) · single tap = nothing · LONG-PRESS = sleep.
#  Publishes live state to HA:  sensor State (awake/listening/speaking/screensaver/sleep),
#  Last heard (STT), Last reply (TTS) — the dravix dashboard shows these in real time.
#  Buttons: Identify (find the robot — cyan flashes) · Reboot.
#  The 3 CARDS are DYNAMIC — you pick which HA entities appear on each one from the
#  dravix-os dashboard (Screens page); dravix pushes title+body into the text slots
#  below (text.dravix_card1_title / _body … card3). No need to edit entity_ids here.
#  Head servos + calibration + petting are handled by dravix-os (the add-on).
#  VALIDATE first. If `time:` clashes with the BSP, delete that block. Swipe is manual
#  (no built-in gesture) — if it misbehaves send me the log. LED save/restore uses
#  light id `stackchan_light_bar`; if that id is wrong, Validate will say so — tell me.
# ════════════════════════════════════════════════════════════════════════════════

# ── FIT TO YOUR SETUP — the only block most people ever edit ─────────────────────
substitutions:
  # FIRMWARE VERSION — bumped whenever this file meaningfully changes. The robot
  # publishes it to HA ("Firmware version" sensor); the dravix dashboard compares it
  # with the version bundled in the add-on and shows "firmware update available".
  # (Maintainers: bump this on every firmware change. Users: don't touch.)
  fw_version: "29"
  # The ESPHome node name (mDNS hostname + the default entity prefix on a fresh flash).
  # Change it only if you run MORE THAN ONE robot — each needs a unique name. NOTE:
  # changing it on an already-adopted robot registers a NEW device in HA.
  device_name: "stackchan"
  friendly_name: "stackchan"
  # The on-device wake word (see the micro_wake_word docs for available models).
  wake_word_model: "okay_nabu"
  # After "Okay Nabu" / a double-tap the robot listens — if NO voice is detected within
  # this many seconds, it closes the session on its own (no hanging on a big-eyed face).
  listen_timeout_s: "5"
  # The entity-id prefix HA gave the robot's own sensors (battery, touch, proximity…).
  # dravix-os convention: rename the device to "Dravix" in HA (Settings → Devices →
  # rename → let HA update the entity ids) and keep this as "dravix". A FRESH flash
  # that was never renamed registers as the node name — set "stackchan" in that case.
  ha_prefix: "dravix"
  # A second prefix this file ALSO listens on for touch — covers HA's rename quirk
  # where re-registered entities get an "<area>_<device>" prefix. A prefix that does
  # not exist is harmless; leave equal to ha_prefix when unsure.
  ha_prefix_alt: "dravix"
  # Battery — properties of the StackChan HARDWARE, not per-person settings (same kit,
  # same cell). Only change if you physically swapped the battery.
  battery_mah: "500"    # capacity, for the time-left estimate
  batt_r_int: "0.15"    # cell+wiring internal resistance (Ω) — used to undo load sag
  # INA226 sign convention: 1 = positive current while DISCHARGING (flip to -1 if your
  # board reports it inverted — the ⚡ charging flag will tell you immediately).
  ina_sign: "1"
  # Presence + room-light thresholds (tune without touching any lambda):
  prox_near: "150"   # proximity counts above this = someone came close → greet
  prox_far: "80"     # …and below this = they moved away
  prox_boop: "650"   # nearly-touching (a finger at the sensor) = a BOOP 👉 → love
  lux_dark: "5"      # lux below this = room went dark → sleep (if enabled)
  lux_bright: "30"   # lux above this = light came back → wake

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  # LIST form on purpose: package lists CONCATENATE, so the BSP's own on_boot automations
  # (RTC clock read + restoring the servos' calibration offsets!) are kept. A mapping here
  # would silently REPLACE them — and the head would boot uncalibrated every time.
  on_boot:
    - priority: -100
      then:
        # LVGL is ready from here on — allow face redraws (guards the privacy-restore path,
        # which otherwise fires render_face BEFORE the display exists → boot crash).
        - globals.set: { id: g_booted, value: "true" }
        - script.execute: render_face   # correct face + PRIVACY badge after any reboot
        # the LOCAL button must show the RESTORED isLocal state (its on_turn_on replays
        # before LVGL exists and is skipped — recolor it here instead)
        - if:
            condition: { switch.is_on: sw_islocal }
            then:
              - lvgl.widget.update: { id: sb_local, bg_color: 0x0e4d44 }
              - lvgl.label.update: { id: sb_local_lbl, text_color: 0x33E6C8 }
        # start listening for "Okay, Nabu" — unless privacy mode was left ON
        - if:
            condition: { switch.is_off: sw_privacy }
            then: [ micro_wake_word.start ]
        # REPLAY the restored mode — restore_value only republishes the select's state;
        # running it through set_action applies the real thing (night dim, sleep droop,
        # servo speeds), so a robot that rebooted at night stays a night robot.
        - if:
            condition: { lambda: 'return id(robot_mode).current_option() != std::string("awake");' }
            then:
              - select.set: { id: robot_mode, option: !lambda 'return id(robot_mode).current_option();' }

esp32:
  variant: esp32s3
  flash_size: 16MB
  framework:
    type: esp-idf
    # BROWNOUT DETECTOR OFF — a deliberate tradeoff, not an experiment: on this hardware
    # the ESP32-S3 brownout detector false-fires on the current spike of a servo starting
    # while WiFi transmits, rebooting the board every few minutes. With it off you MUST
    # feed the robot well: a 5V/2A+ USB-C charger and a good (short/thick) cable. If the
    # robot still resets or hangs, that's a REAL power sag — fix the power, and you can
    # re-enable detection by deleting the CONFIG_ESP_BROWNOUT_DET line.
    sdkconfig_options:
      CONFIG_ESP_BROWNOUT_DET: "n"
      # OOM-RESET FIX: move the big WiFi + lwIP buffers into PSRAM (the CoreS3 has 8MB, nearly
      # empty) instead of the scarce ~300KB internal RAM. WiFi alone uses 64 RX + 64 TX buffers —
      # relocating them frees tens of KB of internal heap, which is exactly what the added LVGL
      # pages/widgets were starving (the resets are an internal-RAM out-of-memory, not the games).
      CONFIG_SPIRAM_TRY_ALLOCATE_WIFI_LWIP: "y"
      # Also route TLS / encryption (mbedTLS) buffers to PSRAM — these are big and only needed
      # during secure connections, so they don't belong in the scarce internal RAM either.
      CONFIG_MBEDTLS_EXTERNAL_MEM_ALLOC: "y"
      # BOOT-OOM FIX (2026-07-07): the extra accessory/card/chip widgets this session finally
      # re-exhausted the internal heap — the board got WiFi but crashed during LVGL widget
      # creation before the API even came up (HA showed the device online yet every entity
      # "unavailable"; ESPHome API port 6053 = "Connect call failed"). Let the GENERAL allocator
      # spill to PSRAM too: anything larger than 4KB (LVGL draw/label buffers, big objects) goes
      # to the 8MB PSRAM instead of the ~300KB internal heap, while 40KB stays reserved internal
      # for DMA-only buffers. Keeps every feature — no pages/games removed.
      CONFIG_SPIRAM_USE_MALLOC: "y"
      CONFIG_SPIRAM_MALLOC_ALWAYSINTERNAL: "4096"
      CONFIG_SPIRAM_MALLOC_RESERVE_INTERNAL: "40960"
      # TASK-WATCHDOG RESET FIX (diagnosed live 2026-07-04: Reset Reason = "task
      # watchdog", loop ~170ms, full-screen LVGL flush = 61ms each). This firmware's
      # main loop is legitimately heavy (LVGL + wake-word inference + I2C sensors +
      # serial servos) — under a burst it starves the IDLE task past the default 5s
      # and the watchdog reboots a perfectly healthy robot. Give real stalls 15s
      # before rebooting, and stop watching the IDLE tasks (loopTask keeps feeding
      # its own WDT, so true hangs still reset):
      CONFIG_ESP_TASK_WDT_TIMEOUT_S: "15"
      CONFIG_ESP_TASK_WDT_CHECK_IDLE_TASK_CPU0: "n"
      CONFIG_ESP_TASK_WDT_CHECK_IDLE_TASK_CPU1: "n"

# INFO, not the default DEBUG — log formatting runs inside the (already heavy) main
# loop; quieter logging = measurably lighter loop. Flip to DEBUG when hunting a bug.
logger:
  level: INFO

api:

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "${device_name} Fallback Hotspot"

captive_portal:

# Lets the robot DOWNLOAD images (Frigate person snapshots, any camera) to its screen.
http_request:
  verify_ssl: false

# ── The OFFICIAL StackChan remote (ESP-NOW joystick) ─────────────────────────────
# Packet (reverse-engineered from m5stack/StackChan remote/code): 8 bytes inside the
# espressif esp-now-lib frame — [id][yaw:int16 LE ±1280][pitch:int16 LE 0..900]
# [speed:int16 = 600][btnB]. We find it at ANY offset by its speed==600 signature, so
# the lib's wrapper version doesn't matter. yaw→servo_x (±164), pitch→n_head_pitch
# (your 158..260 scale), btnB press → talk toggle (like tapping the face).
# IMPORTANT: on the remote's setup screen set its Wi-Fi CHANNEL to your router's
# channel (ESP-NOW must share the robot's Wi-Fi channel).
espnow:
  auto_add_peer: true
  on_broadcast:
    - lambda: |-
        for (int off = 0; off + 8 <= (int) size; off++) {
          if (data[off + 5] != 0x58 || data[off + 6] != 0x02) continue;  // speed == 600
          int16_t yaw, pitch;
          memcpy(&yaw, data + off + 1, 2);
          memcpy(&pitch, data + off + 3, 2);
          if (yaw < -1280 || yaw > 1280 || pitch < 0 || pitch > 900) continue;
          id(g_rc_yaw)   = yaw * 164.0f / 1280.0f;
          id(g_rc_pitch) = 158.0f + pitch * 102.0f / 900.0f;
          id(g_rc_btn)   = data[off + 7];
          id(g_rc_btna)  = data[off + 0];
          id(g_rc_fresh) = true;
          break;
        }
  on_unknown_peer:
    - lambda: |-
        for (int off = 0; off + 8 <= (int) size; off++) {
          if (data[off + 5] != 0x58 || data[off + 6] != 0x02) continue;  // speed == 600
          int16_t yaw, pitch;
          memcpy(&yaw, data + off + 1, 2);
          memcpy(&pitch, data + off + 3, 2);
          if (yaw < -1280 || yaw > 1280 || pitch < 0 || pitch > 900) continue;
          id(g_rc_yaw)   = yaw * 164.0f / 1280.0f;
          id(g_rc_pitch) = 158.0f + pitch * 102.0f / 900.0f;
          id(g_rc_btn)   = data[off + 7];
          id(g_rc_btna)  = data[off + 0];
          id(g_rc_fresh) = true;
          break;
        }

# ── IR AWARENESS — the robot has an infrared RECEIVER (BSP). When anyone uses a TV/AC
# remote in the room it notices and glances over, curious. (The BSP also gives it an IR
# TRANSMITTER + a ready "Default AC" climate entity + an IR proxy — the robot doubles as
# a Home Assistant IR blaster out of the box; nothing to configure here.)
# (the BSP declares the receiver as a single mapping — package maps DEEP-MERGE, so these
# triggers are added onto the BSP's ir_rx without redefining its pin)
remote_receiver:
  on_nec:
    then: [ { script.execute: ir_glance } ]
  on_samsung:
    then: [ { script.execute: ir_glance } ]
  on_coolix:
    then: [ { script.execute: ir_glance } ]

# The downloadable image for the ALERT page. Setting the "Show image URL" text entity
# (from HA automations / the dravix add-on) fetches the URL and shows it full-screen for
# ~25s, then returns to the face. Tip: append ?height=240 to Frigate snapshot URLs.
online_image:
  - id: oi_show
    url: "http://127.0.0.1/placeholder.jpg"   # replaced at runtime via Show image URL
    format: JPEG
    type: RGB565
    resize: 320x240
    update_interval: never
    on_download_finished:
      - lvgl.image.update: { id: img_show, src: oi_show }
      - lvgl.page.show: page_image
      - script.execute: img_timeout
    on_error:
      - logger.log: "show-image: download failed"

# ── GAME SOUND — 8-bit beeps through the BSP's I2S speaker (`i2s_speaker`, shared with TTS;
#    the game only plays them while it's running, when nothing else is using the speaker).
rtttl:
  id: game_sfx
  speaker: i2s_speaker

packages:
  m5stack_stackchan:
    url: https://github.com/m5stack/esphome-yaml
    files: [examples/kit/stackchan-bsp.factory.yaml]
    # PINNED so upstream BSP changes can't silently break every build (this file leans on
    # BSP ids like `stackchan_light_bar` / `servo_x_angle`). To take a BSP update: change
    # ref to the new commit, validate, flash.
    ref: 238ba9825e7874d5626709631dae6be92e861b17
    # 1d (not `never`): with a pinned ref the content can't change anyway, but the daily
    # touch lets ESPHome's recovery path detect-and-recreate a broken cache dir. `never`
    # preserves a corrupted directory forever (learned the hard way).
    refresh: 1d

# Pin the BSP's C++ COMPONENTS to the same commit. The BSP's own external_components
# entry is UNPINNED with refresh: 0s — a git fetch on every single compile, which is
# what corrupts the ESPHome add-on's cache ("shallow.lock exists" / "directory not
# empty" build failures) and lets upstream changes float under us. This entry is
# processed after the package's, and ESPHome prepends component finders, so it WINS.
external_components:
  # NOTE: no `path:` on purpose — ESPHome finds the top-level `components/` folder by
  # itself (the exact mechanism the BSP's own entry has always used), and the plain
  # `.git` URL matches it too so the cache key is clean.
  - source:
      type: git
      url: https://github.com/m5stack/esphome-yaml.git
      ref: 238ba9825e7874d5626709631dae6be92e861b17
    components: [axp2101, aw88298, aw9523b, si12t, m5ioe1, ftservo, scs9009]
    refresh: 1d   # pinned ref = content can't change; the daily touch enables cache self-heal
  # The CoreS3's BMI270 IMU (accelerometer) — the BSP never exposes it. VENDORED into
  # dravix-os's own components/ (MIT, from DennisGaida's driver — the one M5Stack's
  # AtomS3R examples use) with a patch for the ESPHome 2026.6 i2c API, which upstream
  # predates and no longer compiles against. Powers the SHAKE → dizzy reaction.
  # ref is a BRANCH (not a sha) on purpose: GitHub only serves fetches of ADVERTISED
  # refs (branch/tag tips) — a pinned sha breaks the moment it stops being the tip.
  # This is our own repo — the same main the firmware itself ships from.
  - source:
      type: git
      url: https://github.com/YossiKon/dravix-os.git
      ref: main
    components: [bmi270_bmm150]
    refresh: 1d

display:
  - id: !extend m5cores3_lcd
    show_test_card: false
    # note: DON'T set invert_colors here — the BSP's `true` is what the CoreS3 panel needs.

font:
  - file: "gfonts://Roboto"
    id: title_font
    size: 30
  - file: "gfonts://Roboto"
    id: text_font
    size: 24
  - file: "gfonts://Roboto"
    id: small_font
    size: 19
    glyphsets: [GF_Latin_Core]   # adds ° and accented Latin (for the climate page etc.)
  - file: "gfonts://Roboto"
    id: big_font
    size: 52
    glyphsets: [GF_Latin_Core]   # the big climate target readout shows "21°"
  # Speech-bubble font. GF_Latin_Core covers Latin/digits/punctuation; the Hebrew letters
  # are listed explicitly (ESPHome has no GF_Hebrew glyphset). SWAP POINT: if your Assist
  # replies in another script (Cyrillic/CJK/…), switch the font + glyphsets here — e.g.
  # glyphsets: [GF_Latin_Core, GF_Cyrillic_Core] and drop the explicit glyphs list.
  - file: "gfonts://Heebo"
    id: heb_font
    size: 20
    glyphsets: [GF_Latin_Core]
    glyphs: ["א", "ב", "ג", "ד", "ה", "ו", "ז", "ח", "ט", "י", "כ", "ך", "ל", "מ", "ם", "נ", "ן", "ס", "ע", "פ", "ף", "צ", "ץ", "ק", "ר", "ש", "ת", "־", "׳", "״"]

globals:
  # true once on_boot ran — LVGL widgets exist and it's safe to draw
  - { id: g_booted, type: bool, restore_value: false, initial_value: "false" }
  # face state
  - { id: g_expr,   type: int,  restore_value: false, initial_value: "0" }
  - { id: g_face_rest, type: int, restore_value: false, initial_value: "0" }  # mood/select RESTING face; a reaction's happy/blush settles back to this on idle (so a pet's blush doesn't stick)
  - { id: g_bg_last, type: int, restore_value: false, initial_value: "-1" }   # last bg colour render_face painted — skip the full-screen invalidation when unchanged
  - { id: g_sweat,  type: bool, restore_value: false, initial_value: "false" }  # react_hot's sweat drop is up (so render_face doesn't hide it mid-reaction)
  - { id: g_blink,  type: bool, restore_value: false, initial_value: "false" }
  - { id: g_listen, type: bool, restore_value: false, initial_value: "false" }
  - { id: g_talk,   type: bool, restore_value: false, initial_value: "false" }
  - { id: g_think,  type: bool, restore_value: false, initial_value: "false" }   # AI is processing — between your words and its reply
  - { id: g_conc,   type: bool, restore_value: false, initial_value: "false" }   # external "focused" face (a coding agent is working) — focus EYES only, no DND semantics
  - { id: g_vad,    type: bool, restore_value: false, initial_value: "false" }   # voice detected in the CURRENT listen window (VAD) — gates the no-voice auto-close
  - { id: g_ext_talk, type: bool, restore_value: false, initial_value: "false" } # external TTS (dravix chat/notify/timers) is playing → talking mouth
  - { id: g_tip,    type: bool, restore_value: false, initial_value: "false" }  # a wellness tip is showing
  - { id: g_agent,  type: bool, restore_value: false, initial_value: "false" }  # an AI-agent badge is set
  - { id: g_perm,   type: bool, restore_value: false, initial_value: "false" }  # an approve/reject prompt is up
  - { id: g_voice,  type: bool, restore_value: false, initial_value: "false" }  # voice pipeline active
  - { id: g_sleep,  type: bool, restore_value: false, initial_value: "false" }
  - { id: g_saver,  type: bool, restore_value: false, initial_value: "false" }
  - { id: g_busy,   type: bool, restore_value: false, initial_value: "false" }
  - { id: g_night,  type: bool, restore_value: false, initial_value: "false" }   # לילה — dim + quiet behaviour
  - { id: g_focus,  type: bool, restore_value: false, initial_value: "false" }   # מרוכז — do-not-disturb
  - { id: g_quiet,  type: bool, restore_value: false, initial_value: "false" }   # שקט — low volume, no mood LEDs
  - { id: g_vol_saved, type: float, restore_value: false, initial_value: "-1" }  # volume before quiet mode
  - { id: g_anim,   type: int,  restore_value: false, initial_value: "0" }
  - { id: g_near,   type: bool, restore_value: false, initial_value: "false" }  # someone is close
  - { id: g_pet,    type: bool, restore_value: false, initial_value: "false" }  # being touched
  # swipe tracking + which "home screen" (0 = face, 1..3 = cards)
  - { id: sw_x0,    type: int,  restore_value: false, initial_value: "0" }
  - { id: sw_y0,    type: int,  restore_value: false, initial_value: "0" }
  - { id: sw_x1,    type: int,  restore_value: false, initial_value: "0" }
  - { id: sw_y1,    type: int,  restore_value: false, initial_value: "0" }
  - { id: sw_sleep, type: bool, restore_value: false, initial_value: "false" }
  - { id: g_card,   type: int,  restore_value: false, initial_value: "0" }
  - { id: g_score,  type: int,  restore_value: false, initial_value: "0" }   # catch-me game score
  # ── HIGH SCORES — the best each game has seen; restore_value: true → survives reboots ──
  - { id: hs_catch,    type: int, restore_value: true, initial_value: "0" }
  - { id: hs_flappy,   type: int, restore_value: true, initial_value: "0" }
  - { id: hs_breakout, type: int, restore_value: true, initial_value: "0" }
  - { id: hs_simon,    type: int, restore_value: true, initial_value: "0" }
  - { id: hs_react,    type: int, restore_value: true, initial_value: "0" }   # best (lowest) reaction ms; 0 = none yet
  - { id: hs_rps,      type: int, restore_value: true, initial_value: "0" }   # total R-P-S wins
  # ── PONG — you (joystick, left paddle) vs the robot AI (right). First to 7. ──
  - { id: pg_bx,     type: float, restore_value: false, initial_value: "160" }
  - { id: pg_by,     type: float, restore_value: false, initial_value: "120" }
  - { id: pg_vx,     type: float, restore_value: false, initial_value: "3.2" }
  - { id: pg_vy,     type: float, restore_value: false, initial_value: "2.0" }
  - { id: pg_py,     type: int,   restore_value: false, initial_value: "98" }   # player paddle top-Y
  - { id: pg_ay,     type: int,   restore_value: false, initial_value: "98" }   # robot paddle top-Y
  - { id: pg_ps,     type: int,   restore_value: false, initial_value: "0" }
  - { id: pg_as,     type: int,   restore_value: false, initial_value: "0" }
  - { id: pg_alive,  type: bool,  restore_value: false, initial_value: "false" }
  - { id: g_tempst,  type: int,   restore_value: false, initial_value: "0" }   # temperature mood: 0 ok · 1 hot · 2 cold
  # ── SNAKE — 13×8 grid (24px cells), body in two arrays, joystick sets a continuous heading ──
  - id: sn_x
    type: int[12]
    restore_value: false
    initial_value: "std::array<int, 12>{}"
  - id: sn_y
    type: int[12]
    restore_value: false
    initial_value: "std::array<int, 12>{}"
  - { id: sn_len, type: int,     restore_value: false, initial_value: "4" }
  - { id: sn_dir, type: int,     restore_value: false, initial_value: "1" }   # 0 up · 1 right · 2 down · 3 left
  - { id: sn_fx,  type: int,     restore_value: false, initial_value: "9" }
  - { id: sn_fy,  type: int,     restore_value: false, initial_value: "4" }
  - { id: sn_sc,  type: int,     restore_value: false, initial_value: "0" }
  - { id: sn_alive, type: bool,  restore_value: false, initial_value: "false" }
  # (DOOM-lite removed — it was unreachable: the games menu opens the real DOOM-3D.)
  # ── MAPLE-lite — a little platformer: joystick moves, the remote button jumps, stomp mushrooms ──
  - { id: mp_x,     type: float, restore_value: false, initial_value: "20" }
  - { id: mp_y,     type: float, restore_value: false, initial_value: "180" }
  - { id: mp_vy,    type: float, restore_value: false, initial_value: "0" }
  - { id: mp_mx,    type: float, restore_value: false, initial_value: "200" }  # mushroom x
