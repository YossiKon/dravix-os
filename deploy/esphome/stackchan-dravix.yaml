# ════════════════════════════════════════════════════════════════════════════════
#  dravix-os · StackChan ESPHome firmware (M5Stack CoreS3)
#  Sits ON TOP of the M5Stack BSP (servos, mic, speaker, LEDs, touch come from it).
#  Features in this file:
#    • Animated kaomoji FACE — blink, drift, talk/listen, sleep "zzz"
#    • VOICE assistant (mic + speaker) — white screen while listening/talking
#    • SLEEP + SCREENSAVER — dim then black, wake on touch or "ok nabu"
#    • STATUS page — time · date · WiFi · IP · uptime
#    • HOME card — live Home Assistant values (temp · humidity)
#    • Screen BRIGHTNESS control  ·  TAP cycles pages
#  Head servos + head calibration + petting are handled by dravix-os (the add-on),
#  not this file. Validate-first: if `time:` clashes with the BSP, delete that block.
# ════════════════════════════════════════════════════════════════════════════════

esphome:
  name: stackchan
  friendly_name: stackchan

esp32:
  variant: esp32s3
  flash_size: 16MB
  framework:
    type: esp-idf

logger:

api:

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "stackchan Fallback Hotspot"

captive_portal:

packages:
  m5stack_stackchan:
    url: https://github.com/m5stack/esphome-yaml
    files: [examples/kit/stackchan-bsp.factory.yaml]
    refresh: 1d

display:
  - id: !extend m5cores3_lcd
    show_test_card: false
    invert_colors: false          # flip to true if colours come out inverted

font:
  - file: "gfonts://Roboto Mono"
    id: face_font
    size: 96
    glyphs: "-_^Tu><oOz "
  - file: "gfonts://Roboto"
    id: text_font
    size: 28
  - file: "gfonts://Roboto"
    id: small_font
    size: 20

globals:
  - { id: g_expr,   type: int,  restore_value: false, initial_value: "0" }
  - { id: g_blink,  type: bool, restore_value: false, initial_value: "false" }
  - { id: g_listen, type: bool, restore_value: false, initial_value: "false" }
  - { id: g_talk,   type: bool, restore_value: false, initial_value: "false" }
  - { id: g_sleep,  type: bool, restore_value: false, initial_value: "false" }
  - { id: g_busy,   type: bool, restore_value: false, initial_value: "false" }
  - { id: g_anim,   type: int,  restore_value: false, initial_value: "0" }

# If Validate says homeassistant time already exists (from the BSP), delete this
# `time:` block and tell me — we'll reference the existing one.
time:
  - platform: homeassistant
    id: dravix_time

sensor:
  - platform: wifi_signal
    id: wifi_db
    update_interval: 30s
  - platform: uptime
    id: up_sec
  # ── Live values pulled FROM Home Assistant for the "home card" page ──────────
  # Point these at any HA sensors you like (change the entity_id's below).
  - platform: homeassistant
    id: ha_temp
    entity_id: sensor.living_room_temperature
  - platform: homeassistant
    id: ha_hum
    entity_id: sensor.living_room_humidity

text_sensor:
  - platform: wifi_info
    ip_address:
      id: ip_txt
    ssid:
      id: ssid_txt

number:
  - platform: template
    name: "Screensaver after (min)"
    id: n_screensaver
    optimistic: true
    min_value: 1
    max_value: 120
    step: 1
    initial_value: 5
    restore_value: true
  - platform: template
    name: "Sleep after (min)"
    id: n_sleep
    optimistic: true
    min_value: 1
    max_value: 240
    step: 1
    initial_value: 15
    restore_value: true
  - platform: template
    name: "Screen brightness"
    id: n_brightness
    optimistic: true
    min_value: 10
    max_value: 100
    step: 5
    initial_value: 100
    unit_of_measurement: "%"
    restore_value: true
    set_action:
      - light.turn_on:
          id: lcd_backlight
          brightness: !lambda 'return x / 100.0;'

lvgl:
  displays:
    - m5cores3_lcd
  page_wrap: true          # tapping past the last page wraps back to the face
  on_idle:
    - timeout: !lambda 'return (uint32_t) id(n_screensaver).state * 60000;'
      then:
        - light.turn_on: { id: lcd_backlight, brightness: 25% }
    - timeout: !lambda 'return (uint32_t) id(n_sleep).state * 60000;'
      then:
        - globals.set: { id: g_sleep, value: "true" }
        - script.execute: render_face
        - delay: 3s
        - light.turn_off: lcd_backlight
  pages:
    # ── Page 1: the face ────────────────────────────────────────────────────────
    - id: page_face
      bg_color: 0x000000
      bg_opa: COVER
      widgets:
        - obj:
            id: bg_rect
            x: 0
            y: 0
            width: 320
            height: 240
            radius: 0
            border_width: 0
            bg_color: 0x000000
            bg_opa: COVER
        - label:
            id: face_label
            text: "o_o"
            text_color: 0x33E6C8
            text_font: face_font
            align: CENTER
    # ── Page 2: status / vital info ─────────────────────────────────────────────
    - id: page_status
      bg_color: 0x000000
      bg_opa: COVER
      widgets:
        - label:
            id: lbl_time
            text: "--:--"
            text_font: text_font
            text_color: 0x33E6C8
            align: CENTER
            y: -80
        - label:
            id: lbl_date
            text: ""
            text_font: small_font
            text_color: 0x8892A0
            align: CENTER
            y: -42
        - label:
            id: lbl_wifi
            text: "WiFi"
            text_font: small_font
            text_color: 0x8892A0
            align: CENTER
            y: -6
        - label:
            id: lbl_ip
            text: "IP"
            text_font: small_font
            text_color: 0x8892A0
            align: CENTER
            y: 30
        - label:
            id: lbl_up
            text: "Up"
            text_font: small_font
            text_color: 0x8892A0
            align: CENTER
            y: 66
    # ── Page 3: home card (live Home Assistant values) ──────────────────────────
    - id: page_home
      bg_color: 0x000000
      bg_opa: COVER
      widgets:
        - label:
            id: lbl_home_title
            text: "HOME"
            text_font: small_font
            text_color: 0x33E6C8
            align: CENTER
            y: -70
        - label:
            id: lbl_temp
            text: "Temp --"
            text_font: text_font
            text_color: 0xFFFFFF
            align: CENTER
            y: -15
        - label:
            id: lbl_hum
            text: "Hum --"
            text_font: text_font
            text_color: 0xFFFFFF
            align: CENTER
            y: 35

script:
  - id: render_face
    then:
      - lvgl.widget.update:
          id: bg_rect
          bg_color: !lambda 'return (id(g_listen) || id(g_talk)) ? lv_color_hex(0xFFFFFF) : lv_color_hex(0x000000);'
      - lvgl.label.update:
          id: face_label
          text_color: !lambda 'return (id(g_listen) || id(g_talk)) ? lv_color_hex(0x000000) : lv_color_hex(0x33E6C8);'
          text: !lambda |-
            if (id(g_sleep)) {
              const char* z[] = {"u_u", "u_u z", "u_u zz", "u_u zzz"};
              return std::string(z[id(g_anim) % 4]);
            }
            if (id(g_listen)) return std::string("O_O");
            if (id(g_talk))   return std::string((id(g_anim) % 2) ? "o o" : "o_o");
            if (id(g_blink))  return std::string("-_-");
            const char* faces[] = {"o_o", "^_^", "T_T", ">_<", "u_u", "o_O"};
            return std::string(faces[id(g_expr) % 6]);

select:
  - platform: template
    name: "Face"
    id: robot_face
    optimistic: true
    options: [neutral, happy, sad, angry, sleepy, doubt]
    initial_option: neutral
    set_action:
      - globals.set:
          id: g_expr
          value: !lambda |-
            if (x == "happy") return 1;
            else if (x == "sad") return 2;
            else if (x == "angry") return 3;
            else if (x == "sleepy") return 4;
            else if (x == "doubt") return 5;
            return 0;
      - script.execute: render_face
  - platform: template
    name: "Mode"
    id: robot_mode
    optimistic: true
    options: [awake, busy, sleep]
    initial_option: awake
    set_action:
      - globals.set: { id: g_sleep, value: !lambda 'return x == std::string("sleep");' }
      - globals.set: { id: g_busy,  value: !lambda 'return x == std::string("busy");' }
      - script.execute: render_face

interval:
  # Random blink (never while sleeping / listening / talking).
  - interval: 1s
    then:
      - if:
          condition:
            lambda: 'return !id(g_sleep) && !id(g_talk) && !id(g_listen) && random_float() < 0.22;'
          then:
            - globals.set: { id: g_blink, value: "true" }
            - script.execute: render_face
            - delay: 160ms
            - globals.set: { id: g_blink, value: "false" }
            - script.execute: render_face
  # Drives the sleep "zzz" and the talking mouth animation.
  - interval: 600ms
    then:
      - globals.set: { id: g_anim, value: !lambda 'return id(g_anim) + 1;' }
      - if:
          condition:
            lambda: 'return id(g_sleep) || id(g_talk);'
          then:
            - script.execute: render_face
  # Occasional "alive" drift of the face (not in sleep / busy).
  - interval: 7s
    then:
      - if:
          condition:
            lambda: 'return !id(g_sleep) && !id(g_busy);'
          then:
            - lvgl.widget.update:
                id: face_label
                x: !lambda 'return (int)(random_float() * 24 - 12);'
                y: !lambda 'return (int)(random_float() * 18 - 9);'
  # Refresh the status + home-card labels.
  - interval: 5s
    then:
      - lvgl.label.update:
          id: lbl_time
          text: !lambda |-
            auto t = id(dravix_time).now();
            if (!t.is_valid()) return std::string("--:--");
            char b[8]; snprintf(b, sizeof(b), "%02d:%02d", t.hour, t.minute);
            return std::string(b);
      - lvgl.label.update:
          id: lbl_date
          text: !lambda |-
            auto t = id(dravix_time).now();
            if (!t.is_valid()) return std::string("");
            char b[16]; snprintf(b, sizeof(b), "%02d/%02d", t.day_of_month, t.month);
            return std::string(b);
      - lvgl.label.update:
          id: lbl_wifi
          text: !lambda |-
            char b[20]; snprintf(b, sizeof(b), "WiFi %d dB", (int) id(wifi_db).state);
            return std::string(b);
      - lvgl.label.update:
          id: lbl_ip
          text: !lambda 'return "IP " + id(ip_txt).state;'
      - lvgl.label.update:
          id: lbl_up
          text: !lambda |-
            int s = (int) id(up_sec).state;
            char b[24]; snprintf(b, sizeof(b), "Up %dh %dm", s / 3600, (s % 3600) / 60);
            return std::string(b);
      - lvgl.label.update:
          id: lbl_temp
          text: !lambda |-
            if (!id(ha_temp).has_state()) return std::string("Temp --");
            char b[24]; snprintf(b, sizeof(b), "Temp %.1f C", id(ha_temp).state);
            return std::string(b);
      - lvgl.label.update:
          id: lbl_hum
          text: !lambda |-
            if (!id(ha_hum).has_state()) return std::string("Hum --");
            char b[24]; snprintf(b, sizeof(b), "Hum %.0f %%", id(ha_hum).state);
            return std::string(b);

touchscreen:
  - id: !extend touch
    on_touch:
      - if:
          condition:
            lambda: 'return id(g_sleep);'
          then:
            # Asleep → tap wakes it (restore your chosen brightness) and shows the face.
            - light.turn_on:
                id: lcd_backlight
                brightness: !lambda 'return id(n_brightness).state / 100.0;'
            - globals.set: { id: g_sleep, value: "false" }
            - script.execute: render_face
          else:
            # Awake → tap cycles through the pages: face → status → home → face …
            - lvgl.page.next

voice_assistant:
  microphone: i2s_mic
  media_player: va_media_player
  on_listening:
    - light.turn_on:
        id: lcd_backlight
        brightness: !lambda 'return id(n_brightness).state / 100.0;'
    - globals.set: { id: g_sleep, value: "false" }
    - globals.set: { id: g_listen, value: "true" }
    - script.execute: render_face
  on_tts_start:
    - globals.set: { id: g_listen, value: "false" }
    - globals.set: { id: g_talk, value: "true" }
    - script.execute: render_face
  on_end:
    - globals.set: { id: g_listen, value: "false" }
    - globals.set: { id: g_talk, value: "false" }
    - script.execute: render_face

# ── OPTIONAL: robot battery % on the status page ────────────────────────────────
# The CoreS3 battery is read by the M5Stack BSP's power-management chip. If the BSP
# already exposes a battery sensor (likely), it shows up in Home Assistant on its own —
# in that case just add it to the "home card" via a `sensor: platform: homeassistant`
# entry pointing at that battery entity (like ha_temp above). Don't hand-add an AXP2101
# block here — it would clash with the BSP and fail Validate.
