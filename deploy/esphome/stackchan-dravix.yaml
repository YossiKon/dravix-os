  # ── PERMISSIONS log — the current request + the last 3 decisions (shown on the Permissions page) ──
  - id: perm_cur
    type: std::string
    restore_value: false
    initial_value: '""'
  - id: perm_h0
    type: std::string
    restore_value: false
    initial_value: '""'
  - id: perm_h1
    type: std::string
    restore_value: false
    initial_value: '""'
  - id: perm_h2
    type: std::string
    restore_value: false
    initial_value: '""'
  - { id: perm_dec, type: int, restore_value: false, initial_value: "0" }   # last decision: 1 approve · 2 reject
  - { id: g_apulse, type: bool, restore_value: false, initial_value: "false" }  # AI-agent "working" pulse phase
  - { id: g_gloves, type: bool, restore_value: false, initial_value: "false" }  # boxing-gloves accessory is on → arms the auto-punch
  # (g_wink + g_ant removed — winks were permanently disabled and no accessory ever armed the antennae)
  # ── DOOM-3D — a real first-person raycaster: joystick turns/walks, the button shoots ──
  - { id: r3_px,   type: float, restore_value: false, initial_value: "2.5" }   # player x (map units)
  - { id: r3_py,   type: float, restore_value: false, initial_value: "2.5" }   # player y
  - { id: r3_pa,   type: float, restore_value: false, initial_value: "0.6" }   # player angle (radians)
  - { id: r3_hp,   type: int,   restore_value: false, initial_value: "100" }
  - { id: r3_ammo, type: int,   restore_value: false, initial_value: "50" }
  - { id: r3_bp,   type: bool,  restore_value: false, initial_value: "false" } # fire button, previous frame
  - { id: r3_flash, type: int,  restore_value: false, initial_value: "0" }     # muzzle-flash frames left
  - { id: r3_run,  type: bool,  restore_value: false, initial_value: "false" }
  - id: en_x
    type: float[4]
    restore_value: false
    initial_value: "std::array<float, 4>{}"
  - id: en_y
    type: float[4]
    restore_value: false
    initial_value: "std::array<float, 4>{}"
  - id: en_alive
    type: int[4]
    restore_value: false
    initial_value: "std::array<int, 4>{}"
  - { id: r3_kills, type: int,  restore_value: false, initial_value: "0" }
  - { id: r3_hit,   type: int,  restore_value: false, initial_value: "0" }   # damage-flash frames
  - { id: r3_over,  type: bool, restore_value: false, initial_value: "false" }
  - { id: g_pn,     type: int,  restore_value: false, initial_value: "0" }   # party sway alternator
  # official ESP-NOW remote state (latest parsed packet + throttling)
  - { id: g_rc_yaw,   type: float, restore_value: false, initial_value: "0" }     # target yaw (servo scale)
  - { id: g_rc_pitch, type: float, restore_value: false, initial_value: "209" }   # target pitch (158..260) — 209 = the stick's NEUTRAL centre; 165 made Snake/DOOM-3D auto-move with no remote touched
  - { id: g_rc_btn,   type: int,   restore_value: false, initial_value: "0" }
  - { id: g_rc_btna,  type: int,   restore_value: false, initial_value: "0" }   # 2nd remote button / stick-click (packet byte 0)
