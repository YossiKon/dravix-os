                  id(bk_bx) = 160; id(bk_by) = 170; id(bk_vx) = 3; id(bk_vy) = -3.4f;
                  id(bk_alive) = true;
              - lvgl.label.update: { id: bk_msg, text: "" }
              - lvgl.page.show: page_breakout
        - button:
            id: btn_g_pong
            x: 84
            y: 186
            width: 74
            height: 46
            radius: 10
            bg_color: 0x1a3a4a
            widgets:
              - label: { text: "PONG", text_font: small_font, text_color: 0x9fe0ff, align: CENTER }
