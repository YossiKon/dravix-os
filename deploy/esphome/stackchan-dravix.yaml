esphome:
  name: stackchan
  friendly_name: stackchan

esp32:
  variant: esp32s3
  flash_size: 16MB
  framework:
    type: esp-idf

logger:

api:

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "stackchan Fallback Hotspot"

captive_portal:

packages:
  m5stack_stackchan:
    url: https://github.com/m5stack/esphome-yaml
    files: [examples/kit/stackchan-bsp.factory.yaml]
    refresh: 1d

# Turn off the BSP test card so LVGL owns the screen.
display:
  - id: !extend m5cores3_lcd
    show_test_card: false

# Big font for the face.
font:
  - file: "gfonts://Roboto Mono"
    id: face_font
    size: 96
    glyphs: "-_^Tu><oO "

# ── The face (main screen) — a big expression dravix sets ──
lvgl:
  displays:
    - m5cores3_lcd
  pages:
    - id: page_face
      bg_color: 0x000000
      bg_opa: COVER
      widgets:
        - label:
            id: face_label
            text: "-_-"
            text_color: 0x33E6C8
            text_font: face_font
            align: CENTER

# Expression entity dravix controls (select.stackchan_face).
select:
  - platform: template
    name: "Face"
    id: robot_face
    optimistic: true
    options: [neutral, happy, sad, angry, sleepy, doubt]
    initial_option: neutral
    set_action:
      - lvgl.label.update:
          id: face_label
          text: !lambda |-
            if (x == "happy") return std::string("^_^");
            else if (x == "sad") return std::string("T_T");
            else if (x == "angry") return std::string(">_<");
            else if (x == "sleepy") return std::string("u_u");
            else if (x == "doubt") return std::string("o_O");
            else return std::string("-_-");

# ── Voice: Home Assistant Assist + "okay nabu" wake word (on-device) ──
micro_wake_word:
  microphone: i2s_mic
  models:
    - model: okay_nabu
  on_wake_word_detected:
    - voice_assistant.start

voice_assistant:
  microphone: i2s_mic
  media_player: va_media_player
  on_listening:
    - lvgl.label.update: { id: face_label, text: "O_O" }   # listening
  on_tts_start:
    - lvgl.label.update: { id: face_label, text: "-o-" }   # talking (mouth open)
  on_end:
    - lvgl.label.update: { id: face_label, text: "-_-" }   # back to neutral
