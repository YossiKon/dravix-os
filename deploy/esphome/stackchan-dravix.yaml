            - lvgl.widget.update: { id: drink_water, y: 76, height: 8 }
            - delay: 360ms
            # sip 2
            - if:
                condition: { lambda: 'return id(sw_sfx).state && !id(g_quiet) && !id(g_night);' }
                then: [ { rtttl.play: "sip:d=16,o=4,b=150:c" } ]
            - lvgl.widget.update: { id: drink_water, y: 80, height: 2 }
            - delay: 320ms
            # empty → ahh
            - lvgl.widget.hide: drink_water
            - lvgl.widget.hide: drink_glass
            - globals.set: { id: g_expr, value: "1" }
            - script.execute: render_face
            - if:
                condition: { lambda: 'return id(sw_sfx).state && !id(g_quiet) && !id(g_night);' }
                then: [ { rtttl.play: "ahh:d=8,o=5,b=140:e,c" } ]
            - script.execute: head_nod
            - delay: 220ms
            - lvgl.widget.hide: hand_l
            - lvgl.widget.hide: hand_r
  # ── WAVE 👋 — a little paw rises by the face and wiggles hello (used by greet).
  - id: wave
    mode: single
    then:
      - if:
          condition: { lambda: 'return id(g_booted) && !id(g_sleep) && !id(g_saver) && !id(g_perm);' }
          then:
            - lvgl.widget.update: { id: hand_r, x: 58, y: 8 }
            - lvgl.widget.show: hand_r
            - lvgl.widget.update: { id: hand_r, x: 44 }
            - delay: 150ms
            - lvgl.widget.update: { id: hand_r, x: 74 }
            - delay: 150ms
            - lvgl.widget.update: { id: hand_r, x: 44 }
            - delay: 150ms
            - lvgl.widget.update: { id: hand_r, x: 74 }
            - delay: 150ms
            - lvgl.widget.hide: hand_r
            - lvgl.widget.update: { id: hand_r, x: 34, y: 92 }   # back to its eating spot
  # ── RUBS EYES 😴 — both paws come up to the eyes and rub, sleepily (used when nodding off).
  - id: rub_eyes
    mode: single
    then:
      - if:
          condition: { lambda: 'return id(g_booted) && !id(g_perm);' }
          then:
            - lvgl.widget.update: { id: hand_l, x: -50, y: 2 }
            - lvgl.widget.update: { id: hand_r, x: 50, y: 2 }
            - lvgl.widget.show: hand_l
            - lvgl.widget.show: hand_r
            - lvgl.widget.update: { id: hand_l, y: -8 }
            - lvgl.widget.update: { id: hand_r, y: -8 }
            - delay: 190ms
            - lvgl.widget.update: { id: hand_l, y: 8 }
            - lvgl.widget.update: { id: hand_r, y: 8 }
            - delay: 190ms
            - lvgl.widget.update: { id: hand_l, y: -8 }
            - lvgl.widget.update: { id: hand_r, y: -8 }
            - delay: 190ms
            - lvgl.widget.update: { id: hand_l, y: 8 }
            - lvgl.widget.update: { id: hand_r, y: 8 }
            - delay: 190ms
            - lvgl.widget.hide: hand_l
            - lvgl.widget.hide: hand_r
            - lvgl.widget.update: { id: hand_l, x: -34, y: 92 }
            - lvgl.widget.update: { id: hand_r, x: 34, y: 92 }
  # ── SHY 🙈 — paws cover the eyes (blushing), then peek out (used on a boop, too close).
  - id: shy
    mode: single
    then:
      - if:
          condition: { lambda: 'return id(g_booted) && !id(g_sleep) && !id(g_saver) && !id(g_perm);' }
          then:
            - if:
                condition: { lambda: 'return id(sw_sfx).state && !id(g_quiet) && !id(g_night);' }
                then: [ { rtttl.play: "shy:d=16,o=6,b=200:e,c" } ]
            - lvgl.widget.update: { id: hand_l, x: -54, y: 0 }
            - lvgl.widget.update: { id: hand_r, x: 54, y: 0 }
            - lvgl.widget.show: hand_l
            - lvgl.widget.show: hand_r
            - delay: 850ms
            - lvgl.widget.update: { id: hand_l, x: -72 }   # peek out
            - lvgl.widget.update: { id: hand_r, x: 72 }
            - delay: 550ms
            - lvgl.widget.hide: hand_l
            - lvgl.widget.hide: hand_r
            - lvgl.widget.update: { id: hand_l, x: -34, y: 92 }
            - lvgl.widget.update: { id: hand_r, x: 34, y: 92 }
  # ── CLAPS 👏 — paws clap together a few times (used when you win a game).
  - id: clap
    mode: single
    then:
      - if:
          condition: { lambda: 'return id(g_booted) && !id(g_sleep) && !id(g_saver) && !id(g_perm);' }
          then:
            - lvgl.widget.update: { id: hand_l, x: -42, y: 42 }
            - lvgl.widget.update: { id: hand_r, x: 42, y: 42 }
            - lvgl.widget.show: hand_l
            - lvgl.widget.show: hand_r
            - lvgl.widget.update: { id: hand_l, x: -8 }
            - lvgl.widget.update: { id: hand_r, x: 8 }
            - delay: 120ms
            - lvgl.widget.update: { id: hand_l, x: -42 }
            - lvgl.widget.update: { id: hand_r, x: 42 }
            - delay: 120ms
            - lvgl.widget.update: { id: hand_l, x: -8 }
            - lvgl.widget.update: { id: hand_r, x: 8 }
            - delay: 120ms
            - lvgl.widget.update: { id: hand_l, x: -42 }
            - lvgl.widget.update: { id: hand_r, x: 42 }
            - delay: 120ms
            - lvgl.widget.hide: hand_l
            - lvgl.widget.hide: hand_r
            - lvgl.widget.update: { id: hand_l, x: -34, y: 92 }
            - lvgl.widget.update: { id: hand_r, x: 34, y: 92 }
  # ── PLUGGED IN 🔌 — "nom, electricity!": happy face + a green flash when the
  #    charger connects (silent while sleeping — the breathing LEDs take over there).
  - id: plug_react
    mode: single
    then:
      - if:
          condition: { lambda: 'return id(g_booted) && !id(g_sleep) && !id(g_saver);' }
          then:
            - globals.set: { id: g_expr, value: "1" }
            - script.execute: render_face
            - script.execute: { id: led_flash, r: 20, g: 100, b: 30 }
            - if:
                condition: { lambda: 'return id(sw_sfx).state && !id(g_quiet) && !id(g_night);' }
                then: [ { rtttl.play: "plug:d=16,o=5,b=200:c,g,c6" } ]   # "nom, electricity!" ⚡
            - delay: 2500ms
            # settle to the mood's RESTING face, not forced-neutral — this reaction never
            # trig_activity's, so the on_idle settle may already have fired and a mood face
            # set from HA would silently vanish until the next touch.
            - globals.set: { id: g_expr, value: !lambda 'return id(g_face_rest);' }
            - script.execute: render_face
      - delay: 30s   # a flaky charger connection can't turn this into a disco
  # ── WAVE 👋 — a hand waving at the sensor: wakes up, waves BACK with its head,
  #    happy face + warm flash. (Detected as 3 near/far proximity swings within 4s.)
  - id: wave_react
    mode: single
    then:
      - if:
          condition: { lambda: 'return !id(g_sleep) && !id(g_saver);' }   # DND: don't wake on a wave in sleep/screensaver
          then:
            - lambda: 'lv_disp_trig_activity(NULL);'
            - if:  # waving = you want its attention — but it must not cancel night/focus/quiet
                condition: { lambda: 'return !id(g_night) && !id(g_focus) && !id(g_quiet) && id(robot_mode).current_option() != std::string("awake");' }
                then: [ { select.set: { id: robot_mode, option: awake } } ]
            - globals.set: { id: g_expr, value: "1" }         # happy
            - globals.set: { id: g_card, value: "0" }
            - lvgl.page.show: page_face
            - script.execute: render_face
            - script.execute: { id: led_flash, r: 100, g: 60, b: 15 }   # warm hello
            - script.execute: head_shake                                 # waves back!
            - delay: 900ms
            - script.execute: head_shake
            - delay: 2000ms
            - globals.set: { id: g_expr, value: !lambda 'return id(g_face_rest);' }   # back to the mood's resting face
            - script.execute: render_face
            - delay: 6s                                       # throttle
  # ── BOOP 👉 — a finger right up at the proximity sensor: love-eyes + a happy nod.
  - id: boop_react
    mode: single
    then:
      - lambda: 'lv_disp_trig_activity(NULL);'
      - globals.set: { id: g_expr, value: "6" }      # love ♥
      - globals.set: { id: g_card, value: "0" }
      - lvgl.page.show: page_face
      - script.execute: render_face
      - script.execute: { id: led_flash, r: 100, g: 20, b: 45 }
      - script.execute: head_nod
      - script.execute: shy                          # 🙈 bashful — covers its eyes
      - delay: 2500ms
      - globals.set: { id: g_expr, value: !lambda 'return id(g_face_rest);' }   # back to the mood's resting face
      - script.execute: render_face
      - delay: 8s                                    # throttle boops
  # ── HAND-TURN REACTION — someone physically turned the head: a startled "hey!?",
  #    then it accepts the new pose (no fighting the hand) and settles happy.
  - id: hand_react
    mode: single
    then:
      - if:
          condition: { lambda: 'return !id(g_sleep) && !id(g_saver);' }   # DND: don't wake on a head-turn in sleep/screensaver
          then:
            - lambda: 'lv_disp_trig_activity(NULL);'
            - globals.set: { id: g_expr, value: "7" }      # dizzy x_x — whoa!
            - globals.set: { id: g_card, value: "0" }
            - lvgl.page.show: page_face
            - script.execute: render_face
            - script.execute: { id: led_flash, r: 60, g: 25, b: 100 }
            - delay: 1300ms
            - globals.set: { id: g_expr, value: "1" }      # ...okay, that was fun actually
            - script.execute: render_face
            - delay: 2000ms
            - globals.set: { id: g_expr, value: !lambda 'return id(g_face_rest);' }   # back to the mood's resting face
            - script.execute: render_face
            - delay: 12s                                   # throttle: at most once per ~15s
  # ── SHAKEN! 😵 — the IMU felt real shaking: dizzy x_x eyes + "?", a woozy face wobble,
  #    violet LEDs and a warbly whimper. Being shaken wakes it (it's literally in your
  #    hands) but never cancels night/focus/quiet. One dizzy spell per shake session.
  - id: dizzy_react
    mode: single
    then:
      - if:
          condition: { lambda: 'return id(g_booted) && !id(g_voice) && !id(g_perm);' }
          then:
            - lambda: 'lv_disp_trig_activity(NULL);'
            - if:
                condition: { lambda: 'return (id(g_sleep) || id(g_saver)) && !id(g_night) && !id(g_focus) && !id(g_quiet);' }
                then: [ { select.set: { id: robot_mode, option: awake } } ]
            - globals.set: { id: g_card, value: "0" }
            - lvgl.page.show: page_face
            - globals.set: { id: g_expr, value: "7" }      # dizzy x_x + "?"
            - script.execute: render_face
            - script.execute: { id: led_flash, r: 55, g: 25, b: 100 }   # woozy violet
            - if:
                condition: { lambda: 'return id(sw_sfx).state && !id(g_quiet) && !id(g_night) && !id(g_sleep);' }
                then: [ { rtttl.play: "dizzy:d=16,o=5,b=170:g,e,c,e,g,e,c" } ]   # a wobbly whimper
            # the face wobbles like its inner gyro needs a second to settle
            - lvgl.widget.update: { id: face_box, x: -14 }
            - delay: 180ms
            - lvgl.widget.update: { id: face_box, x: 12 }
            - delay: 180ms
            - lvgl.widget.update: { id: face_box, x: -8 }
            - delay: 180ms
            - lvgl.widget.update: { id: face_box, x: 6 }
            - delay: 180ms
            - lvgl.widget.update: { id: face_box, x: 0 }
            - delay: 2400ms
            - globals.set: { id: g_expr, value: !lambda 'return id(g_face_rest);' }   # back to the mood's resting face
            - script.execute: render_face
      - delay: 12s   # throttle — one dizzy spell per shake session
  # ── IR GLANCE — someone pressed a TV/AC remote: glance over, quizzical, then back.
  #    mode: single + the trailing delay = fires at most once per ~20s, and never
  #    interrupts sleep / screensaver / calm modes.
  - id: ir_glance
    mode: single
    then:
      - if:
          condition:
            lambda: |-
              return !id(g_sleep) && !id(g_saver) && !id(g_night) && !id(g_focus)
                     && !id(g_quiet) && !id(g_voice) && id(sw_drift).state;
          then:
            - lambda: 'id(g_glance_ms) = (long) millis();'   # keep breathing off the glance
            - lvgl.widget.update: { id: face_box, x: 22, y: -4 }
            - globals.set: { id: g_expr, value: "5" }        # quizzical
            - script.execute: render_face
            - delay: 1600ms
            - lvgl.widget.update: { id: face_box, x: 0, y: 0 }
            - globals.set: { id: g_expr, value: !lambda 'return id(g_face_rest);' }   # back to the mood's resting face
            - script.execute: render_face
      - delay: 20s
  # ── TICKLE (touch zone 3, back of the head) — giggly, faster than a calm pet ──
  - id: tickle
    mode: restart
    then:
      - if:
          condition: { lambda: 'return !id(g_sleep) && !id(g_saver);' }   # DND: don't wake on a tickle in sleep/screensaver
          then:
            - lambda: 'lv_disp_trig_activity(NULL);'
            - if:  # a tickle must not cancel night/focus/quiet either
                condition: { lambda: 'return !id(g_night) && !id(g_focus) && !id(g_quiet) && id(robot_mode).current_option() != std::string("awake");' }
                then: [ { select.set: { id: robot_mode, option: awake } } ]
            - globals.set: { id: g_expr, value: "1" }     # happy (cheeks show)
            - globals.set: { id: g_card, value: "0" }
            - lvgl.page.show: page_face
            - script.execute: render_face
            - script.execute: { id: led_flash, r: 20, g: 100, b: 60 }   # giggly green
            - script.execute: head_shake                                # wiggle!
            - delay: 900ms
            - script.execute: head_shake                                # ...and again
  # ── PARTY — a little disco: colour-cycling LEDs + head sways, then back to normal ──
  - id: party
    mode: restart
    then:
      - lambda: 'lv_disp_trig_activity(NULL);'
      - if:
          condition: { lambda: 'return id(robot_mode).current_option() != std::string("awake");' }
          then: [ { select.set: { id: robot_mode, option: awake } } ]
      - globals.set: { id: g_expr, value: "1" }
      - globals.set: { id: g_card, value: "0" }
      - lvgl.page.show: page_face
      - script.execute: render_face
      # remember the LEDs — guard on g_flash too, so a mid-flash colour isn't saved as "resting"
      - if:
          condition: { lambda: 'return !id(g_voice) && !id(g_flash);' }
          then:
            - lambda: |-
                auto v = id(stackchan_light_bar).current_values;
                id(led_on)  = v.is_on();
                id(led_bri) = v.get_brightness();
                id(led_r)   = v.get_red();
                id(led_g)   = v.get_green();
                id(led_b)   = v.get_blue();
      # the light bar has REAL animated effects built in (BSP) — run the rainbow
      # while the head sways, instead of hand-rolled colour flips
      - light.turn_on:
          id: stackchan_light_bar
          brightness: 100%
          effect: "Rainbow Effect With Custom Values"
      - repeat:
          count: 12
          then:
            - if:
                condition: { lambda: 'return id(sw_move).state && !std::isnan(id(servo_x_angle).state);' }
                then:
                  - number.set:
                      id: servo_x_angle
                      value: !lambda 'id(g_move_ms) = (long) millis(); id(g_pn)++; return (id(g_pn) % 2) ? 20.0f : -20.0f;'
            - delay: 620ms
      # settle: head back to centre, effect off, LEDs back to how they were
      - if:
          condition: { lambda: 'return id(sw_move).state;' }
          then:
            - number.set: { id: servo_x_angle, value: "0" }
      - light.turn_on: { id: stackchan_light_bar, effect: "None" }
      - if:
          condition: { lambda: 'return !id(g_voice);' }
          then:
            - script.execute: restore_leds
  # ── RESET SCORES — zero the leaderboard (from the SCORES page or Home Assistant).
  - id: reset_scores
    then:
      - lambda: |-
          id(hs_catch) = 0; id(hs_flappy) = 0; id(hs_breakout) = 0;
          id(hs_simon) = 0; id(hs_react) = 0; id(hs_rps) = 0;
      - lvgl.label.update: { id: sc_catch,    text: "Catch:  0" }
      - lvgl.label.update: { id: sc_flappy,   text: "Flappy:  0" }
      - lvgl.label.update: { id: sc_breakout, text: "Breakout:  0" }
      - lvgl.label.update: { id: sc_simon,    text: "Simon:  0" }
      - lvgl.label.update: { id: sc_react,    text: "React:  —" }
      - lvgl.label.update: { id: sc_rps,      text: "R-P-S wins:  0" }
  # ── DANCE 💃 — bops its head + paws to a beat with rainbow LEDs (from HA / the dashboard).
  - id: dance
    mode: single
    then:
      - if:
          condition: { lambda: 'return id(g_booted) && !id(g_sleep) && !id(g_saver) && !id(g_perm);' }
          then:
            - if:
                condition: { lambda: 'return id(robot_mode).current_option() != std::string("awake");' }
                then: [ { select.set: { id: robot_mode, option: awake } } ]
            - globals.set: { id: g_card, value: "0" }
            - globals.set: { id: g_expr, value: "1" }
            - lvgl.page.show: page_face
            - script.execute: render_face
            - lambda: 'lv_disp_trig_activity(NULL);'
            - if:
                condition: { lambda: 'return !id(g_voice) && !id(g_flash);' }
                then:
                  - lambda: |-
                      auto v = id(stackchan_light_bar).current_values;
                      id(led_on)  = v.is_on();
                      id(led_bri) = v.get_brightness();
                      id(led_r)   = v.get_red();
                      id(led_g)   = v.get_green();
                      id(led_b)   = v.get_blue();
            - light.turn_on: { id: stackchan_light_bar, brightness: 100%, effect: "Rainbow Effect With Custom Values" }
            - if:
                condition: { lambda: 'return id(sw_sfx).state && !id(g_quiet) && !id(g_night);' }
                then: [ { rtttl.play: "dance:d=8,o=5,b=150:c,e,g,c6,g,e,c" } ]
            - lvgl.widget.update: { id: hand_l, x: -52, y: 20 }
            - lvgl.widget.update: { id: hand_r, x: 52, y: 20 }
            - lvgl.widget.show: hand_l
            - lvgl.widget.show: hand_r
            - repeat:
                count: 5
                then:
                  - if:
                      condition: { lambda: 'return id(sw_move).state && !std::isnan(id(servo_x_angle).state);' }
                      then: [ { number.set: { id: servo_x_angle, value: "16" } } ]
                  - lvgl.widget.update: { id: hand_l, y: 6 }
                  - lvgl.widget.update: { id: hand_r, y: 36 }
                  - delay: 420ms
                  - if:
                      condition: { lambda: 'return id(sw_move).state && !std::isnan(id(servo_x_angle).state);' }
                      then: [ { number.set: { id: servo_x_angle, value: "-16" } } ]
                  - lvgl.widget.update: { id: hand_l, y: 36 }
                  - lvgl.widget.update: { id: hand_r, y: 6 }
                  - delay: 420ms
            - if:
                condition: { lambda: 'return id(sw_move).state;' }
                then: [ { number.set: { id: servo_x_angle, value: "0" } } ]
            - light.turn_on: { id: stackchan_light_bar, effect: "None" }
            - if:
                condition: { lambda: 'return !id(g_voice);' }
                then: [ { script.execute: restore_leds } ]
            - lvgl.widget.hide: hand_l
            - lvgl.widget.hide: hand_r
            - lvgl.widget.update: { id: hand_l, x: -34, y: 92 }
            - lvgl.widget.update: { id: hand_r, x: 34, y: 92 }
  # ── FEELS HOT 🥵 — wipes its brow, a sweat drop, a "phew".
  - id: react_hot
    then:
      - if:
          condition: { lambda: 'return id(g_booted) && !id(g_sleep) && !id(g_saver) && !id(g_voice) && !id(g_perm);' }
          then:
            - globals.set: { id: g_card, value: "0" }
            - lvgl.page.show: page_face
            # via g_sweat so render_face (blinks etc.) can't hide the drop mid-reaction
            - globals.set: { id: g_sweat, value: "true" }
            - lvgl.widget.show: sweat
            - if:
                condition: { lambda: 'return id(sw_sfx).state && !id(g_quiet) && !id(g_night);' }
                then: [ { rtttl.play: "hot:d=8,o=5,b=110:g,e,c" } ]
            - script.execute: { id: head_nudge, dx: 0, dy: -8 }   # wipes its brow
            - delay: 3500ms
            - globals.set: { id: g_sweat, value: "false" }
            - lvgl.widget.hide: sweat
  # ── FEELS COLD 🥶 — a shivery little shake + a "brr".
  - id: react_cold
    then:
      - if:
          condition: { lambda: 'return id(g_booted) && !id(g_sleep) && !id(g_saver) && !id(g_voice) && !id(g_perm);' }
          then:
            - globals.set: { id: g_card, value: "0" }
            - lvgl.page.show: page_face
            - if:
                condition: { lambda: 'return id(sw_sfx).state && !id(g_quiet) && !id(g_night);' }
                then: [ { rtttl.play: "brr:d=32,o=5,b=210:c,c,c,c,c" } ]
            - script.execute: head_shake
            - delay: 200ms
            - script.execute: head_shake
            - delay: 200ms
            - script.execute: head_shake
  # ── PERMISSIONS log — prepend the latest decision (OK/NO + the request) and refresh the page.
  - id: perm_log
    then:
      - lambda: |-
          id(perm_h2) = id(perm_h1);
          id(perm_h1) = id(perm_h0);
          id(perm_h0) = (id(perm_dec) == 1 ? std::string("OK   ") : std::string("NO   ")) + id(perm_cur);
      - lvgl.label.update: { id: pl_0, text: !lambda 'return id(perm_h0);' }
      - lvgl.label.update: { id: pl_1, text: !lambda 'return id(perm_h1);' }
      - lvgl.label.update: { id: pl_2, text: !lambda 'return id(perm_h2);' }
  # PUNCH — while wearing the boxing gloves, throw a quick right jab (glove darts in + back).
  - id: punch
    mode: single
    then:
      - if:
          condition: { lambda: 'return id(g_gloves);' }
          then:
            - lvgl.widget.update: { id: acc_gv_r,  x: 30, y: 4 }
            - lvgl.widget.update: { id: acc_gv_rc, x: 30, y: 24 }
            - if:
                condition: { lambda: 'return id(sw_sfx).state && !id(g_quiet) && !id(g_night);' }
                then: [ { rtttl.play: "pow:d=16,o=4,b=210:c,g" } ]
            - script.execute: { id: led_flash, r: 100, g: 15, b: 10 }
            - script.execute: { id: head_nudge, dx: 8, dy: 4 }
            - delay: 130ms
            - lvgl.widget.update: { id: acc_gv_r,  x: 74, y: 44 }
            - lvgl.widget.update: { id: acc_gv_rc, x: 74, y: 64 }
  # Redraw the pet face from the current state.
  - id: render_face
    then:
      # Background: awake = white OR the "Face background" theme · night/saver/sleep = black.
      # Painted ONLY when the colour actually changed — an LVGL style write invalidates the
      # full 320×240 even when the value is identical, and render_face runs on every blink.
      # (This also used to hard-code WHITE, stomping the theme select within seconds.)
      - if:
          condition:
            lambda: |-
              int c;
              if (id(g_sleep) || id(g_saver) || id(g_night)) c = 0x000000;
              else {
                auto s = id(sel_background).state;
                c = (s == "Space")  ? 0x0a1830
                  : (s == "Sunset") ? 0x6a3016
                  : (s == "Ocean")  ? 0x0d4a70
                  : (s == "Matrix") ? 0x0c3418
                  : (s == "Party")  ? 0x300a48
                  : (s == "Arena")  ? 0x5a1818
                  : 0xFFFFFF;
              }
              if (c == id(g_bg_last)) return false;
              id(g_bg_last) = c;
              return true;
          then:
            - lvgl.widget.update:
                id: bg_rect
                bg_color: !lambda 'return lv_color_hex(id(g_bg_last));'
      # stars belong to the "Space" theme — awake only (a sleeping face is dead-still black)
      - if:
          condition:
            lambda: |-
              return id(sel_background).state == "Space"
                     && !id(g_sleep) && !id(g_saver) && !id(g_night);
          then:
            - lvgl.widget.show: bg_star1
            - lvgl.widget.show: bg_star2
            - lvgl.widget.show: bg_star3
            - lvgl.widget.show: bg_star4
            - lvgl.widget.show: bg_star5
            - lvgl.widget.show: bg_star6
          else:
            - lvgl.widget.hide: bg_star1
            - lvgl.widget.hide: bg_star2
            - lvgl.widget.hide: bg_star3
            - lvgl.widget.hide: bg_star4
            - lvgl.widget.hide: bg_star5
            - lvgl.widget.hide: bg_star6
      - lvgl.widget.update:
          id: eye_l
          bg_color: !lambda |-
            if (id(g_sleep) || id(g_saver)) return lv_color_hex(0x33E6C8);
            if (id(g_night)) return lv_color_hex(0x1f9e88);
            if (id(sel_background).state != "None") return lv_color_hex(0xF2F5F7);  // light eyes on a dark theme
            return lv_color_hex(0x14181d);
      - lvgl.widget.update:
          id: eye_r
          bg_color: !lambda |-
            if (id(g_sleep) || id(g_saver)) return lv_color_hex(0x33E6C8);
            if (id(g_night)) return lv_color_hex(0x1f9e88);
            if (id(sel_background).state != "None") return lv_color_hex(0xF2F5F7);
            return lv_color_hex(0x14181d);
      - lvgl.widget.update:
          id: mouth
          bg_color: !lambda |-
            if (id(g_sleep) || id(g_saver)) return lv_color_hex(0x33E6C8);
            if (id(g_night)) return lv_color_hex(0x1f9e88);
            if (id(sel_background).state != "None") return lv_color_hex(0xF2F5F7);
            return lv_color_hex(0x14181d);
      # privacy + local badges (pills — show/hide the widget, an empty pill still draws)
      - if:
          condition: { lambda: 'return id(sw_privacy).state && !id(g_sleep);' }
          then: [ { lvgl.widget.show: lbl_priv } ]
          else: [ { lvgl.widget.hide: lbl_priv } ]
      - if:
          condition: { lambda: 'return id(sw_islocal).state && !id(g_sleep) && !id(g_saver);' }
          then: [ { lvgl.widget.show: lbl_local } ]
          else: [ { lvgl.widget.hide: lbl_local } ]
      # AI-agent badge — visible only when set AND the robot is awake (dead-still in sleep)
      - if:
          condition: { lambda: 'return id(g_agent) && !id(g_sleep) && !id(g_saver);' }
          then: [ { lvgl.widget.show: lbl_agent } ]
          else: [ { lvgl.widget.hide: lbl_agent } ]
      # speech bubble — while SPEAKING (the AI's words) or showing a wellness tip.
      # NOT while listening: listening is expressed by the FACE (big curious eyes,
      # attentive perk), never by an on-screen label. External speech shows a bubble
      # only when dravix put text in it (g_tip) — a random media stream that animates
      # the mouth (g_talk via the playback watcher) must not pop a STALE bubble.
      - if:
          condition: { lambda: 'return id(g_tip) || (id(g_talk) && id(g_voice));' }
          then:
            - lvgl.widget.show: speech_bubble
            - lvgl.widget.show: bub_t1
            - lvgl.widget.show: bub_t2
          else:
            - lvgl.widget.hide: speech_bubble
            - lvgl.widget.hide: bub_t1
            - lvgl.widget.hide: bub_t2
      # zzz drifts while sleeping
      - lvgl.label.update:
          id: lbl_zzz
          text: !lambda |-
            if (!id(g_sleep)) return std::string("");
            const char* z[] = {"z", "z z", "z z z", ""};
            return std::string(z[id(g_anim) % 4]);
      # pink cheeks on a happy or in-love idle face (and greet). Blinks DON'T hide them —
      # the cheeks sit below the eyes, and hiding them made the face flicker on every blink.
      - if:
          condition:
            lambda: |-
              return !id(g_sleep) && !id(g_listen) && !id(g_talk) && !id(g_think)
                     && !id(g_saver) && !id(g_focus) && !id(g_conc)
                     && (id(g_expr) == 1 || id(g_expr) == 6);
          then: [ { lvgl.widget.show: cheek_l }, { lvgl.widget.show: cheek_r } ]
          else: [ { lvgl.widget.hide: cheek_l }, { lvgl.widget.hide: cheek_r } ]
      - if:
          condition: { lambda: 'return id(g_sleep);' }
          then: [ { lvgl.widget.hide: mouth } ]
          else: [ { lvgl.widget.show: mouth } ]
      # ── eye + mouth shapes per state ──────────────────────────────────────────
      - if:  # sleeping → eyes closed
          condition: { lambda: 'return id(g_sleep);' }
          then:
            - script.execute: { id: set_eyes, w: 60, h: 10, r: 5, dy: 8 }
      - if:  # blink — always both eyes (winks were retired)
          condition: { lambda: 'return !id(g_sleep) && id(g_blink);' }
          then:
            - script.execute: { id: set_eyes, w: 64, h: 10, r: 5, dy: 0 }
      - if:  # listening → big curious eyes
          condition: { lambda: 'return !id(g_sleep) && !id(g_blink) && id(g_listen);' }
          then:
            - script.execute: { id: set_eyes, w: 74, h: 86, r: 28, dy: -2 }
            - script.execute: { id: set_mouth, w: 22, h: 8, r: 4, dy: 66 }
      - if:  # thinking → eyes drift up, pondering the reply (between your words and its answer)
          condition: { lambda: 'return !id(g_sleep) && !id(g_blink) && !id(g_listen) && id(g_think);' }
          then:
            - script.execute: { id: set_eyes, w: 56, h: 52, r: 22, dy: -14 }
            - script.execute: { id: set_mouth, w: 18, h: 6, r: 3, dy: 58 }
      - if:  # speaking → mouth opens and closes
          condition: { lambda: 'return !id(g_sleep) && !id(g_blink) && !id(g_listen) && id(g_talk);' }
          then:
            - script.execute: { id: set_eyes, w: 64, h: 58, r: 22, dy: 0 }
            - lvgl.widget.update:
                id: mouth
                width: 54
                radius: 12
                height: !lambda 'return (id(g_anim) % 2) ? 26 : 10;'
                y: 62
      - if:  # SCREENSAVER → slow dozy "breathing" eyes (they half-close and open)
          condition: { lambda: 'return !id(g_sleep) && !id(g_blink) && !id(g_listen) && !id(g_talk) && !id(g_think) && id(g_saver);' }
          then:
            - lvgl.widget.update:
                id: eye_l
                width: 60
                radius: 18
                y: 4
                height: !lambda 'const int b[] = {46, 38, 30, 38}; return b[id(g_anim) % 4];'
            - lvgl.widget.update:
                id: eye_r
                width: 60
                radius: 18
                y: 4
                height: !lambda 'const int b[] = {46, 38, 30, 38}; return b[id(g_anim) % 4];'
            - script.execute: { id: set_mouth, w: 30, h: 6, r: 3, dy: 66 }
      - if:  # FOCUS mode — or an external "focused" hint (a coding agent working) → steady, narrowed concentrating eyes
          condition: { lambda: 'return !id(g_sleep) && !id(g_blink) && !id(g_listen) && !id(g_talk) && !id(g_think) && !id(g_saver) && (id(g_focus) || id(g_conc));' }
          then:
            - script.execute: { id: set_eyes, w: 58, h: 40, r: 16, dy: 0 }
            - script.execute: { id: set_mouth, w: 28, h: 6, r: 3, dy: 64 }
      - if:  # idle → the chosen expression
          condition: { lambda: 'return !id(g_sleep) && !id(g_blink) && !id(g_listen) && !id(g_talk) && !id(g_think) && !id(g_saver) && !id(g_focus) && !id(g_conc);' }
          then:
            - if:  # neutral
                condition: { lambda: 'return id(g_expr) == 0;' }
                then:
                  - script.execute: { id: set_eyes, w: 64, h: 64, r: 22, dy: 0 }
                  - script.execute: { id: set_mouth, w: 40, h: 8, r: 4, dy: 64 }
            - if:  # happy — squinted "^^" eyes, wide smile, cheeks
                condition: { lambda: 'return id(g_expr) == 1;' }
                then:
                  - script.execute: { id: set_eyes, w: 70, h: 26, r: 13, dy: -6 }
                  - script.execute: { id: set_mouth, w: 86, h: 10, r: 5, dy: 58 }
            - if:  # sad — droopy small eyes, tiny low mouth
                condition: { lambda: 'return id(g_expr) == 2;' }
                then:
                  - script.execute: { id: set_eyes, w: 52, h: 38, r: 15, dy: 10 }
                  - script.execute: { id: set_mouth, w: 26, h: 8, r: 4, dy: 70 }
            - if:  # angry — narrowed sharp eyes
                condition: { lambda: 'return id(g_expr) == 3;' }
                then:
                  - script.execute: { id: set_eyes, w: 70, h: 22, r: 7, dy: -2 }
                  - script.execute: { id: set_mouth, w: 48, h: 8, r: 4, dy: 64 }
            - if:  # sleepy — heavy lids
                condition: { lambda: 'return id(g_expr) == 4;' }
                then:
                  - script.execute: { id: set_eyes, w: 64, h: 14, r: 7, dy: 8 }
                  - script.execute: { id: set_mouth, w: 34, h: 8, r: 4, dy: 66 }
            - if:  # doubt — one raised eye, one squinted (asymmetric!)
                condition: { lambda: 'return id(g_expr) == 5;' }
                then:
                  - script.execute: { id: set_eyes, w: 64, h: 64, r: 22, dy: 0 }
                  - lvgl.widget.update: { id: eye_r, height: 30, y: 6 }
                  - script.execute: { id: set_mouth, w: 30, h: 8, r: 4, dy: 66 }
            - if:  # LOVE — big soft PINK eyes, blushing cheeks, wide smile
                condition: { lambda: 'return id(g_expr) == 6;' }
                then:
                  - script.execute: { id: set_eyes, w: 72, h: 66, r: 30, dy: -2 }
                  - lvgl.widget.update: { id: eye_l, bg_color: 0xFF5C8A }
                  - lvgl.widget.update: { id: eye_r, bg_color: 0xFF5C8A }
                  - script.execute: { id: set_mouth, w: 80, h: 10, r: 5, dy: 58 }
            - if:  # DIZZY — the eyes become little x-es (just been spun around)
                condition: { lambda: 'return id(g_expr) == 7;' }
                then:
                  - script.execute: { id: set_eyes, w: 8, h: 8, r: 4, dy: 0 }   # eyes shrink away
                  - script.execute: { id: set_mouth, w: 22, h: 8, r: 4, dy: 68 }
      # ── decorators (original-avatar style): x-eyes on dizzy + react_hot's sweat drop.
      #    Shown only on an idle face; hidden in every other state so they never linger.
      - if:  # CONFUSED / dizzy — x-eyes + a "?" above the head (only on an idle face).
             # Colours follow the background: dark marks on the white awake face, bright
             # teal/yellow on dark themes/night — teal-on-white was near-invisible (~1.8:1).
             # Blinks don't hide them: x-eyes don't blink (the blink itself skips expr 7).
          condition:
            lambda: |-
              return !id(g_sleep) && !id(g_listen) && !id(g_talk)
                     && !id(g_saver) && !id(g_focus) && !id(g_conc) && id(g_expr) == 7;
          then:
            - lvgl.label.update:
                id: dz_l
                text_color: !lambda |-
                  bool dark_bg = id(g_night) || id(sel_background).state != "None";
                  return lv_color_hex(dark_bg ? 0x33E6C8 : 0x14181d);
            - lvgl.label.update:
                id: dz_r
                text_color: !lambda |-
                  bool dark_bg = id(g_night) || id(sel_background).state != "None";
                  return lv_color_hex(dark_bg ? 0x33E6C8 : 0x14181d);
            - lvgl.label.update:
                id: q_mark
                text_color: !lambda |-
                  bool dark_bg = id(g_night) || id(sel_background).state != "None";
                  return lv_color_hex(dark_bg ? 0xffd54a : 0xB5471F);
            - lvgl.widget.show: dz_l
            - lvgl.widget.show: dz_r
            - lvgl.widget.show: q_mark
          else: [ { lvgl.widget.hide: dz_l }, { lvgl.widget.hide: dz_r }, { lvgl.widget.hide: q_mark } ]
      - if:  # sweat drop — owned by react_hot (g_sweat), so a blink can't wipe it mid-reaction
          condition: { lambda: 'return id(g_sweat) && !id(g_sleep) && !id(g_saver);' }
          then: [ { lvgl.widget.show: sweat } ]
          else: [ { lvgl.widget.hide: sweat } ]
      # Publish the live state to HA (only when it actually changed).
      - lambda: |-
          std::string s = id(g_sleep)  ? "sleep"
                        : id(g_listen) ? "listening"
                        : id(g_think)  ? "thinking"
                        : id(g_talk)   ? "speaking"
                        : id(g_saver)  ? "screensaver"
                        : id(g_night)  ? "night"
                        : id(g_focus)  ? "focus"
                        : id(g_quiet)  ? "quiet"
                        : id(g_busy)   ? "busy" : "awake";
          if (!id(st_state).has_state() || id(st_state).state != s) id(st_state).publish_state(s);
  # Show the current "home screen" (0 = face, 1..3 = cards, 4 = the game).
  - id: show_card
    then:
      - if: { condition: { lambda: 'return id(g_card) == 1;' }, then: [ { lvgl.page.show: page_card1 } ] }
      - if: { condition: { lambda: 'return id(g_card) == 2;' }, then: [ { lvgl.page.show: page_card2 } ] }
      - if: { condition: { lambda: 'return id(g_card) == 3;' }, then: [ { lvgl.page.show: page_card3 } ] }
      - if: { condition: { lambda: 'return id(g_card) == 4;' }, then: [ { lvgl.page.show: page_games } ] }
      - if: { condition: { lambda: 'return id(g_card) == 5;' }, then: [ { lvgl.page.show: page_vitals } ] }
      - if: { condition: { lambda: 'return id(g_card) == 6;' }, then: [ { lvgl.page.show: page_climate } ] }
      - if: { condition: { lambda: 'return id(g_card) <= 0 || id(g_card) > 6;' }, then: [ { lvgl.page.show: page_face } ] }
  # Greet: someone approached → wake up + a happy face + perk the head up.
  # (Skipped at night / in focus — do-not-disturb — AND while asleep/screensaver: the sleep
  # contract is "only a tap or the wake word wakes it", not someone walking past at night.)
  - id: greet
    then:
      - if:
          condition: { lambda: 'return !id(g_night) && !id(g_focus) && !id(g_sleep) && !id(g_saver);' }
          then:
            - lambda: 'lv_disp_trig_activity(NULL);'   # reset the screensaver/sleep idle timer
            - globals.set: { id: g_card,  value: "0" }
            - globals.set: { id: g_expr,  value: "1" }     # happy
            - lvgl.page.show: page_face
            - if:
                condition: { lambda: 'return id(robot_mode).current_option() != std::string("awake");' }
                then: [ { select.set: { id: robot_mode, option: awake } } ]
            - script.execute: wave                                # 👋 a paw waves hello
            - if:
                condition: { lambda: 'return id(sw_sfx).state && !id(g_quiet);' }
                then: [ { rtttl.play: "hi:d=16,o=6,b=180:e,g,c7" } ]   # a friendly "hello!" 👋
            - delay: 400ms
            - script.execute: { id: head_nudge, dx: 0, dy: 8 }   # perks up at you
            - delay: 500ms
            - script.execute: head_nod                            # …and nods hello 👋
  # Identify: flash the LEDs cyan 3× + a happy face, so you can find/confirm the robot.
  - id: identify
    then:
      - if:
          condition: { lambda: 'return !id(g_voice) && !id(g_flash);' }
          then:
            - lambda: |-
                auto v = id(stackchan_light_bar).current_values;
                id(led_on)  = v.is_on();
                id(led_bri) = v.get_brightness();
                id(led_r)   = v.get_red();
                id(led_g)   = v.get_green();
                id(led_b)   = v.get_blue();
      - globals.set: { id: g_expr, value: "1" }
      - script.execute: render_face
      - repeat:
          count: 3
          then:
            - light.turn_on: { id: stackchan_light_bar, brightness: 100%, red: 0%, green: 90%, blue: 100% }
            - delay: 250ms
            - light.turn_off: stackchan_light_bar
            - delay: 200ms
      - if:
          condition: { lambda: 'return !id(g_voice);' }
          then:
            - script.execute: restore_leds
  # AI-mode LEDs: go YELLOW (gated by the "Speaking LEDs" switch).
  - id: leds_yellow
    then:
      - if:
          condition: { lambda: 'return id(sw_speak_led).state;' }
          then:
            - light.turn_on: { id: stackchan_light_bar, brightness: 80%, red: 100%, green: 80%, blue: 0% }
  # Put the LEDs back to whatever they were before the voice interaction (or off).
  - id: restore_leds
    then:
      - if:
          condition: { lambda: 'return id(led_on);' }
          then:
            - light.turn_on:
                id: stackchan_light_bar
                brightness: !lambda 'return id(led_bri);'
                red: !lambda 'return id(led_r);'
                green: !lambda 'return id(led_g);'
                blue: !lambda 'return id(led_b);'
          else:
            - light.turn_off: stackchan_light_bar
  # ── GAME: Reaction — red → (random wait) → green; tap to see your ms ──────────
  - id: react_start
    mode: restart
    then:
      - globals.set: { id: g_react, value: "0" }
      - lvgl.widget.update: { id: react_pad, bg_color: 0x8a1c1c }
      - lvgl.label.update: { id: react_txt, text: "WAIT..." }
      - delay: !lambda 'return 1200 + (uint32_t)(random_float() * 2800.0f);'
      - if:
          condition:
            and:
              - lambda: 'return id(g_react) == 0;'
              - lvgl.page.is_showing: page_react
          then:
            - globals.set: { id: g_react, value: "1" }
            - globals.set: { id: g_react_t, value: !lambda 'return (long) millis();' }
            - lvgl.widget.update: { id: react_pad, bg_color: 0x14713a }
            - lvgl.label.update: { id: react_txt, text: "TAP!" }
  - id: react_tap
    then:
      - if:
          condition: { lambda: 'return id(g_react) == 1;' }   # GREEN → measure
          then:
            - globals.set: { id: g_react, value: "2" }
            - lvgl.widget.update: { id: react_pad, bg_color: 0x123a5a }
            - lambda: |-
                long ms = (long) millis() - id(g_react_t);
                if (id(hs_react) == 0 || ms < id(hs_react)) id(hs_react) = (int) ms;   // best time
            - lvgl.label.update:
                id: react_txt
                text: !lambda |-
                  long ms = (long) millis() - id(g_react_t);
                  char b[28]; snprintf(b, sizeof(b), "%ld ms\n(tap to retry)", ms);
                  return std::string(b);
          else:
            - if:
                condition: { lambda: 'return id(g_react) == 0;' }   # RED → jumped the gun
                then:
                  - globals.set: { id: g_react, value: "2" }
                  - lvgl.widget.update: { id: react_pad, bg_color: 0x123a5a }
                  - lvgl.label.update: { id: react_txt, text: "too soon!\n(tap to retry)" }
                else:                                              # result → play again
                  - script.execute: react_start
  # ── GAME: Simon — grow-and-repeat the colour sequence ────────────────────────
  - id: simon_new
    then:
      - globals.set: { id: g_slen, value: "0" }
      - script.execute: simon_add
  - id: simon_add            # add one random step, then replay the whole sequence
    then:
      - lambda: |-
          if (id(g_slen) < 16) { id(g_sq)[id(g_slen)] = (int)(random_float() * 4.0f); id(g_slen) += 1; }
      - globals.set: { id: g_sipos, value: "0" }
      - globals.set: { id: g_saccept, value: "false" }
      - script.execute: simon_play
  - id: simon_play
    mode: restart
    then:
      - globals.set: { id: g_spi, value: "0" }
      - lvgl.label.update: { id: simon_msg, text: "WATCH" }
      - delay: 600ms
      - repeat:
          count: !lambda 'return id(g_slen);'
          then:
            - script.execute: { id: simon_flash, q: !lambda 'return id(g_sq)[id(g_spi)];' }
            - delay: 520ms
            - globals.set: { id: g_spi, value: !lambda 'return id(g_spi) + 1;' }
      - globals.set: { id: g_saccept, value: "true" }
      - lvgl.label.update: { id: simon_msg, text: "YOUR TURN" }
  - id: simon_flash          # briefly light quadrant q, then restore all four
    parameters:
      q: int
    then:
      - if: { condition: { lambda: 'return q == 0;' }, then: [ { lvgl.widget.update: { id: sq0, bg_color: 0x5dffa0 } } ] }
      - if: { condition: { lambda: 'return q == 1;' }, then: [ { lvgl.widget.update: { id: sq1, bg_color: 0xff7b7b } } ] }
      - if: { condition: { lambda: 'return q == 2;' }, then: [ { lvgl.widget.update: { id: sq2, bg_color: 0x7bb0ff } } ] }
      - if: { condition: { lambda: 'return q == 3;' }, then: [ { lvgl.widget.update: { id: sq3, bg_color: 0xffe680 } } ] }
      - delay: 300ms
      - lvgl.widget.update: { id: sq0, bg_color: 0x1f6b3a }
      - lvgl.widget.update: { id: sq1, bg_color: 0x6b1f1f }
      - lvgl.widget.update: { id: sq2, bg_color: 0x1f3a6b }
      - lvgl.widget.update: { id: sq3, bg_color: 0x6b5f1f }
  - id: simon_tap
    parameters:
      tap: int
    then:
      - if:
          condition: { lambda: 'return id(g_saccept);' }   # ignore taps during playback
          then:
            - script.execute: { id: simon_flash, q: !lambda 'return tap;' }
            - if:
                condition: { lambda: 'return id(g_sq)[id(g_sipos)] == tap;' }   # right one
                then:
                  - globals.set: { id: g_sipos, value: !lambda 'return id(g_sipos) + 1;' }
                  - if:
                      condition: { lambda: 'return id(g_sipos) >= id(g_slen);' }   # round done
                      then:
                        - globals.set: { id: g_saccept, value: "false" }
                        - lvgl.label.update: { id: simon_msg, text: "GOOD!" }
                        - delay: 700ms
                        - if:
                            condition:
                              lvgl.page.is_showing: page_simon
                            then:
                              - script.execute: simon_add
                else:                                                        # wrong → game over
                  - globals.set: { id: g_saccept, value: "false" }
                  - lambda: 'if (id(g_slen) - 1 > id(hs_simon)) id(hs_simon) = id(g_slen) - 1;'
                  - lvgl.label.update:
                      id: simon_msg
                      text: !lambda |-
                        char b[28]; snprintf(b, sizeof(b), "OOPS!  score %d", id(g_slen) - 1);
                        return std::string(b);
                  # it feels the loss too — a sympathetic blue + a little slump
                  - script.execute: { id: led_flash, r: 10, g: 25, b: 100 }
                  - script.execute: { id: head_nudge, dx: 0, dy: -8 }
  # ── GAME: Rock-Paper-Scissors — the robot nods when it wins, shakes when it loses
  - id: rps_play
    parameters:
      me: int          # 0 rock · 1 paper · 2 scissors
    then:
      - globals.set: { id: g_rps_bot, value: !lambda 'return (int)(random_float() * 3.0f);' }
      - globals.set:
          id: g_rps_out
          value: !lambda |-
            int bot = id(g_rps_bot);
            if (me == bot) return 0;                 // tie
            if ((me + 1) % 3 == bot) return 2;       // robot beats you
            return 1;                                // you beat the robot
      - lvgl.label.update:
          id: rps_msg
          text: !lambda |-
            const char* n[] = {"Rock", "Paper", "Scissors"};
            const char* v[] = {"Tie!", "You win!", "I win!"};
            char b[52]; snprintf(b, sizeof(b), "You: %s   Me: %s\n%s", n[me], n[id(g_rps_bot)], v[id(g_rps_out)]);
            return std::string(b);
      # EMOTIONAL STAKES (the Cozmo magic): it CARES about the result — gloats a
      # double-nod + green flash when it wins, huffs and turns away when it loses.
      - if:
          condition: { lambda: 'return id(g_rps_out) == 2;' }
          then:
            - script.execute: { id: led_flash, r: 20, g: 100, b: 30 }
            - script.execute: head_nod
            - delay: 1200ms
            - script.execute: head_nod
      - if:
          condition: { lambda: 'return id(g_rps_out) == 1;' }
          then:
            - lambda: 'id(hs_rps) += 1;'                          # count your wins
            - script.execute: { id: led_flash, r: 100, g: 15, b: 0 }
            - script.execute: head_shake
            - delay: 900ms
            - script.execute: { id: head_nudge, dx: -14, dy: 0 }   # ...huffy turn away
