# ════════════════════════════════════════════════════════════════════════════════
#  dravix-os · StackChan ESPHome firmware (M5Stack CoreS3)
#  Sits ON TOP of the M5Stack BSP (servos, mic, speaker, LEDs, touch come from it).
#  PET FACE: two big DRAWN eyes (blink · look around · squint when happy · widen when
#  listening) + pink cheeks + an animated mouth — a little desk creature, not a text face.
#  IT ACTS ALIVE: petting the head → pink LEDs + nuzzle-up + happy wiggle · every
#  expression has a mood LED colour + a head pose (sad droops, doubt tilts, angry shakes)
#  · it glances around with its head · going to sleep the head droops, waking it rises.
#  Switches: "Body language" = autonomous head moves · "Mood LEDs" = emotion colours.
#  States:  awake = WHITE bg + dark eyes  ·  listening = BIG eyes + YELLOW LEDs
#           screensaver = dim, face+blink, NO drift  ·  sleep = closed eyes + zzz, black
#  Wake word "Okay, Nabu" (on-device) · brightness control.
#  SWIPE:  down → status · up → face · left/right → 3 cards + the CATCH-ME game.
#  GAME "CATCH ME!": a teal dot runs around the screen — tap it to score; every 10
#  catches the robot celebrates (green LEDs + a happy head wiggle).
#  TAP face = talk (toggle) · LONG-PRESS face (1.2s) = instant sleep.
#  Publishes live state to HA:  sensor State (awake/listening/speaking/screensaver/sleep),
#  Last heard (STT), Last reply (TTS) — the dravix dashboard shows these in real time.
#  Buttons: Identify (find the robot — cyan flashes) · Reboot.
#  The 3 CARDS are DYNAMIC — you pick which HA entities appear on each one from the
#  dravix-os dashboard (Screens page); dravix pushes title+body into the text slots
#  below (text.dravix_card1_title / _body … card3). No need to edit entity_ids here.
#  Head servos + calibration + petting are handled by dravix-os (the add-on).
#  VALIDATE first. If `time:` clashes with the BSP, delete that block. Swipe is manual
#  (no built-in gesture) — if it misbehaves send me the log. LED save/restore uses
#  light id `stackchan_light_bar`; if that id is wrong, Validate will say so — tell me.
# ════════════════════════════════════════════════════════════════════════════════

esphome:
  name: stackchan
  friendly_name: stackchan
  # LIST form on purpose: package lists CONCATENATE, so the BSP's own on_boot automations
  # (RTC clock read + restoring the servos' calibration offsets!) are kept. A mapping here
  # would silently REPLACE them — and the head would boot uncalibrated every time.
  on_boot:
    - priority: -100
      then:
        # start listening for "Okay, Nabu" — unless privacy mode was left ON
        - if:
            condition: { switch.is_off: sw_privacy }
            then: [ micro_wake_word.start ]

esp32:
  variant: esp32s3
  flash_size: 16MB
  framework:
    type: esp-idf

logger:

api:

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "stackchan Fallback Hotspot"

captive_portal:

# Lets the robot DOWNLOAD images (Frigate person snapshots, any camera) to its screen.
http_request:
  verify_ssl: false

# The downloadable image for the ALERT page. Setting the "Show image URL" text entity
# (from HA automations / the dravix add-on) fetches the URL and shows it full-screen for
# ~25s, then returns to the face. Tip: append ?height=240 to Frigate snapshot URLs.
online_image:
  - id: oi_show
    url: "http://127.0.0.1/placeholder.jpg"   # replaced at runtime via Show image URL
    format: JPEG
    type: RGB565
    resize: 320x240
    update_interval: never
    on_download_finished:
      - lvgl.image.update: { id: img_show, src: oi_show }
      - lvgl.page.show: page_image
      - script.execute: img_timeout
    on_error:
      - logger.log: "show-image: download failed"

packages:
  m5stack_stackchan:
    url: https://github.com/m5stack/esphome-yaml
    files: [examples/kit/stackchan-bsp.factory.yaml]
    refresh: 1d

display:
  - id: !extend m5cores3_lcd
    show_test_card: false
    # note: DON'T set invert_colors here — the BSP's `true` is what the CoreS3 panel needs.

font:
  - file: "gfonts://Roboto"
    id: title_font
    size: 30
  - file: "gfonts://Roboto"
    id: text_font
    size: 24
  - file: "gfonts://Roboto"
    id: small_font
    size: 19
  - file: "gfonts://Roboto"
    id: big_font
    size: 52

globals:
  # face state
  - { id: g_expr,   type: int,  restore_value: false, initial_value: "0" }
  - { id: g_blink,  type: bool, restore_value: false, initial_value: "false" }
  - { id: g_listen, type: bool, restore_value: false, initial_value: "false" }
  - { id: g_talk,   type: bool, restore_value: false, initial_value: "false" }
  - { id: g_voice,  type: bool, restore_value: false, initial_value: "false" }  # voice pipeline active
  - { id: g_sleep,  type: bool, restore_value: false, initial_value: "false" }
  - { id: g_saver,  type: bool, restore_value: false, initial_value: "false" }
  - { id: g_busy,   type: bool, restore_value: false, initial_value: "false" }
  - { id: g_night,  type: bool, restore_value: false, initial_value: "false" }   # לילה — dim + quiet behaviour
  - { id: g_focus,  type: bool, restore_value: false, initial_value: "false" }   # מרוכז — do-not-disturb
  - { id: g_quiet,  type: bool, restore_value: false, initial_value: "false" }   # שקט — low volume, no mood LEDs
  - { id: g_vol_saved, type: float, restore_value: false, initial_value: "-1" }  # volume before quiet mode
  - { id: g_anim,   type: int,  restore_value: false, initial_value: "0" }
  - { id: g_near,   type: bool, restore_value: false, initial_value: "false" }  # someone is close
  - { id: g_pet,    type: bool, restore_value: false, initial_value: "false" }  # being touched
  # swipe tracking + which "home screen" (0 = face, 1..3 = cards)
  - { id: sw_x0,    type: int,  restore_value: false, initial_value: "0" }
  - { id: sw_y0,    type: int,  restore_value: false, initial_value: "0" }
  - { id: sw_x1,    type: int,  restore_value: false, initial_value: "0" }
  - { id: sw_y1,    type: int,  restore_value: false, initial_value: "0" }
  - { id: sw_sleep, type: bool, restore_value: false, initial_value: "false" }
  - { id: g_card,   type: int,  restore_value: false, initial_value: "0" }
  - { id: g_score,  type: int,  restore_value: false, initial_value: "0" }   # catch-me game score
  - { id: g_tms,    type: long, restore_value: false, initial_value: "0" }   # touch-press start (ms)
  # mood-flash bookkeeping + head pose memory
  - { id: g_flash, type: bool,  restore_value: false, initial_value: "false" }   # a mood LED flash is active
  - { id: g_pitch_saved, type: float, restore_value: false, initial_value: "-1" }  # pitch before sleep-droop
  # saved LED state, so a voice interaction can restore it afterwards
  - { id: led_on,  type: bool,  restore_value: false, initial_value: "false" }
  - { id: led_bri, type: float, restore_value: false, initial_value: "0" }
  - { id: led_r,   type: float, restore_value: false, initial_value: "0" }
  - { id: led_g,   type: float, restore_value: false, initial_value: "0" }
  - { id: led_b,   type: float, restore_value: false, initial_value: "0" }

# If Validate says homeassistant time already exists (from the BSP), delete this block.
time:
  - platform: homeassistant
    id: dravix_time

sensor:
  - platform: wifi_signal
    id: wifi_db
    update_interval: 30s
  - platform: uptime
    id: up_sec
  # Robot battery %, imported from HA. Fix the entity_id if yours differs.
  - platform: homeassistant
    id: ha_batt
    entity_id: sensor.dravix_battery_level
  # Proximity — the robot notices you approach and perks up (greets). The BSP exposes the
  # ltr_als_ps proximity as "Proximity counts". Tune the 150/80 thresholds to taste.
  - platform: homeassistant
    id: ha_prox
    entity_id: sensor.dravix_proximity_counts
    on_value:
      - if:
          condition: { lambda: 'return x > 150 && !id(g_near) && id(sw_greet).state;' }
          then:
            - globals.set: { id: g_near, value: "true" }
            - script.execute: greet
      - if:
          condition: { lambda: 'return x < 80;' }                    # they moved away
          then:
            - globals.set: { id: g_near, value: "false" }
  # Ambient light — night = sleep (room goes dark), morning = wake (lights come on).
  # ltr_als_ps exposes "Ambient light". Tune the 5/30 lux thresholds to your room.
  - platform: homeassistant
    id: ha_lux
    entity_id: sensor.dravix_ambient_light
    on_value:
      - if:
          condition: { lambda: 'return x < 5 && !id(g_sleep) && id(sw_dark).state;' }   # dark → sleep
          then:
            - select.set: { id: robot_mode, option: sleep }
      - if:
          condition: { lambda: 'return x > 30 && id(g_sleep) && id(sw_dark).state;' }    # light → wake
          then:
            - select.set: { id: robot_mode, option: awake }
text_sensor:
  # PETTING — the BSP's touch sensors publish TEXT ("No touch" / touch levels), so they
  # must be imported as text. Any state that isn't "No touch" = you're petting the head →
  # pink LEDs + nuzzle + happy face (see pet_react). Add sensors 2/3 the same way if you like.
  - platform: homeassistant
    id: ha_touch1
    entity_id: sensor.dravix_touch_sensor_1
    on_value:
      - if:
          condition:
            lambda: |-
              return x != "No touch" && x != "unknown" && x != "unavailable" && x != ""
                     && !id(g_pet) && id(sw_touch).state;
          then:
            - globals.set: { id: g_pet, value: "true" }
            - script.execute: pet_react
      - if:
          condition: { lambda: 'return x == "No touch";' }            # released
          then:
            - globals.set: { id: g_pet, value: "false" }
  - platform: wifi_info
    ip_address:
      id: ip_txt
    ssid:
      id: ssid_txt
  # Live robot state for HA + the dravix dashboard: awake/listening/speaking/screensaver/sleep.
  - platform: template
    name: "State"
    id: st_state
  # What the robot heard (STT) and what it answered (TTS) — shown live on the dashboard.
  - platform: template
    name: "Last heard"
    id: st_heard
  - platform: template
    name: "Last reply"
    id: st_reply

# ── Dynamic card slots — dravix-os writes these (you choose the entities in the UI) ──
text:
  - platform: template
    name: "Card1 title"
    id: t_c1_title
    optimistic: true
    mode: text
    max_length: 30
    initial_value: "CARD 1"
  - platform: template
    name: "Card1 body"
    id: t_c1_body
    optimistic: true
    mode: text
    max_length: 160
    initial_value: ""
  - platform: template
    name: "Card2 title"
    id: t_c2_title
    optimistic: true
    mode: text
    max_length: 30
    initial_value: "CARD 2"
  - platform: template
    name: "Card2 body"
    id: t_c2_body
    optimistic: true
    mode: text
    max_length: 160
    initial_value: ""
  - platform: template
    name: "Card3 title"
    id: t_c3_title
    optimistic: true
    mode: text
    max_length: 30
    initial_value: "CARD 3"
  - platform: template
    name: "Card3 body"
    id: t_c3_body
    optimistic: true
    mode: text
    max_length: 160
    initial_value: ""
  # Set this to any image URL → the robot shows it full-screen (empty = back to the face).
  # e.g. http://<frigate>:5000/api/<camera>/latest.jpg?height=240
  - platform: template
    name: "Show image URL"
    id: t_img_url
    optimistic: true
    mode: text
    max_length: 255
    initial_value: ""
    set_action:
      - if:
          condition: { lambda: 'return x.empty();' }
          then:
            - lvgl.page.show: page_face
          else:
            - online_image.set_url:      # set_url also starts the download itself
                id: oi_show
                url: !lambda 'return x;'

number:
  - platform: template
    name: "Screensaver after (min)"
    id: n_screensaver
    optimistic: true
    min_value: 1
    max_value: 120
    step: 1
    initial_value: 5
    restore_value: true
  - platform: template
    name: "Sleep after (min)"
    id: n_sleep
    optimistic: true
    min_value: 1
    max_value: 240
    step: 1
    initial_value: 15
    restore_value: true
  - platform: template
    name: "Screen brightness"
    id: n_brightness
    optimistic: true
    min_value: 10
    max_value: 100
    step: 5
    initial_value: 100
    unit_of_measurement: "%"
    restore_value: true
    set_action:
      - light.turn_on:
          id: lcd_backlight
          brightness: !lambda 'return x / 100.0;'
  # Head PITCH in YOUR units (158..260). The BSP's servo_y_angle is locked to 0..90 and can't
  # be re-ranged, so this number maps 158..260 → the real 0..90 servo. In dravix-os Setup,
  # map "Head — up/down" to THIS entity: number.dravix_head_pitch  (instead of servo_y_angle).
  - platform: template
    name: "Head pitch"
    id: n_head_pitch
    optimistic: true
    min_value: 158
    max_value: 260
    step: 1
    initial_value: 165
    restore_value: true
    set_action:
      - number.set:
          id: servo_y_angle
          value: !lambda 'return (x - 158.0f) * 90.0f / 102.0f;'   # 158..260 → 0..90

# ── Utility buttons ───────────────────────────────────────────────────────────
button:
  - platform: template
    name: "Identify"
    id: btn_identify
    on_press:
      - script.execute: identify
  - platform: restart
    name: "Reboot"
    id: btn_reboot

# ── Behaviour toggles — flip these from Home Assistant / the dravix dashboard ────
switch:
  - { platform: template, name: "Greet on approach", id: sw_greet,     optimistic: true, restore_mode: RESTORE_DEFAULT_ON }
  - { platform: template, name: "Sleep when dark",   id: sw_dark,      optimistic: true, restore_mode: RESTORE_DEFAULT_ON }
  - { platform: template, name: "Touch reaction",    id: sw_touch,     optimistic: true, restore_mode: RESTORE_DEFAULT_ON }
  - { platform: template, name: "Speaking LEDs",     id: sw_speak_led, optimistic: true, restore_mode: RESTORE_DEFAULT_ON }
  - { platform: template, name: "Random blink",      id: sw_blink,     optimistic: true, restore_mode: RESTORE_DEFAULT_ON }
  - { platform: template, name: "Idle head drift",   id: sw_drift,     optimistic: true, restore_mode: RESTORE_DEFAULT_ON }
  - { platform: template, name: "Tap face to talk",  id: sw_tap_talk,  optimistic: true, restore_mode: RESTORE_DEFAULT_ON }
  - { platform: template, name: "Body language",     id: sw_move,      optimistic: true, restore_mode: RESTORE_DEFAULT_ON }
  - { platform: template, name: "Mood LEDs",         id: sw_mood_led,  optimistic: true, restore_mode: RESTORE_DEFAULT_ON }
  # PRIVACY: kills the microphone on-device (wake word + voice pipeline stopped) and shows
  # a red PRIVACY badge on the face. dravix additionally blocks the camera stream/snapshot
  # endpoints (the path Frigate + the dashboard use) while this is ON.
  - platform: template
    name: "Privacy mode"
    id: sw_privacy
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    on_turn_on:
      - voice_assistant.stop
      - micro_wake_word.stop
      - script.execute: render_face
    on_turn_off:
      - micro_wake_word.start
      - script.execute: render_face

lvgl:
  displays:
    - m5cores3_lcd
  # A tasteful default style for every "card" container.
  style_definitions:
    - id: card_box
      radius: 18
      bg_color: 0x121821
      bg_opa: COVER
      border_color: 0x2b3644
      border_width: 2
      pad_all: 16
    - id: accent_txt
      text_color: 0x33E6C8
    - id: muted_txt
      text_color: 0x8b96a4
  on_idle:
    # Screensaver: dim + dozy breathing eyes + a soft clock (night mode is already dim — skip).
    - timeout: !lambda 'return (uint32_t) id(n_screensaver).state * 60000;'
      then:
        - if:
            condition: { lambda: 'return !id(g_voice) && !id(g_sleep) && !id(g_night);' }
            then:
              - globals.set: { id: g_saver, value: "true" }
              - script.execute: render_face
              - light.turn_on: { id: lcd_backlight, brightness: 25% }
    # Sleep: freeze (no movement) and go black — via the mode select so HA stays in sync.
    - timeout: !lambda 'return (uint32_t) id(n_sleep).state * 60000;'
      then:
        - if:
            condition: { lambda: 'return !id(g_voice);' }
            then:
              - select.set: { id: robot_mode, option: sleep }
  pages:
    # ── Page 0: the face (HOME) ──────────────────────────────────────────────────
    - id: page_face
      bg_color: 0x000000
      bg_opa: COVER
      # the face drifts partly off-page when "looking around" — never let that scroll the page
      scrollable: false
      scrollbar_mode: "OFF"
      widgets:
        - obj:
            id: bg_rect
            x: 0
            y: 0
            width: 320
            height: 240
            radius: 0
            border_width: 0
            bg_color: 0x000000
            bg_opa: COVER
        # ── the pet face: everything lives in face_box so it can "look around" as one ──
        - obj:
            id: face_box
            align: CENTER
            width: 320
            height: 210
            bg_opa: TRANSP
            border_width: 0
            scrollbar_mode: "OFF"
            widgets:
              - obj: { id: eye_l,   align: CENTER, x: -58, y: 0,  width: 64, height: 64, radius: 22, bg_color: 0x33E6C8, bg_opa: COVER, border_width: 0 }
              - obj: { id: eye_r,   align: CENTER, x: 58,  y: 0,  width: 64, height: 64, radius: 22, bg_color: 0x33E6C8, bg_opa: COVER, border_width: 0 }
              - obj: { id: cheek_l, align: CENTER, x: -58, y: 42, width: 28, height: 10, radius: 5,  bg_color: 0xFF9EB5, bg_opa: COVER, border_width: 0, hidden: true }
              - obj: { id: cheek_r, align: CENTER, x: 58,  y: 42, width: 28, height: 10, radius: 5,  bg_color: 0xFF9EB5, bg_opa: COVER, border_width: 0, hidden: true }
              - obj: { id: mouth,   align: CENTER, x: 0,   y: 64, width: 40, height: 8,  radius: 4,  bg_color: 0x33E6C8, bg_opa: COVER, border_width: 0 }
        # zzz while sleeping
        - label:
            id: lbl_zzz
            text: ""
            text_font: title_font
            text_color: 0x33E6C8
            align: TOP_LEFT
            x: 12
            y: 8
        # red badge while privacy mode is on (mic dead + camera blocked)
        - label:
            id: lbl_priv
            text: ""
            text_font: small_font
            text_color: 0xE05555
            align: TOP_MID
            y: 6
        # a soft clock, shown only on the screensaver
        - label:
            id: lbl_clock
            text: ""
            text_font: title_font
            text_color: 0x8b96a4
            align: BOTTOM_MID
            y: -8
        # Low-battery warning — appears (red) on the face only when battery < 20%.
        - label:
            id: lbl_face_batt
            text: ""
            text_font: small_font
            text_color: 0xE05555
            align: TOP_RIGHT
            x: -6
            y: 4
    # ── Page 1: STATUS (swipe down): time · battery %+mAh+bar+time-left · wifi · ip ──
    # The CoreS3 has a 500mAh battery (AXP2101); time-left is estimated at ~200mA draw.
    - id: page_status
      bg_color: 0x05080b
      bg_opa: COVER
      widgets:
        - obj:
            styles: card_box
            pad_all: 10
            align: CENTER
            width: 300
            height: 222
            scrollbar_mode: "OFF"
            widgets:
              - label: { id: lbl_time, text: "--:--", text_font: big_font,   text_color: 0xFFFFFF, align: TOP_MID,  y: 0 }
              - label: { id: lbl_date, text: "",       text_font: small_font, styles: muted_txt,   align: TOP_MID,  y: 48 }
              - label: { id: lbl_batt, text: "Batt --", text_font: text_font, text_color: 0x5dffa0, align: TOP_LEFT, x: 8, y: 72 }
              - bar:
                  id: bar_batt
                  x: 8
                  y: 100
                  width: 260
                  height: 10
                  min_value: 0
                  max_value: 100
                  value: 0
              - label: { id: lbl_est,  text: "",       text_font: small_font, styles: muted_txt,   align: TOP_LEFT, x: 8, y: 116 }
              - label: { id: lbl_wifi, text: "WiFi",   text_font: small_font, styles: muted_txt,   align: TOP_LEFT, x: 8, y: 140 }
              - label: { id: lbl_ip,   text: "IP",     text_font: small_font, styles: muted_txt,   align: TOP_LEFT, x: 8, y: 161 }
              - label: { id: lbl_up,   text: "Up",     text_font: small_font, styles: muted_txt,   align: TOP_LEFT, x: 8, y: 182 }
    # ── Pages 2-4: the 3 dynamic cards (swipe left/right) ────────────────────────
    - id: page_card1
      bg_color: 0x05080b
      bg_opa: COVER
      widgets:
        - obj:
            styles: card_box
            align: CENTER
            width: 300
            height: 222
            scrollbar_mode: "OFF"
            widgets:
              - label: { id: lbl_c1_title, text: "CARD 1", text_font: title_font, styles: accent_txt, align: TOP_MID, y: 2 }
              - label: { id: lbl_c1_body, text: "", text_font: text_font, text_color: 0xFFFFFF, align: TOP_LEFT, x: 4, y: 52 }
    - id: page_card2
      bg_color: 0x05080b
      bg_opa: COVER
      widgets:
        - obj:
            styles: card_box
            align: CENTER
            width: 300
            height: 222
            scrollbar_mode: "OFF"
            widgets:
              - label: { id: lbl_c2_title, text: "CARD 2", text_font: title_font, styles: accent_txt, align: TOP_MID, y: 2 }
              - label: { id: lbl_c2_body, text: "", text_font: text_font, text_color: 0xFFFFFF, align: TOP_LEFT, x: 4, y: 52 }
    - id: page_card3
      bg_color: 0x05080b
      bg_opa: COVER
      widgets:
        - obj:
            styles: card_box
            align: CENTER
            width: 300
            height: 222
            scrollbar_mode: "OFF"
            widgets:
              - label: { id: lbl_c3_title, text: "CARD 3", text_font: title_font, styles: accent_txt, align: TOP_MID, y: 2 }
              - label: { id: lbl_c3_body, text: "", text_font: text_font, text_color: 0xFFFFFF, align: TOP_LEFT, x: 4, y: 52 }
    # ── Page 5: CATCH ME! — tap the dot before it runs away (in the swipe cycle) ──
    - id: page_play
      bg_color: 0x05080b
      bg_opa: COVER
      widgets:
        - label: { id: lbl_play, text: "CATCH ME!", text_font: title_font, styles: accent_txt, align: TOP_LEFT, x: 10, y: 6 }
        - label: { id: lbl_score, text: "0", text_font: big_font, text_color: 0xFFFFFF, align: TOP_RIGHT, x: -12, y: 0 }
        - button:
            id: btn_dot
            x: 132
            y: 100
            width: 56
            height: 56
            radius: 28
            bg_color: 0x33E6C8
            on_click:
              - lambda: 'id(g_score) += 1;'
              - lvgl.label.update:
                  id: lbl_score
                  text: !lambda 'char b[12]; snprintf(b, sizeof(b), "%d", id(g_score)); return std::string(b);'
              # the dot escapes to a random spot
              - lvgl.widget.update:
                  id: btn_dot
                  x: !lambda 'return (int)(random_float() * 240.0f) + 12;'
                  y: !lambda 'return (int)(random_float() * 130.0f) + 46;'
              # every 10 catches → celebration!
              - if:
                  condition: { lambda: 'return id(g_score) % 10 == 0;' }
                  then:
                    - script.execute: { id: led_flash, r: 20, g: 100, b: 30 }
                    - script.execute: head_shake
    # ── Page 6: ALERT IMAGE — a downloaded snapshot (Frigate person, doorbell, …) ──
    - id: page_image
      bg_color: 0x000000
      bg_opa: COVER
      widgets:
        - image:
            id: img_show
            align: CENTER
            src: oi_show

script:
  # After ~25s the alert image goes away and the face comes back.
  - id: img_timeout
    mode: restart
    then:
      - delay: 25s
      - if:
          condition: { lvgl.page.is_showing: page_image }
          then: [ { lvgl.page.show: page_face } ]
  # Set both eyes to a shape: width / height / corner-radius / vertical offset.
  # (Eyes are align:CENTER, so size changes keep them centred — no x math needed.)
  - id: set_eyes
    mode: restart
    parameters:
      w: int
      h: int
      r: int
      dy: int
    then:
      - lvgl.widget.update:
          id: eye_l
          width: !lambda 'return w;'
          height: !lambda 'return h;'
          radius: !lambda 'return r;'
          y: !lambda 'return dy;'
      - lvgl.widget.update:
          id: eye_r
          width: !lambda 'return w;'
          height: !lambda 'return h;'
          radius: !lambda 'return r;'
          y: !lambda 'return dy;'
  - id: set_mouth
    mode: restart
    parameters:
      w: int
      h: int
      r: int
      dy: int
    then:
      - lvgl.widget.update:
          id: mouth
          width: !lambda 'return w;'
          height: !lambda 'return h;'
          radius: !lambda 'return r;'
          y: !lambda 'return dy;'
  # ── BODY LANGUAGE ─────────────────────────────────────────────────────────────
  # Nudge the head relative to where it is now (clamped to the servos' real ranges).
  # Writes are spaced 350ms apart — the SCS9009 serial bus drops back-to-back writes.
  - id: head_nudge
    mode: restart
    parameters:
      dx: int
      dy: int
    then:
      - if:
          condition: { lambda: 'return id(sw_move).state && dx != 0 && !std::isnan(id(servo_x_angle).state);' }
          then:
            - number.set:
                id: servo_x_angle
                value: !lambda |-
                  float v = id(servo_x_angle).state + dx;
                  return v < -164 ? -164 : (v > 164 ? 164 : v);
            - delay: 350ms
      - if:
          condition: { lambda: 'return id(sw_move).state && dy != 0 && !std::isnan(id(servo_y_angle).state);' }
          then:
            - number.set:
                id: servo_y_angle
                value: !lambda |-
                  float v = id(servo_y_angle).state + dy;
                  return v < 0 ? 0 : (v > 90 ? 90 : v);
  # A quick left-right "no!" shake (angry / playful).
  - id: head_shake
    mode: restart
    then:
      - if:
          condition: { lambda: 'return id(sw_move).state && !std::isnan(id(servo_x_angle).state);' }
          then:
            - number.set:
                id: servo_x_angle
                value: !lambda 'float v = id(servo_x_angle).state - 12; return v < -164 ? -164 : v;'
            - delay: 350ms
            - number.set:
                id: servo_x_angle
                value: !lambda 'float v = id(servo_x_angle).state + 24; return v > 164 ? 164 : v;'
            - delay: 350ms
            - number.set:
                id: servo_x_angle
                value: !lambda 'float v = id(servo_x_angle).state - 12; return v < -164 ? -164 : v;'
  # ── MOOD LEDs — flash an emotion colour for ~2.5s, then put the LEDs back ──────
  - id: led_flash
    mode: restart
    parameters:
      r: int
      g: int
      b: int
    then:
      - if:
          condition:
            lambda: |-
              return id(sw_mood_led).state && !id(g_voice)
                     && !id(g_night) && !id(g_focus) && !id(g_quiet);   # calm modes = no light shows
          then:
            - if:
                condition: { lambda: 'return !id(g_flash);' }   # don't re-save our own colour
                then:
                  - lambda: |-
                      auto v = id(stackchan_light_bar).current_values;
                      id(led_on)  = v.is_on();
                      id(led_bri) = v.get_brightness();
                      id(led_r)   = v.get_red();
                      id(led_g)   = v.get_green();
                      id(led_b)   = v.get_blue();
            - globals.set: { id: g_flash, value: "true" }
            - light.turn_on:
                id: stackchan_light_bar
                brightness: 70%
                red: !lambda 'return r / 100.0f;'
                green: !lambda 'return g / 100.0f;'
                blue: !lambda 'return b / 100.0f;'
            - delay: 2500ms
            # if a voice conversation started meanwhile, DON'T stomp its yellow —
            # the conversation's own on_end will restore the true original colour.
            - if:
                condition: { lambda: 'return !id(g_voice);' }
                then:
                  - script.execute: restore_leds
            - globals.set: { id: g_flash, value: "false" }
  # ── PETTING — wake up, blush, pink LEDs, nuzzle up + a happy wiggle ─────────────
  - id: pet_react
    mode: restart
    then:
      - lambda: 'lv_disp_trig_activity(NULL);'
      - select.set: { id: robot_mode, option: awake }
      - globals.set: { id: g_expr, value: "1" }     # happy (cheeks show)
      - globals.set: { id: g_card, value: "0" }
      - lvgl.page.show: page_face
      - script.execute: render_face
      - script.execute: { id: led_flash, r: 100, g: 25, b: 45 }   # pink
      - delay: 400ms
      - script.execute: { id: head_nudge, dx: 0, dy: 12 }         # nuzzle up into your hand
      - delay: 900ms
      - script.execute: head_shake                                # happy little wiggle
  # Redraw the pet face from the current state.
  - id: render_face
    then:
      # Background: awake = WHITE + dark eyes · night = black + dim teal · saver/sleep = black + teal.
      - lvgl.widget.update:
          id: bg_rect
          bg_color: !lambda 'return (!id(g_sleep) && !id(g_saver) && !id(g_night)) ? lv_color_hex(0xFFFFFF) : lv_color_hex(0x000000);'
      - lvgl.widget.update:
          id: eye_l
          bg_color: !lambda |-
            if (id(g_sleep) || id(g_saver)) return lv_color_hex(0x33E6C8);
            if (id(g_night)) return lv_color_hex(0x1f9e88);
            return lv_color_hex(0x14181d);
      - lvgl.widget.update:
          id: eye_r
          bg_color: !lambda |-
            if (id(g_sleep) || id(g_saver)) return lv_color_hex(0x33E6C8);
            if (id(g_night)) return lv_color_hex(0x1f9e88);
            return lv_color_hex(0x14181d);
      - lvgl.widget.update:
          id: mouth
          bg_color: !lambda |-
            if (id(g_sleep) || id(g_saver)) return lv_color_hex(0x33E6C8);
            if (id(g_night)) return lv_color_hex(0x1f9e88);
            return lv_color_hex(0x14181d);
      # privacy badge
      - lvgl.label.update:
          id: lbl_priv
          text: !lambda 'return id(sw_privacy).state ? std::string("PRIVACY") : std::string("");'
      # zzz drifts while sleeping
      - lvgl.label.update:
          id: lbl_zzz
          text: !lambda |-
            if (!id(g_sleep)) return std::string("");
            const char* z[] = {"z", "z z", "z z z", ""};
            return std::string(z[id(g_anim) % 4]);
      # pink cheeks only on a happy idle face (and greet)
      - if:
          condition:
            lambda: |-
              return !id(g_sleep) && !id(g_listen) && !id(g_talk) && !id(g_blink)
                     && !id(g_saver) && !id(g_focus) && id(g_expr) == 1;
          then: [ { lvgl.widget.show: cheek_l }, { lvgl.widget.show: cheek_r } ]
          else: [ { lvgl.widget.hide: cheek_l }, { lvgl.widget.hide: cheek_r } ]
      - if:
          condition: { lambda: 'return id(g_sleep);' }
          then: [ { lvgl.widget.hide: mouth } ]
          else: [ { lvgl.widget.show: mouth } ]
      # ── eye + mouth shapes per state ──────────────────────────────────────────
      - if:  # sleeping → eyes closed
          condition: { lambda: 'return id(g_sleep);' }
          then:
            - script.execute: { id: set_eyes, w: 60, h: 10, r: 5, dy: 8 }
      - if:  # blink
          condition: { lambda: 'return !id(g_sleep) && id(g_blink);' }
          then:
            - script.execute: { id: set_eyes, w: 64, h: 10, r: 5, dy: 0 }
      - if:  # listening → big curious eyes
          condition: { lambda: 'return !id(g_sleep) && !id(g_blink) && id(g_listen);' }
          then:
            - script.execute: { id: set_eyes, w: 74, h: 86, r: 28, dy: -2 }
            - script.execute: { id: set_mouth, w: 22, h: 8, r: 4, dy: 66 }
      - if:  # speaking → mouth opens and closes
          condition: { lambda: 'return !id(g_sleep) && !id(g_blink) && !id(g_listen) && id(g_talk);' }
          then:
            - script.execute: { id: set_eyes, w: 64, h: 58, r: 22, dy: 0 }
            - lvgl.widget.update:
                id: mouth
                width: 54
                radius: 12
                height: !lambda 'return (id(g_anim) % 2) ? 26 : 10;'
                y: 62
      - if:  # SCREENSAVER → slow dozy "breathing" eyes (they half-close and open)
          condition: { lambda: 'return !id(g_sleep) && !id(g_blink) && !id(g_listen) && !id(g_talk) && id(g_saver);' }
          then:
            - lvgl.widget.update:
                id: eye_l
                width: 60
                radius: 18
                y: 4
                height: !lambda 'const int b[] = {46, 38, 30, 38}; return b[id(g_anim) % 4];'
            - lvgl.widget.update:
                id: eye_r
                width: 60
                radius: 18
                y: 4
                height: !lambda 'const int b[] = {46, 38, 30, 38}; return b[id(g_anim) % 4];'
            - script.execute: { id: set_mouth, w: 30, h: 6, r: 3, dy: 66 }
      - if:  # FOCUS → steady, narrowed concentrating eyes
          condition: { lambda: 'return !id(g_sleep) && !id(g_blink) && !id(g_listen) && !id(g_talk) && !id(g_saver) && id(g_focus);' }
          then:
            - script.execute: { id: set_eyes, w: 58, h: 40, r: 16, dy: 0 }
            - script.execute: { id: set_mouth, w: 28, h: 6, r: 3, dy: 64 }
      - if:  # idle → the chosen expression
          condition: { lambda: 'return !id(g_sleep) && !id(g_blink) && !id(g_listen) && !id(g_talk) && !id(g_saver) && !id(g_focus);' }
          then:
            - if:  # neutral
                condition: { lambda: 'return id(g_expr) % 6 == 0;' }
                then:
                  - script.execute: { id: set_eyes, w: 64, h: 64, r: 22, dy: 0 }
                  - script.execute: { id: set_mouth, w: 40, h: 8, r: 4, dy: 64 }
            - if:  # happy — squinted "^^" eyes, wide smile, cheeks
                condition: { lambda: 'return id(g_expr) % 6 == 1;' }
                then:
                  - script.execute: { id: set_eyes, w: 70, h: 26, r: 13, dy: -6 }
                  - script.execute: { id: set_mouth, w: 86, h: 10, r: 5, dy: 58 }
            - if:  # sad — droopy small eyes, tiny low mouth
                condition: { lambda: 'return id(g_expr) % 6 == 2;' }
                then:
                  - script.execute: { id: set_eyes, w: 52, h: 38, r: 15, dy: 10 }
                  - script.execute: { id: set_mouth, w: 26, h: 8, r: 4, dy: 70 }
            - if:  # angry — narrowed sharp eyes
                condition: { lambda: 'return id(g_expr) % 6 == 3;' }
                then:
                  - script.execute: { id: set_eyes, w: 70, h: 22, r: 7, dy: -2 }
                  - script.execute: { id: set_mouth, w: 48, h: 8, r: 4, dy: 64 }
            - if:  # sleepy — heavy lids
                condition: { lambda: 'return id(g_expr) % 6 == 4;' }
                then:
                  - script.execute: { id: set_eyes, w: 64, h: 14, r: 7, dy: 8 }
                  - script.execute: { id: set_mouth, w: 34, h: 8, r: 4, dy: 66 }
            - if:  # doubt — one raised eye, one squinted (asymmetric!)
                condition: { lambda: 'return id(g_expr) % 6 == 5;' }
                then:
                  - script.execute: { id: set_eyes, w: 64, h: 64, r: 22, dy: 0 }
                  - lvgl.widget.update: { id: eye_r, height: 30, y: 6 }
                  - script.execute: { id: set_mouth, w: 30, h: 8, r: 4, dy: 66 }
      # Publish the live state to HA (only when it actually changed).
      - lambda: |-
          std::string s = id(g_sleep)  ? "sleep"
                        : id(g_listen) ? "listening"
                        : id(g_talk)   ? "speaking"
                        : id(g_saver)  ? "screensaver"
                        : id(g_night)  ? "night"
                        : id(g_focus)  ? "focus"
                        : id(g_quiet)  ? "quiet"
                        : id(g_busy)   ? "busy" : "awake";
          if (!id(st_state).has_state() || id(st_state).state != s) id(st_state).publish_state(s);
  # Show the current "home screen" (0 = face, 1..3 = cards, 4 = the game).
  - id: show_card
    then:
      - if: { condition: { lambda: 'return id(g_card) == 1;' }, then: [ { lvgl.page.show: page_card1 } ] }
      - if: { condition: { lambda: 'return id(g_card) == 2;' }, then: [ { lvgl.page.show: page_card2 } ] }
      - if: { condition: { lambda: 'return id(g_card) == 3;' }, then: [ { lvgl.page.show: page_card3 } ] }
      - if: { condition: { lambda: 'return id(g_card) == 4;' }, then: [ { lvgl.page.show: page_play } ] }
      - if: { condition: { lambda: 'return id(g_card) <= 0 || id(g_card) > 4;' }, then: [ { lvgl.page.show: page_face } ] }
  # Greet: someone approached → wake up + a happy face + perk the head up.
  # (Skipped at night and in focus mode — do-not-disturb.)
  - id: greet
    then:
      - if:
          condition: { lambda: 'return !id(g_night) && !id(g_focus);' }
          then:
            - lambda: 'lv_disp_trig_activity(NULL);'   # reset the screensaver/sleep idle timer
            - globals.set: { id: g_card,  value: "0" }
            - globals.set: { id: g_expr,  value: "1" }     # happy
            - lvgl.page.show: page_face
            - select.set: { id: robot_mode, option: awake }
            - delay: 400ms
            - script.execute: { id: head_nudge, dx: 0, dy: 8 }   # perks up at you
  # Identify: flash the LEDs cyan 3× + a happy face, so you can find/confirm the robot.
  - id: identify
    then:
      - if:
          condition: { lambda: 'return !id(g_voice);' }
          then:
            - lambda: |-
                auto v = id(stackchan_light_bar).current_values;
                id(led_on)  = v.is_on();
                id(led_bri) = v.get_brightness();
                id(led_r)   = v.get_red();
                id(led_g)   = v.get_green();
                id(led_b)   = v.get_blue();
      - globals.set: { id: g_expr, value: "1" }
      - script.execute: render_face
      - repeat:
          count: 3
          then:
            - light.turn_on: { id: stackchan_light_bar, brightness: 100%, red: 0%, green: 90%, blue: 100% }
            - delay: 250ms
            - light.turn_off: stackchan_light_bar
            - delay: 200ms
      - if:
          condition: { lambda: 'return !id(g_voice);' }
          then:
            - script.execute: restore_leds
  # AI-mode LEDs: go YELLOW (gated by the "Speaking LEDs" switch).
  - id: leds_yellow
    then:
      - if:
          condition: { lambda: 'return id(sw_speak_led).state;' }
          then:
            - light.turn_on: { id: stackchan_light_bar, brightness: 80%, red: 100%, green: 80%, blue: 0% }
  # Put the LEDs back to whatever they were before the voice interaction (or off).
  - id: restore_leds
    then:
      - if:
          condition: { lambda: 'return id(led_on);' }
          then:
            - light.turn_on:
                id: stackchan_light_bar
                brightness: !lambda 'return id(led_bri);'
                red: !lambda 'return id(led_r);'
                green: !lambda 'return id(led_g);'
                blue: !lambda 'return id(led_b);'
          else:
            - light.turn_off: stackchan_light_bar

select:
  - platform: template
    name: "Face"
    id: robot_face
    optimistic: true
    options: [neutral, happy, sad, angry, sleepy, doubt]
    initial_option: neutral
    set_action:
      - globals.set:
          id: g_expr
          value: !lambda |-
            if (x == "happy") return 1;
            else if (x == "sad") return 2;
            else if (x == "angry") return 3;
            else if (x == "sleepy") return 4;
            else if (x == "doubt") return 5;
            return 0;
      - script.execute: render_face
      # Every emotion also has a LED colour + body language:
      - if:
          condition: { lambda: 'return x == "happy";' }
          then:
            - script.execute: { id: led_flash, r: 100, g: 45, b: 10 }   # warm orange
            - script.execute: { id: head_nudge, dx: 0, dy: 10 }         # chin up
      - if:
          condition: { lambda: 'return x == "sad";' }
          then:
            - script.execute: { id: led_flash, r: 10, g: 25, b: 100 }   # blue
            - script.execute: { id: head_nudge, dx: 0, dy: -14 }        # droop
      - if:
          condition: { lambda: 'return x == "angry";' }
          then:
            - script.execute: { id: led_flash, r: 100, g: 5, b: 0 }     # red
            - script.execute: head_shake                                 # "no!"
      - if:
          condition: { lambda: 'return x == "sleepy";' }
          then:
            - script.execute: { id: led_flash, r: 45, g: 20, b: 60 }    # dim purple
            - script.execute: { id: head_nudge, dx: 0, dy: -8 }
      - if:
          condition: { lambda: 'return x == "doubt";' }
          then:
            - script.execute: { id: led_flash, r: 60, g: 0, b: 100 }    # purple
            - script.execute: { id: head_nudge, dx: 14, dy: 0 }         # quizzical side-glance
  # The ONE place a mode is applied — every mode path goes through this select, so
  # Home Assistant + the dravix dashboard always show the true mode.
  #   awake   ער — bright, full behaviour
  #   morning בוקר — a sunrise scene (bright + happy + warm LEDs), settles into awake
  #   focus   מרוכז — do-not-disturb: no greeting, no drifting, no mood LEDs
  #   quiet   שקט — speaker down to 25% (restored on exit), no mood LEDs
  #   night   לילה — dim screen, teal face, calm (no greet/moves), sleeps on its timer
  #   busy / sleep — as before (sleep: head droops, LEDs off, screen off)
  - platform: template
    name: "Mode"
    id: robot_mode
    optimistic: true
    options: [awake, morning, focus, quiet, night, busy, sleep]
    initial_option: awake
    set_action:
      # option → state flags
      - globals.set: { id: g_sleep, value: !lambda 'return x == std::string("sleep");' }
      - globals.set: { id: g_busy,  value: !lambda 'return x == std::string("busy");' }
      - globals.set: { id: g_night, value: !lambda 'return x == std::string("night");' }
      - globals.set: { id: g_focus, value: !lambda 'return x == std::string("focus");' }
      # quiet: remember the speaker volume, lower it; restore it on the way out
      - if:
          condition: { lambda: 'return x == std::string("quiet") && !id(g_quiet);' }
          then:
            - lambda: 'id(g_vol_saved) = id(va_media_player).volume;'
            - media_player.volume_set: { id: va_media_player, volume: 25% }
      - if:
          condition: { lambda: 'return x != std::string("quiet") && id(g_quiet) && id(g_vol_saved) >= 0;' }
          then:
            - media_player.volume_set: { id: va_media_player, volume: !lambda 'return id(g_vol_saved);' }
            - lambda: 'id(g_vol_saved) = -1;'
      - globals.set: { id: g_quiet, value: !lambda 'return x == std::string("quiet");' }
      - globals.set: { id: g_saver, value: "false" }
      - script.execute: render_face
      # per-mode screen + body
      - if:
          condition: { lambda: 'return x == std::string("sleep");' }
          then:
            # the head slowly droops (remembering where it was), LEDs off…
            - if:
                condition: { lambda: 'return id(sw_move).state && id(g_pitch_saved) < 0;' }
                then:
                  - lambda: 'id(g_pitch_saved) = id(servo_y_angle).state;'
                  - number.set:
                      id: servo_y_angle
                      value: !lambda 'float v = id(servo_y_angle).state - 25.0f; return v < 0 ? 0 : v;'
            - light.turn_off: stackchan_light_bar
            # …the zzz face shows for a moment, then the screen goes fully off
            - delay: 2s
            - if:
                condition: { lambda: 'return id(g_sleep);' }   # unless it was woken meanwhile
                then: [ { light.turn_off: lcd_backlight } ]
      - if:
          condition: { lambda: 'return x == std::string("night");' }
          then:
            - light.turn_on: { id: lcd_backlight, brightness: 15% }
      - if:
          condition:
            lambda: |-
              return x == std::string("awake") || x == std::string("focus")
                  || x == std::string("quiet") || x == std::string("busy");
          then:
            - light.turn_on: { id: lcd_backlight, brightness: !lambda 'return id(n_brightness).state / 100.0;' }
            # …and on waking the head rises back to where it was before sleeping.
            - if:
                condition: { lambda: 'return id(sw_move).state && id(g_pitch_saved) >= 0;' }
                then:
                  - number.set:
                      id: servo_y_angle
                      value: !lambda 'return id(g_pitch_saved);'
                  - globals.set: { id: g_pitch_saved, value: "-1" }
      - if:
          condition: { lambda: 'return x == std::string("morning");' }
          then:
            # SUNRISE: full brightness, happy face, warm LEDs, head up — then settle to awake.
            - light.turn_on: { id: lcd_backlight, brightness: !lambda 'return id(n_brightness).state / 100.0;' }
            - if:
                condition: { lambda: 'return id(sw_move).state && id(g_pitch_saved) >= 0;' }
                then:
                  - number.set: { id: servo_y_angle, value: !lambda 'return id(g_pitch_saved);' }
                  - globals.set: { id: g_pitch_saved, value: "-1" }
            - globals.set: { id: g_expr, value: "1" }
            - globals.set: { id: g_card, value: "0" }
            - lvgl.page.show: page_face
            - script.execute: render_face
            - script.execute: { id: led_flash, r: 100, g: 60, b: 15 }   # warm sunrise
            - script.execute: { id: head_nudge, dx: 0, dy: 10 }
            - delay: 4s
            - select.set: { id: robot_mode, option: awake }

interval:
  # Random blink (never while sleeping / listening / talking).
  - interval: 1s
    then:
      - if:
          condition:
            lambda: 'return id(sw_blink).state && !id(g_sleep) && !id(g_talk) && !id(g_listen) && random_float() < 0.22;'
          then:
            - globals.set: { id: g_blink, value: "true" }
            - script.execute: render_face
            - delay: 160ms
            - globals.set: { id: g_blink, value: "false" }
            - script.execute: render_face
  # Sleep "zzz" + talking mouth + screensaver breathing animation.
  - interval: 600ms
    then:
      - globals.set: { id: g_anim, value: !lambda 'return id(g_anim) + 1;' }
      - if:
          condition: { lambda: 'return id(g_sleep) || id(g_talk) || id(g_saver);' }
          then: [ { script.execute: render_face } ]
  # "Alive" looking-around: the whole face glances to a random spot every few seconds —
  # only when fully awake (not screensaver/sleep/busy).
  - interval: 6s
    then:
      - if:
          condition: { lambda: 'return id(sw_drift).state && !id(g_sleep) && !id(g_saver) && !id(g_busy) && !id(g_night) && !id(g_focus);' }
          then:
            - lvgl.widget.update:
                id: face_box
                x: !lambda 'return (int)(random_float() * 32 - 16);'
                y: !lambda 'return (int)(random_float() * 18 - 9);'
      # …and sometimes the HEAD glances too (a small random turn, like a curious pet).
      - if:
          condition:
            lambda: |-
              return id(sw_move).state && id(sw_drift).state && !id(g_sleep) && !id(g_saver)
                     && !id(g_busy) && !id(g_night) && !id(g_focus) && !id(g_voice)
                     && !std::isnan(id(servo_x_angle).state) && random_float() < 0.35;
          then:
            - number.set:
                id: servo_x_angle
                value: !lambda |-
                  float v = id(servo_x_angle).state + (random_float() * 24.0f - 12.0f);
                  return v < -164 ? -164 : (v > 164 ? 164 : v);
      # ...and drift back to centre half the time, so it doesn't wander off.
      - if:
          condition: { lambda: 'return id(sw_drift).state && !id(g_sleep) && !id(g_saver) && random_float() < 0.5;' }
          then:
            - delay: 2.5s
            - lvgl.widget.update: { id: face_box, x: 0, y: 0 }
  # Refresh the status labels + the dynamic card labels (from the text slots dravix writes).
  - interval: 5s
    then:
      - lvgl.label.update:
          id: lbl_time
          text: !lambda |-
            auto t = id(dravix_time).now();
            if (!t.is_valid()) return std::string("--:--");
            char b[8]; snprintf(b, sizeof(b), "%02d:%02d", t.hour, t.minute);
            return std::string(b);
      - lvgl.label.update:
          id: lbl_date
          text: !lambda |-
            auto t = id(dravix_time).now();
            if (!t.is_valid()) return std::string("");
            char b[16]; snprintf(b, sizeof(b), "%02d/%02d", t.day_of_month, t.month);
            return std::string(b);
      - lvgl.label.update:
          id: lbl_wifi
          text: !lambda |-
            char b[20]; snprintf(b, sizeof(b), "WiFi %d dB", (int) id(wifi_db).state);
            return std::string(b);
      - lvgl.label.update:
          id: lbl_ip
          text: !lambda 'return "IP " + id(ip_txt).state;'
      - lvgl.label.update:
          id: lbl_up
          text: !lambda |-
            int s = (int) id(up_sec).state;
            char b[24]; snprintf(b, sizeof(b), "Up %dh %dm", s / 3600, (s % 3600) / 60);
            return std::string(b);
      # Battery: % + remaining mAh (500mAh cell) + bar + estimated time left (~200mA draw).
      - lvgl.label.update:
          id: lbl_batt
          text_color: !lambda |-
            return (id(ha_batt).has_state() && id(ha_batt).state < 20)
                ? lv_color_hex(0xFF5555) : lv_color_hex(0x5dffa0);
          text: !lambda |-
            if (!id(ha_batt).has_state()) return std::string("Batt --");
            int mah = (int)(id(ha_batt).state * 500.0f / 100.0f);
            char b[32]; snprintf(b, sizeof(b), "Batt %.0f%%  ~%d mAh", id(ha_batt).state, mah);
            return std::string(b);
      - lvgl.bar.update:
          id: bar_batt
          value: !lambda 'return id(ha_batt).has_state() ? (int) id(ha_batt).state : 0;'
      - lvgl.label.update:
          id: lbl_est
          text: !lambda |-
            char b[40];
            if (id(ha_batt).has_state()) {
              float hours = (id(ha_batt).state * 500.0f / 100.0f) / 200.0f;  // ~200mA typical
              snprintf(b, sizeof(b), "~%.1f h left  ·  %s", hours, id(robot_mode).state.c_str());
            } else {
              snprintf(b, sizeof(b), "%s", id(robot_mode).state.c_str());
            }
            return std::string(b);
      # Soft clock on the screensaver (empty otherwise).
      - lvgl.label.update:
          id: lbl_clock
          text: !lambda |-
            if (!id(g_saver)) return std::string("");
            auto t = id(dravix_time).now();
            if (!t.is_valid()) return std::string("");
            char b[8]; snprintf(b, sizeof(b), "%02d:%02d", t.hour, t.minute);
            return std::string(b);
      # Low-battery badge on the face page (empty = hidden).
      - lvgl.label.update:
          id: lbl_face_batt
          text: !lambda |-
            if (id(ha_batt).has_state() && id(ha_batt).state < 20) {
              char b[12]; snprintf(b, sizeof(b), "%.0f%%", id(ha_batt).state);
              return std::string(b);
            }
            return std::string("");
      - lvgl.label.update: { id: lbl_c1_title, text: !lambda 'return id(t_c1_title).state;' }
      - lvgl.label.update: { id: lbl_c1_body,  text: !lambda 'return id(t_c1_body).state;' }
      - lvgl.label.update: { id: lbl_c2_title, text: !lambda 'return id(t_c2_title).state;' }
      - lvgl.label.update: { id: lbl_c2_body,  text: !lambda 'return id(t_c2_body).state;' }
      - lvgl.label.update: { id: lbl_c3_title, text: !lambda 'return id(t_c3_title).state;' }
      - lvgl.label.update: { id: lbl_c3_body,  text: !lambda 'return id(t_c3_body).state;' }

# ── Manual SWIPE detection (ESPHome LVGL has no built-in gesture) ────────────────
touchscreen:
  - id: !extend touch
    on_touch:
      - globals.set: { id: sw_sleep, value: !lambda 'return id(g_sleep);' }
      - lambda: 'id(sw_x0) = 0; id(sw_y0) = 0; id(sw_x1) = 0; id(sw_y1) = 0; id(g_tms) = (long) millis();'
      # Any touch exits the screensaver (restore full brightness).
      - if:
          condition: { lambda: 'return id(g_saver) && !id(g_sleep);' }
          then:
            - light.turn_on: { id: lcd_backlight, brightness: !lambda 'return id(n_brightness).state / 100.0;' }
            - globals.set: { id: g_saver, value: "false" }
    on_update:
      - lambda: |-
          for (auto t : touches) {
            id(sw_x0) = t.x_org; id(sw_y0) = t.y_org;
            id(sw_x1) = t.x;     id(sw_y1) = t.y;
          }
    on_release:
      # Asleep → wake and stop (don't treat the wake as a swipe).
      - if:
          condition: { lambda: 'return id(sw_sleep);' }
          then:
            - select.set: { id: robot_mode, option: awake }
      # LONG-PRESS (1.2s+) on the FACE → instant sleep.
      - if:
          condition:
            and:
              - lvgl.page.is_showing: page_face
              - lambda: |-
                  int dx = id(sw_x1) - id(sw_x0), dy = id(sw_y1) - id(sw_y0);
                  int adx = dx < 0 ? -dx : dx, ady = dy < 0 ? -dy : dy;
                  long dur = (long) millis() - id(g_tms);
                  return !id(sw_sleep) && !id(g_voice) && adx < 40 && ady < 40 && dur > 1200;
          then:
            - select.set: { id: robot_mode, option: sleep }
      # Quick TAP (not a swipe / long-press) on the FACE → toggle the voice assistant:
      # 1st tap starts it (like "ok nabu"), a 2nd tap stops it. Toggle via sw_tap_talk.
      - if:
          condition:
            and:
              - switch.is_on: sw_tap_talk
              - lvgl.page.is_showing: page_face
              - lambda: |-
                  int dx = id(sw_x1) - id(sw_x0), dy = id(sw_y1) - id(sw_y0);
                  int adx = dx < 0 ? -dx : dx, ady = dy < 0 ? -dy : dy;
                  long dur = (long) millis() - id(g_tms);
                  return !id(sw_sleep) && adx < 40 && ady < 40 && dur < 700;
          then:
            - if:
                condition: { lambda: 'return id(g_voice);' }
                then:
                  - voice_assistant.stop     # already talking → a 2nd tap cancels
                else:
                  - if:
                      condition: { switch.is_off: sw_privacy }   # no listening in privacy mode
                      then: [ voice_assistant.start ]
      # swipe DOWN → status
      - if:
          condition:
            lambda: |-
              int dx = id(sw_x1) - id(sw_x0), dy = id(sw_y1) - id(sw_y0);
              int adx = dx < 0 ? -dx : dx, ady = dy < 0 ? -dy : dy;
              return !id(sw_sleep) && ady > adx && dy > 40;
          then: [ { lvgl.page.show: page_status } ]
      # swipe UP → face (home)
      - if:
          condition:
            lambda: |-
              int dx = id(sw_x1) - id(sw_x0), dy = id(sw_y1) - id(sw_y0);
              int adx = dx < 0 ? -dx : dx, ady = dy < 0 ? -dy : dy;
              return !id(sw_sleep) && ady > adx && dy < -40;
          then:
            - globals.set: { id: g_card, value: "0" }
            - lvgl.page.show: page_face
      # swipe LEFT → next screen (face → c1 → c2 → c3 → game → face)
      - if:
          condition:
            lambda: |-
              int dx = id(sw_x1) - id(sw_x0), dy = id(sw_y1) - id(sw_y0);
              int adx = dx < 0 ? -dx : dx, ady = dy < 0 ? -dy : dy;
              return !id(sw_sleep) && adx >= ady && dx < -40;
          then:
            - globals.set: { id: g_card, value: !lambda 'return (id(g_card) + 1) % 5;' }
            - script.execute: show_card
      # swipe RIGHT → previous screen
      - if:
          condition:
            lambda: |-
              int dx = id(sw_x1) - id(sw_x0), dy = id(sw_y1) - id(sw_y0);
              int adx = dx < 0 ? -dx : dx, ady = dy < 0 ? -dy : dy;
              return !id(sw_sleep) && adx >= ady && dx > 40;
          then:
            - globals.set: { id: g_card, value: !lambda 'return (id(g_card) + 4) % 5;' }
            - script.execute: show_card

# ── Wake word "Okay, Nabu" (on-device) ──────────────────────────────────────────
# Heavy TensorFlow compile — flash from a LOCAL ESPHome (not Nabu Casa remote), be
# patient (~10-15 min), and don't refresh the browser mid-build.
micro_wake_word:
  microphone: i2s_mic
  models:
    - model: okay_nabu           # say "Okay, Nabu" to wake it
  on_wake_word_detected:
    - voice_assistant.start

voice_assistant:
  microphone: i2s_mic
  media_player: va_media_player
  # Mic tuning for better recognition with the HA Assist pipeline (STT hears you
  # more clearly across the room): suppress noise, auto-level, and boost the mic.
  noise_suppression_level: 2
  auto_gain: 31dBFS
  volume_multiplier: 2.0
  on_listening:
    - lambda: 'lv_disp_trig_activity(NULL);'   # a conversation is activity — no screensaver
    # a mood flash may be mid-run — stop it so its delayed restore can't fire mid-talk
    - script.stop: led_flash
    # remember the current LEDs — but only at the START of a conversation, and never
    # while a mood flash is showing (the flash already saved the TRUE original colour).
    - if:
        condition: { lambda: 'return !id(g_voice) && !id(g_flash);' }
        then:
          - lambda: |-
              auto v = id(stackchan_light_bar).current_values;
              id(led_on)  = v.is_on();
              id(led_bri) = v.get_brightness();
              id(led_r)   = v.get_red();
              id(led_g)   = v.get_green();
              id(led_b)   = v.get_blue();
    - globals.set: { id: g_flash, value: "false" }   # flash cancelled; save is now ours
    - select.set: { id: robot_mode, option: awake }
    - globals.set: { id: g_listen, value: "true" }
    - globals.set: { id: g_voice, value: "true" }
    - lvgl.page.show: page_face
    - globals.set: { id: g_card, value: "0" }
    - script.execute: leds_yellow
    - script.execute: render_face
  on_stt_end:
    # Publish what the robot HEARD (shows live on the dashboard + HA).
    - text_sensor.template.publish: { id: st_heard, state: !lambda 'return x;' }
  on_tts_start:
    # AI is speaking → "talking" mouth face, stays YELLOW the whole turn (listen + speak).
    - lambda: 'lv_disp_trig_activity(NULL);'
    - text_sensor.template.publish: { id: st_reply, state: !lambda 'return x;' }
    - globals.set: { id: g_listen, value: "false" }
    - globals.set: { id: g_talk, value: "true" }
    - script.execute: leds_yellow
    - script.execute: render_face
  on_end:
    # AI finished the turn → back to the previous face + the previous LEDs (or off).
    - globals.set: { id: g_listen, value: "false" }
    - globals.set: { id: g_talk, value: "false" }
    - globals.set: { id: g_voice, value: "false" }
    - script.execute: render_face
    - script.execute: restore_leds
    - if:
        condition: { switch.is_off: sw_privacy }
        then: [ micro_wake_word.start ]
  on_error:
    # Pipeline error → NEVER stay stuck on yellow/listening; clean up and re-arm the wake word.
    - globals.set: { id: g_listen, value: "false" }
    - globals.set: { id: g_talk, value: "false" }
    - globals.set: { id: g_voice, value: "false" }
    - script.execute: render_face
    - script.execute: restore_leds
    - if:
        condition: { switch.is_off: sw_privacy }
        then: [ micro_wake_word.start ]
