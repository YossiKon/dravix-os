                id: perm_title
                text: "Permission?"
                text_font: small_font
                text_color: 0xE69F00
                align: TOP_MID
                y: 8
            - label:
                id: perm_txt
                text: ""
                text_font: small_font
                text_color: 0xFFFFFF
