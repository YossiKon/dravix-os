                on_click:
                  - globals.set: { id: g_perm, value: "false" }
                  - homeassistant.event: { event: esphome.dravix_permission, data: { decision: "approve" } }
                  - globals.set: { id: perm_dec, value: "1" }
                  - script.execute: perm_log
                  - lvgl.widget.hide: perm_box
            - button:
                id: perm_no
                align: TOP_RIGHT
