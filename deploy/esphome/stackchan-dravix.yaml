      bg_color: 0x05080b
      bg_opa: COVER
      widgets:
        - label: { id: lbl_play, text: "CATCH ME!", text_font: title_font, styles: accent_txt, align: TOP_MID, y: 6 }
        - label: { id: lbl_score, text: "0", text_font: big_font, text_color: 0xFFFFFF, align: TOP_RIGHT, x: -12, y: 0 }
        - button:
            id: play_back
            x: 6
            y: 6
            width: 52
            height: 28
            radius: 8
            bg_color: 0x05080b
            widgets:
              - label: { text: "<", text_font: text_font, text_color: 0x33E6C8, align: CENTER }
            on_click:
              - globals.set: { id: g_card, value: "4" }
              - lvgl.page.show: page_games
        - button:
            id: btn_dot
            x: 132
            y: 100
            width: 56
            height: 56
            radius: 28
            bg_color: 0x33E6C8
            widgets:
              # the dot is a tiny creature — it has a face 🙂
              - label: { text: "o_o", text_font: small_font, text_color: 0x05080b, align: CENTER }
            on_click:
              - lambda: 'id(g_score) += 1;'
              - lvgl.label.update:
                  id: lbl_score
                  text: !lambda 'char b[12]; snprintf(b, sizeof(b), "%d", id(g_score)); return std::string(b);'
              # the dot escapes to a random spot
              - lvgl.widget.update:
                  id: btn_dot
                  x: !lambda 'return (int)(random_float() * 240.0f) + 12;'
                  y: !lambda 'return (int)(random_float() * 130.0f) + 46;'
              # every 10 catches → celebration!
              - if:
                  condition: { lambda: 'return id(g_score) % 10 == 0;' }
                  then:
                    - script.execute: { id: led_flash, r: 20, g: 100, b: 30 }
                    - script.execute: head_shake
