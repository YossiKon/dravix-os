                  id(r3_px) = 2.5f; id(r3_py) = 2.5f; id(r3_pa) = 0.6f;
                  id(r3_hp) = 100; id(r3_ammo) = 50; id(r3_bp) = false;
                  id(r3_flash) = 0; id(r3_kills) = 0; id(r3_hit) = 0; id(r3_over) = false;
                  id(en_x)[0] = 5.5f; id(en_y)[0] = 5.5f; id(en_alive)[0] = 1;
                  id(en_x)[1] = 6.5f; id(en_y)[1] = 1.5f; id(en_alive)[1] = 1;
                  id(en_x)[2] = 1.5f; id(en_y)[2] = 5.5f; id(en_alive)[2] = 1;
                  id(en_x)[3] = 5.5f; id(en_y)[3] = 3.5f; id(en_alive)[3] = 1;
                  id(r3_run) = true;
