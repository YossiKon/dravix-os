              - lvgl.label.update: { id: pg_msg, text: "" }
              - lvgl.page.show: page_pong
        - button:
            id: btn_g_snake
            x: 162
            y: 186
            width: 74
            height: 46
            radius: 10
            bg_color: 0x14402a
            widgets:
              - label: { text: "SNAKE", text_font: small_font, text_color: 0x5dffa0, align: CENTER }
            on_click:
              - lambda: |-
                  id(sn_len) = 4; id(sn_dir) = 1; id(sn_sc) = 0;
                  id(sn_x)[0] = 6; id(sn_y)[0] = 4; id(sn_x)[1] = 5; id(sn_y)[1] = 4;
                  id(sn_x)[2] = 4; id(sn_y)[2] = 4; id(sn_x)[3] = 3; id(sn_y)[3] = 4;
                  id(sn_fx) = 9; id(sn_fy) = 2; id(sn_alive) = true;
              - lvgl.label.update: { id: sn_msg, text: "" }
              - lvgl.page.show: page_snake
        - button:
            id: btn_g_scores
            x: 240
            y: 186
            width: 74
            height: 46
            radius: 10
            bg_color: 0x2a2440
            widgets:
              - label: { text: "SCORES", text_font: small_font, text_color: 0xFFC23D, align: CENTER }
            on_click:
              - lvgl.label.update: { id: sc_catch,    text: !lambda 'char b[24]; snprintf(b, sizeof(b), "Catch:  %d", id(hs_catch)); return std::string(b);' }
              - lvgl.label.update: { id: sc_flappy,   text: !lambda 'char b[24]; snprintf(b, sizeof(b), "Flappy:  %d", id(hs_flappy)); return std::string(b);' }
              - lvgl.label.update: { id: sc_breakout, text: !lambda 'char b[24]; snprintf(b, sizeof(b), "Breakout:  %d", id(hs_breakout)); return std::string(b);' }
              - lvgl.label.update: { id: sc_simon,    text: !lambda 'char b[24]; snprintf(b, sizeof(b), "Simon:  %d", id(hs_simon)); return std::string(b);' }
              - lvgl.label.update: { id: sc_react,    text: !lambda 'char b[28]; if (id(hs_react) == 0) return std::string("React:  —"); snprintf(b, sizeof(b), "React:  %d ms", id(hs_react)); return std::string(b);' }
              - lvgl.label.update: { id: sc_rps,      text: !lambda 'char b[24]; snprintf(b, sizeof(b), "R-P-S wins:  %d", id(hs_rps)); return std::string(b);' }
              - lvgl.page.show: page_scores
    # ── FLAPPY — tap to flap, slip through the pipe gaps (the official has one too) ──
    - id: page_flappy
      bg_color: 0x0a1420
      bg_opa: COVER
      scrollable: false
      scrollbar_mode: "OFF"
      widgets:
        # the pipe pair (one, recycled right→left; the gap moves each pass)
        - obj: { id: fb_top, x: 340, y: 0,   width: 34, height: 90,  radius: 4, bg_color: 0x2ea35c, bg_opa: COVER, border_width: 0 }
        - obj: { id: fb_bot, x: 340, y: 170, width: 34, height: 240, radius: 4, bg_color: 0x2ea35c, bg_opa: COVER, border_width: 0 }
        # the bird — a little teal creature, of course
        - obj:
            id: fb_bird
            x: 60
            y: 110
            width: 26
            height: 26
            radius: 13
            bg_color: 0x33E6C8
            bg_opa: COVER
            border_width: 0
            widgets:
              - label: { text: "o", text_font: small_font, text_color: 0x0a1420, align: CENTER }
        # full-screen tap catcher (transparent, drawn above the playfield): tap = flap / start
        - button:
            id: fb_tapzone
            x: 0
            y: 0
            width: 320
            height: 240
            radius: 0
            bg_opa: TRANSP
            border_width: 0
            shadow_width: 0
            on_click:
              - if:
                  condition: { lambda: 'return id(fb_alive);' }
                  then:
                    - lambda: 'id(fb_vy) = -5.5f;'   # flap!
                  else:
                    - lambda: |-
                        id(fb_alive) = true; id(fb_score) = 0;
                        id(fb_y) = 110.0f; id(fb_vy) = -5.5f; id(fb_px) = 340;
                    - lvgl.label.update: { id: fb_lbl, text: "" }
                    - lvgl.label.update: { id: fb_sc, text: "0" }
        # HUD on top of the tap zone (labels don't block clicks)
        - label: { id: fb_lbl, text: "TAP!", text_font: title_font, styles: accent_txt, align: TOP_MID, y: 6 }
        - label: { id: fb_sc,  text: "0",    text_font: title_font, text_color: 0xFFFFFF, align: TOP_RIGHT, x: -10, y: 6 }
        # back to the menu (drawn after the tap zone so it stays clickable)
        - button:
            id: fb_back
            x: 6
            y: 6
            width: 52
            height: 28
            radius: 8
            bg_color: 0x05080b
            widgets:
              - label: { text: "<", text_font: text_font, text_color: 0x33E6C8, align: CENTER }
            on_click:
              - lambda: 'id(fb_alive) = false;'
              - globals.set: { id: g_card, value: "4" }
              - lvgl.page.show: page_games
