            text_font: small_font
            text_color: 0xFFC23D
            align: TOP_LEFT
            x: 6
            y: 4
            hidden: true
        # AI AGENT badge — the winning coding-agent's "name: state" (fw v20). Bottom-left,
        # clear of the top speech bubble; driven by the t_agent text slot, hidden when empty.
        - label:
            id: lbl_agent
            text: ""
            text_font: small_font
            text_color: 0x33E6C8
            align: BOTTOM_LEFT
            x: 6
            y: -6
            hidden: true
        # SPEECH BUBBLE — a comic bubble COMING FROM THE MOUTH: sits at the TOP of the
        # screen (so the animated talking mouth stays fully visible) with a little tail
        # pointing down toward the mouth. Shows the AI's words while speaking, and
        # wellness tips. NOT shown while listening — listening is a FACE, not a label.
        - obj:
            id: speech_bubble
            align: TOP_MID
            y: 28
            width: 312
            height: 66
            radius: 14
            bg_color: 0x1a2233
