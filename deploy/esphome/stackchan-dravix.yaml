    # ── CLIMATE — control the configured AC right on the robot (swipe slot 6). Every
    #    button fires esphome.dravix_climate {action}; dravix runs the HA service call
    #    on the AC you picked in the dashboard's Climate tab and writes the status back.
    - id: page_climate
      bg_color: 0x05080b
      bg_opa: COVER
      scrollable: false
      scrollbar_mode: "OFF"
      widgets:
        - label: { id: lbl_clim_name, text: "AC", text_font: title_font, styles: accent_txt, align: TOP_MID, y: 6 }
        - label: { id: lbl_clim_info, text: "", text_font: small_font, text_color: 0x8b96a4, align: TOP_MID, y: 40 }
        # big − / + for the target temperature, flanking a large readout
        - button:
            id: clim_minus
            x: 8
            y: 74
            width: 78
            height: 84
            radius: 14
            bg_color: 0x14324a
            widgets:
              - label: { text: "-", text_font: big_font, text_color: 0xFFFFFF, align: CENTER }
            on_click:
              - homeassistant.event: { event: esphome.dravix_climate, data: { action: "temp_down" } }
        - label: { id: lbl_clim_set, text: "--°", text_font: big_font, text_color: 0x33E6C8, align: CENTER, y: -6 }
        - button:
            id: clim_plus
            x: 234
            y: 74
            width: 78
            height: 84
            radius: 14
            bg_color: 0x14324a
            widgets:
              - label: { text: "+", text_font: big_font, text_color: 0xFFFFFF, align: CENTER }
            on_click:
              - homeassistant.event: { event: esphome.dravix_climate, data: { action: "temp_up" } }
        # HVAC mode + power row
        - button: { id: clim_cool, x: 6,   y: 172, width: 58, height: 30, radius: 8, bg_color: 0x123a5a, widgets: [ { label: { text: "COOL", text_font: small_font, text_color: 0x7bb0ff, align: CENTER } } ], on_click: [ { homeassistant.event: { event: esphome.dravix_climate, data: { action: "cool" } } } ] }
        - button: { id: clim_heat, x: 68,  y: 172, width: 58, height: 30, radius: 8, bg_color: 0x4a1c14, widgets: [ { label: { text: "HEAT", text_font: small_font, text_color: 0xff9440, align: CENTER } } ], on_click: [ { homeassistant.event: { event: esphome.dravix_climate, data: { action: "heat" } } } ] }
        - button: { id: clim_fan,  x: 130, y: 172, width: 58, height: 30, radius: 8, bg_color: 0x14324a, widgets: [ { label: { text: "FAN", text_font: small_font, text_color: 0x33E6C8, align: CENTER } } ], on_click: [ { homeassistant.event: { event: esphome.dravix_climate, data: { action: "fan_only" } } } ] }
        - button: { id: clim_dry,  x: 192, y: 172, width: 58, height: 30, radius: 8, bg_color: 0x14324a, widgets: [ { label: { text: "DRY", text_font: small_font, text_color: 0xffc23d, align: CENTER } } ], on_click: [ { homeassistant.event: { event: esphome.dravix_climate, data: { action: "dry" } } } ] }
        - button: { id: clim_auto, x: 254, y: 172, width: 58, height: 30, radius: 8, bg_color: 0x14324a, widgets: [ { label: { text: "AUTO", text_font: small_font, text_color: 0xFFFFFF, align: CENTER } } ], on_click: [ { homeassistant.event: { event: esphome.dravix_climate, data: { action: "auto" } } } ] }
        # power + fan-speed row
        - button: { id: clim_off,  x: 6,   y: 206, width: 120, height: 30, radius: 8, bg_color: 0x3a1414, widgets: [ { label: { text: "OFF", text_font: small_font, text_color: 0xE05555, align: CENTER } } ], on_click: [ { homeassistant.event: { event: esphome.dravix_climate, data: { action: "off" } } } ] }
        - button: { id: clim_fanspd, x: 130, y: 206, width: 124, height: 30, radius: 8, bg_color: 0x14324a, widgets: [ { label: { text: "FAN SPEED", text_font: small_font, text_color: 0x33E6C8, align: CENTER } } ], on_click: [ { homeassistant.event: { event: esphome.dravix_climate, data: { action: "fan_cycle" } } } ] }
        - button:
            id: clim_back
            x: 258
            y: 206
            width: 54
            height: 30
            radius: 8
            bg_color: 0x05080b
            widgets:
              - label: { text: "<", text_font: text_font, text_color: 0x33E6C8, align: CENTER }
            on_click:
              - globals.set: { id: g_card, value: "0" }
              - lvgl.page.show: page_face

script:
  # ── FACE TAP dispatch — single tap = STOP everything · double tap = toggle the AI ──
  - id: panic_stop            # single tap: cut speech + dance + effects, LEDs off, clean face
    then:
      - voice_assistant.stop                    # stop listening / speaking mid-sentence
      - script.stop: led_flash
      - script.stop: party                      # stop the disco / dance
      - script.stop: identify
      - globals.set: { id: g_flash,  value: "false" }
      - globals.set: { id: g_listen, value: "false" }
      - globals.set: { id: g_talk,   value: "false" }
      - globals.set: { id: g_voice,  value: "false" }
      - light.turn_off: stackchan_light_bar     # no LEDs — back to a clean state
      - script.execute: render_face             # redraw the current mode's face
  - id: tap_single            # fires the STOP only if a 2nd tap didn't arrive (→ that's a double)
    mode: restart
    then:
      - delay: 350ms
      - if:
          condition: { lambda: 'return id(g_dc_ms) != 0;' }
          then:
            - globals.set: { id: g_dc_ms, value: "0" }
            - script.execute: panic_stop
  # After ~25s the alert image goes away and the face comes back.
  - id: img_timeout
    mode: restart
    then:
      - delay: 25s
      - if:
          condition: { lvgl.page.is_showing: page_image }
          then: [ { lvgl.page.show: page_face } ]
  # A wellness tip auto-hides after ~12s (the speech bubble goes back to the face).
  - id: tip_timeout
    mode: restart
    then:
      - delay: 12s
      - globals.set: { id: g_tip, value: "false" }
      - script.execute: render_face
  # Safety auto-hide for the permission prompt — clears the buttons after 3 min if you never
  # tapped (the agent has already timed out by then). NEVER auto-decides — just tidies up.
  - id: perm_timeout
    mode: restart
    then:
      - delay: 180s
      - globals.set: { id: g_perm, value: "false" }
      - lvgl.widget.hide: perm_box
  # HOLD-TO-REJECT — armed on a head touch while a prompt is up. If the touch is still held
  # 3s later it's a deliberate long-press → REJECT (with a "no" head shake). A quick tap
  # releases before this fires and is handled as APPROVE in the touch release handler.
  - id: perm_hold
    mode: restart
    then:
      - delay: 3s
      - if:
          condition: { lambda: 'return id(g_ptouch) && id(g_perm);' }
          then:
            - globals.set: { id: g_ptouch, value: "false" }
            - globals.set: { id: g_perm, value: "false" }
            - lvgl.widget.hide: perm_box
            - homeassistant.event: { event: esphome.dravix_permission, data: { decision: "reject" } }
            - script.execute: head_shake
  # Set both eyes to a shape: width / height / corner-radius / vertical offset.
  # (Eyes are align:CENTER, so size changes keep them centred — no x math needed.)
  - id: set_eyes
    mode: restart
    parameters:
      w: int
      h: int
      r: int
      dy: int
    then:
      - lvgl.widget.update:
          id: eye_l
          width: !lambda 'return w;'
          height: !lambda 'return h;'
          radius: !lambda 'return r;'
          y: !lambda 'return dy;'
      - lvgl.widget.update:
          id: eye_r
          width: !lambda 'return w;'
          height: !lambda 'return h;'
          radius: !lambda 'return r;'
          y: !lambda 'return dy;'
  - id: set_mouth
    mode: restart
    parameters:
      w: int
      h: int
      r: int
      dy: int
    then:
      - lvgl.widget.update:
          id: mouth
          width: !lambda 'return w;'
          height: !lambda 'return h;'
          radius: !lambda 'return r;'
          y: !lambda 'return dy;'
  # ── BODY LANGUAGE ─────────────────────────────────────────────────────────────
  # Nudge the head relative to where it is now. PITCH goes through n_head_pitch, i.e.
  # in YOUR units (158..260, straight=165) — never the motor's internal 0..90 scale.
  # Writes are spaced 350ms apart — the SCS9009 serial bus drops back-to-back writes.
  # HARD no-move rule: in the calm modes (night / focus / quiet) body language is
  # fully OFF — not even slow moves (only deliberate user control still works).
  - id: head_nudge
    mode: restart
    parameters:
      dx: int
      dy: int
    then:
      - lambda: 'id(g_move_ms) = (long) millis();'   # a commanded move — not a hand
      - if:
          condition:
            lambda: |-
              return id(sw_move).state && dx != 0 && !std::isnan(id(servo_x_angle).state)
                     && !id(g_night) && !id(g_focus) && !id(g_quiet)
                     && !id(g_sleep) && !id(g_saver);
          then:
            - number.set:
                id: servo_x_angle
                value: !lambda |-
                  float v = id(servo_x_angle).state + dx;
                  return v < -164 ? -164 : (v > 164 ? 164 : v);
            - delay: 350ms
      - if:
          condition:
            lambda: |-
              return id(sw_move).state && dy != 0 && !std::isnan(id(n_head_pitch).state)
                     && !id(g_night) && !id(g_focus) && !id(g_quiet)
                     && !id(g_sleep) && !id(g_saver);
          then:
            - number.set:
                id: n_head_pitch
                value: !lambda |-
                  float v = id(n_head_pitch).state + dy;
                  return v < 158 ? 158 : (v > 260 ? 260 : v);
  # A quick left-right "no!" shake (angry / playful). Silent in the calm modes.
  - id: head_shake
    mode: restart
    then:
      - lambda: 'id(g_move_ms) = (long) millis();'
      - if:
          condition:
            lambda: |-
              return id(sw_move).state && !std::isnan(id(servo_x_angle).state)
                     && !id(g_night) && !id(g_focus) && !id(g_quiet)
                     && !id(g_sleep) && !id(g_saver);
          then:
            - number.set:
                id: servo_x_angle
                value: !lambda 'float v = id(servo_x_angle).state - 12; return v < -164 ? -164 : v;'
            - delay: 350ms
            - number.set:
                id: servo_x_angle
                value: !lambda 'float v = id(servo_x_angle).state + 24; return v > 164 ? 164 : v;'
            - delay: 350ms
            - number.set:
                id: servo_x_angle
                value: !lambda 'float v = id(servo_x_angle).state - 12; return v < -164 ? -164 : v;'
  # A gentle up-down "yes" nod (agree / acknowledge / greet). PITCH via n_head_pitch
  # (158..260). Silent in the calm modes.
  - id: head_nod
    mode: restart
    then:
      - lambda: 'id(g_move_ms) = (long) millis();'
      - if:
          condition:
            lambda: |-
              return id(sw_move).state && !std::isnan(id(n_head_pitch).state)
                     && !id(g_night) && !id(g_focus) && !id(g_quiet)
                     && !id(g_sleep) && !id(g_saver);
          then:
            - number.set:
                id: n_head_pitch
                value: !lambda 'float v = id(n_head_pitch).state + 12; return v > 260 ? 260 : v;'
            - delay: 350ms
            - number.set:
                id: n_head_pitch
                value: !lambda 'float v = id(n_head_pitch).state - 24; return v < 158 ? 158 : v;'
            - delay: 350ms
            - number.set:
                id: n_head_pitch
                value: !lambda 'float v = id(n_head_pitch).state + 12; return v > 260 ? 260 : v;'
  # ── MOOD LEDs — flash an emotion colour for ~2.5s, then put the LEDs back ──────
  - id: led_flash
    mode: restart
    parameters:
      r: int
      g: int
      b: int
    then:
      - if:
          # calm modes (night / focus / quiet) and SLEEP/SAVER = no light shows
          condition:
            lambda: |-
              return id(sw_mood_led).state && !id(g_voice)
                     && !id(g_night) && !id(g_focus) && !id(g_quiet)
                     && !id(g_sleep) && !id(g_saver);
          then:
            - if:
                condition: { lambda: 'return !id(g_flash);' }   # don't re-save our own colour
                then:
                  - lambda: |-
                      auto v = id(stackchan_light_bar).current_values;
                      id(led_on)  = v.is_on();
                      id(led_bri) = v.get_brightness();
                      id(led_r)   = v.get_red();
                      id(led_g)   = v.get_green();
                      id(led_b)   = v.get_blue();
            - globals.set: { id: g_flash, value: "true" }
            - light.turn_on:
                id: stackchan_light_bar
                brightness: 70%
                red: !lambda 'return r / 100.0f;'
                green: !lambda 'return g / 100.0f;'
                blue: !lambda 'return b / 100.0f;'
            - delay: 2500ms
            # if a voice conversation started meanwhile, DON'T stomp its yellow —
            # the conversation's own on_end will restore the true original colour.
            - if:
                condition: { lambda: 'return !id(g_voice);' }
                then:
                  - script.execute: restore_leds
            - globals.set: { id: g_flash, value: "false" }
  # ── PETTING — wake up, blush, pink LEDs, nuzzle up + a happy wiggle ─────────────
  - id: pet_react
    mode: restart
    then:
      - lambda: 'lv_disp_trig_activity(NULL);'
      - select.set: { id: robot_mode, option: awake }
      - globals.set: { id: g_expr, value: "1" }     # happy (cheeks show)
      - globals.set: { id: g_card, value: "0" }
      - lvgl.page.show: page_face
      - script.execute: render_face
      - script.execute: { id: led_flash, r: 100, g: 25, b: 45 }   # pink
      - delay: 400ms
      - script.execute: { id: head_nudge, dx: 0, dy: 12 }         # nuzzle up into your hand
      - delay: 900ms
      - script.execute: head_shake                                # happy little wiggle
  # ── PLUGGED IN 🔌 — "nom, electricity!": happy face + a green flash when the
  #    charger connects (silent while sleeping — the breathing LEDs take over there).
  - id: plug_react
    mode: single
    then:
      - if:
          condition: { lambda: 'return id(g_booted) && !id(g_sleep) && !id(g_saver);' }
          then:
            - globals.set: { id: g_expr, value: "1" }
            - script.execute: render_face
            - script.execute: { id: led_flash, r: 20, g: 100, b: 30 }
            - delay: 2500ms
            - globals.set: { id: g_expr, value: "0" }
            - script.execute: render_face
      - delay: 30s   # a flaky charger connection can't turn this into a disco
  # ── WAVE 👋 — a hand waving at the sensor: wakes up, waves BACK with its head,
  #    happy face + warm flash. (Detected as 3 near/far proximity swings within 4s.)
  - id: wave_react
    mode: single
    then:
      - lambda: 'lv_disp_trig_activity(NULL);'
      - select.set: { id: robot_mode, option: awake }   # waving = you want its attention
      - globals.set: { id: g_expr, value: "1" }         # happy
      - globals.set: { id: g_card, value: "0" }
      - lvgl.page.show: page_face
      - script.execute: render_face
      - script.execute: { id: led_flash, r: 100, g: 60, b: 15 }   # warm hello
      - script.execute: head_shake                                 # waves back!
      - delay: 900ms
      - script.execute: head_shake
      - delay: 2000ms
      - globals.set: { id: g_expr, value: "0" }
      - script.execute: render_face
      - delay: 6s                                       # throttle
  # ── BOOP 👉 — a finger right up at the proximity sensor: love-eyes + a happy nod.
  - id: boop_react
    mode: single
    then:
      - lambda: 'lv_disp_trig_activity(NULL);'
      - globals.set: { id: g_expr, value: "6" }      # love ♥
      - globals.set: { id: g_card, value: "0" }
      - lvgl.page.show: page_face
      - script.execute: render_face
      - script.execute: { id: led_flash, r: 100, g: 20, b: 45 }
      - script.execute: head_nod
      - delay: 2500ms
      - globals.set: { id: g_expr, value: "0" }
      - script.execute: render_face
      - delay: 8s                                    # throttle boops
  # ── HAND-TURN REACTION — someone physically turned the head: a startled "hey!?",
  #    then it accepts the new pose (no fighting the hand) and settles happy.
  - id: hand_react
    mode: single
    then:
      - lambda: 'lv_disp_trig_activity(NULL);'
      - globals.set: { id: g_expr, value: "7" }      # dizzy x_x — whoa!
      - globals.set: { id: g_card, value: "0" }
      - lvgl.page.show: page_face
      - script.execute: render_face
      - script.execute: { id: led_flash, r: 60, g: 25, b: 100 }
      - delay: 1300ms
      - globals.set: { id: g_expr, value: "1" }      # ...okay, that was fun actually
      - script.execute: render_face
      - delay: 2000ms
      - globals.set: { id: g_expr, value: "0" }
      - script.execute: render_face
      - delay: 12s                                   # throttle: at most once per ~15s
  # ── IR GLANCE — someone pressed a TV/AC remote: glance over, quizzical, then back.
  #    mode: single + the trailing delay = fires at most once per ~20s, and never
  #    interrupts sleep / screensaver / calm modes.
  - id: ir_glance
    mode: single
    then:
      - if:
          condition:
            lambda: |-
              return !id(g_sleep) && !id(g_saver) && !id(g_night) && !id(g_focus)
                     && !id(g_quiet) && !id(g_voice) && id(sw_drift).state;
          then:
            - lambda: 'id(g_glance_ms) = (long) millis();'   # keep breathing off the glance
            - lvgl.widget.update: { id: face_box, x: 22, y: -4 }
            - globals.set: { id: g_expr, value: "5" }        # quizzical
            - script.execute: render_face
            - delay: 1600ms
            - lvgl.widget.update: { id: face_box, x: 0, y: 0 }
            - globals.set: { id: g_expr, value: "0" }
            - script.execute: render_face
      - delay: 20s
  # ── TICKLE (touch zone 3, back of the head) — giggly, faster than a calm pet ──
  - id: tickle
    mode: restart
    then:
      - lambda: 'lv_disp_trig_activity(NULL);'
      - select.set: { id: robot_mode, option: awake }
      - globals.set: { id: g_expr, value: "1" }     # happy (cheeks show)
      - globals.set: { id: g_card, value: "0" }
      - lvgl.page.show: page_face
      - script.execute: render_face
      - script.execute: { id: led_flash, r: 20, g: 100, b: 60 }   # giggly green
      - script.execute: head_shake                                # wiggle!
      - delay: 900ms
      - script.execute: head_shake                                # ...and again
  # ── PARTY — a little disco: colour-cycling LEDs + head sways, then back to normal ──
  - id: party
    mode: restart
    then:
      - lambda: 'lv_disp_trig_activity(NULL);'
      - select.set: { id: robot_mode, option: awake }
      - globals.set: { id: g_expr, value: "1" }
      - globals.set: { id: g_card, value: "0" }
      - lvgl.page.show: page_face
      - script.execute: render_face
      # remember the LEDs (same guard pattern as identify)
      - if:
          condition: { lambda: 'return !id(g_voice);' }
          then:
            - lambda: |-
                auto v = id(stackchan_light_bar).current_values;
                id(led_on)  = v.is_on();
                id(led_bri) = v.get_brightness();
                id(led_r)   = v.get_red();
                id(led_g)   = v.get_green();
                id(led_b)   = v.get_blue();
      # the light bar has REAL animated effects built in (BSP) — run the rainbow
      # while the head sways, instead of hand-rolled colour flips
      - light.turn_on:
          id: stackchan_light_bar
          brightness: 100%
          effect: "Rainbow Effect With Custom Values"
      - repeat:
          count: 12
          then:
            - if:
                condition: { lambda: 'return id(sw_move).state && !std::isnan(id(servo_x_angle).state);' }
                then:
                  - number.set:
                      id: servo_x_angle
                      value: !lambda 'id(g_move_ms) = (long) millis(); id(g_pn)++; return (id(g_pn) % 2) ? 20.0f : -20.0f;'
            - delay: 620ms
      # settle: head back to centre, effect off, LEDs back to how they were
      - if:
          condition: { lambda: 'return id(sw_move).state;' }
          then:
            - number.set: { id: servo_x_angle, value: "0" }
      - light.turn_on: { id: stackchan_light_bar, effect: "None" }
      - if:
          condition: { lambda: 'return !id(g_voice);' }
          then:
            - script.execute: restore_leds
  # Redraw the pet face from the current state.
  - id: render_face
    then:
      # Background: awake = WHITE + dark eyes · night = black + dim teal · saver/sleep = black + teal.
      - lvgl.widget.update:
          id: bg_rect
          bg_color: !lambda 'return (!id(g_sleep) && !id(g_saver) && !id(g_night)) ? lv_color_hex(0xFFFFFF) : lv_color_hex(0x000000);'
      - lvgl.widget.update:
          id: eye_l
          bg_color: !lambda |-
            if (id(g_sleep) || id(g_saver)) return lv_color_hex(0x33E6C8);
            if (id(g_night)) return lv_color_hex(0x1f9e88);
            return lv_color_hex(0x14181d);
      - lvgl.widget.update:
          id: eye_r
          bg_color: !lambda |-
            if (id(g_sleep) || id(g_saver)) return lv_color_hex(0x33E6C8);
            if (id(g_night)) return lv_color_hex(0x1f9e88);
            return lv_color_hex(0x14181d);
      - lvgl.widget.update:
          id: mouth
          bg_color: !lambda |-
            if (id(g_sleep) || id(g_saver)) return lv_color_hex(0x33E6C8);
            if (id(g_night)) return lv_color_hex(0x1f9e88);
            return lv_color_hex(0x14181d);
      # privacy badge
      - lvgl.label.update:
          id: lbl_priv
          text: !lambda 'return id(sw_privacy).state ? std::string("PRIVACY") : std::string("");'
      # AI-agent badge — visible only when set AND the robot is awake (dead-still in sleep)
      - if:
          condition: { lambda: 'return id(g_agent) && !id(g_sleep) && !id(g_saver);' }
          then: [ { lvgl.widget.show: lbl_agent } ]
          else: [ { lvgl.widget.hide: lbl_agent } ]
      # speech bubble — while SPEAKING (the AI's words) or showing a wellness tip.
      # NOT while listening: listening is expressed by the FACE (big curious eyes,
      # attentive perk), never by an on-screen label.
      - if:
          condition: { lambda: 'return id(g_talk) || id(g_tip);' }
          then:
            - lvgl.widget.show: speech_bubble
            - lvgl.widget.show: bub_t1
            - lvgl.widget.show: bub_t2
          else:
            - lvgl.widget.hide: speech_bubble
            - lvgl.widget.hide: bub_t1
            - lvgl.widget.hide: bub_t2
      # zzz drifts while sleeping
      - lvgl.label.update:
          id: lbl_zzz
          text: !lambda |-
            if (!id(g_sleep)) return std::string("");
            const char* z[] = {"z", "z z", "z z z", ""};
            return std::string(z[id(g_anim) % 4]);
      # pink cheeks on a happy or in-love idle face (and greet)
      - if:
          condition:
            lambda: |-
              return !id(g_sleep) && !id(g_listen) && !id(g_talk) && !id(g_blink)
                     && !id(g_saver) && !id(g_focus) && (id(g_expr) == 1 || id(g_expr) == 6);
          then: [ { lvgl.widget.show: cheek_l }, { lvgl.widget.show: cheek_r } ]
          else: [ { lvgl.widget.hide: cheek_l }, { lvgl.widget.hide: cheek_r } ]
      - if:
          condition: { lambda: 'return id(g_sleep);' }
          then: [ { lvgl.widget.hide: mouth } ]
          else: [ { lvgl.widget.show: mouth } ]
      # ── eye + mouth shapes per state ──────────────────────────────────────────
      - if:  # sleeping → eyes closed
          condition: { lambda: 'return id(g_sleep);' }
          then:
            - script.execute: { id: set_eyes, w: 60, h: 10, r: 5, dy: 8 }
      - if:  # blink
          condition: { lambda: 'return !id(g_sleep) && id(g_blink);' }
          then:
            - script.execute: { id: set_eyes, w: 64, h: 10, r: 5, dy: 0 }
      - if:  # listening → big curious eyes
          condition: { lambda: 'return !id(g_sleep) && !id(g_blink) && id(g_listen);' }
          then:
            - script.execute: { id: set_eyes, w: 74, h: 86, r: 28, dy: -2 }
            - script.execute: { id: set_mouth, w: 22, h: 8, r: 4, dy: 66 }
      - if:  # speaking → mouth opens and closes
          condition: { lambda: 'return !id(g_sleep) && !id(g_blink) && !id(g_listen) && id(g_talk);' }
          then:
            - script.execute: { id: set_eyes, w: 64, h: 58, r: 22, dy: 0 }
            - lvgl.widget.update:
                id: mouth
                width: 54
                radius: 12
                height: !lambda 'return (id(g_anim) % 2) ? 26 : 10;'
                y: 62
      - if:  # SCREENSAVER → slow dozy "breathing" eyes (they half-close and open)
          condition: { lambda: 'return !id(g_sleep) && !id(g_blink) && !id(g_listen) && !id(g_talk) && id(g_saver);' }
          then:
            - lvgl.widget.update:
                id: eye_l
                width: 60
                radius: 18
                y: 4
                height: !lambda 'const int b[] = {46, 38, 30, 38}; return b[id(g_anim) % 4];'
            - lvgl.widget.update:
                id: eye_r
                width: 60
                radius: 18
                y: 4
                height: !lambda 'const int b[] = {46, 38, 30, 38}; return b[id(g_anim) % 4];'
            - script.execute: { id: set_mouth, w: 30, h: 6, r: 3, dy: 66 }
      - if:  # FOCUS → steady, narrowed concentrating eyes
          condition: { lambda: 'return !id(g_sleep) && !id(g_blink) && !id(g_listen) && !id(g_talk) && !id(g_saver) && id(g_focus);' }
          then:
            - script.execute: { id: set_eyes, w: 58, h: 40, r: 16, dy: 0 }
            - script.execute: { id: set_mouth, w: 28, h: 6, r: 3, dy: 64 }
      - if:  # idle → the chosen expression
          condition: { lambda: 'return !id(g_sleep) && !id(g_blink) && !id(g_listen) && !id(g_talk) && !id(g_saver) && !id(g_focus);' }
          then:
            - if:  # neutral
                condition: { lambda: 'return id(g_expr) == 0;' }
                then:
                  - script.execute: { id: set_eyes, w: 64, h: 64, r: 22, dy: 0 }
                  - script.execute: { id: set_mouth, w: 40, h: 8, r: 4, dy: 64 }
            - if:  # happy — squinted "^^" eyes, wide smile, cheeks
                condition: { lambda: 'return id(g_expr) == 1;' }
                then:
                  - script.execute: { id: set_eyes, w: 70, h: 26, r: 13, dy: -6 }
                  - script.execute: { id: set_mouth, w: 86, h: 10, r: 5, dy: 58 }
            - if:  # sad — droopy small eyes, tiny low mouth
                condition: { lambda: 'return id(g_expr) == 2;' }
                then:
                  - script.execute: { id: set_eyes, w: 52, h: 38, r: 15, dy: 10 }
                  - script.execute: { id: set_mouth, w: 26, h: 8, r: 4, dy: 70 }
            - if:  # angry — narrowed sharp eyes
                condition: { lambda: 'return id(g_expr) == 3;' }
                then:
                  - script.execute: { id: set_eyes, w: 70, h: 22, r: 7, dy: -2 }
                  - script.execute: { id: set_mouth, w: 48, h: 8, r: 4, dy: 64 }
            - if:  # sleepy — heavy lids
                condition: { lambda: 'return id(g_expr) == 4;' }
                then:
                  - script.execute: { id: set_eyes, w: 64, h: 14, r: 7, dy: 8 }
                  - script.execute: { id: set_mouth, w: 34, h: 8, r: 4, dy: 66 }
            - if:  # doubt — one raised eye, one squinted (asymmetric!)
                condition: { lambda: 'return id(g_expr) == 5;' }
                then:
                  - script.execute: { id: set_eyes, w: 64, h: 64, r: 22, dy: 0 }
                  - lvgl.widget.update: { id: eye_r, height: 30, y: 6 }
                  - script.execute: { id: set_mouth, w: 30, h: 8, r: 4, dy: 66 }
            - if:  # LOVE — big soft PINK eyes, blushing cheeks, wide smile
                condition: { lambda: 'return id(g_expr) == 6;' }
                then:
                  - script.execute: { id: set_eyes, w: 72, h: 66, r: 30, dy: -2 }
                  - lvgl.widget.update: { id: eye_l, bg_color: 0xFF5C8A }
                  - lvgl.widget.update: { id: eye_r, bg_color: 0xFF5C8A }
                  - script.execute: { id: set_mouth, w: 80, h: 10, r: 5, dy: 58 }
            - if:  # DIZZY — the eyes become little x-es (just been spun around)
                condition: { lambda: 'return id(g_expr) == 7;' }
                then:
                  - script.execute: { id: set_eyes, w: 8, h: 8, r: 4, dy: 0 }   # eyes shrink away
                  - script.execute: { id: set_mouth, w: 22, h: 8, r: 4, dy: 68 }
      # ── decorators (original-avatar style): brows on angry · x-eyes on dizzy ·
      #    a sweat drop while busy. Shown only on an idle face; hidden in every
      #    other state so they never linger.
      - if:
          condition:
            lambda: |-
              return !id(g_sleep) && !id(g_listen) && !id(g_talk) && !id(g_blink)
                     && !id(g_saver) && !id(g_focus) && id(g_expr) == 3;
          then: [ { lvgl.widget.show: brow_l }, { lvgl.widget.show: brow_r } ]
          else: [ { lvgl.widget.hide: brow_l }, { lvgl.widget.hide: brow_r } ]
      - if:
          condition:
            lambda: |-
              return !id(g_sleep) && !id(g_listen) && !id(g_talk) && !id(g_blink)
                     && !id(g_saver) && !id(g_focus) && id(g_expr) == 7;
          then: [ { lvgl.widget.show: dz_l }, { lvgl.widget.show: dz_r } ]
          else: [ { lvgl.widget.hide: dz_l }, { lvgl.widget.hide: dz_r } ]
      - if:
          condition: { lambda: 'return id(g_busy) && !id(g_sleep) && !id(g_saver);' }
          then: [ { lvgl.widget.show: sweat } ]
          else: [ { lvgl.widget.hide: sweat } ]
      # Publish the live state to HA (only when it actually changed).
      - lambda: |-
          std::string s = id(g_sleep)  ? "sleep"
                        : id(g_listen) ? "listening"
                        : id(g_talk)   ? "speaking"
                        : id(g_saver)  ? "screensaver"
                        : id(g_night)  ? "night"
                        : id(g_focus)  ? "focus"
                        : id(g_quiet)  ? "quiet"
                        : id(g_busy)   ? "busy" : "awake";
          if (!id(st_state).has_state() || id(st_state).state != s) id(st_state).publish_state(s);
  # Show the current "home screen" (0 = face, 1..3 = cards, 4 = the game).
  - id: show_card
    then:
      - if: { condition: { lambda: 'return id(g_card) == 1;' }, then: [ { lvgl.page.show: page_card1 } ] }
      - if: { condition: { lambda: 'return id(g_card) == 2;' }, then: [ { lvgl.page.show: page_card2 } ] }
      - if: { condition: { lambda: 'return id(g_card) == 3;' }, then: [ { lvgl.page.show: page_card3 } ] }
      - if: { condition: { lambda: 'return id(g_card) == 4;' }, then: [ { lvgl.page.show: page_games } ] }
      - if: { condition: { lambda: 'return id(g_card) == 5;' }, then: [ { lvgl.page.show: page_vitals } ] }
      - if: { condition: { lambda: 'return id(g_card) == 6;' }, then: [ { lvgl.page.show: page_climate } ] }
      - if: { condition: { lambda: 'return id(g_card) <= 0 || id(g_card) > 6;' }, then: [ { lvgl.page.show: page_face } ] }
  # Greet: someone approached → wake up + a happy face + perk the head up.
  # (Skipped at night and in focus mode — do-not-disturb.)
  - id: greet
    then:
      - if:
          condition: { lambda: 'return !id(g_night) && !id(g_focus);' }
          then:
            - lambda: 'lv_disp_trig_activity(NULL);'   # reset the screensaver/sleep idle timer
            - globals.set: { id: g_card,  value: "0" }
            - globals.set: { id: g_expr,  value: "1" }     # happy
            - lvgl.page.show: page_face
            - select.set: { id: robot_mode, option: awake }
            - delay: 400ms
            - script.execute: { id: head_nudge, dx: 0, dy: 8 }   # perks up at you
            - delay: 500ms
            - script.execute: head_nod                            # …and nods hello 👋
  # Identify: flash the LEDs cyan 3× + a happy face, so you can find/confirm the robot.
  - id: identify
    then:
      - if:
          condition: { lambda: 'return !id(g_voice);' }
          then:
            - lambda: |-
                auto v = id(stackchan_light_bar).current_values;
                id(led_on)  = v.is_on();
                id(led_bri) = v.get_brightness();
                id(led_r)   = v.get_red();
                id(led_g)   = v.get_green();
                id(led_b)   = v.get_blue();
      - globals.set: { id: g_expr, value: "1" }
      - script.execute: render_face
      - repeat:
          count: 3
          then:
            - light.turn_on: { id: stackchan_light_bar, brightness: 100%, red: 0%, green: 90%, blue: 100% }
            - delay: 250ms
            - light.turn_off: stackchan_light_bar
            - delay: 200ms
      - if:
          condition: { lambda: 'return !id(g_voice);' }
          then:
            - script.execute: restore_leds
  # AI-mode LEDs: go YELLOW (gated by the "Speaking LEDs" switch).
  - id: leds_yellow
    then:
      - if:
          condition: { lambda: 'return id(sw_speak_led).state;' }
          then:
            - light.turn_on: { id: stackchan_light_bar, brightness: 80%, red: 100%, green: 80%, blue: 0% }
  # Put the LEDs back to whatever they were before the voice interaction (or off).
  - id: restore_leds
    then:
      - if:
          condition: { lambda: 'return id(led_on);' }
          then:
            - light.turn_on:
                id: stackchan_light_bar
                brightness: !lambda 'return id(led_bri);'
                red: !lambda 'return id(led_r);'
                green: !lambda 'return id(led_g);'
                blue: !lambda 'return id(led_b);'
          else:
            - light.turn_off: stackchan_light_bar
  # ── GAME: Reaction — red → (random wait) → green; tap to see your ms ──────────
  - id: react_start
    mode: restart
    then:
      - globals.set: { id: g_react, value: "0" }
      - lvgl.widget.update: { id: react_pad, bg_color: 0x8a1c1c }
      - lvgl.label.update: { id: react_txt, text: "WAIT..." }
      - delay: !lambda 'return 1200 + (uint32_t)(random_float() * 2800.0f);'
      - if:
          condition:
            and:
              - lambda: 'return id(g_react) == 0;'
              - lvgl.page.is_showing: page_react
          then:
            - globals.set: { id: g_react, value: "1" }
            - globals.set: { id: g_react_t, value: !lambda 'return (long) millis();' }
            - lvgl.widget.update: { id: react_pad, bg_color: 0x14713a }
            - lvgl.label.update: { id: react_txt, text: "TAP!" }
  - id: react_tap
    then:
      - if:
          condition: { lambda: 'return id(g_react) == 1;' }   # GREEN → measure
          then:
            - globals.set: { id: g_react, value: "2" }
            - lvgl.widget.update: { id: react_pad, bg_color: 0x123a5a }
            - lvgl.label.update:
                id: react_txt
                text: !lambda |-
                  long ms = (long) millis() - id(g_react_t);
                  char b[28]; snprintf(b, sizeof(b), "%ld ms\n(tap to retry)", ms);
                  return std::string(b);
          else:
            - if:
                condition: { lambda: 'return id(g_react) == 0;' }   # RED → jumped the gun
                then:
                  - globals.set: { id: g_react, value: "2" }
                  - lvgl.widget.update: { id: react_pad, bg_color: 0x123a5a }
                  - lvgl.label.update: { id: react_txt, text: "too soon!\n(tap to retry)" }
                else:                                              # result → play again
                  - script.execute: react_start
  # ── GAME: Simon — grow-and-repeat the colour sequence ────────────────────────
  - id: simon_new
    then:
      - globals.set: { id: g_slen, value: "0" }
      - script.execute: simon_add
  - id: simon_add            # add one random step, then replay the whole sequence
    then:
      - lambda: |-
          if (id(g_slen) < 16) { id(g_sq)[id(g_slen)] = (int)(random_float() * 4.0f); id(g_slen) += 1; }
      - globals.set: { id: g_sipos, value: "0" }
      - globals.set: { id: g_saccept, value: "false" }
      - script.execute: simon_play
  - id: simon_play
    mode: restart
    then:
      - globals.set: { id: g_spi, value: "0" }
      - lvgl.label.update: { id: simon_msg, text: "WATCH" }
      - delay: 600ms
      - repeat:
          count: !lambda 'return id(g_slen);'
          then:
            - script.execute: { id: simon_flash, q: !lambda 'return id(g_sq)[id(g_spi)];' }
            - delay: 520ms
            - globals.set: { id: g_spi, value: !lambda 'return id(g_spi) + 1;' }
      - globals.set: { id: g_saccept, value: "true" }
      - lvgl.label.update: { id: simon_msg, text: "YOUR TURN" }
  - id: simon_flash          # briefly light quadrant q, then restore all four
    parameters:
      q: int
    then:
      - if: { condition: { lambda: 'return q == 0;' }, then: [ { lvgl.widget.update: { id: sq0, bg_color: 0x5dffa0 } } ] }
      - if: { condition: { lambda: 'return q == 1;' }, then: [ { lvgl.widget.update: { id: sq1, bg_color: 0xff7b7b } } ] }
      - if: { condition: { lambda: 'return q == 2;' }, then: [ { lvgl.widget.update: { id: sq2, bg_color: 0x7bb0ff } } ] }
      - if: { condition: { lambda: 'return q == 3;' }, then: [ { lvgl.widget.update: { id: sq3, bg_color: 0xffe680 } } ] }
      - delay: 300ms
      - lvgl.widget.update: { id: sq0, bg_color: 0x1f6b3a }
      - lvgl.widget.update: { id: sq1, bg_color: 0x6b1f1f }
      - lvgl.widget.update: { id: sq2, bg_color: 0x1f3a6b }
      - lvgl.widget.update: { id: sq3, bg_color: 0x6b5f1f }
  - id: simon_tap
    parameters:
      tap: int
    then:
      - if:
          condition: { lambda: 'return id(g_saccept);' }   # ignore taps during playback
          then:
            - script.execute: { id: simon_flash, q: !lambda 'return tap;' }
            - if:
                condition: { lambda: 'return id(g_sq)[id(g_sipos)] == tap;' }   # right one
                then:
                  - globals.set: { id: g_sipos, value: !lambda 'return id(g_sipos) + 1;' }
                  - if:
                      condition: { lambda: 'return id(g_sipos) >= id(g_slen);' }   # round done
                      then:
                        - globals.set: { id: g_saccept, value: "false" }
                        - lvgl.label.update: { id: simon_msg, text: "GOOD!" }
                        - delay: 700ms
                        - if:
                            condition:
                              lvgl.page.is_showing: page_simon
                            then:
                              - script.execute: simon_add
                else:                                                        # wrong → game over
                  - globals.set: { id: g_saccept, value: "false" }
                  - lvgl.label.update:
                      id: simon_msg
                      text: !lambda |-
                        char b[28]; snprintf(b, sizeof(b), "OOPS!  score %d", id(g_slen) - 1);
                        return std::string(b);
                  # it feels the loss too — a sympathetic blue + a little slump
                  - script.execute: { id: led_flash, r: 10, g: 25, b: 100 }
                  - script.execute: { id: head_nudge, dx: 0, dy: -8 }
  # ── GAME: Rock-Paper-Scissors — the robot nods when it wins, shakes when it loses
  - id: rps_play
    parameters:
      me: int          # 0 rock · 1 paper · 2 scissors
    then:
      - globals.set: { id: g_rps_bot, value: !lambda 'return (int)(random_float() * 3.0f);' }
      - globals.set:
          id: g_rps_out
          value: !lambda |-
            int bot = id(g_rps_bot);
            if (me == bot) return 0;                 // tie
            if ((me + 1) % 3 == bot) return 2;       // robot beats you
            return 1;                                // you beat the robot
      - lvgl.label.update:
          id: rps_msg
          text: !lambda |-
            const char* n[] = {"Rock", "Paper", "Scissors"};
            const char* v[] = {"Tie!", "You win!", "I win!"};
            char b[52]; snprintf(b, sizeof(b), "You: %s   Me: %s\n%s", n[me], n[id(g_rps_bot)], v[id(g_rps_out)]);
            return std::string(b);
      # EMOTIONAL STAKES (the Cozmo magic): it CARES about the result — gloats a
      # double-nod + green flash when it wins, huffs and turns away when it loses.
      - if:
          condition: { lambda: 'return id(g_rps_out) == 2;' }
          then:
            - script.execute: { id: led_flash, r: 20, g: 100, b: 30 }
            - script.execute: head_nod
            - delay: 1200ms
            - script.execute: head_nod
      - if:
          condition: { lambda: 'return id(g_rps_out) == 1;' }
          then:
            - script.execute: { id: led_flash, r: 100, g: 15, b: 0 }
            - script.execute: head_shake
            - delay: 900ms
            - script.execute: { id: head_nudge, dx: -14, dy: 0 }   # ...huffy turn away
select:
  - platform: template
    name: "Face"
    id: robot_face
    optimistic: true
    options: [neutral, happy, sad, angry, sleepy, doubt, love, dizzy]
    initial_option: neutral
    set_action:
      - globals.set:
          id: g_expr
          value: !lambda |-
            if (x == "happy") return 1;
            else if (x == "sad") return 2;
            else if (x == "angry") return 3;
            else if (x == "sleepy") return 4;
            else if (x == "doubt") return 5;
            else if (x == "love") return 6;
            else if (x == "dizzy") return 7;
            return 0;
      - script.execute: render_face
      # Every emotion also has a LED colour + body language:
      - if:
          condition: { lambda: 'return x == "happy";' }
          then:
            - script.execute: { id: led_flash, r: 100, g: 45, b: 10 }   # warm orange
            - script.execute: { id: head_nudge, dx: 0, dy: 10 }         # chin up
      - if:
          condition: { lambda: 'return x == "sad";' }
          then:
            - script.execute: { id: led_flash, r: 10, g: 25, b: 100 }   # blue
            - script.execute: { id: head_nudge, dx: 0, dy: -14 }        # droop
      - if:
          condition: { lambda: 'return x == "angry";' }
          then:
            - script.execute: { id: led_flash, r: 100, g: 5, b: 0 }     # red
            - script.execute: head_shake                                 # "no!"
      - if:
          condition: { lambda: 'return x == "sleepy";' }
          then:
            - script.execute: { id: led_flash, r: 45, g: 20, b: 60 }    # dim purple
            - script.execute: { id: head_nudge, dx: 0, dy: -8 }
      - if:
          condition: { lambda: 'return x == "doubt";' }
          then:
            - script.execute: { id: led_flash, r: 60, g: 0, b: 100 }    # purple
            - script.execute: { id: head_nudge, dx: 14, dy: 0 }         # quizzical side-glance
      - if:
          condition: { lambda: 'return x == "love";' }
          then:
            - script.execute: { id: led_flash, r: 100, g: 20, b: 45 }   # warm pink
            - script.execute: head_nod                                   # an adoring little nod
      - if:
          condition: { lambda: 'return x == "dizzy";' }
          then:
            - script.execute: { id: led_flash, r: 55, g: 25, b: 100 }   # woozy violet
            - script.execute: head_shake                                 # shakes it off
  # The ONE place a mode is applied — every mode path goes through this select, so
  # Home Assistant + the dravix dashboard always show the true mode.
  #   awake   ער — bright, full behaviour
  #   morning בוקר — a sunrise scene (bright + happy + warm LEDs), settles into awake
  #   focus   מרוכז — do-not-disturb: no greeting, no drifting, no mood LEDs
  #   quiet   שקט — speaker down to 25% (restored on exit), no mood LEDs
  #   night   לילה — dim screen, teal face, calm (no greet/moves), sleeps on its timer
  #   busy / sleep — as before (sleep: head droops, LEDs off, screen off)
  - platform: template
    name: "Mode"
    id: robot_mode
    optimistic: true
    options: [awake, morning, focus, quiet, night, busy, sleep]
    initial_option: awake
    set_action:
      # option → state flags
      - globals.set: { id: g_sleep, value: !lambda 'return x == std::string("sleep");' }
      - globals.set: { id: g_busy,  value: !lambda 'return x == std::string("busy");' }
      - globals.set: { id: g_night, value: !lambda 'return x == std::string("night");' }
      - globals.set: { id: g_focus, value: !lambda 'return x == std::string("focus");' }
      # quiet: remember the speaker volume, lower it; restore it on the way out
      - if:
          condition: { lambda: 'return x == std::string("quiet") && !id(g_quiet);' }
          then:
            - lambda: 'id(g_vol_saved) = id(va_media_player).volume;'
            - media_player.volume_set: { id: va_media_player, volume: 25% }
      - if:
          condition: { lambda: 'return x != std::string("quiet") && id(g_quiet) && id(g_vol_saved) >= 0;' }
          then:
            - media_player.volume_set: { id: va_media_player, volume: !lambda 'return id(g_vol_saved);' }
            - lambda: 'id(g_vol_saved) = -1;'
      - globals.set: { id: g_quiet, value: !lambda 'return x == std::string("quiet");' }
      - globals.set: { id: g_saver, value: "false" }
      - script.execute: render_face
      # GRACEFUL MOTION — the serial-bus servos take a speed setting (the BSP exposes
      # it; the official remote drives them at 600). Calm modes get slow, gentle moves.
      - number.set:
          id: servo_x_speed
          value: !lambda |-
            return (x == std::string("night") || x == std::string("quiet")
                    || x == std::string("focus")) ? 300.0f : 600.0f;
      - delay: 350ms   # SCS9009 bus spacing
      - number.set:
          id: servo_y_speed
          value: !lambda |-
            return (x == std::string("night") || x == std::string("quiet")
                    || x == std::string("focus")) ? 300.0f : 600.0f;
      - delay: 350ms
      # per-mode screen + body
      - if:
          condition: { lambda: 'return x == std::string("sleep");' }
          then:
            # the head slowly droops (remembering where it was — in the 158..260 scale),
            # LEDs off… the droop writes the SERVO directly (n_head_pitch is locked
            # while g_sleep, which is already true at this point)
            - if:
                condition: { lambda: 'return id(sw_move).state && id(g_pitch_saved) < 0;' }
                then:
                  - lambda: 'id(g_pitch_saved) = id(n_head_pitch).state;'
                  - number.set:
                      id: servo_y_angle
                      value: !lambda |-
                        float p = id(n_head_pitch).state - 25.0f;
                        if (p < 158.0f) p = 158.0f;
                        float a = (p - 158.0f) * 90.0f / 102.0f;
                        return a < 5.0f ? 5.0f : (a > 85.0f ? 85.0f : a);
            - light.turn_off: stackchan_light_bar
            # …the zzz face shows for a moment, then the screen goes fully off
            - delay: 2s
            - if:
                condition: { lambda: 'return id(g_sleep);' }   # unless it was woken meanwhile
                then: [ { light.turn_off: lcd_backlight } ]
      - if:
          condition: { lambda: 'return x == std::string("night");' }
          then:
            - light.turn_on: { id: lcd_backlight, brightness: 15% }
      - if:
          condition:
            lambda: |-
              return x == std::string("awake") || x == std::string("focus")
                  || x == std::string("quiet") || x == std::string("busy");
          then:
            - light.turn_on: { id: lcd_backlight, brightness: !lambda 'return id(n_brightness).state / 100.0;' }
            # …and on waking the head rises back to where it was before sleeping —
            # with a little MORNING STRETCH: a sleepy yawn face, then a bright-eyed
            # shake-awake (only on a real wake-from-sleep, when a droop was saved).
            - if:
                condition: { lambda: 'return id(sw_move).state && id(g_pitch_saved) >= 0;' }
                then:
                  - number.set:
                      id: n_head_pitch
                      value: !lambda 'return id(g_pitch_saved);'
                  - globals.set: { id: g_pitch_saved, value: "-1" }
                  - globals.set: { id: g_expr, value: "4" }      # yaaawn…
                  - script.execute: render_face
                  - delay: 1400ms
                  - globals.set: { id: g_expr, value: "1" }      # …bright and happy!
                  - script.execute: render_face
                  - script.execute: head_shake                    # shakes the sleep off
                  - delay: 1500ms
                  - globals.set: { id: g_expr, value: "0" }
                  - script.execute: render_face
            # ALWAYS clear the saved droop on waking — even when Body language is off,
            # otherwise the next sleep skips its droop and a later wake restores stale pitch
            - globals.set: { id: g_pitch_saved, value: "-1" }
      - if:
          condition: { lambda: 'return x == std::string("morning");' }
          then:
            # SUNRISE: full brightness, happy face, warm LEDs, head up — then settle to awake.
            - light.turn_on: { id: lcd_backlight, brightness: !lambda 'return id(n_brightness).state / 100.0;' }
            - if:
                condition: { lambda: 'return id(sw_move).state && id(g_pitch_saved) >= 0;' }
                then:
                  - number.set: { id: n_head_pitch, value: !lambda 'return id(g_pitch_saved);' }
                  - globals.set: { id: g_pitch_saved, value: "-1" }
            - globals.set: { id: g_expr, value: "1" }
            - globals.set: { id: g_card, value: "0" }
            - lvgl.page.show: page_face
            - script.execute: render_face
            - script.execute: { id: led_flash, r: 100, g: 60, b: 15 }   # warm sunrise
            - script.execute: { id: head_nudge, dx: 0, dy: 10 }
            - delay: 4s
            # settle into awake — unless the user already switched mode meanwhile
            - if:
                condition: { lambda: 'return id(robot_mode).current_option() == std::string("morning");' }
                then:
                  - select.set: { id: robot_mode, option: awake }

interval:
  # OFFICIAL REMOTE — apply the freshest joystick packet, throttled to ~3Hz so the
  # SCS9009 serial bus never sees back-to-back writes. Button B = talk toggle.
  - interval: 150ms
    then:
      - if:
          condition: { lambda: 'return id(g_rc_fresh) && !id(g_rc_busy) && !id(g_sleep);' }
          then:
            - lambda: |-
                id(g_rc_fresh) = false;
                id(g_rc_busy) = true;
                id(g_move_ms) = (long) millis();   // remote-driven moves aren't a hand
                lv_disp_trig_activity(NULL);
            # button B rising edge → toggle the voice assistant (privacy-respecting)
            - if:
                condition: { lambda: 'return id(g_rc_btn) != 0 && id(g_rc_prev) == 0;' }
                then:
                  - if:
                      condition: { lambda: 'return id(g_voice);' }
                      then:
                        - voice_assistant.stop
                      else:
                        - if:
                            condition: { switch.is_off: sw_privacy }
                            then: [ voice_assistant.start ]
            - lambda: 'id(g_rc_prev) = id(g_rc_btn);'
            - number.set:
                id: servo_x_angle
                value: !lambda 'return id(g_rc_yaw);'
            - delay: 140ms
            - number.set:
                id: n_head_pitch
                value: !lambda 'return id(g_rc_pitch);'
            - lambda: 'id(g_rc_busy) = false;'
  # HAND-TURN DETECTION — the serial servos report their true position back into the
  # angle numbers, so when a hand twists the head the numbers change with NO command.
  # Sample both axes every 800ms: a big jump, with no commanded move in the last 4s,
  # while awake = someone's hand → react (hand_react, throttled).
  - interval: 800ms
    then:
      - lambda: |-
          float x = id(servo_x_angle).state, y = id(servo_y_angle).state;
          if (!std::isnan(x) && !std::isnan(y)) {
            bool jump = (id(g_prev_x) > -900.0f) &&
                        (fabsf(x - id(g_prev_x)) > 14.0f || fabsf(y - id(g_prev_y)) > 10.0f);
            bool commanded = ((long) millis() - id(g_move_ms)) < 4000;
            if (jump && !commanded && !id(g_sleep) && !id(g_saver) && !id(g_voice)
                && id(sw_touch).state) {
              id(hand_react).execute();
            }
            id(g_prev_x) = x;
            id(g_prev_y) = y;
          }
  # FLAPPY physics — ~11 fps is plenty for a 320px playfield. Only ticks while the
  # game page is showing AND a run is alive; otherwise this is a single cheap check.
  - interval: 90ms
    then:
      - if:
          condition:
            and:
              - lvgl.page.is_showing: page_flappy
              - lambda: 'return id(fb_alive);'
          then:
            - lambda: |-
                id(fb_vy) += 0.9f;                                  // gravity
                if (id(fb_vy) > 7.0f) id(fb_vy) = 7.0f;
                id(fb_y) += id(fb_vy);
                id(fb_px) -= 6;                                     // pipe scrolls left
                if (id(fb_px) < -40) {                              // passed → recycle + score
                  id(fb_px) = 330;
                  id(fb_gap) = 40 + (int)(random_float() * 100.0f); // gap top: 40..140 (gap = 84px)
                  id(fb_score) += 1;
                }
                // collision: bird box x 60..86; pipes at fb_px..fb_px+34; gap fb_gap..fb_gap+84
                bool hit = (id(fb_y) < 34.0f) || (id(fb_y) > 214.0f);
                if (id(fb_px) < 86 && id(fb_px) + 34 > 60) {
                  if (id(fb_y) < id(fb_gap) || id(fb_y) + 26.0f > id(fb_gap) + 84.0f) hit = true;
                }
                if (hit) id(fb_alive) = false;
            - lvgl.widget.update: { id: fb_bird, y: !lambda 'return (int) id(fb_y);' }
            - lvgl.widget.update: { id: fb_top, x: !lambda 'return id(fb_px);', height: !lambda 'return id(fb_gap);' }
            - lvgl.widget.update: { id: fb_bot, x: !lambda 'return id(fb_px);', y: !lambda 'return id(fb_gap) + 84;' }
            - lvgl.label.update: { id: fb_sc, text: !lambda 'char b[8]; snprintf(b, sizeof(b), "%d", id(fb_score)); return std::string(b);' }
            - if:
                condition: { lambda: 'return !id(fb_alive);' }
                then:
                  - lvgl.label.update: { id: fb_lbl, text: "GAME OVER" }
                  - script.execute: { id: led_flash, r: 10, g: 25, b: 100 }   # a sad blue
                  - script.execute: head_shake
  # BREAKOUT physics — ~25 fps. Joystick paddle (read DIRECTLY, no servo → no delay).
  # Ticks only while the page shows AND a run is alive; otherwise a single cheap check.
  - interval: 40ms
    then:
      - if:
          condition:
            and:
              - lvgl.page.is_showing: page_breakout
              - lambda: 'return id(bk_alive);'
          then:
            - lambda: |-
                // paddle follows the ESP-NOW joystick (g_rc_yaw ∈ ±164)
                int px = 160 + (int) id(g_rc_yaw) - 28;
                id(bk_px) = px < 2 ? 2 : (px > 262 ? 262 : px);
                // move the ball
                id(bk_bx) += id(bk_vx);
                id(bk_by) += id(bk_vy);
                // walls
                if (id(bk_bx) < 2)   { id(bk_bx) = 2;   id(bk_vx) =  fabsf(id(bk_vx)); }
                if (id(bk_bx) > 308) { id(bk_bx) = 308; id(bk_vx) = -fabsf(id(bk_vx)); }
                if (id(bk_by) < 24)  { id(bk_by) = 24;  id(bk_vy) =  fabsf(id(bk_vy)); }
                // paddle bounce (paddle top y=214, 56 wide)
                if (id(bk_vy) > 0 && id(bk_by) + 10 >= 214 && id(bk_by) <= 220
                    && id(bk_bx) + 10 >= id(bk_px) && id(bk_bx) <= id(bk_px) + 56) {
                  id(bk_vy) = -fabsf(id(bk_vy));
                  id(bk_vx) += (id(bk_bx) + 5 - (id(bk_px) + 28)) * 0.05f;   // put english on it
                  id(bk_ev) = 2;                                             // paddle save
                }
                // brick hit — grid 4×2 (cols step 76 from x8; rows y30 & y52)
                int cx = (int) id(bk_bx) + 5, cy = (int) id(bk_by) + 5;
                if (cy >= 30 && cy <= 68) {
                  int col = (cx - 8) / 76, row = (cy - 30) / 22;
                  if (col >= 0 && col < 4 && row >= 0 && row < 2) {
                    int bi = row * 4 + col;
                    if (id(bk_mask) & (1 << bi)) {
                      id(bk_mask) &= ~(1 << bi);
                      id(bk_vy) = -id(bk_vy);
                      id(bk_score) += 1;
                      id(bk_ev) = 1;                                    // smashed a brick
                    }
                  }
                }
                // miss → lose a life; empty mask → you cleared the board
                if (id(bk_by) > 236) {
                  id(bk_lives) -= 1;
                  id(bk_ev) = 3;                                             // the ball beat you
                  if (id(bk_lives) <= 0) id(bk_alive) = false;
                  else { id(bk_bx) = 160; id(bk_by) = 170; id(bk_vx) = 3; id(bk_vy) = -3.4f; }
                }
                if (id(bk_mask) == 0) id(bk_alive) = false;
            - lvgl.widget.update: { id: bk_ball,   x: !lambda 'return (int) id(bk_bx);', y: !lambda 'return (int) id(bk_by);' }
            - lvgl.widget.update: { id: bk_paddle, x: !lambda 'return id(bk_px);' }
            - lvgl.label.update:  { id: bk_sc, text: !lambda 'char b[8]; snprintf(b, sizeof(b), "%d", id(bk_score)); return std::string(b);' }
            - if: { condition: { lambda: 'return ((id(bk_mask) >> 0) & 1) != 0;' }, then: [ { lvgl.widget.show: bk_b0 } ], else: [ { lvgl.widget.hide: bk_b0 } ] }
            - if: { condition: { lambda: 'return ((id(bk_mask) >> 1) & 1) != 0;' }, then: [ { lvgl.widget.show: bk_b1 } ], else: [ { lvgl.widget.hide: bk_b1 } ] }
            - if: { condition: { lambda: 'return ((id(bk_mask) >> 2) & 1) != 0;' }, then: [ { lvgl.widget.show: bk_b2 } ], else: [ { lvgl.widget.hide: bk_b2 } ] }
            - if: { condition: { lambda: 'return ((id(bk_mask) >> 3) & 1) != 0;' }, then: [ { lvgl.widget.show: bk_b3 } ], else: [ { lvgl.widget.hide: bk_b3 } ] }
            - if: { condition: { lambda: 'return ((id(bk_mask) >> 4) & 1) != 0;' }, then: [ { lvgl.widget.show: bk_b4 } ], else: [ { lvgl.widget.hide: bk_b4 } ] }
            - if: { condition: { lambda: 'return ((id(bk_mask) >> 5) & 1) != 0;' }, then: [ { lvgl.widget.show: bk_b5 } ], else: [ { lvgl.widget.hide: bk_b5 } ] }
            - if: { condition: { lambda: 'return ((id(bk_mask) >> 6) & 1) != 0;' }, then: [ { lvgl.widget.show: bk_b6 } ], else: [ { lvgl.widget.hide: bk_b6 } ] }
            - if: { condition: { lambda: 'return ((id(bk_mask) >> 7) & 1) != 0;' }, then: [ { lvgl.widget.show: bk_b7 } ], else: [ { lvgl.widget.hide: bk_b7 } ] }
            # lives readout — turns red on your last ball
            - lvgl.label.update:
                id: bk_lv
                text: !lambda 'char b[12]; snprintf(b, sizeof(b), "LIVES %d", id(bk_lives)); return std::string(b);'
                text_color: !lambda 'return id(bk_lives) <= 1 ? lv_color_hex(0xFF5555) : lv_color_hex(0x8b96a4);'
            # per-event JUICE — LED + an 8-bit beep on every hit; head shake when the ball beats you
            - if:
                condition: { lambda: 'return id(bk_ev) == 1;' }
                then:
                  - script.execute: { id: led_flash, r: 0, g: 90, b: 80 }                # brick → cyan
                  - rtttl.play: "bk:d=16,o=7,b=220:c"                                     # bright blip
            - if:
                condition: { lambda: 'return id(bk_ev) == 2;' }
                then:
                  - script.execute: { id: led_flash, r: 55, g: 55, b: 15 }               # paddle → soft
                  - rtttl.play: "bk:d=16,o=6,b=220:g"                                     # bloop
            - if:
                condition: { lambda: 'return id(bk_ev) == 3;' }
                then:
                  - script.execute: { id: led_flash, r: 100, g: 8, b: 8 }                # hit → red
                  - script.execute: head_shake
                  - rtttl.play: "bk:d=8,o=4,b=150:c,a#"                                   # sad buzz down
            - lambda: 'id(bk_ev) = 0;'
            - if:
                condition: { lambda: 'return !id(bk_alive);' }
                then:
                  - if:
                      condition: { lambda: 'return id(bk_mask) == 0;' }
                      then:
                        - lvgl.label.update: { id: bk_msg, text: "YOU WIN!" }
                        - script.execute: { id: led_flash, r: 20, g: 100, b: 30 }        # win → green
                        - script.execute: head_nod                                        # a happy nod
                        - rtttl.play: "win:d=8,o=6,b=180:c,e,g,c7"                        # victory fanfare
                      else:
                        - lvgl.label.update: { id: bk_msg, text: "GAME OVER" }
                        - script.execute: { id: led_flash, r: 100, g: 8, b: 8 }           # lose → red
                        - script.execute: head_shake
                        - rtttl.play: "lose:d=8,o=5,b=120:g,e,c,c4"                       # sad descent
  # SLEEP BREATHING — while asleep ON THE CHARGER, the LED bar "breathes" very dimly
  # (the EMO/Vector charger-snooze everyone loves). Gated on Mood LEDs; goes fully
  # dark the moment it wakes or is unplugged.
  - interval: 4s
    then:
      - if:
          condition: { lambda: 'return id(g_sleep) && id(g_batt_chg) && id(sw_mood_led).state;' }
          then:
            - light.turn_on:
                id: stackchan_light_bar
                red: 0%
                green: 90%
                blue: 80%
                brightness: !lambda 'return (id(g_anim) % 2) ? 0.07f : 0.03f;'
            - globals.set: { id: g_breath, value: "true" }
          else:
            - if:
                condition: { lambda: 'return id(g_breath);' }
                then:
                  - light.turn_off: stackchan_light_bar
                  - globals.set: { id: g_breath, value: "false" }
  # Random blink (never while sleeping / listening / talking).
  - interval: 1s
    then:
      - if:
          condition:
            lambda: 'return id(sw_blink).state && !id(g_sleep) && !id(g_talk) && !id(g_listen) && random_float() < 0.22;'
          then:
            - globals.set: { id: g_blink, value: "true" }
            - script.execute: render_face
            - delay: 160ms
            - globals.set: { id: g_blink, value: "false" }
            - script.execute: render_face
  # Sleep "zzz" + talking mouth + screensaver breathing animation.
  - interval: 600ms
    then:
      - globals.set: { id: g_anim, value: !lambda 'return id(g_anim) + 1;' }
      - if:
          condition: { lambda: 'return id(g_sleep) || id(g_talk) || id(g_saver);' }
          then: [ { script.execute: render_face } ]
      # BREATHING — the whole face rises/settles on a slow ~5s sine (the original's
      # breath modifier). Idle awake only; pauses for 5s after any glance so the
      # glance's vertical offset isn't immediately stomped.
      - if:
          condition:
            lambda: |-
              return !id(g_sleep) && !id(g_saver) && !id(g_listen) && !id(g_talk) && !id(g_voice)
                     && ((long) millis() - id(g_glance_ms)) > 5000;
          then:
            - lvgl.widget.update:
                id: face_box
                y: !lambda 'const int b[] = {0, -2, -3, -2, 0, 2, 3, 2}; return b[id(g_anim) % 8];'
  # SPEAKING MOTION — tiny conversational head sways while it talks (the original's
  # speaking modifier): small ABSOLUTE yaw targets so they can never wander off-centre.
  - interval: 2300ms
    then:
      - if:
          condition:
            lambda: |-
              return id(g_talk) && id(sw_move).state && !std::isnan(id(servo_x_angle).state)
                     && !id(g_night) && !id(g_focus) && !id(g_quiet);
          then:
            - number.set:
                id: servo_x_angle
                value: !lambda 'id(g_move_ms) = (long) millis(); return random_float() * 16.0f - 8.0f;'
  # "Alive" looking-around — TRULY random: it skips a beat sometimes (irregular
  # timing), varies how far it looks, and mixes yaw glances with pitch tilts and an
  # occasional look-up "stretch", so it never repeats the same move twice in a row.
  # Only when fully awake (not screensaver/sleep/busy/calm modes).
  - interval: 9s
    then:
      # ~30% of ticks it simply doesn't move at all — rhythm is what kills realism
      - if:
          condition:
            lambda: |-
              return id(sw_drift).state && !id(g_sleep) && !id(g_saver) && !id(g_busy)
                     && !id(g_night) && !id(g_focus) && !id(g_quiet) && random_float() < 0.7;
          then:
            - lvgl.widget.update:
                id: face_box
                x: !lambda 'id(g_glance_ms) = (long) millis(); return (int)(random_float() * 32 - 16);'
                y: !lambda 'return (int)(random_float() * 18 - 9);'
      # …and sometimes the HEAD moves too — ABSOLUTE small angles around centre (never
      # accumulates), with a random FLAVOUR each time: a yaw glance, a pitch tilt,
      # or both (a little diagonal look).
      - if:
          condition:
            and:
              - lvgl.page.is_showing: page_face      # ONLY glance the head while the FACE is on screen
              - lambda: |-
                  return id(sw_move).state && id(sw_drift).state && !id(g_sleep) && !id(g_saver)
                         && !id(g_busy) && !id(g_night) && !id(g_focus) && !id(g_quiet) && !id(g_voice)
                         && !std::isnan(id(servo_x_angle).state) && random_float() < 0.14;
          then:
            - number.set:
                id: servo_x_angle
                value: !lambda |-
                  id(g_move_ms) = (long) millis();
                  // vary the reach too: mostly small (±8), sometimes a wider look (±14)
                  float span = (random_float() < 0.3f) ? 14.0f : 8.0f;
                  return random_float() * 2.0f * span - span;
            - delay: 350ms   # serial-bus spacing before a possible pitch write
            - if:
                condition: { lambda: 'return random_float() < 0.45 && !std::isnan(id(n_head_pitch).state);' }
                then:
                  - number.set:
                      id: n_head_pitch
                      value: !lambda 'return 160.0f + random_float() * 16.0f;'   # tilt: 160..176
      # ...and drift back roughly (not exactly!) to centre about half the time.
      - if:
          condition: { lambda: 'return id(sw_drift).state && !id(g_sleep) && !id(g_saver) && random_float() < 0.5;' }
          then:
            - delay: !lambda 'return (uint32_t)(1500 + random_float() * 3000);'   # 1.5-4.5s, varies
            - lvgl.widget.update:
                id: face_box
                x: !lambda 'return (int)(random_float() * 8 - 4);'
                y: !lambda 'return (int)(random_float() * 6 - 3);'
  # Refresh the status labels + the dynamic card labels (from the text slots dravix writes).
  - interval: 5s
    then:
      # Soft clock on the screensaver (empty otherwise).
      - lvgl.label.update:
          id: lbl_clock
          text: !lambda |-
            if (!id(g_saver)) return std::string("");
            auto t = id(dravix_time).now();
            if (!t.is_valid()) return std::string("");
            char b[8]; snprintf(b, sizeof(b), "%02d:%02d", t.hour, t.minute);
            return std::string(b);
      # Low-battery badge on the face page (empty = hidden; silent while charging).
      - lvgl.label.update:
          id: lbl_face_batt
          text: !lambda |-
            if (!id(g_batt_chg) && id(battery_pct).has_state() && id(battery_pct).state < 20) {
              char b[12]; snprintf(b, sizeof(b), "%.0f%%", id(battery_pct).state);
              return std::string(b);
            }
            return std::string("");
      - lvgl.label.update: { id: lbl_c1_title, text: !lambda 'return id(t_c1_title).state;' }
      - lvgl.label.update: { id: lbl_c2_title, text: !lambda 'return id(t_c2_title).state;' }
      - lvgl.label.update: { id: lbl_c3_title, text: !lambda 'return id(t_c3_title).state;' }
      # split each card body into its 4 tappable rows (line k → row k; empty → hidden)
      - lvgl.label.update: { id: lbl_c1_r0, text: !lambda 'std::string b = id(t_c1_body).state; size_t s = 0; for (int i = 0; i < 0; i++) { size_t p = b.find(10, s); if (p == std::string::npos) return std::string(""); s = p + 1; } size_t e = b.find(10, s); return b.substr(s, e == std::string::npos ? std::string::npos : e - s);' }
      - lvgl.label.update: { id: lbl_c1_r1, text: !lambda 'std::string b = id(t_c1_body).state; size_t s = 0; for (int i = 0; i < 1; i++) { size_t p = b.find(10, s); if (p == std::string::npos) return std::string(""); s = p + 1; } size_t e = b.find(10, s); return b.substr(s, e == std::string::npos ? std::string::npos : e - s);' }
      - lvgl.label.update: { id: lbl_c1_r2, text: !lambda 'std::string b = id(t_c1_body).state; size_t s = 0; for (int i = 0; i < 2; i++) { size_t p = b.find(10, s); if (p == std::string::npos) return std::string(""); s = p + 1; } size_t e = b.find(10, s); return b.substr(s, e == std::string::npos ? std::string::npos : e - s);' }
      - lvgl.label.update: { id: lbl_c1_r3, text: !lambda 'std::string b = id(t_c1_body).state; size_t s = 0; for (int i = 0; i < 3; i++) { size_t p = b.find(10, s); if (p == std::string::npos) return std::string(""); s = p + 1; } size_t e = b.find(10, s); return b.substr(s, e == std::string::npos ? std::string::npos : e - s);' }
      - lvgl.label.update: { id: lbl_c2_r0, text: !lambda 'std::string b = id(t_c2_body).state; size_t s = 0; for (int i = 0; i < 0; i++) { size_t p = b.find(10, s); if (p == std::string::npos) return std::string(""); s = p + 1; } size_t e = b.find(10, s); return b.substr(s, e == std::string::npos ? std::string::npos : e - s);' }
      - lvgl.label.update: { id: lbl_c2_r1, text: !lambda 'std::string b = id(t_c2_body).state; size_t s = 0; for (int i = 0; i < 1; i++) { size_t p = b.find(10, s); if (p == std::string::npos) return std::string(""); s = p + 1; } size_t e = b.find(10, s); return b.substr(s, e == std::string::npos ? std::string::npos : e - s);' }
      - lvgl.label.update: { id: lbl_c2_r2, text: !lambda 'std::string b = id(t_c2_body).state; size_t s = 0; for (int i = 0; i < 2; i++) { size_t p = b.find(10, s); if (p == std::string::npos) return std::string(""); s = p + 1; } size_t e = b.find(10, s); return b.substr(s, e == std::string::npos ? std::string::npos : e - s);' }
      - lvgl.label.update: { id: lbl_c2_r3, text: !lambda 'std::string b = id(t_c2_body).state; size_t s = 0; for (int i = 0; i < 3; i++) { size_t p = b.find(10, s); if (p == std::string::npos) return std::string(""); s = p + 1; } size_t e = b.find(10, s); return b.substr(s, e == std::string::npos ? std::string::npos : e - s);' }
      - lvgl.label.update: { id: lbl_c3_r0, text: !lambda 'std::string b = id(t_c3_body).state; size_t s = 0; for (int i = 0; i < 0; i++) { size_t p = b.find(10, s); if (p == std::string::npos) return std::string(""); s = p + 1; } size_t e = b.find(10, s); return b.substr(s, e == std::string::npos ? std::string::npos : e - s);' }
      - lvgl.label.update: { id: lbl_c3_r1, text: !lambda 'std::string b = id(t_c3_body).state; size_t s = 0; for (int i = 0; i < 1; i++) { size_t p = b.find(10, s); if (p == std::string::npos) return std::string(""); s = p + 1; } size_t e = b.find(10, s); return b.substr(s, e == std::string::npos ? std::string::npos : e - s);' }
      - lvgl.label.update: { id: lbl_c3_r2, text: !lambda 'std::string b = id(t_c3_body).state; size_t s = 0; for (int i = 0; i < 2; i++) { size_t p = b.find(10, s); if (p == std::string::npos) return std::string(""); s = p + 1; } size_t e = b.find(10, s); return b.substr(s, e == std::string::npos ? std::string::npos : e - s);' }
      - lvgl.label.update: { id: lbl_c3_r3, text: !lambda 'std::string b = id(t_c3_body).state; size_t s = 0; for (int i = 0; i < 3; i++) { size_t p = b.find(10, s); if (p == std::string::npos) return std::string(""); s = p + 1; } size_t e = b.find(10, s); return b.substr(s, e == std::string::npos ? std::string::npos : e - s);' }
      # rows with no entity behind them disappear (count the body's lines)
      - lambda: |-
          auto rows_of = [](const std::string &b) -> int {
            if (b.empty()) return 0;
            int n = 1;
            for (char c : b) if (c == '\n') n++;
            return n;
          };
          int n1 = rows_of(id(t_c1_body).state);
          int n2 = rows_of(id(t_c2_body).state);
          int n3 = rows_of(id(t_c3_body).state);
          lv_obj_t *c1[4] = {id(c1_r0), id(c1_r1), id(c1_r2), id(c1_r3)};
          lv_obj_t *c2[4] = {id(c2_r0), id(c2_r1), id(c2_r2), id(c2_r3)};
          lv_obj_t *c3[4] = {id(c3_r0), id(c3_r1), id(c3_r2), id(c3_r3)};
          for (int i = 0; i < 4; i++) {
            if (i < n1) lv_obj_clear_flag(c1[i], LV_OBJ_FLAG_HIDDEN); else lv_obj_add_flag(c1[i], LV_OBJ_FLAG_HIDDEN);
            if (i < n2) lv_obj_clear_flag(c2[i], LV_OBJ_FLAG_HIDDEN); else lv_obj_add_flag(c2[i], LV_OBJ_FLAG_HIDDEN);
            if (i < n3) lv_obj_clear_flag(c3[i], LV_OBJ_FLAG_HIDDEN); else lv_obj_add_flag(c3[i], LV_OBJ_FLAG_HIDDEN);
          }
      # ── status-bar overlay (compact time · date · battery · wifi) ──
      - lvgl.label.update:
          id: sb_time
          text: !lambda |-
            auto t = id(dravix_time).now();
            if (!t.is_valid()) return std::string("--:--");
            char b[8]; snprintf(b, sizeof(b), "%02d:%02d", t.hour, t.minute);
            return std::string(b);
      - lvgl.label.update:
          id: sb_date
          text: !lambda |-
            auto t = id(dravix_time).now();
            if (!t.is_valid()) return std::string("");
            char b[16]; snprintf(b, sizeof(b), "%02d/%02d", t.day_of_month, t.month);
            return std::string(b);
      - lvgl.label.update:
          id: sb_batt
          text: !lambda |-
            if (!id(battery_pct).has_state()) return std::string("--%");
            char b[10];
            snprintf(b, sizeof(b), "%.0f%%%s", id(battery_pct).state, id(g_batt_chg) ? "+" : "");
            return std::string(b);
      # battery label colour tells the story at a glance: charging=cyan · low=red · ok=green
      - if:
          condition: { lambda: 'return id(g_batt_chg);' }
          then: [ { lvgl.label.update: { id: sb_batt, text_color: 0x33E6C8 } } ]
          else:
            - if:
                condition: { lambda: 'return id(battery_pct).has_state() && id(battery_pct).state < 20;' }
                then: [ { lvgl.label.update: { id: sb_batt, text_color: 0xE05555 } } ]
                else: [ { lvgl.label.update: { id: sb_batt, text_color: 0x5dffa0 } } ]
      - lvgl.bar.update:
          id: sb_bat_f
          value: !lambda 'return id(battery_pct).has_state() ? (int) id(battery_pct).state : 0;'
      # row 2 — battery TIME-LEFT only (the raw W/mA still live in HA as the INA226
      # sensors; the user asked to keep this line clean). While charging just say so —
      # a time-left would be a lie there, the charger pulls the voltage up.
      - lvgl.label.update:
          id: sb_power
          text: !lambda |-
            char b[24];
            float ma = id(ha_curr).has_state() ? fabsf(id(ha_curr).state) * 1000.0f : 0.0f;
            if (id(g_batt_chg)) {
              snprintf(b, sizeof(b), "charging");
            } else if (id(battery_pct).has_state() && ma > 20.0f) {
              float hours = (id(battery_pct).state * ${battery_mah}.0f / 100.0f) / ma;   // pack size from substitutions
              snprintf(b, sizeof(b), "~%.1fh left", hours);
            } else {
              return std::string("");
            }
            return std::string(b);
      # keep the sliders mirroring the real values (each skips while it's being touched)
      - if:
          condition: { lambda: 'return !lv_obj_has_state(id(sl_vol), LV_STATE_PRESSED);' }
          then:
            - lvgl.slider.update:
                id: sl_vol
                value: !lambda 'return (int)(id(va_media_player).volume * 100.0f);'
      - if:
          condition: { lambda: 'return !lv_obj_has_state(id(sl_scr), LV_STATE_PRESSED);' }
          then:
            - lvgl.slider.update: { id: sl_scr, value: !lambda 'return (int) id(n_brightness).state;' }
      - if:
          condition: { lambda: 'return !lv_obj_has_state(id(sl_led), LV_STATE_PRESSED);' }
          then:
            - lvgl.slider.update:
                id: sl_led
                value: !lambda 'return (int)(id(stackchan_light_bar).remote_values.is_on() ? id(stackchan_light_bar).remote_values.get_brightness() * 100.0f : 0.0f);'
      # UPDATE arrow — newer firmware is waiting (dravix keeps "Latest firmware" fresh)
      - if:
          condition:
            lambda: |-
              return id(t_latest_fw).has_state() && !id(t_latest_fw).state.empty()
                     && id(t_latest_fw).state != "${fw_version}";
          then: [ { lvgl.widget.show: upd_a1 }, { lvgl.widget.show: upd_a2 } ]
          else: [ { lvgl.widget.hide: upd_a1 }, { lvgl.widget.hide: upd_a2 } ]
      # WiFi signal → reveal more bars as it gets stronger
      - if:
          condition: { lambda: 'return id(wifi_db).state < -78;' }
          then: [ { lvgl.widget.hide: sb_w2 } ]
          else: [ { lvgl.widget.show: sb_w2 } ]
      - if:
          condition: { lambda: 'return id(wifi_db).state < -68;' }
          then: [ { lvgl.widget.hide: sb_w3 } ]
          else: [ { lvgl.widget.show: sb_w3 } ]
      - if:
          condition: { lambda: 'return id(wifi_db).state < -58;' }
          then: [ { lvgl.widget.hide: sb_w4 } ]
          else: [ { lvgl.widget.show: sb_w4 } ]
      # vitals bars (dravix pushes the 0-100 values into the number entities)
      - lvgl.bar.update: { id: bar_energy, value: !lambda 'return (int) id(n_vital_energy).state;' }
      - lvgl.bar.update: { id: bar_food,   value: !lambda 'return (int) id(n_vital_food).state;' }
      - lvgl.bar.update: { id: bar_fun,    value: !lambda 'return (int) id(n_vital_fun).state;' }
      - lvgl.bar.update: { id: bar_calm,   value: !lambda 'return (int) id(n_vital_calm).state;' }
      # climate page — dravix keeps these slots fresh from the configured AC
      - lvgl.label.update: { id: lbl_clim_name, text: !lambda 'return id(t_clim_name).state.empty() ? std::string("No AC configured") : id(t_clim_name).state;' }
      - lvgl.label.update: { id: lbl_clim_set,  text: !lambda 'return id(t_clim_set).state;' }
      - lvgl.label.update: { id: lbl_clim_info, text: !lambda 'return id(t_clim_info).state;' }

# ── Manual SWIPE detection (ESPHome LVGL has no built-in gesture) ────────────────
touchscreen:
  - id: !extend touch
    on_touch:
      - globals.set: { id: sw_sleep, value: !lambda 'return id(g_sleep);' }
      - lambda: 'id(sw_x0) = 0; id(sw_y0) = 0; id(sw_x1) = 0; id(sw_y1) = 0; id(g_tms) = (long) millis();'
      # Any touch exits the screensaver (restore full brightness).
      - if:
          condition: { lambda: 'return id(g_saver) && !id(g_sleep);' }
          then:
            - light.turn_on: { id: lcd_backlight, brightness: !lambda 'return id(n_brightness).state / 100.0;' }
            - globals.set: { id: g_saver, value: "false" }
    on_update:
      - lambda: |-
          for (auto t : touches) {
            id(sw_x0) = t.x_org; id(sw_y0) = t.y_org;
            id(sw_x1) = t.x;     id(sw_y1) = t.y;
          }
    on_release:
      # Asleep → wake and stop (don't treat the wake as a swipe).
      - if:
          condition: { lambda: 'return id(sw_sleep);' }
          then:
            - select.set: { id: robot_mode, option: awake }
      # LONG-PRESS (1.2s+) on the FACE → instant sleep.
      - if:
          condition:
            and:
              - lvgl.page.is_showing: page_face
              - lambda: |-
                  int dx = id(sw_x1) - id(sw_x0), dy = id(sw_y1) - id(sw_y0);
                  int adx = dx < 0 ? -dx : dx, ady = dy < 0 ? -dy : dy;
                  long dur = (long) millis() - id(g_tms);
                  return !id(sw_sleep) && !id(g_voice) && adx < 40 && ady < 40 && dur > 1200;
          then:
            - select.set: { id: robot_mode, option: sleep }
      # FACE TAP: SINGLE tap = STOP everything (panic); DOUBLE tap (2nd within ~350ms) = toggle
      # the AI (start listening / cancel). Only on the face page, gated by "Tap face to talk".
      - if:
          condition:
            and:
              - switch.is_on: sw_tap_talk
              - lvgl.page.is_showing: page_face
              - lambda: |-
                  int dx = id(sw_x1) - id(sw_x0), dy = id(sw_y1) - id(sw_y0);
                  int adx = dx < 0 ? -dx : dx, ady = dy < 0 ? -dy : dy;
                  long dur = (long) millis() - id(g_tms);
                  return !id(sw_sleep) && adx < 40 && ady < 40 && dur < 700;
          then:
            - if:
                condition: { lambda: 'return id(g_dc_ms) != 0 && ((long) millis() - id(g_dc_ms)) < 350;' }
                then:
                  # ── DOUBLE tap → toggle the voice assistant ──
                  - globals.set: { id: g_dc_ms, value: "0" }
                  - script.stop: tap_single
                  - if:
                      condition: { lambda: 'return id(g_voice);' }
                      then:
                        - voice_assistant.stop
                      else:
                        - if:
                            condition: { switch.is_off: sw_privacy }
                            then: [ voice_assistant.start ]
                else:
                  # ── first tap → arm the single-tap STOP (fires if no 2nd tap arrives) ──
                  - globals.set: { id: g_dc_ms, value: !lambda 'return (long) millis();' }
                  - script.execute: tap_single
      # swipe DOWN → status
      - if:
          condition:
            lambda: |-
              int dx = id(sw_x1) - id(sw_x0), dy = id(sw_y1) - id(sw_y0);
              int adx = dx < 0 ? -dx : dx, ady = dy < 0 ? -dy : dy;
              return !id(sw_sleep) && ady > adx && dy > 40;
          then: [ { lvgl.widget.show: statusbar } ]   # slim overlay, not a full page
      # swipe UP → face (home)
      - if:
          condition:
            lambda: |-
              int dx = id(sw_x1) - id(sw_x0), dy = id(sw_y1) - id(sw_y0);
              int adx = dx < 0 ? -dx : dx, ady = dy < 0 ? -dy : dy;
              return !id(sw_sleep) && ady > adx && dy < -40;
          then:
            - globals.set: { id: g_card, value: "0" }
            - lvgl.widget.hide: statusbar
            - lvgl.page.show: page_face
      # swipe LEFT → next screen (face → c1 → c2 → c3 → games → vitals → climate → face)
      # BUT NOT while the status bar is open — there, a horizontal drag is a slider
      # (volume / screen / LED brightness), not a screen change.
      - if:
          condition:
            lambda: |-
              int dx = id(sw_x1) - id(sw_x0), dy = id(sw_y1) - id(sw_y0);
              int adx = dx < 0 ? -dx : dx, ady = dy < 0 ? -dy : dy;
              return !id(sw_sleep) && adx >= ady && dx < -40
                     && lv_obj_has_flag(id(statusbar), LV_OBJ_FLAG_HIDDEN);
          then:
            - globals.set: { id: g_card, value: !lambda 'return (id(g_card) + 1) % 7;' }
            - script.execute: show_card
      # swipe RIGHT → previous screen (blocked while the status bar is open — see above)
      - if:
          condition:
            lambda: |-
              int dx = id(sw_x1) - id(sw_x0), dy = id(sw_y1) - id(sw_y0);
              int adx = dx < 0 ? -dx : dx, ady = dy < 0 ? -dy : dy;
              if (!lv_obj_has_flag(id(statusbar), LV_OBJ_FLAG_HIDDEN)) return false;
              return !id(sw_sleep) && adx >= ady && dx > 40;
          then:
            - globals.set: { id: g_card, value: !lambda 'return (id(g_card) + 6) % 7;' }
            - lvgl.widget.hide: statusbar
            - script.execute: show_card

# ── Wake word "Okay, Nabu" (on-device) ──────────────────────────────────────────
# Heavy TensorFlow compile — flash from a LOCAL ESPHome (not Nabu Casa remote), be
# patient (~10-15 min), and don't refresh the browser mid-build.
micro_wake_word:
  microphone: i2s_mic
  models:
    - model: ${wake_word_model}   # default: say "Okay, Nabu" to wake it
  on_wake_word_detected:
    - voice_assistant.start

voice_assistant:
  microphone: i2s_mic
  media_player: va_media_player
  # Mic tuning for better recognition with the HA Assist pipeline (STT hears you
  # more clearly across the room): suppress noise, auto-level, and boost the mic.
  noise_suppression_level: 2
  auto_gain: 31dBFS
  volume_multiplier: 2.0
  on_listening:
    - lambda: 'lv_disp_trig_activity(NULL);'   # a conversation is activity — no screensaver
    # a mood flash may be mid-run — stop it so its delayed restore can't fire mid-talk
    - script.stop: led_flash
    # remember the current LEDs — but only at the START of a conversation, and never
    # while a mood flash is showing (the flash already saved the TRUE original colour).
    - if:
        condition: { lambda: 'return !id(g_voice) && !id(g_flash);' }
        then:
          - lambda: |-
              auto v = id(stackchan_light_bar).current_values;
              id(led_on)  = v.is_on();
              id(led_bri) = v.get_brightness();
              id(led_r)   = v.get_red();
              id(led_g)   = v.get_green();
              id(led_b)   = v.get_blue();
    - globals.set: { id: g_flash, value: "false" }   # flash cancelled; save is now ours
    - select.set: { id: robot_mode, option: awake }
    - globals.set: { id: g_listen, value: "true" }
    - globals.set: { id: g_voice, value: "true" }
    - lvgl.page.show: page_face
    - globals.set: { id: g_card, value: "0" }
    - script.execute: leds_yellow
    - script.execute: render_face          # the LISTENING FACE (big curious eyes) — no label
    - script.execute: { id: head_nudge, dx: 0, dy: 6 }   # perks up attentively, like it leans in
  on_stt_end:
    # Publish what the robot HEARD (shows live on the dashboard + HA).
    - text_sensor.template.publish: { id: st_heard, state: !lambda 'return x;' }
  on_tts_start:
    # AI is speaking → "talking" mouth face, stays YELLOW the whole turn (listen + speak).
    - lambda: 'lv_disp_trig_activity(NULL);'
    - text_sensor.template.publish: { id: st_reply, state: !lambda 'return x;' }
    - lvgl.label.update: { id: speech_txt, text: !lambda 'return x;' }   # show what the AI says
    - globals.set: { id: g_listen, value: "false" }
    - globals.set: { id: g_talk, value: "true" }
    - script.execute: leds_yellow
    - script.execute: render_face
  on_end:
    # AI finished the turn → back to the previous face + the previous LEDs (or off).
    - globals.set: { id: g_listen, value: "false" }
    - globals.set: { id: g_talk, value: "false" }
    - globals.set: { id: g_voice, value: "false" }
    - script.execute: render_face
    - script.execute: restore_leds
    - if:
        condition: { switch.is_off: sw_privacy }
        then: [ micro_wake_word.start ]
  on_error:
    # Pipeline error → NEVER stay stuck on yellow/listening; clean up and re-arm the wake word.
    - globals.set: { id: g_listen, value: "false" }
    - globals.set: { id: g_talk, value: "false" }
    - globals.set: { id: g_voice, value: "false" }
    - script.execute: render_face
    - script.execute: restore_leds
    - if:
        condition: { switch.is_off: sw_privacy }
        then: [ micro_wake_word.start ]
