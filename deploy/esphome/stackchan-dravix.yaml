            - lvgl.widget.update: { id: drink_water, y: 96, height: 18 }
            - lvgl.widget.update: { id: hand_l, y: 92 }
            - lvgl.widget.update: { id: hand_r, y: 92 }
            - lvgl.widget.show: drink_glass
            - lvgl.widget.show: drink_water
            - lvgl.widget.show: hand_l
            - lvgl.widget.show: hand_r
            - delay: 260ms
            # raise to the mouth
            - lvgl.widget.update: { id: drink_glass, y: 62 }
            - lvgl.widget.update: { id: drink_water, y: 72, height: 14 }
            - lvgl.widget.update: { id: hand_l, y: 72 }
            - lvgl.widget.update: { id: hand_r, y: 72 }
            - delay: 320ms
            # sip 1
            - if:
