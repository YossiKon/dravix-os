  - platform: template
    name: "Face"
    id: robot_face
    optimistic: true
    options: [neutral, happy, sad, angry, sleepy, doubt, love, dizzy]
    initial_option: neutral
    set_action:
      - globals.set:
          id: g_expr
          value: !lambda |-
            if (x == "happy") return 1;
            else if (x == "sad") return 2;
            else if (x == "angry") return 3;
            else if (x == "sleepy") return 4;
            else if (x == "doubt") return 5;
            else if (x == "love") return 6;
            else if (x == "dizzy") return 7;
            return 0;
      - globals.set: { id: g_face_rest, value: !lambda 'return id(g_expr);' }   # this IS the resting face
      - script.execute: render_face
      # Every emotion also has a LED colour + body language:
      - if:
          condition: { lambda: 'return x == "happy";' }
          then:
            - script.execute: { id: led_flash, r: 100, g: 45, b: 10 }   # warm orange
            - script.execute: { id: head_nudge, dx: 0, dy: 10 }         # chin up
      - if:
          condition: { lambda: 'return x == "sad";' }
          then:
            - script.execute: { id: led_flash, r: 10, g: 25, b: 100 }   # blue
            - script.execute: { id: head_nudge, dx: 0, dy: -14 }        # droop
      - if:
          condition: { lambda: 'return x == "angry";' }
          then:
            - script.execute: { id: led_flash, r: 100, g: 5, b: 0 }     # red
            - script.execute: head_shake                                 # "no!"
      - if:
          condition: { lambda: 'return x == "sleepy";' }
          then:
            - script.execute: { id: led_flash, r: 45, g: 20, b: 60 }    # dim purple
            - script.execute: { id: head_nudge, dx: 0, dy: -8 }
      - if:
          condition: { lambda: 'return x == "doubt";' }
          then:
            - script.execute: { id: led_flash, r: 60, g: 0, b: 100 }    # purple
            - script.execute: { id: head_nudge, dx: 14, dy: 0 }         # quizzical side-glance
      - if:
          condition: { lambda: 'return x == "love";' }
          then:
            - script.execute: { id: led_flash, r: 100, g: 20, b: 45 }   # warm pink
            - script.execute: head_nod                                   # an adoring little nod
      - if:
          condition: { lambda: 'return x == "dizzy";' }
          then:
            - script.execute: { id: led_flash, r: 55, g: 25, b: 100 }   # woozy violet
            - script.execute: head_shake                                 # shakes it off
  # The ONE place a mode is applied — every mode path goes through this select, so
  # Home Assistant + the dravix dashboard always show the true mode.
  #   awake   ער — bright, full behaviour
  #   morning בוקר — a sunrise scene (bright + happy + warm LEDs), settles into awake
  #   focus   מרוכז — do-not-disturb: no greeting, no drifting, no mood LEDs
  #   quiet   שקט — speaker down to 25% (restored on exit), no mood LEDs
  #   night   לילה — dim screen, teal face, calm (no greet/moves), sleeps on its timer
  #   busy / sleep — as before (sleep: head droops, LEDs off, screen off)
  - platform: template
    name: "Mode"
    id: robot_mode
    optimistic: true
    options: [awake, morning, focus, quiet, night, busy, sleep]
    initial_option: awake
    # survive a reboot: a robot put to night/sleep must not boot back bright-awake.
    # NOTE: restoring only republishes the STATE — on_boot below replays it through
    # set_action so the flags/backlight/servo speeds actually apply.
    restore_value: true
    set_action:
      # option → state flags
      - globals.set: { id: g_sleep, value: !lambda 'return x == std::string("sleep");' }
      - globals.set: { id: g_busy,  value: !lambda 'return x == std::string("busy");' }
      - globals.set: { id: g_night, value: !lambda 'return x == std::string("night");' }
      - globals.set: { id: g_focus, value: !lambda 'return x == std::string("focus");' }
      # quiet: remember the speaker volume, lower it; restore it on the way out
      - if:
          condition: { lambda: 'return x == std::string("quiet") && !id(g_quiet);' }
          then:
            - lambda: 'id(g_vol_saved) = id(va_media_player).volume;'
            - media_player.volume_set: { id: va_media_player, volume: 25% }
      - if:
          condition: { lambda: 'return x != std::string("quiet") && id(g_quiet) && id(g_vol_saved) >= 0;' }
          then:
            - media_player.volume_set: { id: va_media_player, volume: !lambda 'return id(g_vol_saved);' }
            - lambda: 'id(g_vol_saved) = -1;'
      - globals.set: { id: g_quiet, value: !lambda 'return x == std::string("quiet");' }
      - globals.set: { id: g_saver, value: "false" }
      - script.execute: render_face
      # CALM modes (focus / quiet / night) = NO mood LEDs. Those modes DISABLE led_flash, so a
      # colour that was lit would otherwise stay stuck on — clear the bar (and cancel any pending
      # flash) on entry so it goes truly dark. (busy keeps its LEDs — led_flash still runs there.)
      - if:
          condition:
            lambda: |-
              return x == std::string("focus") || x == std::string("quiet")
                  || x == std::string("night");
          then:
            - script.stop: led_flash
            - globals.set: { id: g_flash, value: "false" }
            - light.turn_off: stackchan_light_bar
      # GRACEFUL MOTION — the serial-bus servos take a speed setting (the BSP exposes
      # it; the official remote drives them at 600). Calm modes get slow, gentle moves.
      - number.set:
          id: servo_x_speed
          value: !lambda |-
            return (x == std::string("night") || x == std::string("quiet")
                    || x == std::string("focus")) ? 300.0f : 600.0f;
      - delay: 350ms   # SCS9009 bus spacing
      - number.set:
          id: servo_y_speed
          value: !lambda |-
            return (x == std::string("night") || x == std::string("quiet")
                    || x == std::string("focus")) ? 300.0f : 600.0f;
      - delay: 350ms
      # per-mode screen + body
      - if:
          condition: { lambda: 'return x == std::string("sleep");' }
          then:
            - script.execute: rub_eyes       # 😴 rubs its eyes sleepily before nodding off
            - delay: 900ms
            # the head slowly droops (remembering where it was — in the 158..260 scale),
            # LEDs off… the droop writes the SERVO directly (n_head_pitch is locked
            # while g_sleep, which is already true at this point)
            - if:
                condition: { lambda: 'return id(sw_move).state && id(g_pitch_saved) < 0;' }
                then:
                  - lambda: 'id(g_pitch_saved) = id(n_head_pitch).state;'
                  - number.set:
                      id: servo_y_angle
                      value: !lambda |-
                        float p = id(n_head_pitch).state - 25.0f;
                        if (p < 158.0f) p = 158.0f;
                        float a = (p - 158.0f) * 90.0f / 102.0f;
                        return a < 5.0f ? 5.0f : (a > 85.0f ? 85.0f : a);
            - light.turn_off: stackchan_light_bar
            # …the zzz face shows for a moment, then the screen goes fully off
            - delay: 2s
            - if:
                condition: { lambda: 'return id(g_sleep);' }   # unless it was woken meanwhile
                then: [ { light.turn_off: lcd_backlight } ]
      - if:
          condition: { lambda: 'return x == std::string("night");' }
          then:
            - light.turn_on: { id: lcd_backlight, brightness: 15% }
      - if:
          condition:
            lambda: |-
              return x == std::string("awake") || x == std::string("focus")
                  || x == std::string("quiet") || x == std::string("busy");
          then:
            - light.turn_on: { id: lcd_backlight, brightness: !lambda 'return id(n_brightness).state / 100.0;' }
            # …and on waking the head rises back to where it was before sleeping —
            # with a little MORNING STRETCH: a sleepy yawn face, then a bright-eyed
            # shake-awake (only on a real wake-from-sleep, when a droop was saved).
            - if:
                condition: { lambda: 'return id(sw_move).state && id(g_pitch_saved) >= 0;' }
                then:
                  - number.set:
                      id: n_head_pitch
                      value: !lambda 'return id(g_pitch_saved);'
                  - globals.set: { id: g_pitch_saved, value: "-1" }
                  - globals.set: { id: g_expr, value: "4" }      # yaaawn…
                  - script.execute: render_face
                  - if:
                      condition: { lambda: 'return id(sw_sfx).state && !id(g_quiet) && !id(g_night);' }
                      then: [ { rtttl.play: "yawn:d=4,o=4,b=85:c,e,d,c" } ]   # a sleepy yaaawn
                  - delay: 1400ms
                  - globals.set: { id: g_expr, value: "1" }      # …bright and happy!
                  - script.execute: render_face
                  - if:
                      condition: { lambda: 'return id(sw_sfx).state && !id(g_quiet) && !id(g_night);' }
                      then: [ { rtttl.play: "wake:d=16,o=5,b=170:c,e,g,c6" } ]   # a cheery boot-up 🌅
                  - script.execute: head_shake                    # shakes the sleep off
                  - delay: 1500ms
                  - globals.set: { id: g_expr, value: !lambda 'return id(g_face_rest);' }   # back to the mood's resting face
                  - script.execute: render_face
            # ALWAYS clear the saved droop on waking — even when Body language is off,
            # otherwise the next sleep skips its droop and a later wake restores stale pitch
            - globals.set: { id: g_pitch_saved, value: "-1" }
      - if:
          condition: { lambda: 'return x == std::string("morning");' }
          then:
            # SUNRISE: full brightness, happy face, warm LEDs, head up — then settle to awake.
            - light.turn_on: { id: lcd_backlight, brightness: !lambda 'return id(n_brightness).state / 100.0;' }
            - if:
                condition: { lambda: 'return id(sw_move).state && id(g_pitch_saved) >= 0;' }
                then:
                  - number.set: { id: n_head_pitch, value: !lambda 'return id(g_pitch_saved);' }
                  - globals.set: { id: g_pitch_saved, value: "-1" }
            - globals.set: { id: g_expr, value: "1" }
            - globals.set: { id: g_card, value: "0" }
            - lvgl.page.show: page_face
            - script.execute: render_face
            - script.execute: { id: led_flash, r: 100, g: 60, b: 15 }   # warm sunrise
            - script.execute: { id: head_nudge, dx: 0, dy: 10 }
            - delay: 4s
            # settle into awake — unless the user already switched mode meanwhile
            - if:
                condition: { lambda: 'return id(robot_mode).current_option() == std::string("morning");' }
                then:
                  - select.set: { id: robot_mode, option: awake }

interval:
  # OFFICIAL REMOTE — apply the freshest joystick packet, throttled to ~3Hz so the
  # SCS9009 serial bus never sees back-to-back writes. Button B = talk toggle.
  - interval: 150ms
    then:
      - if:
          condition: { lambda: 'return id(g_rc_fresh) && !id(g_rc_busy) && !id(g_sleep);' }
          then:
            - lambda: |-
                id(g_rc_fresh) = false;
                id(g_rc_busy) = true;
                id(g_move_ms) = (long) millis();   // remote-driven moves aren't a hand
                lv_disp_trig_activity(NULL);
            # button B rising edge → toggle the voice assistant (privacy-respecting)
            - if:
                condition: { lambda: 'return id(g_rc_btn) != 0 && id(g_rc_prev) == 0 && !id(mp_run) && !id(r3_run);' }   # not while a game uses the button
                then:
                  - if:
                      condition: { lambda: 'return id(g_voice);' }
                      then:
                        - voice_assistant.stop
                      else:
                        - if:
                            condition: { switch.is_off: sw_privacy }
                            then: [ voice_assistant.start ]
            - lambda: 'id(g_rc_prev) = id(g_rc_btn);'
            # The joystick only steers the HEAD on the face page. During a game it drives the
            # game (paddle / aim / walk) — the games read g_rc_yaw/pitch directly — so the head
            # stays still instead of mirroring your play.
            - if:
                condition:
                  lvgl.page.is_showing: page_face
                then:
                  - number.set:
                      id: servo_x_angle
                      value: !lambda 'return id(g_rc_yaw);'
                  - delay: 140ms
                  - number.set:
                      id: n_head_pitch
                      value: !lambda 'return id(g_rc_pitch);'
            - lambda: 'id(g_rc_busy) = false;'
  # HAND-TURN DETECTION — the serial servos report their true position back into the
  # angle numbers, so when a hand twists the head the numbers change with NO command.
  # Sample both axes every 800ms: a big jump, with no commanded move in the last 4s,
  # while awake = someone's hand → react (hand_react, throttled).
  - interval: 800ms
    then:
      - lambda: |-
          float x = id(servo_x_angle).state, y = id(servo_y_angle).state;
          if (!std::isnan(x) && !std::isnan(y)) {
            bool jump = (id(g_prev_x) > -900.0f) &&
                        (fabsf(x - id(g_prev_x)) > 14.0f || fabsf(y - id(g_prev_y)) > 10.0f);
            bool commanded = ((long) millis() - id(g_move_ms)) < 4000;
            if (jump && !commanded && !id(g_sleep) && !id(g_saver) && !id(g_voice)
                && id(sw_touch).state) {
              id(hand_react).execute();
            }
            id(g_prev_x) = x;
            id(g_prev_y) = y;
          }
  # FLAPPY physics — ~11 fps is plenty for a 320px playfield. Only ticks while the
  # game page is showing AND a run is alive; otherwise this is a single cheap check.
  - interval: 90ms
    then:
      - if:
          condition:
            and:
              - lvgl.page.is_showing: page_flappy
              - lambda: 'return id(fb_alive);'
          then:
            - lambda: |-
                id(fb_vy) += 0.9f;                                  // gravity
                if (id(fb_vy) > 7.0f) id(fb_vy) = 7.0f;
                id(fb_y) += id(fb_vy);
                id(fb_px) -= 6;                                     // pipe scrolls left
                if (id(fb_px) < -40) {                              // passed → recycle + score
                  id(fb_px) = 330;
                  id(fb_gap) = 40 + (int)(random_float() * 100.0f); // gap top: 40..140 (gap = 84px)
                  id(fb_score) += 1;
                }
                // collision: bird box x 60..86; pipes at fb_px..fb_px+34; gap fb_gap..fb_gap+84
                bool hit = (id(fb_y) < 34.0f) || (id(fb_y) > 214.0f);
                if (id(fb_px) < 86 && id(fb_px) + 34 > 60) {
                  if (id(fb_y) < id(fb_gap) || id(fb_y) + 26.0f > id(fb_gap) + 84.0f) hit = true;
                }
                if (hit) id(fb_alive) = false;
            - lvgl.widget.update: { id: fb_bird, y: !lambda 'return (int) id(fb_y);' }
            - lvgl.widget.update: { id: fb_top, x: !lambda 'return id(fb_px);', height: !lambda 'return id(fb_gap);' }
            - lvgl.widget.update: { id: fb_bot, x: !lambda 'return id(fb_px);', y: !lambda 'return id(fb_gap) + 84;' }
            - lvgl.label.update: { id: fb_sc, text: !lambda 'char b[8]; snprintf(b, sizeof(b), "%d", id(fb_score)); return std::string(b);' }
            - if:
                condition: { lambda: 'return !id(fb_alive);' }
                then:
                  - lambda: 'if (id(fb_score) > id(hs_flappy)) id(hs_flappy) = id(fb_score);'
                  - lvgl.label.update: { id: fb_lbl, text: "GAME OVER" }
                  - script.execute: { id: led_flash, r: 10, g: 25, b: 100 }   # a sad blue
                  - script.execute: head_shake
  # BREAKOUT physics — ~25 fps. Joystick paddle (read DIRECTLY, no servo → no delay).
  # Ticks only while the page shows AND a run is alive; otherwise a single cheap check.
  - interval: 40ms
    then:
      - if:
          condition:
            and:
              - lvgl.page.is_showing: page_breakout
              - lambda: 'return id(bk_alive);'
          then:
            - lambda: |-
                // paddle follows the ESP-NOW joystick (g_rc_yaw ∈ ±164)
                int px = 160 + (int) id(g_rc_yaw) - 28;
                id(bk_px) = px < 2 ? 2 : (px > 262 ? 262 : px);
                // move the ball
                id(bk_bx) += id(bk_vx);
                id(bk_by) += id(bk_vy);
                // walls
                if (id(bk_bx) < 2)   { id(bk_bx) = 2;   id(bk_vx) =  fabsf(id(bk_vx)); }
                if (id(bk_bx) > 308) { id(bk_bx) = 308; id(bk_vx) = -fabsf(id(bk_vx)); }
                if (id(bk_by) < 24)  { id(bk_by) = 24;  id(bk_vy) =  fabsf(id(bk_vy)); }
                // paddle bounce (paddle top y=214, 56 wide)
                if (id(bk_vy) > 0 && id(bk_by) + 10 >= 214 && id(bk_by) <= 220
                    && id(bk_bx) + 10 >= id(bk_px) && id(bk_bx) <= id(bk_px) + 56) {
                  id(bk_vy) = -fabsf(id(bk_vy));
                  id(bk_vx) += (id(bk_bx) + 5 - (id(bk_px) + 28)) * 0.05f;   // put english on it
                  id(bk_ev) = 2;                                             // paddle save
                }
                // brick hit — grid 4×2 (cols step 76 from x8; rows y30 & y52)
                int cx = (int) id(bk_bx) + 5, cy = (int) id(bk_by) + 5;
                if (cy >= 30 && cy <= 68) {
                  int col = (cx - 8) / 76, row = (cy - 30) / 22;
                  if (col >= 0 && col < 4 && row >= 0 && row < 2) {
                    int bi = row * 4 + col;
                    if (id(bk_mask) & (1 << bi)) {
                      id(bk_mask) &= ~(1 << bi);
                      id(bk_vy) = -id(bk_vy);
                      id(bk_score) += 1;
                      id(bk_ev) = 1;                                    // smashed a brick
                    }
                  }
                }
                // miss → lose a life; empty mask → you cleared the board
                if (id(bk_by) > 236) {
                  id(bk_lives) -= 1;
                  id(bk_ev) = 3;                                             // the ball beat you
                  if (id(bk_lives) <= 0) id(bk_alive) = false;
                  else { id(bk_bx) = 160; id(bk_by) = 170; id(bk_vx) = 3; id(bk_vy) = -3.4f; }
                }
                if (id(bk_mask) == 0) id(bk_alive) = false;
            - lvgl.widget.update: { id: bk_ball,   x: !lambda 'return (int) id(bk_bx);', y: !lambda 'return (int) id(bk_by);' }
            - lvgl.widget.update: { id: bk_paddle, x: !lambda 'return id(bk_px);' }
            - lvgl.label.update:  { id: bk_sc, text: !lambda 'char b[8]; snprintf(b, sizeof(b), "%d", id(bk_score)); return std::string(b);' }
            - if: { condition: { lambda: 'return ((id(bk_mask) >> 0) & 1) != 0;' }, then: [ { lvgl.widget.show: bk_b0 } ], else: [ { lvgl.widget.hide: bk_b0 } ] }
            - if: { condition: { lambda: 'return ((id(bk_mask) >> 1) & 1) != 0;' }, then: [ { lvgl.widget.show: bk_b1 } ], else: [ { lvgl.widget.hide: bk_b1 } ] }
            - if: { condition: { lambda: 'return ((id(bk_mask) >> 2) & 1) != 0;' }, then: [ { lvgl.widget.show: bk_b2 } ], else: [ { lvgl.widget.hide: bk_b2 } ] }
            - if: { condition: { lambda: 'return ((id(bk_mask) >> 3) & 1) != 0;' }, then: [ { lvgl.widget.show: bk_b3 } ], else: [ { lvgl.widget.hide: bk_b3 } ] }
            - if: { condition: { lambda: 'return ((id(bk_mask) >> 4) & 1) != 0;' }, then: [ { lvgl.widget.show: bk_b4 } ], else: [ { lvgl.widget.hide: bk_b4 } ] }
            - if: { condition: { lambda: 'return ((id(bk_mask) >> 5) & 1) != 0;' }, then: [ { lvgl.widget.show: bk_b5 } ], else: [ { lvgl.widget.hide: bk_b5 } ] }
            - if: { condition: { lambda: 'return ((id(bk_mask) >> 6) & 1) != 0;' }, then: [ { lvgl.widget.show: bk_b6 } ], else: [ { lvgl.widget.hide: bk_b6 } ] }
            - if: { condition: { lambda: 'return ((id(bk_mask) >> 7) & 1) != 0;' }, then: [ { lvgl.widget.show: bk_b7 } ], else: [ { lvgl.widget.hide: bk_b7 } ] }
            # lives readout — turns red on your last ball
            - lvgl.label.update:
                id: bk_lv
                text: !lambda 'char b[12]; snprintf(b, sizeof(b), "LIVES %d", id(bk_lives)); return std::string(b);'
                text_color: !lambda 'return id(bk_lives) <= 1 ? lv_color_hex(0xFF5555) : lv_color_hex(0x8b96a4);'
            # per-event JUICE — LED + an 8-bit beep on every hit (beeps respect "Robot
            # sounds" + quiet/night like every other sound); head shake when the ball beats you
            - if:
                condition: { lambda: 'return id(bk_ev) == 1;' }
                then:
                  - script.execute: { id: led_flash, r: 0, g: 90, b: 80 }                # brick → cyan
                  - if:
                      condition: { lambda: 'return id(sw_sfx).state && !id(g_quiet) && !id(g_night);' }
                      then: [ { rtttl.play: "bk:d=16,o=7,b=220:c" } ]                     # bright blip
            - if:
                condition: { lambda: 'return id(bk_ev) == 2;' }
                then:
                  - script.execute: { id: led_flash, r: 55, g: 55, b: 15 }               # paddle → soft
                  - if:
                      condition: { lambda: 'return id(sw_sfx).state && !id(g_quiet) && !id(g_night);' }
                      then: [ { rtttl.play: "bk:d=16,o=6,b=220:g" } ]                     # bloop
            - if:
                condition: { lambda: 'return id(bk_ev) == 3;' }
                then:
                  - script.execute: { id: led_flash, r: 100, g: 8, b: 8 }                # hit → red
                  - script.execute: head_shake
                  - if:
                      condition: { lambda: 'return id(sw_sfx).state && !id(g_quiet) && !id(g_night);' }
                      then: [ { rtttl.play: "bk:d=8,o=4,b=150:c,a#" } ]                   # sad buzz down
            - lambda: 'id(bk_ev) = 0;'
            - if:
                condition: { lambda: 'return !id(bk_alive);' }
                then:
                  - lambda: 'if (id(bk_score) > id(hs_breakout)) id(hs_breakout) = id(bk_score);'
                  - if:
                      condition: { lambda: 'return id(bk_mask) == 0;' }
                      then:
                        - lvgl.label.update: { id: bk_msg, text: "YOU WIN!" }
                        - script.execute: { id: led_flash, r: 20, g: 100, b: 30 }        # win → green
                        - script.execute: head_nod                                        # a happy nod
                        - if:
                            condition: { lambda: 'return id(sw_sfx).state && !id(g_quiet) && !id(g_night);' }
                            then: [ { rtttl.play: "win:d=8,o=6,b=180:c,e,g,c7" } ]        # victory fanfare
                        - script.execute: clap                                            # 👏 claps for you
                      else:
                        - lvgl.label.update: { id: bk_msg, text: "GAME OVER" }
                        - script.execute: { id: led_flash, r: 100, g: 8, b: 8 }           # lose → red
                        - script.execute: head_shake
                        - if:
                            condition: { lambda: 'return id(sw_sfx).state && !id(g_quiet) && !id(g_night);' }
                            then: [ { rtttl.play: "lose:d=8,o=5,b=120:g,e,c,c4" } ]       # sad descent
  # SPONTANEOUS SNACK — every so often, while you're on the face and it's awake + idle, the
  # robot gets peckish and eats a little treat on its own (Ropet/Tamagotchi charm).
  - interval: 113s
    then:
      - if:
          condition:
            and:
              - lvgl.page.is_showing: page_face
              # (night/focus/quiet included — no spontaneous snacking in do-not-disturb;
              #  nor while it's mid-speech or a bubble is up — paws over a talking mouth read wrong)
              - lambda: 'return !id(g_sleep) && !id(g_saver) && !id(g_voice) && !id(g_busy) && !id(g_perm) && !id(g_night) && !id(g_focus) && !id(g_quiet) && !id(g_talk) && !id(g_tip) && random_float() < 0.25;'
          then:
            - if:
                condition: { lambda: 'return random_float() < 0.5;' }
                then: [ { script.execute: eat } ]
                else: [ { script.execute: drink } ]
  # PONG physics — ~25 fps. Joystick pitch moves your paddle; the robot AI tracks the ball
  # but is capped at 3 px/frame so it's beatable. Only ticks while the page shows + alive.
  - interval: 40ms
    then:
      - if:
          condition:
            and:
              - lvgl.page.is_showing: page_pong
              - lambda: 'return id(pg_alive);'
          then:
            - lambda: |-
                // your paddle follows the joystick pitch (g_rc_pitch ∈ 158..260)
                int py = (int) ((id(g_rc_pitch) - 158.0f) * 1.92f);
                id(pg_py) = py < 2 ? 2 : (py > 194 ? 194 : py);
                // robot AI: chase the ball, but capped at 3 px/frame
                int target = (int) id(pg_by) - 18;
                if (target < 2) target = 2; else if (target > 194) target = 194;
                int d = target - id(pg_ay);
                if (d > 3) d = 3; else if (d < -3) d = -3;
                id(pg_ay) += d;
                // move the ball
                id(pg_bx) += id(pg_vx);
                id(pg_by) += id(pg_vy);
                // top / bottom walls
                if (id(pg_by) < 2)   { id(pg_by) = 2;   id(pg_vy) =  fabsf(id(pg_vy)); }
                if (id(pg_by) > 229) { id(pg_by) = 229; id(pg_vy) = -fabsf(id(pg_vy)); }
                // your paddle (x 8..15)
                if (id(pg_vx) < 0 && id(pg_bx) <= 16 && id(pg_bx) >= 4
                    && id(pg_by) + 9 >= id(pg_py) && id(pg_by) <= id(pg_py) + 44) {
                  id(pg_vx) = fabsf(id(pg_vx));
                  id(pg_vy) += (id(pg_by) + 4 - (id(pg_py) + 22)) * 0.06f;
                }
                // robot paddle (x 305..312)
                if (id(pg_vx) > 0 && id(pg_bx) + 9 >= 305 && id(pg_bx) + 9 <= 316
                    && id(pg_by) + 9 >= id(pg_ay) && id(pg_by) <= id(pg_ay) + 44) {
                  id(pg_vx) = -fabsf(id(pg_vx));
                  id(pg_vy) += (id(pg_by) + 4 - (id(pg_ay) + 22)) * 0.06f;
                }
                // scoring — off the left = robot point; off the right = your point
                if (id(pg_bx) < -6)  { id(pg_as) += 1; id(pg_bx) = 160; id(pg_by) = 120; id(pg_vx) =  3.2f; id(pg_vy) = 2.0f; }
                if (id(pg_bx) > 322) { id(pg_ps) += 1; id(pg_bx) = 160; id(pg_by) = 120; id(pg_vx) = -3.2f; id(pg_vy) = 2.0f; }
                if (id(pg_ps) >= 7 || id(pg_as) >= 7) id(pg_alive) = false;   // first to 7
            - lvgl.widget.update: { id: pg_pl,   y: !lambda 'return id(pg_py);' }
            - lvgl.widget.update: { id: pg_pr,   y: !lambda 'return id(pg_ay);' }
            - lvgl.widget.update: { id: pg_ball, x: !lambda 'return (int) id(pg_bx);', y: !lambda 'return (int) id(pg_by);' }
            - lvgl.label.update:  { id: pg_sc, text: !lambda 'char b[16]; snprintf(b, sizeof(b), "%d : %d", id(pg_ps), id(pg_as)); return std::string(b);' }
            - if:
                condition: { lambda: 'return !id(pg_alive);' }
                then:
                  - if:
                      condition: { lambda: 'return id(pg_ps) > id(pg_as);' }
                      then:
                        - lvgl.label.update: { id: pg_msg, text: "YOU WIN!" }
                        - script.execute: clap
                        - script.execute: head_nod
                      else:
                        - lvgl.label.update: { id: pg_msg, text: "ROBOT WINS" }
                        - script.execute: head_shake
  # TEMPERATURE MOOD — reacts to the chip temperature (axp_temp) crossing a threshold: too warm
  # → "phew" + sweat; too cool → a shiver. Edge-detected via g_tempst, only while on the face.
  # (Thresholds are for the AXP chip, which runs warm — tune 46/33 to taste for your room.)
  - interval: 30s
    then:
      - if:
          condition:
            and:
              - lvgl.page.is_showing: page_face
              - lambda: 'return id(axp_temp).has_state() && id(axp_temp).state > 46.0 && id(g_tempst) != 1 && !id(g_sleep) && !id(g_saver) && !id(g_voice);'
          then:
            - globals.set: { id: g_tempst, value: "1" }
            - script.execute: react_hot
      - if:
          condition:
            and:
              - lvgl.page.is_showing: page_face
              - lambda: 'return id(axp_temp).has_state() && id(axp_temp).state < 33.0 && id(g_tempst) != 2 && !id(g_sleep) && !id(g_saver) && !id(g_voice);'
          then:
            - globals.set: { id: g_tempst, value: "2" }
            - script.execute: react_cold
      - if:
          condition: { lambda: 'return id(axp_temp).has_state() && id(axp_temp).state >= 35.0 && id(axp_temp).state <= 44.0;' }
          then: [ { globals.set: { id: g_tempst, value: "0" } } ]
  # SNAKE physics — ~6 fps. Joystick sets a continuous heading; grid 13×8; grows on food.
  - interval: 160ms
    then:
      - if:
          condition:
            and:
              - lvgl.page.is_showing: page_snake
              - lambda: 'return id(sn_alive);'
          then:
            - lambda: |-
                // heading from the joystick (continuous; can't reverse into itself)
                float dx = id(g_rc_yaw);
                float dy = id(g_rc_pitch) - 209.0f;
                if (fabsf(dx) > 55.0f || fabsf(dy) > 22.0f) {
                  if (fabsf(dx) > fabsf(dy)) {
                    if (dx > 0 && id(sn_dir) != 3) id(sn_dir) = 1;
                    else if (dx < 0 && id(sn_dir) != 1) id(sn_dir) = 3;
                  } else {
                    if (dy > 0 && id(sn_dir) != 0) id(sn_dir) = 2;
                    else if (dy < 0 && id(sn_dir) != 2) id(sn_dir) = 0;
                  }
                }
                for (int i = id(sn_len) - 1; i > 0; i--) { id(sn_x)[i] = id(sn_x)[i-1]; id(sn_y)[i] = id(sn_y)[i-1]; }
                if (id(sn_dir) == 0) id(sn_y)[0]--;
                else if (id(sn_dir) == 1) id(sn_x)[0]++;
                else if (id(sn_dir) == 2) id(sn_y)[0]++;
                else id(sn_x)[0]--;
                if (id(sn_x)[0] < 0 || id(sn_x)[0] > 12 || id(sn_y)[0] < 0 || id(sn_y)[0] > 7) id(sn_alive) = false;
                for (int i = 1; i < id(sn_len); i++) if (id(sn_x)[i] == id(sn_x)[0] && id(sn_y)[i] == id(sn_y)[0]) id(sn_alive) = false;
                if (id(sn_x)[0] == id(sn_fx) && id(sn_y)[0] == id(sn_fy)) {
                  id(sn_sc) += 1;
                  if (id(sn_len) < 12) id(sn_len) += 1;
                  id(sn_fx) = (int)(random_float() * 12.99f);
                  id(sn_fy) = (int)(random_float() * 7.99f);
                }
            - lvgl.widget.update: { id: sn_food, x: !lambda 'return id(sn_fx) * 24 + 2;', y: !lambda 'return id(sn_fy) * 24 + 42;' }
            - lvgl.label.update:  { id: sn_lbl, text: !lambda 'char b[8]; snprintf(b, sizeof(b), "%d", id(sn_sc)); return std::string(b);' }
            - lvgl.widget.update: { id: sn_s0,  x: !lambda 'return id(sn_x)[0]  * 24;', y: !lambda 'return id(sn_y)[0]  * 24 + 40;' }
            - lvgl.widget.update: { id: sn_s1,  x: !lambda 'return id(sn_x)[1]  * 24;', y: !lambda 'return id(sn_y)[1]  * 24 + 40;' }
            - lvgl.widget.update: { id: sn_s2,  x: !lambda 'return id(sn_x)[2]  * 24;', y: !lambda 'return id(sn_y)[2]  * 24 + 40;' }
            - lvgl.widget.update: { id: sn_s3,  x: !lambda 'return id(sn_x)[3]  * 24;', y: !lambda 'return id(sn_y)[3]  * 24 + 40;' }
            - lvgl.widget.update: { id: sn_s4,  x: !lambda 'return id(sn_x)[4]  * 24;', y: !lambda 'return id(sn_y)[4]  * 24 + 40;' }
            - lvgl.widget.update: { id: sn_s5,  x: !lambda 'return id(sn_x)[5]  * 24;', y: !lambda 'return id(sn_y)[5]  * 24 + 40;' }
            - lvgl.widget.update: { id: sn_s6,  x: !lambda 'return id(sn_x)[6]  * 24;', y: !lambda 'return id(sn_y)[6]  * 24 + 40;' }
            - lvgl.widget.update: { id: sn_s7,  x: !lambda 'return id(sn_x)[7]  * 24;', y: !lambda 'return id(sn_y)[7]  * 24 + 40;' }
            - lvgl.widget.update: { id: sn_s8,  x: !lambda 'return id(sn_x)[8]  * 24;', y: !lambda 'return id(sn_y)[8]  * 24 + 40;' }
            - lvgl.widget.update: { id: sn_s9,  x: !lambda 'return id(sn_x)[9]  * 24;', y: !lambda 'return id(sn_y)[9]  * 24 + 40;' }
            - lvgl.widget.update: { id: sn_s10, x: !lambda 'return id(sn_x)[10] * 24;', y: !lambda 'return id(sn_y)[10] * 24 + 40;' }
            - lvgl.widget.update: { id: sn_s11, x: !lambda 'return id(sn_x)[11] * 24;', y: !lambda 'return id(sn_y)[11] * 24 + 40;' }
            - if: { condition: { lambda: 'return 1  < id(sn_len);' }, then: [ { lvgl.widget.show: sn_s1 } ],  else: [ { lvgl.widget.hide: sn_s1 } ] }
            - if: { condition: { lambda: 'return 2  < id(sn_len);' }, then: [ { lvgl.widget.show: sn_s2 } ],  else: [ { lvgl.widget.hide: sn_s2 } ] }
            - if: { condition: { lambda: 'return 3  < id(sn_len);' }, then: [ { lvgl.widget.show: sn_s3 } ],  else: [ { lvgl.widget.hide: sn_s3 } ] }
            - if: { condition: { lambda: 'return 4  < id(sn_len);' }, then: [ { lvgl.widget.show: sn_s4 } ],  else: [ { lvgl.widget.hide: sn_s4 } ] }
            - if: { condition: { lambda: 'return 5  < id(sn_len);' }, then: [ { lvgl.widget.show: sn_s5 } ],  else: [ { lvgl.widget.hide: sn_s5 } ] }
            - if: { condition: { lambda: 'return 6  < id(sn_len);' }, then: [ { lvgl.widget.show: sn_s6 } ],  else: [ { lvgl.widget.hide: sn_s6 } ] }
            - if: { condition: { lambda: 'return 7  < id(sn_len);' }, then: [ { lvgl.widget.show: sn_s7 } ],  else: [ { lvgl.widget.hide: sn_s7 } ] }
            - if: { condition: { lambda: 'return 8  < id(sn_len);' }, then: [ { lvgl.widget.show: sn_s8 } ],  else: [ { lvgl.widget.hide: sn_s8 } ] }
            - if: { condition: { lambda: 'return 9  < id(sn_len);' }, then: [ { lvgl.widget.show: sn_s9 } ],  else: [ { lvgl.widget.hide: sn_s9 } ] }
            - if: { condition: { lambda: 'return 10 < id(sn_len);' }, then: [ { lvgl.widget.show: sn_s10 } ], else: [ { lvgl.widget.hide: sn_s10 } ] }
            - if: { condition: { lambda: 'return 11 < id(sn_len);' }, then: [ { lvgl.widget.show: sn_s11 } ], else: [ { lvgl.widget.hide: sn_s11 } ] }
            - if:
                condition: { lambda: 'return !id(sn_alive);' }
                then:
                  - lvgl.label.update: { id: sn_msg, text: "GAME OVER" }
                  - script.execute: { id: led_flash, r: 10, g: 25, b: 100 }
                  - script.execute: head_shake
  # (DOOM-lite physics interval removed with page_doom.)
  # MAPLE-lite physics — ~25 fps. Joystick walks, button jumps, gravity + platform landing;
  # land ON the mushroom to stomp it (score), touch it from the side and you lose a life.
  - interval: 40ms
    then:
      - if:
          condition:
            and:
              - lvgl.page.is_showing: page_maple
              - lambda: 'return id(mp_run);'
          then:
            - lambda: |-
                float mv = id(g_rc_yaw);
                if (mv > 40.0f) id(mp_x) += 3.5f;
                else if (mv < -40.0f) id(mp_x) -= 3.5f;
                if (id(mp_x) < 2.0f) id(mp_x) = 2.0f;
                if (id(mp_x) > 298.0f) id(mp_x) = 298.0f;
                bool jb = (id(g_rc_btn) != 0) && !id(mp_bp);
                id(mp_bp) = (id(g_rc_btn) != 0);
                if (jb && id(mp_grnd)) { id(mp_vy) = -9.0f; id(mp_grnd) = false; }
                id(mp_vy) += 0.55f;
                if (id(mp_vy) > 11.0f) id(mp_vy) = 11.0f;
                id(mp_y) += id(mp_vy);
                id(mp_grnd) = false;
                float feet = id(mp_y) + 24.0f;
                if (id(mp_vy) >= 0 && feet >= 214.0f && feet <= 226.0f) { id(mp_y) = 190.0f; id(mp_vy) = 0; id(mp_grnd) = true; }
                if (id(mp_vy) >= 0 && feet >= 156.0f && feet <= 168.0f && id(mp_x) + 20 > 40.0f  && id(mp_x) < 150.0f) { id(mp_y) = 132.0f; id(mp_vy) = 0; id(mp_grnd) = true; }
                if (id(mp_vy) >= 0 && feet >= 110.0f && feet <= 122.0f && id(mp_x) + 20 > 180.0f && id(mp_x) < 290.0f) { id(mp_y) = 86.0f;  id(mp_vy) = 0; id(mp_grnd) = true; }
                if (id(mp_y) > 240.0f) { id(mp_lives) -= 1; id(mp_x) = 20.0f; id(mp_y) = 180.0f; id(mp_vy) = 0; if (id(mp_lives) <= 0) id(mp_run) = false; }
                id(mp_mx) += id(mp_mdir) * 1.7f;
                if (id(mp_mx) < 6.0f)   id(mp_mdir) = 1;
                if (id(mp_mx) > 292.0f) id(mp_mdir) = -1;
                if (id(mp_x) + 20 > id(mp_mx) && id(mp_x) < id(mp_mx) + 22 && feet >= 190.0f && id(mp_y) < 214.0f) {
                  if (id(mp_vy) > 0 && feet <= 202.0f) {
                    id(mp_sc) += 1;
                    id(mp_vy) = -6.5f;
                    id(mp_mx) = 20.0f + random_float() * 260.0f;
                  } else {
                    id(mp_lives) -= 1;
                    id(mp_x) = 20.0f; id(mp_y) = 180.0f; id(mp_vy) = 0;
                    if (id(mp_lives) <= 0) id(mp_run) = false;
                  }
                }
            - lvgl.widget.update: { id: mp_player, x: !lambda 'return (int) id(mp_x);', y: !lambda 'return (int) id(mp_y);' }
            - lvgl.widget.update: { id: mp_mush,   x: !lambda 'return (int) id(mp_mx);' }
            - lvgl.label.update:  { id: mp_lbl, text: !lambda 'char b[8]; snprintf(b, sizeof(b), "%d", id(mp_sc)); return std::string(b);' }
            - lvgl.label.update:  { id: mp_lives_lbl, text: !lambda 'char b[12]; snprintf(b, sizeof(b), "LIVES %d", id(mp_lives)); return std::string(b);' }
            - if:
                condition: { lambda: 'return !id(mp_run);' }
                then:
                  - lvgl.label.update: { id: mp_msg, text: "GAME OVER" }
                  - script.execute: { id: led_flash, r: 100, g: 60, b: 15 }
                  - script.execute: head_shake
  # AI-AGENT "WORKING" PULSE — while an agent is active (its status badge is up), gently pulse
  # the badge's colour so you can tell at a glance the AI is doing something.
  - interval: 550ms
    then:
      - if:
          condition: { lambda: 'return id(g_agent) && !id(g_sleep) && !id(g_saver);' }
          then:
            - globals.set: { id: g_apulse, value: !lambda 'return !id(g_apulse);' }
            - lvgl.label.update:
                id: lbl_agent
                text_color: !lambda 'return id(g_apulse) ? lv_color_hex(0x5dffe0) : lv_color_hex(0x1f8a7a);'
  # DOOM-3D raycaster — ~15 fps. Joystick turns (yaw) + walks (pitch, with wall collision), the
  # button shoots. Each of the 40 wall columns is one ray: march it across the 8x8 map, then size
  # + shade the column by the fisheye-corrected hit distance (E/W faces a touch darker for depth).
  - interval: 66ms
    then:
      - if:
          condition:
            and:
              - lvgl.page.is_showing: page_doom3d
              - lambda: 'return id(r3_run);'
          then:
            - lambda: |-
                static const uint8_t M[8][8] = {
                  {2,2,2,2,2,2,2,2},
                  {2,0,0,0,0,0,0,3},
                  {2,0,0,1,1,0,0,3},
                  {2,0,0,0,0,0,0,3},
                  {2,0,1,0,0,1,0,3},
                  {2,0,0,0,0,0,0,3},
                  {2,0,0,0,0,0,0,3},
                  {2,2,2,2,2,2,2,2},
                };
                static lv_obj_t* COL[40] = {
                  id(dw00),id(dw01),id(dw02),id(dw03),id(dw04),id(dw05),id(dw06),id(dw07),
                  id(dw08),id(dw09),id(dw10),id(dw11),id(dw12),id(dw13),id(dw14),id(dw15),
                  id(dw16),id(dw17),id(dw18),id(dw19),id(dw20),id(dw21),id(dw22),id(dw23),
                  id(dw24),id(dw25),id(dw26),id(dw27),id(dw28),id(dw29),id(dw30),id(dw31),
                  id(dw32),id(dw33),id(dw34),id(dw35),id(dw36),id(dw37),id(dw38),id(dw39),
                };
                float yaw = id(g_rc_yaw);
                if (yaw > 30.0f) id(r3_pa) += 0.05f;
                else if (yaw < -30.0f) id(r3_pa) -= 0.05f;
                float pit = id(g_rc_pitch);
                float mv = (pit < 188.0f) ? 0.07f : ((pit > 232.0f) ? -0.07f : 0.0f);
                if (mv != 0.0f) {
                  float nx = id(r3_px) + cosf(id(r3_pa)) * mv;
                  float ny = id(r3_py) + sinf(id(r3_pa)) * mv;
                  int px0 = (int) id(r3_px), py0 = (int) id(r3_py);
                  int nxc = (int) nx, nyc = (int) ny;
                  if (px0 >= 0 && px0 < 8 && py0 >= 0 && py0 < 8) {
                    if (nxc >= 0 && nxc < 8 && M[py0][nxc] == 0) id(r3_px) = nx;
                    if (nyc >= 0 && nyc < 8 && M[nyc][px0] == 0) id(r3_py) = ny;
                  }
                }
                bool pressed = (id(g_rc_btn) != 0) || (id(g_rc_btna) != 0);
                bool sb = pressed && !id(r3_bp);
                id(r3_bp) = pressed;
                bool shot = false;
                if (sb && id(r3_ammo) > 0) { id(r3_ammo) -= 1; id(r3_flash) = 3; shot = true; }
                if (id(r3_flash) > 0) id(r3_flash) -= 1;
                static float zbuf[40];
                const float FOV = 1.05f;
                for (int i = 0; i < 40; i++) {
                  float ra = id(r3_pa) - FOV * 0.5f + FOV * ((float) i / 39.0f);
                  float rc = cosf(ra), rs = sinf(ra);
                  float dist = 0.0f; int side = 0; int wtype = 1;
                  for (int s = 0; s < 160; s++) {
                    dist += 0.05f;
                    float x = id(r3_px) + rc * dist;
                    float y = id(r3_py) + rs * dist;
                    int mx = (int) x, my = (int) y;
                    if (mx < 0 || mx >= 8 || my < 0 || my >= 8) break;
                    if (M[my][mx] != 0) {
                      wtype = M[my][mx];
                      float fx = x - mx; if (fx > 0.5f) fx = 1.0f - fx;
                      float fy = y - my; if (fy > 0.5f) fy = 1.0f - fy;
                      side = (fx < fy) ? 0 : 1;
                      break;
                    }
                  }
                  float corr = dist * cosf(ra - id(r3_pa));
                  if (corr < 0.2f) corr = 0.2f;
                  int h = (int) (150.0f / corr);
                  if (h > 200) h = 200;
                  if (h < 2) h = 2;
                  int yy = 100 - h / 2;
                  int sh = 210 - (int) (corr * 20.0f);
                  if (sh < 45) sh = 45;
                  if (sh > 210) sh = 210;
                  if (side != 0) sh = sh * 65 / 100;
                  uint32_t r = sh, g = sh, b = sh;
                  if (wtype == 2)      { r = (uint32_t)(sh * 60 / 100); g = (uint32_t)(sh * 68 / 100); b = (uint32_t) sh; }               // steel-blue tech
                  else if (wtype == 3) { r = (uint32_t)(sh * 45 / 100); g = (uint32_t) sh;             b = (uint32_t)(sh * 45 / 100); }    // green tech
                  else                 { r = (uint32_t) sh;             g = (uint32_t)(sh * 62 / 100); b = (uint32_t)(sh * 40 / 100); }    // brown
                  uint32_t col = (r << 16) | (g << 8) | b;
                  zbuf[i] = corr;
                  lv_obj_set_height(COL[i], h);
                  lv_obj_set_y(COL[i], yy);
                  lv_obj_set_style_bg_color(COL[i], lv_color_hex(col), 0);
                }
                static lv_obj_t* ESP[4] = { id(e_spr0), id(e_spr1), id(e_spr2), id(e_spr3) };
                int hitT = -1; float hitA = 0.16f;
                for (int e = 0; e < 4; e++) {
                  if (id(en_alive)[e] == 0) { lv_obj_add_flag(ESP[e], LV_OBJ_FLAG_HIDDEN); continue; }
                  float ex = id(en_x)[e], ey = id(en_y)[e];
                  float ddx = id(r3_px) - ex, ddy = id(r3_py) - ey;
                  float ed = sqrtf(ddx * ddx + ddy * ddy);
                  if (ed > 0.7f) {
                    float mxs = ex + (ddx / ed) * 0.018f, mys = ey + (ddy / ed) * 0.018f;
                    if ((int) ey >= 0 && (int) ey < 8 && (int) mxs >= 0 && (int) mxs < 8 && M[(int) ey][(int) mxs] == 0) ex = mxs;
                    if ((int) mys >= 0 && (int) mys < 8 && (int) ex >= 0 && (int) ex < 8 && M[(int) mys][(int) ex] == 0) ey = mys;
                    id(en_x)[e] = ex; id(en_y)[e] = ey;
                  } else if (id(r3_hit) == 0) {
                    id(r3_hp) -= 4; id(r3_hit) = 3;
                  }
                  float dx = ex - id(r3_px), dy = ey - id(r3_py);
                  float edist = sqrtf(dx * dx + dy * dy);
                  float eang = atan2f(dy, dx) - id(r3_pa);
                  while (eang >  3.14159f) eang -= 6.28318f;
                  while (eang < -3.14159f) eang += 6.28318f;
                  if (fabsf(eang) > FOV * 0.55f || edist < 0.25f) { lv_obj_add_flag(ESP[e], LV_OBJ_FLAG_HIDDEN); continue; }
                  int zc = (int) ((eang / (FOV * 0.5f) * 0.5f + 0.5f) * 39.0f);
                  if (zc < 0) zc = 0;
                  if (zc > 39) zc = 39;
                  if (edist > zbuf[zc] + 0.3f) { lv_obj_add_flag(ESP[e], LV_OBJ_FLAG_HIDDEN); continue; }
                  int sx = (int) (160.0f + (eang / (FOV * 0.5f)) * 160.0f);
                  int esz = (int) (150.0f / edist);
                  if (esz > 200) esz = 200;
                  if (esz < 8) esz = 8;
                  int ew = esz * 3 / 4;
                  int eyp = 100 - esz / 2 + esz / 8;
                  lv_obj_set_size(ESP[e], ew, esz);
                  lv_obj_set_pos(ESP[e], sx - ew / 2, eyp);
                  lv_obj_clear_flag(ESP[e], LV_OBJ_FLAG_HIDDEN);
                  if (fabsf(eang) < hitA) { hitA = fabsf(eang); hitT = e; }
                }
                if (shot && hitT >= 0) {
                  id(en_alive)[hitT] = 0;
                  id(r3_kills) += 1;
                  lv_obj_add_flag(ESP[hitT], LV_OBJ_FLAG_HIDDEN);
                }
                if (id(r3_hit) > 0) id(r3_hit) -= 1;
                if (id(r3_hp) <= 0 && !id(r3_over)) { id(r3_hp) = 0; id(r3_over) = true; id(r3_run) = false; }
            - if:
                condition: { lambda: 'return id(r3_flash) > 0;' }
                then: [ { lvgl.widget.show: d3_muzzle } ]
                else: [ { lvgl.widget.hide: d3_muzzle } ]
            - if:
                condition: { lambda: 'return id(r3_hit) > 0;' }
                then: [ { lvgl.widget.show: d3_blood } ]
                else: [ { lvgl.widget.hide: d3_blood } ]
            - if:
                condition: { lambda: 'return id(r3_over);' }
                then:
                  - lvgl.label.update: { id: d3_over, text: "YOU DIED" }
                  - lvgl.widget.hide: d3_muzzle
                  - script.execute: { id: led_flash, r: 100, g: 5, b: 0 }
            - lvgl.label.update: { id: d3_ammo_n,  text: !lambda 'char b[8]; snprintf(b, sizeof(b), "%d", id(r3_ammo)); return std::string(b);' }
            - lvgl.label.update: { id: d3_hp_n,    text: !lambda 'char b[8]; snprintf(b, sizeof(b), "%d", id(r3_hp) < 0 ? 0 : id(r3_hp)); return std::string(b);' }
            - lvgl.label.update: { id: d3_kills_n, text: !lambda 'char b[8]; snprintf(b, sizeof(b), "%d", id(r3_kills)); return std::string(b);' }
            - lvgl.widget.update:
                id: d3_face
                bg_color: !lambda |-
                  if (id(r3_hit) > 0) return lv_color_hex(0xd85a4a);
                  int hp = id(r3_hp);
                  if (hp < 30) return lv_color_hex(0xa8674a);
                  if (hp < 60) return lv_color_hex(0xb87e56);
                  return lv_color_hex(0xc0895a);
  # AUTO-PUNCH — with the gloves on, a chance every few seconds to throw a jab (face page only).
  - interval: 3200ms
    then:
      - if:
          condition:
            and:
              - lvgl.page.is_showing: page_face
              - lambda: 'return id(g_gloves) && !id(g_sleep) && !id(g_saver) && !id(g_voice) && !id(g_flash) && random_float() < 0.55;'
          then:
            - script.execute: punch
  # (antennae wiggle interval removed with the dead antennae widgets)
  # SLEEP BREATHING — while asleep ON THE CHARGER, the LED bar "breathes" very dimly
  # (the EMO/Vector charger-snooze everyone loves). Gated on Mood LEDs; goes fully
  # dark the moment it wakes or is unplugged.
  - interval: 4s
    then:
      - if:
          condition: { lambda: 'return id(g_sleep) && id(g_batt_chg) && id(sw_mood_led).state;' }
          then:
            - light.turn_on:
                id: stackchan_light_bar
                red: 0%
                green: 90%
                blue: 80%
                brightness: !lambda 'return (id(g_anim) % 2) ? 0.07f : 0.03f;'
            - globals.set: { id: g_breath, value: "true" }
          else:
            - if:
                condition: { lambda: 'return id(g_breath);' }
                then:
                  - light.turn_off: stackchan_light_bar
                  - globals.set: { id: g_breath, value: "false" }
  # Random blink (never while sleeping / listening / talking — nor on the dizzy x-eyes,
  # which aren't real eyes and used to flash full-width slits over the x-es every blink).
  - interval: 1s
    then:
      - if:
          condition:
            lambda: 'return id(sw_blink).state && !id(g_sleep) && !id(g_talk) && !id(g_listen) && !id(g_saver) && id(g_expr) != 7 && random_float() < 0.22;'
          then:
            - globals.set: { id: g_blink, value: "true" }
            - script.execute: render_face
            - delay: 160ms
            - globals.set: { id: g_blink, value: "false" }
            - script.execute: render_face
  # EXTERNAL SPEECH → talking mouth. dravix TTS (chat replies, notifications, timers,
  # birthday lines) plays on va_media_player WITHOUT the voice pipeline, so g_talk never
  # fired and the mouth sat still while the robot was clearly speaking. Watch playback
  # and animate the mouth for the duration (the pipeline's own states always win).
  - interval: 500ms
    then:
      - lambda: |-
          bool playing = !id(g_voice) && !id(g_sleep) && !id(g_saver)
                         && (id(va_media_player).state == media_player::MEDIA_PLAYER_STATE_PLAYING
                             || id(va_media_player).state == media_player::MEDIA_PLAYER_STATE_ANNOUNCING);
          if (playing != id(g_ext_talk)) {
            id(g_ext_talk) = playing;
            id(g_talk) = playing;
            id(render_face).execute();
          }
  # Sleep "zzz" + talking mouth + screensaver breathing animation.
  - interval: 600ms
    then:
      - globals.set: { id: g_anim, value: !lambda 'return id(g_anim) + 1;' }
      - if:
          # in sleep, keep animating only while the backlight is still on (it goes fully off
          # ~2s in) — re-rendering an invisible zzz all night is pure SPI/CPU churn.
          condition: { lambda: 'return id(g_talk) || id(g_saver) || (id(g_sleep) && id(lcd_backlight).current_values.is_on());' }
          then: [ { script.execute: render_face } ]
      # BREATHING — the whole face rises/settles on a slow ~5s sine (the original's
      # breath modifier). Idle awake only; pauses for 5s after any glance so the
      # glance's vertical offset isn't immediately stomped.
      - if:
          condition:
            lambda: |-
              return !id(g_sleep) && !id(g_saver) && !id(g_listen) && !id(g_talk) && !id(g_voice)
                     && ((long) millis() - id(g_glance_ms)) > 5000;
          then:
            - lvgl.widget.update:
                id: face_box
                y: !lambda 'const int b[] = {0, -2, -3, -2, 0, 2, 3, 2}; return b[id(g_anim) % 8];'
  # SPEAKING MOTION — tiny conversational head sways while it talks (the original's
  # speaking modifier): small ABSOLUTE yaw targets so they can never wander off-centre.
  - interval: 2300ms
    then:
      - if:
          condition:
            lambda: |-
              return id(g_talk) && id(sw_move).state && !std::isnan(id(servo_x_angle).state)
                     && !id(g_night) && !id(g_focus) && !id(g_quiet);
          then:
            - number.set:
                id: servo_x_angle
                value: !lambda 'id(g_move_ms) = (long) millis(); return random_float() * 16.0f - 8.0f;'
  # "Alive" looking-around — TRULY random: it skips a beat sometimes (irregular
  # timing), varies how far it looks, and mixes yaw glances with pitch tilts and an
  # occasional look-up "stretch", so it never repeats the same move twice in a row.
  # Only when fully awake (not screensaver/sleep/busy/calm modes).
  - interval: 9s
    then:
      # ~30% of ticks it simply doesn't move at all — rhythm is what kills realism
      - if:
          condition:
            lambda: |-
              return id(sw_drift).state && !id(g_sleep) && !id(g_saver) && !id(g_busy)
                     && !id(g_night) && !id(g_focus) && !id(g_quiet) && random_float() < 0.7;
          then:
            - lvgl.widget.update:
                id: face_box
                x: !lambda 'id(g_glance_ms) = (long) millis(); return (int)(random_float() * 32 - 16);'
                y: !lambda 'return (int)(random_float() * 18 - 9);'
      # …and sometimes the HEAD moves too — ABSOLUTE small angles around centre (never
      # accumulates), with a random FLAVOUR each time: a yaw glance, a pitch tilt,
      # or both (a little diagonal look).
      - if:
          condition:
            and:
              - lvgl.page.is_showing: page_face      # ONLY glance the head while the FACE is on screen
              - lambda: |-
                  return id(sw_move).state && id(sw_drift).state && !id(g_sleep) && !id(g_saver)
                         && !id(g_busy) && !id(g_night) && !id(g_focus) && !id(g_quiet) && !id(g_voice)
                         && !std::isnan(id(servo_x_angle).state) && random_float() < 0.14;
          then:
            - number.set:
                id: servo_x_angle
                value: !lambda |-
                  id(g_move_ms) = (long) millis();
                  // vary the reach too: mostly small (±8), sometimes a wider look (±14)
                  float span = (random_float() < 0.3f) ? 14.0f : 8.0f;
                  return random_float() * 2.0f * span - span;
            - delay: 350ms   # serial-bus spacing before a possible pitch write
            - if:
                condition: { lambda: 'return random_float() < 0.45 && !std::isnan(id(n_head_pitch).state);' }
                then:
                  - number.set:
                      id: n_head_pitch
                      value: !lambda 'return 160.0f + random_float() * 16.0f;'   # tilt: 160..176
      # ...and drift back roughly (not exactly!) to centre about half the time.
      - if:
          condition: { lambda: 'return id(sw_drift).state && !id(g_sleep) && !id(g_saver) && random_float() < 0.5;' }
          then:
            - delay: !lambda 'return (uint32_t)(1500 + random_float() * 3000);'   # 1.5-4.5s, varies
            - lvgl.widget.update:
                id: face_box
                x: !lambda 'return (int)(random_float() * 8 - 4);'
                y: !lambda 'return (int)(random_float() * 6 - 3);'
  # Refresh the status labels + the dynamic card labels (from the text slots dravix writes).
  - interval: 5s
    then:
      # Soft clock on the screensaver (empty otherwise).
      - lvgl.label.update:
          id: lbl_clock
          text: !lambda |-
            if (!id(g_saver)) return std::string("");
            auto t = id(dravix_time).now();
            if (!t.is_valid()) return std::string("");
            char b[8]; snprintf(b, sizeof(b), "%02d:%02d", t.hour, t.minute);
            return std::string(b);
      # Low-battery badge on the face page (empty = hidden; silent while charging).
      - lvgl.label.update:
          id: lbl_face_batt
          text: !lambda |-
            if (!id(g_batt_chg) && id(battery_pct).has_state() && id(battery_pct).state < 20) {
              char b[12]; snprintf(b, sizeof(b), "%.0f%%", id(battery_pct).state);
              return std::string(b);
            }
            return std::string("");
      # LOW-BATTERY worried "uh-oh" — once when it dips below 15%; re-arms after charging past 25%.
      - if:
          condition:
            lambda: |-
              return !id(g_batt_chg) && id(battery_pct).has_state()
                     && id(battery_pct).state < 15 && !id(g_lowbatt);
          then:
            - globals.set: { id: g_lowbatt, value: "true" }
            - if:
                condition: { lambda: 'return id(sw_sfx).state && !id(g_quiet) && !id(g_night);' }
                then: [ { rtttl.play: "low:d=8,o=4,b=120:c,g#" } ]
            - script.execute: head_shake
      - if:
          condition: { lambda: 'return id(g_batt_chg) || (id(battery_pct).has_state() && id(battery_pct).state > 25);' }
          then: [ { globals.set: { id: g_lowbatt, value: "false" } } ]
      - lvgl.label.update: { id: lbl_c1_title, text: !lambda 'return id(t_c1_title).state;' }
      - lvgl.label.update: { id: lbl_c2_title, text: !lambda 'return id(t_c2_title).state;' }
      - lvgl.label.update: { id: lbl_c3_title, text: !lambda 'return id(t_c3_title).state;' }
      # split each card body into its 4 tappable rows (line k → row k; empty → hidden)
      - lvgl.label.update: { id: lbl_c1_r0, text: !lambda 'std::string b = id(t_c1_body).state; size_t s = 0; for (int i = 0; i < 0; i++) { size_t p = b.find(10, s); if (p == std::string::npos) return std::string(""); s = p + 1; } size_t e = b.find(10, s); return b.substr(s, e == std::string::npos ? std::string::npos : e - s);' }
      - lvgl.label.update: { id: lbl_c1_r1, text: !lambda 'std::string b = id(t_c1_body).state; size_t s = 0; for (int i = 0; i < 1; i++) { size_t p = b.find(10, s); if (p == std::string::npos) return std::string(""); s = p + 1; } size_t e = b.find(10, s); return b.substr(s, e == std::string::npos ? std::string::npos : e - s);' }
      - lvgl.label.update: { id: lbl_c1_r2, text: !lambda 'std::string b = id(t_c1_body).state; size_t s = 0; for (int i = 0; i < 2; i++) { size_t p = b.find(10, s); if (p == std::string::npos) return std::string(""); s = p + 1; } size_t e = b.find(10, s); return b.substr(s, e == std::string::npos ? std::string::npos : e - s);' }
      - lvgl.label.update: { id: lbl_c1_r3, text: !lambda 'std::string b = id(t_c1_body).state; size_t s = 0; for (int i = 0; i < 3; i++) { size_t p = b.find(10, s); if (p == std::string::npos) return std::string(""); s = p + 1; } size_t e = b.find(10, s); return b.substr(s, e == std::string::npos ? std::string::npos : e - s);' }
      - lvgl.label.update: { id: lbl_c2_r0, text: !lambda 'std::string b = id(t_c2_body).state; size_t s = 0; for (int i = 0; i < 0; i++) { size_t p = b.find(10, s); if (p == std::string::npos) return std::string(""); s = p + 1; } size_t e = b.find(10, s); return b.substr(s, e == std::string::npos ? std::string::npos : e - s);' }
      - lvgl.label.update: { id: lbl_c2_r1, text: !lambda 'std::string b = id(t_c2_body).state; size_t s = 0; for (int i = 0; i < 1; i++) { size_t p = b.find(10, s); if (p == std::string::npos) return std::string(""); s = p + 1; } size_t e = b.find(10, s); return b.substr(s, e == std::string::npos ? std::string::npos : e - s);' }
      - lvgl.label.update: { id: lbl_c2_r2, text: !lambda 'std::string b = id(t_c2_body).state; size_t s = 0; for (int i = 0; i < 2; i++) { size_t p = b.find(10, s); if (p == std::string::npos) return std::string(""); s = p + 1; } size_t e = b.find(10, s); return b.substr(s, e == std::string::npos ? std::string::npos : e - s);' }
      - lvgl.label.update: { id: lbl_c2_r3, text: !lambda 'std::string b = id(t_c2_body).state; size_t s = 0; for (int i = 0; i < 3; i++) { size_t p = b.find(10, s); if (p == std::string::npos) return std::string(""); s = p + 1; } size_t e = b.find(10, s); return b.substr(s, e == std::string::npos ? std::string::npos : e - s);' }
      - lvgl.label.update: { id: lbl_c3_r0, text: !lambda 'std::string b = id(t_c3_body).state; size_t s = 0; for (int i = 0; i < 0; i++) { size_t p = b.find(10, s); if (p == std::string::npos) return std::string(""); s = p + 1; } size_t e = b.find(10, s); return b.substr(s, e == std::string::npos ? std::string::npos : e - s);' }
      - lvgl.label.update: { id: lbl_c3_r1, text: !lambda 'std::string b = id(t_c3_body).state; size_t s = 0; for (int i = 0; i < 1; i++) { size_t p = b.find(10, s); if (p == std::string::npos) return std::string(""); s = p + 1; } size_t e = b.find(10, s); return b.substr(s, e == std::string::npos ? std::string::npos : e - s);' }
      - lvgl.label.update: { id: lbl_c3_r2, text: !lambda 'std::string b = id(t_c3_body).state; size_t s = 0; for (int i = 0; i < 2; i++) { size_t p = b.find(10, s); if (p == std::string::npos) return std::string(""); s = p + 1; } size_t e = b.find(10, s); return b.substr(s, e == std::string::npos ? std::string::npos : e - s);' }
      - lvgl.label.update: { id: lbl_c3_r3, text: !lambda 'std::string b = id(t_c3_body).state; size_t s = 0; for (int i = 0; i < 3; i++) { size_t p = b.find(10, s); if (p == std::string::npos) return std::string(""); s = p + 1; } size_t e = b.find(10, s); return b.substr(s, e == std::string::npos ? std::string::npos : e - s);' }
      # FREE POSITIONING (dashboard drag-and-drop) — a row whose text starts with "x,y|" jumps
      # to (x,y) as a small 150x46 card; without the prefix it keeps the default full-width stack
      # (backward compatible). The "x,y|" prefix is stripped so only the entity text is shown.
      - lambda: |-
          auto place = [](lv_obj_t* row, lv_obj_t* lbl) {
            const char* t = lv_label_get_text(lbl);
            std::string s = t ? t : "";
            size_t bar = s.find('|');
            if (bar == std::string::npos) return;
            std::string pos = s.substr(0, bar);
            size_t comma = pos.find(',');
            if (comma == std::string::npos) return;
            lv_obj_set_size(row, 150, 46);
            lv_obj_set_pos(row, atoi(pos.substr(0, comma).c_str()), atoi(pos.substr(comma + 1).c_str()));
            lv_label_set_text(lbl, s.substr(bar + 1).c_str());
          };
          place(id(c1_r0), id(lbl_c1_r0)); place(id(c1_r1), id(lbl_c1_r1)); place(id(c1_r2), id(lbl_c1_r2)); place(id(c1_r3), id(lbl_c1_r3));
          place(id(c2_r0), id(lbl_c2_r0)); place(id(c2_r1), id(lbl_c2_r1)); place(id(c2_r2), id(lbl_c2_r2)); place(id(c2_r3), id(lbl_c2_r3));
          place(id(c3_r0), id(lbl_c3_r0)); place(id(c3_r1), id(lbl_c3_r1)); place(id(c3_r2), id(lbl_c3_r2)); place(id(c3_r3), id(lbl_c3_r3));
      # Mushroom-style chip colour per row, read from the row's own text: active → amber,
      # off/closed/locked → grey, sensor/other → blue, empty → blends into the card.
      - lambda: |-
          auto chip = [](lv_obj_t* ch, const char* txt) {
            std::string s = txt ? txt : "";
            lv_color_t c;
            if (s.empty()) c = lv_color_hex(0x121821);
            else if (s.find("ON") != std::string::npos || s.find("OPEN") != std::string::npos || s.find("PLAY") != std::string::npos) c = lv_color_hex(0xF5A623);
            else if (s.find("OFF") != std::string::npos || s.find("CLOS") != std::string::npos || s.find("LOCK") != std::string::npos) c = lv_color_hex(0x555b66);
            else c = lv_color_hex(0x4a90d9);
            lv_obj_set_style_bg_color(ch, c, 0);
          };
          chip(id(chip_c1_r0), lv_label_get_text(id(lbl_c1_r0)));
          chip(id(chip_c1_r1), lv_label_get_text(id(lbl_c1_r1)));
          chip(id(chip_c1_r2), lv_label_get_text(id(lbl_c1_r2)));
          chip(id(chip_c1_r3), lv_label_get_text(id(lbl_c1_r3)));
          chip(id(chip_c2_r0), lv_label_get_text(id(lbl_c2_r0)));
          chip(id(chip_c2_r1), lv_label_get_text(id(lbl_c2_r1)));
          chip(id(chip_c2_r2), lv_label_get_text(id(lbl_c2_r2)));
          chip(id(chip_c2_r3), lv_label_get_text(id(lbl_c2_r3)));
          chip(id(chip_c3_r0), lv_label_get_text(id(lbl_c3_r0)));
          chip(id(chip_c3_r1), lv_label_get_text(id(lbl_c3_r1)));
          chip(id(chip_c3_r2), lv_label_get_text(id(lbl_c3_r2)));
          chip(id(chip_c3_r3), lv_label_get_text(id(lbl_c3_r3)));
      # rows with no entity behind them disappear (count the body's lines)
      - lambda: |-
          auto rows_of = [](const std::string &b) -> int {
            if (b.empty()) return 0;
            int n = 1;
            for (char c : b) if (c == '\n') n++;
            return n;
          };
          int n1 = rows_of(id(t_c1_body).state);
          int n2 = rows_of(id(t_c2_body).state);
          int n3 = rows_of(id(t_c3_body).state);
          lv_obj_t *c1[4] = {id(c1_r0), id(c1_r1), id(c1_r2), id(c1_r3)};
          lv_obj_t *c2[4] = {id(c2_r0), id(c2_r1), id(c2_r2), id(c2_r3)};
          lv_obj_t *c3[4] = {id(c3_r0), id(c3_r1), id(c3_r2), id(c3_r3)};
          for (int i = 0; i < 4; i++) {
            if (i < n1) lv_obj_clear_flag(c1[i], LV_OBJ_FLAG_HIDDEN); else lv_obj_add_flag(c1[i], LV_OBJ_FLAG_HIDDEN);
            if (i < n2) lv_obj_clear_flag(c2[i], LV_OBJ_FLAG_HIDDEN); else lv_obj_add_flag(c2[i], LV_OBJ_FLAG_HIDDEN);
            if (i < n3) lv_obj_clear_flag(c3[i], LV_OBJ_FLAG_HIDDEN); else lv_obj_add_flag(c3[i], LV_OBJ_FLAG_HIDDEN);
          }
      # ── status-bar overlay (compact time · date · battery · wifi) ──
      - lvgl.label.update:
          id: sb_time
          text: !lambda |-
            auto t = id(dravix_time).now();
            if (!t.is_valid()) return std::string("--:--");
            char b[8]; snprintf(b, sizeof(b), "%02d:%02d", t.hour, t.minute);
            return std::string(b);
      - lvgl.label.update:
          id: sb_date
          text: !lambda |-
            auto t = id(dravix_time).now();
            if (!t.is_valid()) return std::string("");
            char b[16]; snprintf(b, sizeof(b), "%02d/%02d", t.day_of_month, t.month);
            return std::string(b);
      - lvgl.label.update:
          id: sb_batt
          text: !lambda |-
            if (!id(battery_pct).has_state()) return std::string("--%");
            char b[10];
            snprintf(b, sizeof(b), "%.0f%%%s", id(battery_pct).state, id(g_batt_chg) ? "+" : "");
            return std::string(b);
      # battery label colour tells the story at a glance: charging=cyan · low=red · ok=green
      - if:
          condition: { lambda: 'return id(g_batt_chg);' }
          then: [ { lvgl.label.update: { id: sb_batt, text_color: 0x33E6C8 } } ]
          else:
            - if:
                condition: { lambda: 'return id(battery_pct).has_state() && id(battery_pct).state < 20;' }
                then: [ { lvgl.label.update: { id: sb_batt, text_color: 0xE05555 } } ]
                else: [ { lvgl.label.update: { id: sb_batt, text_color: 0x5dffa0 } } ]
      - lvgl.bar.update:
          id: sb_bat_f
          value: !lambda 'return id(battery_pct).has_state() ? (int) id(battery_pct).state : 0;'
      # row 2 — battery TIME-LEFT only (the raw W/mA still live in HA as the INA226
      # sensors; the user asked to keep this line clean). While charging just say so —
      # a time-left would be a lie there, the charger pulls the voltage up.
      - lvgl.label.update:
          id: sb_power
          text: !lambda |-
            char b[24];
            float ma = id(ha_curr).has_state() ? fabsf(id(ha_curr).state) * 1000.0f : 0.0f;
            if (id(g_batt_chg)) {
              snprintf(b, sizeof(b), "charging");
            } else if (id(battery_pct).has_state() && ma > 20.0f) {
              float hours = (id(battery_pct).state * ${battery_mah}.0f / 100.0f) / ma;   // pack size from substitutions
              snprintf(b, sizeof(b), "~%.1fh left", hours);
            } else {
              return std::string("");
            }
            return std::string(b);
      # keep the sliders mirroring the real values (each skips while it's being touched)
      - if:
          condition: { lambda: 'return !lv_obj_has_state(id(sl_vol), LV_STATE_PRESSED);' }
          then:
            - lvgl.slider.update:
                id: sl_vol
                value: !lambda 'return (int)(id(va_media_player).volume * 100.0f);'
      - if:
          condition: { lambda: 'return !lv_obj_has_state(id(sl_scr), LV_STATE_PRESSED);' }
          then:
            - lvgl.slider.update: { id: sl_scr, value: !lambda 'return (int) id(n_brightness).state;' }
      - if:
          condition: { lambda: 'return !lv_obj_has_state(id(sl_led), LV_STATE_PRESSED);' }
          then:
            - lvgl.slider.update:
                id: sl_led
                value: !lambda 'return (int)(id(stackchan_light_bar).remote_values.is_on() ? id(stackchan_light_bar).remote_values.get_brightness() * 100.0f : 0.0f);'
      # UPDATE arrow — newer firmware is waiting (dravix keeps "Latest firmware" fresh)
      - if:
          condition:
            lambda: |-
              return id(t_latest_fw).has_state() && !id(t_latest_fw).state.empty()
                     && id(t_latest_fw).state != "${fw_version}";
          then: [ { lvgl.widget.show: upd_a1 }, { lvgl.widget.show: upd_a2 }, { lvgl.widget.show: upd_badge } ]
          else: [ { lvgl.widget.hide: upd_a1 }, { lvgl.widget.hide: upd_a2 }, { lvgl.widget.hide: upd_badge } ]
      # WiFi signal → reveal more bars as it gets stronger
      - if:
          condition: { lambda: 'return id(wifi_db).state < -78;' }
          then: [ { lvgl.widget.hide: sb_w2 } ]
          else: [ { lvgl.widget.show: sb_w2 } ]
      - if:
          condition: { lambda: 'return id(wifi_db).state < -68;' }
          then: [ { lvgl.widget.hide: sb_w3 } ]
          else: [ { lvgl.widget.show: sb_w3 } ]
      - if:
          condition: { lambda: 'return id(wifi_db).state < -58;' }
          then: [ { lvgl.widget.hide: sb_w4 } ]
          else: [ { lvgl.widget.show: sb_w4 } ]
      # vitals bars (dravix pushes the 0-100 values into the number entities)
      - lvgl.bar.update: { id: bar_energy, value: !lambda 'return (int) id(n_vital_energy).state;' }
      - lvgl.bar.update: { id: bar_food,   value: !lambda 'return (int) id(n_vital_food).state;' }
      - lvgl.bar.update: { id: bar_fun,    value: !lambda 'return (int) id(n_vital_fun).state;' }
      - lvgl.bar.update: { id: bar_calm,   value: !lambda 'return (int) id(n_vital_calm).state;' }
      # climate page — dravix keeps these slots fresh from the configured AC
      - lvgl.label.update: { id: lbl_clim_name, text: !lambda 'return id(t_clim_name).state.empty() ? std::string("No AC configured") : id(t_clim_name).state;' }
      - lvgl.label.update: { id: lbl_clim_set,  text: !lambda 'return id(t_clim_set).state;' }
      - lvgl.label.update: { id: lbl_clim_info, text: !lambda 'return id(t_clim_info).state;' }

# ── Manual SWIPE detection (ESPHome LVGL has no built-in gesture) ────────────────
touchscreen:
  - id: !extend touch
    on_touch:
      - globals.set: { id: sw_sleep, value: !lambda 'return id(g_sleep);' }
      - lambda: 'id(sw_x0) = 0; id(sw_y0) = 0; id(sw_x1) = 0; id(sw_y1) = 0; id(g_tms) = (long) millis();'
      # Any touch exits the screensaver (restore full brightness + redraw NOW — the dozy
      # breathing eyes and the "screensaver" HA state used to linger until the next blink).
      - if:
          condition: { lambda: 'return id(g_saver) && !id(g_sleep);' }
          then:
            - light.turn_on: { id: lcd_backlight, brightness: !lambda 'return id(n_brightness).state / 100.0;' }
            - globals.set: { id: g_saver, value: "false" }
            - script.execute: render_face
    on_update:
      - lambda: |-
          for (auto t : touches) {
            id(sw_x0) = t.x_org; id(sw_y0) = t.y_org;
            id(sw_x1) = t.x;     id(sw_y1) = t.y;
          }
    on_release:
      # Asleep → wake and stop (don't treat the wake as a swipe).
      - if:
          condition: { lambda: 'return id(sw_sleep);' }
          then:
            - select.set: { id: robot_mode, option: awake }
      # LONG-PRESS (1.2s+) on the FACE → instant sleep. NOT while the status-bar overlay is
      # open — holding a slider knob / the LOCAL button must not put the robot to sleep.
      - if:
          condition:
            and:
              - lvgl.page.is_showing: page_face
              - lambda: |-
                  int dx = id(sw_x1) - id(sw_x0), dy = id(sw_y1) - id(sw_y0);
                  int adx = dx < 0 ? -dx : dx, ady = dy < 0 ? -dy : dy;
                  long dur = (long) millis() - id(g_tms);
                  return !id(sw_sleep) && !id(g_voice) && adx < 40 && ady < 40 && dur > 1200
                         && lv_obj_has_flag(id(statusbar), LV_OBJ_FLAG_HIDDEN);
          then:
            - select.set: { id: robot_mode, option: sleep }
      # PERMISSION up? A quick tap on the face = APPROVE (Reject = the red button on the prompt).
      # (Not through the status-bar overlay.)
      - if:
          condition:
            and:
              - lvgl.page.is_showing: page_face
              - lambda: |-
                  int dx = id(sw_x1) - id(sw_x0), dy = id(sw_y1) - id(sw_y0);
                  int adx = dx < 0 ? -dx : dx, ady = dy < 0 ? -dy : dy;
                  long dur = (long) millis() - id(g_tms);
                  return id(g_perm) && !id(sw_sleep) && adx < 40 && ady < 40 && dur < 700
                         && lv_obj_has_flag(id(statusbar), LV_OBJ_FLAG_HIDDEN);
          then:
            - script.execute: perm_tap_approve
      # FACE TAP: TRIPLE tap (3 within ~350ms each) = STOP everything (panic); DOUBLE tap = toggle
      # the AI (start listening / cancel); a single tap does nothing. Gated by "Tap face to talk".
      # Suppressed while a permission prompt is up (then a tap = approve, above) and while the
      # status-bar overlay is open (two quick taps on LOCAL must not start the voice assistant).
      - if:
          condition:
            and:
              - switch.is_on: sw_tap_talk
              - lvgl.page.is_showing: page_face
              - lambda: |-
                  int dx = id(sw_x1) - id(sw_x0), dy = id(sw_y1) - id(sw_y0);
                  int adx = dx < 0 ? -dx : dx, ady = dy < 0 ? -dy : dy;
                  long dur = (long) millis() - id(g_tms);
                  return !id(sw_sleep) && adx < 40 && ady < 40 && dur < 700 && !id(g_perm)
                         && lv_obj_has_flag(id(statusbar), LV_OBJ_FLAG_HIDDEN);
          then:
            - lambda: |-
                if ((long) millis() - id(g_dc_ms) < 350) id(g_tapc) += 1;
                else id(g_tapc) = 1;
                id(g_dc_ms) = (long) millis();
            - if:
                condition: { lambda: 'return id(g_tapc) >= 3;' }
                then:
                  # ── TRIPLE tap → STOP everything ──
                  - script.stop: tap_single
                  - globals.set: { id: g_tapc, value: "0" }
                  - globals.set: { id: g_dc_ms, value: "0" }
                  - script.execute: panic_stop
                else:
                  # ── 1 or 2 taps → wait a beat (tap_single decides: a settled double = AI) ──
                  - script.execute: tap_single
      # swipe DOWN → status
      - if:
          condition:
            lambda: |-
              int dx = id(sw_x1) - id(sw_x0), dy = id(sw_y1) - id(sw_y0);
              int adx = dx < 0 ? -dx : dx, ady = dy < 0 ? -dy : dy;
              return !id(sw_sleep) && ady > adx && dy > 40;
          then: [ { lvgl.widget.show: statusbar } ]   # slim overlay, not a full page
      # swipe UP → face (home)
      - if:
          condition:
            lambda: |-
              int dx = id(sw_x1) - id(sw_x0), dy = id(sw_y1) - id(sw_y0);
              int adx = dx < 0 ? -dx : dx, ady = dy < 0 ? -dy : dy;
              return !id(sw_sleep) && ady > adx && dy < -40;
          then:
            - globals.set: { id: g_card, value: "0" }
            - lvgl.widget.hide: statusbar
            - lvgl.page.show: page_face
      # swipe LEFT → next screen (face → c1 → c2 → c3 → games → vitals → climate → face)
      # BUT NOT while the status bar is open — there, a horizontal drag is a slider
      # (volume / screen / LED brightness), not a screen change.
      - if:
          condition:
            lambda: |-
              int dx = id(sw_x1) - id(sw_x0), dy = id(sw_y1) - id(sw_y0);
              int adx = dx < 0 ? -dx : dx, ady = dy < 0 ? -dy : dy;
              return !id(sw_sleep) && adx >= ady && dx < -40
                     && lv_obj_has_flag(id(statusbar), LV_OBJ_FLAG_HIDDEN);
          then:
            - globals.set: { id: g_card, value: !lambda 'return (id(g_card) + 1) % 7;' }
            - script.execute: show_card
      # swipe RIGHT → previous screen (blocked while the status bar is open — see above)
      - if:
          condition:
            lambda: |-
              int dx = id(sw_x1) - id(sw_x0), dy = id(sw_y1) - id(sw_y0);
              int adx = dx < 0 ? -dx : dx, ady = dy < 0 ? -dy : dy;
              if (!lv_obj_has_flag(id(statusbar), LV_OBJ_FLAG_HIDDEN)) return false;
              return !id(sw_sleep) && adx >= ady && dx > 40;
          then:
            - globals.set: { id: g_card, value: !lambda 'return (id(g_card) + 6) % 7;' }
            - lvgl.widget.hide: statusbar
            - script.execute: show_card

# ── Wake word "Okay, Nabu" (on-device) ──────────────────────────────────────────
# Heavy TensorFlow compile — flash from a LOCAL ESPHome (not Nabu Casa remote), be
# patient (~10-15 min), and don't refresh the browser mid-build.
micro_wake_word:
  microphone: i2s_mic
  models:
    - model: ${wake_word_model}   # default: say "Okay, Nabu" to wake it
  on_wake_word_detected:
    - voice_assistant.start

voice_assistant:
  microphone: i2s_mic
  media_player: va_media_player
  # Mic tuning for better recognition with the HA Assist pipeline (STT hears you
  # more clearly across the room): suppress noise, auto-level, and boost the mic.
  noise_suppression_level: 2
  auto_gain: 31dBFS
  volume_multiplier: 2.0
  on_listening:
    # PRIVACY HARD-STOP — every on-device start path already refuses while privacy is on,
    # but a session can also be started REMOTELY (HA's assist-satellite services). If one
    # slips through, it dies on the very first event: no listening face, no yellow, no audio.
    - if:
        condition: { switch.is_on: sw_privacy }
        then:
          - voice_assistant.stop
        else:
          - lambda: 'lv_disp_trig_activity(NULL);'   # a conversation is activity — no screensaver
          # a mood flash may be mid-run — stop it so its delayed restore can't fire mid-talk
          - script.stop: led_flash
          # remember the current LEDs — but only at the START of a conversation, and never
          # while a mood flash is showing (the flash already saved the TRUE original colour).
          - if:
              condition: { lambda: 'return !id(g_voice) && !id(g_flash);' }
              then:
                - lambda: |-
                    auto v = id(stackchan_light_bar).current_values;
                    id(led_on)  = v.is_on();
                    id(led_bri) = v.get_brightness();
                    id(led_r)   = v.get_red();
                    id(led_g)   = v.get_green();
                    id(led_b)   = v.get_blue();
          - globals.set: { id: g_flash, value: "false" }   # flash cancelled; save is now ours
          # the wake word DOES wake a sleeping robot — but a question asked in night/focus/quiet
          # must not silently cancel that mode (it kept dropping focus/night to awake).
          - if:
              condition: { lambda: 'return id(g_sleep) || (!id(g_night) && !id(g_focus) && !id(g_quiet) && id(robot_mode).current_option() != std::string("awake"));' }
              then: [ { select.set: { id: robot_mode, option: awake } } ]
          - globals.set: { id: g_listen, value: "true" }
          - globals.set: { id: g_voice, value: "true" }
          - globals.set: { id: g_vad, value: "false" }   # fresh listen window — no voice heard yet
          - script.execute: listen_timeout               # …auto-close if none arrives in ${listen_timeout_s}s
          - lvgl.page.show: page_face
          - globals.set: { id: g_card, value: "0" }
          - script.execute: leds_yellow
          - script.execute: render_face          # the LISTENING FACE (big curious eyes) — no label
          - script.execute: { id: head_nudge, dx: 0, dy: 6 }   # perks up attentively, like it leans in
  on_stt_vad_start:
    # a voice! — disarm the no-voice auto-close for this turn
    - globals.set: { id: g_vad, value: "true" }
  on_stt_end:
    # You finished talking → STOP "listening" and show a "THINKING" face until the reply
    # starts. The LEDs stay YELLOW — one colour from "it hears me" to the end of the AI's
    # speech (the cyan thinking-flash made the turn read as three unrelated events).
    - text_sensor.template.publish: { id: st_heard, state: !lambda 'return x;' }
    - globals.set: { id: g_listen, value: "false" }
    - globals.set: { id: g_think,  value: "true" }
    - script.execute: leds_yellow
    - script.execute: render_face
    - script.execute: { id: head_nudge, dx: 12, dy: -6 }   # tilts up, pondering
  on_tts_start:
    # AI is speaking → "talking" mouth face, stays YELLOW the whole turn (listen + speak).
    - lambda: 'lv_disp_trig_activity(NULL);'
    - text_sensor.template.publish: { id: st_reply, state: !lambda 'return x;' }
    - lvgl.label.update: { id: speech_txt, text: !lambda 'return x;' }   # show what the AI says
    - globals.set: { id: g_listen, value: "false" }
    - globals.set: { id: g_think, value: "false" }
    - globals.set: { id: g_talk, value: "true" }
    - script.execute: leds_yellow
    - script.execute: render_face
  on_end:
    # AI finished the turn → back to the previous face + the previous LEDs (or off).
    - globals.set: { id: g_listen, value: "false" }
    - globals.set: { id: g_talk, value: "false" }
    - globals.set: { id: g_think, value: "false" }
    - globals.set: { id: g_voice, value: "false" }
    - script.execute: render_face
    - script.execute: restore_leds
    - if:
        condition: { switch.is_off: sw_privacy }
        then: [ micro_wake_word.start ]
  on_error:
    # Pipeline error → NEVER stay stuck on yellow/listening; clean up and re-arm the wake word.
    - globals.set: { id: g_listen, value: "false" }
    - globals.set: { id: g_talk, value: "false" }
    - globals.set: { id: g_think, value: "false" }
    - globals.set: { id: g_voice, value: "false" }
    - script.execute: render_face
    - script.execute: restore_leds
    - if:
        condition: { switch.is_off: sw_privacy }
        then: [ micro_wake_word.start ]
