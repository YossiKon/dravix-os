      # ── AI AGENT PERMISSION PROMPT (fw v21) — floats above any page. dravix writes the
      #    request to the t_permission text slot to pop it; the two buttons fire
      #    esphome.dravix_permission {decision} back to dravix, which answers the agent.
      #    Colour-blind-safe: green vs vermillion AND the words Approve / Reject.
      - obj:
          id: perm_box
          align: CENTER
          x: 0
          y: 0
          width: 300
          height: 168
          radius: 16
