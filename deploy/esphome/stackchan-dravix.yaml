        - button: { id: sq2, x: 20,  y: 140, width: 130, height: 88, radius: 10, bg_color: 0x1f3a6b, on_click: [ { script.execute: { id: simon_tap, tap: 2 } } ] }
        - button: { id: sq3, x: 170, y: 140, width: 130, height: 88, radius: 10, bg_color: 0x6b5f1f, on_click: [ { script.execute: { id: simon_tap, tap: 3 } } ] }
        - label: { id: simon_msg, text: "WATCH", text_font: text_font, styles: accent_txt, align: TOP_MID, y: 12 }
        - button:
