name: dravix-os
version: "0.0.73"
slug: dravix_os
description: Companion OS for the M5Stack StackChan robot (local-first)
url: https://github.com/YossiKon/dravix-os
# Pull a prebuilt image from GHCR (built by GitHub Actions) instead of building on
# the user's box. HA replaces {arch}; CI publishes dravix-os-{amd64,aarch64}:<version>.
image: ghcr.io/yossikon/dravix-os-{arch}
arch:
  - amd64
  - aarch64
init: false
# Lets the add-on reach the HA API with the Supervisor's own token — so a fresh install
# needs NO manually created long-lived token (run.sh falls back to SUPERVISOR_TOKEN).
homeassistant_api: true
# The web dashboard + API, plus an "Open Web UI" button on the add-on page.
ports:
  8800/tcp: 8800
ports_description:
  8800/tcp: dravix-os dashboard + API
webui: "http://[HOST]:[PORT:8800]"
# Add-on options → DRAVIX_* env (see run.sh). Persistent state lives in /data.
options:
  # dravix controls the robot through Home Assistant entities exposed by the custom
  # dravix ESPHome firmware on the StackChan (see docs/esphome-local-control.md).
  robot_driver: ha
  # When robot_driver=ha, the StackChan ESPHome entity ids (leave blank what you don't have):
  robot_entity_face: ""          # select.* — expression (neutral|happy|sad|angry|sleepy|doubt)
  robot_entity_head_yaw: ""      # number.* — head left/right
  robot_entity_head_pitch: ""    # number.* — head up/down
  robot_entity_media_player: ""  # media_player.* — the speaker TTS plays on
  robot_entity_tts: ""           # tts.* — your HA TTS engine (e.g. tts.piper) for speech
  robot_entity_light: ""         # light.* — the LED bar
  robot_entity_camera: ""        # camera.* — the robot camera
  # Leave BOTH blank for zero-config: the add-on then talks to HA through the
  # supervisor proxy with its own token. Fill them only for a non-standard setup.
  ha_url: "http://homeassistant:8123"
  ha_token: ""
  ai_provider: ha_assist
  # Language for the robot's wellness tips etc. (the dashboard has its own live toggle).
  language: en
  idle_motion: false             # dravix's own idle glances; OFF by default — the firmware glances on its own and freezes in sleep/focus/quiet (on = double motion)
  # Seeds the dashboard's isLocal toggle on the VERY FIRST run only — from then on the
  # toggle is the user's explicit choice and this option is ignored (never auto-flips).
  local_only: true
  frigate_url: ""
  frigate_camera: ""
  log_level: INFO
schema:
  robot_driver: "list(ha)"
  robot_entity_face: "str?"
  robot_entity_head_yaw: "str?"
  robot_entity_head_pitch: "str?"
  robot_entity_media_player: "str?"
  robot_entity_tts: "str?"
  robot_entity_light: "str?"
  robot_entity_camera: "str?"
  ha_url: str
  ha_token: "str?"
  ai_provider: "list(ha_assist|claude|openai|ollama)"
  language: "list(en|he)"
  idle_motion: bool
  local_only: bool
  frigate_url: "str?"
  frigate_camera: "str?"
  log_level: "list(DEBUG|INFO|WARNING|ERROR)"
