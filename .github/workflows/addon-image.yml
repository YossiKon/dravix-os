name: Build add-on image

# Build the HA add-on image in CI and push it to GHCR, so Home Assistant pulls a
# ready image instead of building (slowly + unreliably) on the user's box.

on:
  push:
    branches: [main]
    paths:
      - "core/**"
      - "web/**"
      - "plugins/**"
      - "dravix_os/**"
      - "deploy/addon.Dockerfile"
      - ".github/workflows/addon-image.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Read add-on version
        id: ver
        run: |
          v=$(sed -nE 's/^version:[[:space:]]*"?([^"]+)"?.*/\1/p' dravix_os/config.yaml | head -n1)
          echo "version=$v" >> "$GITHUB_OUTPUT"
          # Forks build into their own namespace automatically (GHCR owner = repo owner).
          echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"
          echo "Add-on version: $v"

      # aarch64 covers Raspberry Pi / HA Yellow / most HA installs; amd64 covers NUC/VM.
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push amd64 image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/addon.Dockerfile
          platforms: linux/amd64
          push: true
          build-args: |
            DRAVIX_VERSION=${{ steps.ver.outputs.version }}
          tags: |
            ghcr.io/${{ steps.ver.outputs.owner }}/dravix-os-amd64:${{ steps.ver.outputs.version }}
            ghcr.io/${{ steps.ver.outputs.owner }}/dravix-os-amd64:latest

      - name: Build & push aarch64 image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/addon.Dockerfile
          platforms: linux/arm64
          push: true
          build-args: |
            DRAVIX_VERSION=${{ steps.ver.outputs.version }}
          tags: |
            ghcr.io/${{ steps.ver.outputs.owner }}/dravix-os-aarch64:${{ steps.ver.outputs.version }}
            ghcr.io/${{ steps.ver.outputs.owner }}/dravix-os-aarch64:latest
