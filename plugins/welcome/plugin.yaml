name: welcome
description: Welcome-home celebration — when someone arrives home (HA person entity), the robot lights up, perks up toward the door and greets.
kind: ambient
entrypoint: mode:WelcomeMode
enabled: true
config:
  line: "Welcome back, {name}!"      # spoken greeting (English); {name} = the person's name
  line_he: "ברוך שובך, {name}!"      # spoken greeting when the language is Hebrew
  min_gap_min: 15                    # don't re-celebrate the same person within this window
  use_frigate_faces: true            # also greet by name from Frigate face recognition (if set up)
  frigate_camera: ""                 # which camera to watch for faces ("" = any); needs a Frigate URL
  face_poll_s: 6                     # how often to check Frigate for a recognised face (seconds)
  primary: ""                        # this person's name gets an extra-warm greeting (love + fistbump)
